<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Your Event Requirements · Isheeka Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#E8185A;--rose:#A01044;--pink-light:#FCEAF1;--pink-mid:#EF93B4;
    --gold:#B8893A;--gold-soft:#F0C674;
    --ink:#2A2723;--muted:#6B6660;--faint:#9A938A;--line:#E5DDD2;--line2:#F1ECE4;
    --bg:#F3EFE9;--card:#ffffff;--field:#FAF7F3;--green:#0F6E56;--red:#A32D2D;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:480px;margin:0 auto;padding:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.06);}
  /* masthead — matches the PDF cover */
  .mast{background:var(--rose);padding:20px 16px;text-align:center;}
  .mast .name{font-family:'Great Vibes',cursive;color:#fff;font-size:34px;line-height:1;}
  .mast .tag{font-family:'Cormorant Garamond',serif;font-style:italic;color:#F3C9D9;font-size:13px;margin-top:3px;}
  .mast .since{font-family:'Great Vibes',cursive;color:var(--gold-soft);font-size:17px;margin-top:2px;}
  .pad{padding:18px 18px 22px;}
  h1{font-size:16px;font-weight:600;margin:0 0 2px;}
  .sub{font-size:12px;color:var(--faint);margin-bottom:14px;}
  label{display:block;font-size:11px;color:var(--faint);margin:10px 0 4px;}
  input,select,textarea{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:9px;padding:10px 11px;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--pink-mid);}
  textarea{resize:vertical;min-height:64px;}
  .row{display:flex;gap:10px;}.row>div{flex:1;}
  .gold-label{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--gold);margin:14px 0 4px;}
  .btn{display:block;width:100%;text-align:center;font-size:14px;font-weight:600;border-radius:11px;padding:12px;border:none;cursor:pointer;font-family:inherit;}
  .btn.primary{background:var(--pink);color:#fff;}
  .btn.green{background:var(--green);color:#fff;}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted);}
  .nav{display:flex;gap:10px;margin-top:18px;}
  .nav .ghost{flex:1;}.nav .primary{flex:2;}
  .stepper{display:flex;align-items:center;gap:5px;padding:13px 18px;border-bottom:1px solid var(--line2);}
  .dot{width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;background:#F1ECE4;color:var(--faint);flex:none;}
  .dot.done{background:var(--green);color:#fff;}.dot.active{background:var(--pink);color:#fff;}
  .bar{flex:1;height:2px;background:var(--line);}.bar.fill{background:var(--pink);}.bar.done{background:var(--green);}
  .chip{display:inline-flex;align-items:center;font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;user-select:none;}
  .chip.on{background:var(--pink-light);color:var(--rose);border-color:var(--pink-mid);}
  .chip.add{border-style:dashed;color:var(--rose);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:5px 0;}
  .subrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .subrow .nm{min-width:84px;font-size:12px;}
  .subrow input{flex:1;}
  .pinbox{display:flex;gap:8px;justify-content:center;margin:14px 0;}
  .pinbox input{width:46px;height:54px;text-align:center;font-size:22px;font-weight:700;color:var(--rose);}
  .note{font-size:11px;color:var(--faint);margin-top:10px;text-align:center;}
  .link{color:var(--rose);cursor:pointer;text-decoration:underline;}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
  .itemrow{display:flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:8px;padding:7px 10px;margin-bottom:6px;}
  .itemrow.off{opacity:.72;}
  .itemrow .idesc{flex:1;min-width:0;font-size:13px;overflow-wrap:anywhere;word-break:break-word;}
  .itemrow{align-items:flex-start;}
  textarea,input{max-width:100%;}
  .addbtn{font-size:12px;color:var(--rose);background:#fff;border:1px solid var(--pink-mid);border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit;}
  .qty{display:inline-flex;align-items:center;gap:8px;}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;color:var(--rose);font-size:14px;cursor:pointer;line-height:1;}
  .qty .rm{color:var(--faint);border-color:var(--line);}
  .save-hint{font-size:11px;color:var(--green);text-align:center;margin-top:8px;}
  .err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;}
  .center{text-align:center;}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--pink);border-radius:50%;animation:s 1s linear infinite;margin:30px auto;}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="mast">
      <div class="name">Isheeka Events</div>
      <div class="tag">Making Every Event Memorable</div>
      <div class="since">Since 2017</div>
    </div>
    <div id="app"><div class="spin"></div></div>
  </div>
  <div class="note">Powered by Isheeka Events · Your details are saved automatically.</div>
</div>
<div class="toast" id="toast"></div>

<script>
const GATEWAY = (/localhost|127\.0\.0\.1/.test(location.hostname))
  ? "http://127.0.0.1:54321/functions/v1/rfq-gateway"   // local Supabase, for testing
  : "https://jlcssesetnxulnkbrmyp.supabase.co/functions/v1/rfq-gateway";
const BUDGETS = ["Under ₹1 Lakh","₹1–3 Lakh","₹3–5 Lakh","₹5–10 Lakh","₹10–20 Lakh","₹20–30 Lakh","Above ₹30 Lakh","Not sure yet"];
const SUBEVENT_SUGGEST = {
  wedding:["Mehendi","Haldi","Sangeeth","Reception"],
  "half saree":["Pooja","Reception"],
  engagement:["Ceremony","Reception"],
  birthday:["Main Function"],
  default:["Main Function"]
};
const EVENT_TYPES = ["Wedding","Half Saree","Engagement","Birthday","Baby Shower","House Warming","Corporate","Other"];

const $ = id => document.getElementById(id);
const app = $('app');
const token = new URLSearchParams(location.search).get('t') || '';
let session = sessionStorage.getItem('rfq_sess_'+token) || null;
let data = {};            // rfq fields
let subEvents = [];       // [{name, planned_date}]
let items = [];           // [{sub_event_name, description, quantity, source}]
let catalog = [];         // [{sub_event_name, description, default_quantity}]
let changeNote = null;    // staff "request changes" note, if any
let subSuggest = [];      // configured sub-events for this event type (Settings)
let subSuggestType = '';  // the event type subSuggest was fetched for
let evTypes = [];         // configured event types (Settings)
let step = 1;
let extractMsg = '';      // status line for the attachment → items extractor
let showPaste = false;    // paste-a-message box visible?
let pasteText = '';       // pasted WhatsApp message / list text
let pendingItems = null;  // client: extracted items awaiting review before merge
let pendingCosts = null;  // vendor: matched costs awaiting review before apply
let vitems = [];          // vendor mode: cost items [{rfq_item_id, description, quantity, unit_cost, can_supply, item_note}]
let vschedule = null;     // vendor mode: parent client RFQ schedule (read-only) {sub_events, location, event_date}

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

async function api(action, payload){
  const r = await fetch(GATEWAY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({action,token},payload||{}))});
  let j={}; try{ j=await r.json(); }catch(e){}
  return Object.assign({_http:r.status}, j);
}

// ---------- boot ----------
(async function boot(){
  if(!token){ app.innerHTML = msg("This link is missing its code. Please use the full link Isheeka shared with you."); return; }
  if(session){ const ok = await loadRfq(); if(ok) return; session=null; sessionStorage.removeItem('rfq_sess_'+token); }
  renderUnlock();
})();

function msg(text){ return '<div class="pad center"><p style="font-size:14px;color:var(--muted)">'+text+'</p></div>'; }

// ---------- unlock ----------
function renderUnlock(mode){
  mode = mode || 'pin';
  if(mode==='pin'){
    app.innerHTML = '<div class="pad">'
      + '<h1>Your Event Requirements</h1>'
      + '<div class="sub">Enter the PIN Isheeka shared with you.</div>'
      + '<div class="pinbox">'
        + '<input id="p0" inputmode="numeric" maxlength="1"><input id="p1" inputmode="numeric" maxlength="1">'
        + '<input id="p2" inputmode="numeric" maxlength="1"><input id="p3" inputmode="numeric" maxlength="1">'
      + '</div>'
      + '<button class="btn primary" id="pinGo">Continue →</button>'
      + '<div class="err" id="uerr"></div>'
      + '<div class="note">No PIN? <span class="link" id="toOtp">Email me a code instead</span></div>'
      + '</div>';
    const boxes=['p0','p1','p2','p3'].map($);
    boxes.forEach((b,i)=>b.addEventListener('input',()=>{ if(b.value&&i<3)boxes[i+1].focus(); }));
    boxes[0].focus();
    $('pinGo').onclick = async ()=>{
      const pin = boxes.map(b=>b.value).join('');
      if(pin.length<4){ $('uerr').textContent='Enter the 4-digit PIN.'; return; }
      $('pinGo').textContent='Checking…';
      const r = await api('verify_pin',{pin});
      if(r.ok && r.session){ session=r.session; sessionStorage.setItem('rfq_sess_'+token,session); data=r.rfq||{}; await loadRfq(); }
      else { $('pinGo').textContent='Continue →'; $('uerr').textContent = r.error==='wrong_pin' ? ('Incorrect PIN'+(r.attempts_left!=null?(' · '+r.attempts_left+' tries left'):'')) : (r.error==='locked'?'Too many tries — please wait a few minutes.':(r.error==='link_expired'?'This link has expired. Please ask Isheeka for a new one.':'Could not verify. Please try again.')); }
    };
    $('toOtp').onclick = ()=>renderUnlock('otp');
  } else {
    app.innerHTML = '<div class="pad">'
      + '<h1>Your Event Requirements</h1>'
      + '<div class="sub">We\'ll email you a 6-digit code.</div>'
      + '<label>Your email</label><input id="oem" type="email" placeholder="you@email.com">'
      + '<button class="btn ghost" id="otpSend" style="margin-top:10px">Send code</button>'
      + '<div id="otpStage" style="display:none"><label>Enter the 6-digit code</label><input id="ocode" inputmode="numeric" maxlength="6" placeholder="••••••"><button class="btn primary" id="otpGo" style="margin-top:10px">Verify →</button></div>'
      + '<div class="err" id="uerr"></div>'
      + '<div class="note"><span class="link" id="toPin">← Use a PIN instead</span></div>'
      + '</div>';
    $('toPin').onclick=()=>renderUnlock('pin');
    $('otpSend').onclick = async ()=>{
      const email=$('oem').value.trim(); if(!email){ $('uerr').textContent='Enter your email.'; return; }
      $('otpSend').textContent='Sending…';
      const r = await api('request_otp',{email});
      $('otpSend').textContent='Resend code';
      if(r.ok){ $('otpStage').style.display='block'; $('uerr').textContent=''; toast(r.stubbed?'Code generated (check function logs in test mode)':'Code sent to your email'); }
      else { $('uerr').textContent = r.error==='email_mismatch'?'That email doesn\'t match this request.':(r.error==='rate_limited'?'Please wait a bit before requesting again.':'Could not send. Try again.'); }
    };
    $('otpGo') && ($('otpGo').onclick = async ()=>{
      const email=$('oem').value.trim(), code=$('ocode').value.trim();
      const r = await api('verify_otp',{email,code});
      if(r.ok && r.session){ session=r.session; sessionStorage.setItem('rfq_sess_'+token,session); data=r.rfq||{}; await loadRfq(); }
      else $('uerr').textContent = r.error==='wrong_code'?'Incorrect code.':(r.error==='code_expired'?'Code expired — send a new one.':'Could not verify.');
    });
    // delegate (otpGo created after first send)
    app.addEventListener('click',e=>{ if(e.target&&e.target.id==='otpGo'){} });
  }
}

// ---------- load + prefill ----------
async function loadRfq(){
  const r = await api('get_rfq',{session});
  if(!(r.ok && r.rfq)){ return false; }
  data = r.rfq;
  if(data.party_type==='vendor'){ renderVendorPortal(r); return true; }   // Milestone S — vendor cost-entry mode
  subEvents = Array.isArray(data.sub_events)? data.sub_events.slice() : [];
  items = Array.isArray(r.items)? r.items.map(it=>({sub_event_name:it.sub_event_name||'',description:it.description||'',quantity:Number(it.quantity)||1,source:it.source||'custom'})) : [];
  catalog = Array.isArray(r.catalog)? r.catalog : [];
  changeNote = r.change_note||null;
  subSuggest = Array.isArray(r.subevent_suggestions)? r.subevent_suggestions : [];
  subSuggestType = (data.event_type||'').toLowerCase();
  evTypes = Array.isArray(r.event_types)? r.event_types : [];
  if(data.status==='converted'||data.status==='approved'){ renderSubmitted(false); return true; }
  if(data.status==='submitted'){ renderSubmitted(true); return true; }
  step=1; renderForm();
  return true;
}

// ---------- stepper ----------
function stepper(){
  const s=step;
  const d=(n)=>'<span class="dot '+(s>n?'done':(s===n?'active':''))+'">'+(s>n?'✓':n)+'</span>';
  const b=(n)=>'<span class="bar '+(s>n?'done':(s===n?'fill':''))+'"></span>';
  return '<div class="stepper">'+d(1)+b(1)+d(2)+b(2)+d(3)+b(3)+d(4)+'</div>';
}

// ---------- collect current step fields into `data` ----------
function collect(){
  if(step===1){
    data.contact_first_name=$('f_fname').value.trim();
    data.contact_last_name=$('f_lname').value.trim();
    data.contact_name=(data.contact_first_name+' '+data.contact_last_name).trim();
    data.contact_phone=$('f_phone').value.trim();
    data.contact_email=$('f_email').value.trim();
    data.secondary_contact_name=$('f_sname').value.trim();
    data.secondary_contact_phone=$('f_sphone').value.trim();
  } else if(step===2){
    data.event_type=$('f_type').value;
    data.event_date=$('f_date').value||null;
    data.location=$('f_venue').value.trim();
    data.city=$('f_city').value.trim();
    data.guest_count=$('f_guests').value?parseInt($('f_guests').value,10):null;
    data.budget_range=$('f_budget').value;
    data.notes=$('f_notes').value.trim();
    // sub-event dates already kept in subEvents via inputs
    data.sub_events=subEvents;
  }
}

async function save(silent, sendItems){
  collect();
  const fields={
    contact_name:data.contact_name, contact_first_name:data.contact_first_name, contact_last_name:data.contact_last_name, contact_phone:data.contact_phone,
    secondary_contact_name:data.secondary_contact_name, secondary_contact_phone:data.secondary_contact_phone,
    event_type:data.event_type, event_date:data.event_date, location:data.location, city:data.city,
    guest_count:data.guest_count, budget_range:data.budget_range, notes:data.notes,
    sub_events:data.sub_events
  };
  const payload={session,fields};
  if(sendItems) payload.items=items;   // only replace items when we're on the items step (avoids wiping on step 1–2 saves)
  const r=await api('save_rfq',payload);
  if(!silent){ if(r.ok) toast('Saved'); else if(r._http===401){ toast('Session expired — please re-enter your PIN'); session=null; renderUnlock(); } else toast('Could not save'); }
  return r.ok;
}

// ---------- form ----------
function renderForm(){
  const banner = (data.status==='changes_requested')
    ? '<div style="background:#FCEBEB;color:#A32D2D;padding:10px 14px;font-size:12px;border-bottom:1px solid #F1ECE4;">Isheeka Events has requested some changes'+(changeNote?(': '+esc(changeNote)):'')+'. Please update and resubmit.</div>'
    : '';
  app.innerHTML = banner + stepper() + '<div class="pad" id="stepbody"></div>';
  if(step===1) renderStep1();
  else if(step===2) renderStep2();
  else if(step===3) renderStep3();
  else renderStep4();
}

function renderStep1(){
  $('stepbody').innerHTML =
    '<h1>Your details</h1><div class="sub">We\'ve pre-filled what we have — please correct anything.</div>'
    + '<div class="row"><div><label>First name</label><input id="f_fname" value="'+esc(data.contact_first_name!=null?data.contact_first_name:((data.contact_name||'').trim().split(/\s+/)[0]||''))+'"></div>'
    + '<div><label>Last name</label><input id="f_lname" value="'+esc(data.contact_last_name!=null?data.contact_last_name:((data.contact_name||'').trim().split(/\s+/).slice(1).join(' ')))+'"></div></div>'
    + '<label>Phone</label><input id="f_phone" value="'+esc(data.contact_phone)+'">'
    + '<label>Email (optional)</label><input id="f_email" type="email" value="'+esc(data.contact_email)+'">'
    + '<div class="gold-label">SECONDARY CONTACT (optional)</div>'
    + '<div class="row"><div><label>Name</label><input id="f_sname" value="'+esc(data.secondary_contact_name)+'"></div>'
    + '<div><label>Phone</label><input id="f_sphone" value="'+esc(data.secondary_contact_phone)+'"></div></div>'
    + '<div class="nav"><button class="btn primary" id="next1">Next →</button></div>'
    + '<div class="save-hint">✓ Saved automatically — you can close and resume from your link</div>';
  $('next1').onclick=async()=>{ collect();
    if(!data.contact_first_name){ toast('Please enter your first name'); return; }
    if(!data.contact_phone && !data.contact_email){ toast('Add a phone or email so we can reach you'); return; }
    await save(true); step=2; renderForm(); };
}

function suggFor(type){ const t=(type||'').toLowerCase(); if(subSuggest.length && t===subSuggestType) return subSuggest; return SUBEVENT_SUGGEST[t]||SUBEVENT_SUGGEST.default; }
function renderStep2(){
  const type=(data.event_type||'').toLowerCase();
  const sugg=suggFor(type);
  $('stepbody').innerHTML =
    '<h1>Event details</h1>'
    + '<label>Main event</label><select id="f_type">'+(()=>{ let types=evTypes.length?evTypes.slice():EVENT_TYPES.slice(); if(data.event_type&&!types.includes(data.event_type)) types.unshift(data.event_type); return types.map(t=>'<option '+(data.event_type===t?'selected':'')+'>'+esc(t)+'</option>').join(''); })()+'</select>'
    + '<label>Planned date (main event)</label><input id="f_date" type="date" value="'+esc(data.event_date)+'">'
    + '<label>Functions &amp; their planned dates</label><div class="chips" id="chips"></div>'
    + '<div id="subdates"></div>'
    + '<div class="row"><div><label>Venue</label><input id="f_venue" value="'+esc(data.location)+'"></div>'
    + '<div><label>City</label><input id="f_city" value="'+esc(data.city||'Hyderabad')+'"></div></div>'
    + '<div class="row"><div><label>Guests</label><input id="f_guests" inputmode="numeric" value="'+esc(data.guest_count)+'"></div>'
    + '<div><label>Approx. budget</label><select id="f_budget">'+['<option value="">Select…</option>'].concat(BUDGETS.map(b=>'<option '+(data.budget_range===b?'selected':'')+'>'+b+'</option>')).join('')+'</select></div></div>'
    + '<label>Notes (optional)</label><textarea id="f_notes" placeholder="Anything you\'d like us to know">'+esc(data.notes)+'</textarea>'
    + '<div class="nav"><button class="btn ghost" id="back2">← Back</button><button class="btn primary" id="next2">Next →</button></div>'
    + '<div class="save-hint">✓ Saved automatically</div>';
  renderChips(sugg);
  $('f_type').onchange=()=>{ renderChips(suggFor($('f_type').value)); };
  $('back2').onclick=async()=>{ await save(true); step=1; renderForm(); };
  $('next2').onclick=async()=>{ collect();
    if(!data.event_type){ toast('Pick the main event type'); return; }
    if(!data.event_date){ toast('Pick the main event date'); return; }
    if(!subEvents.length){ toast('Pick at least one function'); return; }
    await save(true); step=3; renderForm(); };
}

function renderChips(sugg){
  const have=new Set(subEvents.map(s=>s.name.toLowerCase()));
  const all=[...new Set(sugg.concat(subEvents.map(s=>s.name)))];
  $('chips').innerHTML = all.map(n=>'<span class="chip '+(have.has(n.toLowerCase())?'on':'')+'" data-n="'+esc(n)+'">'+esc(n)+(have.has(n.toLowerCase())?' ✓':'')+'</span>').join('')
    + '<span class="chip add" id="addChip">+ add</span>';
  $('chips').querySelectorAll('.chip[data-n]').forEach(c=>c.onclick=()=>toggleSub(c.getAttribute('data-n')));
  $('addChip').onclick=()=>{ const n=prompt('Function name (e.g. Pellikoduku)'); if(n&&n.trim()){ subEvents.push({name:n.trim(),planned_date:null}); renderChips(sugg); renderSubDates(); } };
  renderSubDates();
}
function toggleSub(name){
  const i=subEvents.findIndex(s=>s.name.toLowerCase()===name.toLowerCase());
  if(i>=0) subEvents.splice(i,1); else subEvents.push({name,planned_date:null});
  renderChips(suggFor($('f_type').value));
}
function renderSubDates(){
  $('subdates').innerHTML = subEvents.map((s,i)=>
    '<div class="subrow"><span class="nm">'+esc(s.name)+'</span><input type="date" data-i="'+i+'" value="'+esc(s.planned_date)+'"></div>'
    +'<div class="subrow"><span class="nm"></span><input data-vi="'+i+'" placeholder="Venue (optional)" value="'+esc(s.venue||'')+'"></div>').join('');
  $('subdates').querySelectorAll('input[data-i]').forEach(inp=>inp.onchange=()=>{ subEvents[+inp.getAttribute('data-i')].planned_date=inp.value||null; });
  $('subdates').querySelectorAll('input[data-vi]').forEach(inp=>inp.oninput=()=>{ subEvents[+inp.getAttribute('data-vi')].venue=inp.value; });
}

// ---------- attachment / photo → item list (Claude vision via gateway) ----------
function attachErr(r){
  const e=r&&r.error;
  if(e==='extract_unavailable') return 'Photo reading isn’t enabled yet — please add items manually below.';
  if(e==='too_large') return 'That file is too large — try a smaller photo.';
  if(e==='bad_type') return 'Unsupported file — use a photo (JPG/PNG) or a PDF.';
  if(e==='extract_unreadable') return 'Couldn’t read a clear list from that — try a sharper photo, or add items manually.';
  if(e==='no_session') return 'Session expired — re-open your link and try again.';
  if(e==='no_items') return 'No items to price yet — ask Isheeka to add the requirement list first.';
  return 'Couldn’t read that '+(e?('('+e+')'):(r&&r._http?('(HTTP '+r._http+')'):''))+' — try again, or add items manually below.';
}
// Read a file into { media_type, data(base64) }. Images are downscaled to keep payload + cost low.
function fileToPayload(file){
  return new Promise((resolve,reject)=>{
    if(file.type==='application/pdf'){
      const fr=new FileReader();
      fr.onload=()=>{ try{ resolve({media_type:'application/pdf',data:String(fr.result).split(',')[1]}); }catch(e){ reject(e); } };
      fr.onerror=reject; fr.readAsDataURL(file); return;
    }
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const max=1280; let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
      if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      try{ const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
        resolve({media_type:'image/jpeg',data:c.toDataURL('image/jpeg',0.85).split(',')[1]}); }
      catch(e){ reject(e); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('unreadable_image')); };
    img.src=url;
  });
}
// Merge the extracted items into `items`, mapping each to a chosen function (creating one if needed).
function mergeExtracted(list){
  let added=0;
  (Array.isArray(list)?list:[]).forEach(ex=>{
    const desc=String((ex&&ex.description)||'').trim(); if(!desc) return;
    let seName=null;
    if(ex.sub_event){
      const m=subEvents.find(s=>s.name.toLowerCase().trim()===String(ex.sub_event).toLowerCase().trim());
      if(m) seName=m.name; else { seName=String(ex.sub_event).trim().slice(0,80); subEvents.push({name:seName,planned_date:null}); }
    }
    if(!seName){ if(!subEvents.length) subEvents.push({name:'General',planned_date:null}); seName=subEvents[0].name; }
    const qty=Math.max(1,Math.round(Number(ex.quantity)||1));
    // Keep every imported line as its own row (no auto-merge) — duplicates are removed in review.
    items.push({sub_event_name:seName,description:desc,quantity:qty,source:'attachment'}); added++;
  });
  return added;
}
// Chunk large inputs (text by ~80 lines, files one-per-call), extract in parallel, merge + de-dupe.
async function extractItemsChunked(opts){
  const calls=[];
  if(opts.text && opts.text.trim()){
    const lines=opts.text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if(lines.length<=80) calls.push({text:opts.text});
    else { for(let i=0;i<lines.length;i+=80) calls.push({text:lines.slice(i,i+80).join('\n')}); }
  }
  if(opts.files && opts.files.length){ opts.files.forEach(f=>calls.push({files:[f]})); }
  if(!calls.length) return {ok:false,error:'no_input'};
  if(calls.length===1) return await api('extract_items',Object.assign({session},calls[0]));
  const results=await Promise.all(calls.map(c=>api('extract_items',Object.assign({session},c))));
  const ok=results.filter(r=>r&&r.ok);
  if(!ok.length) return results.find(r=>r&&r.error)||{ok:false,error:'extract_failed'};
  const items=[]; ok.forEach(r=>(r.items||[]).forEach(it=>items.push(it)));   // keep all (no de-dup)
  return {ok:true,items};
}
async function extractFromText(){
  const t=(pasteText||'').trim();
  if(t.length<3){ extractMsg='Type or paste your list first.'; renderStep3(); return; }
  const st=$('attachStatus'); if(st) st.textContent='Reading your message… ⏳';
  try{
    const r=await extractItemsChunked({text:t});
    if(r&&r.ok){ showPaste=false; pasteText=''; if((r.items||[]).length){ pendingItems=r.items; extractMsg=''; } else { extractMsg='No items found in that message — add them manually below.'; } renderStep3(); }
    else { extractMsg=attachErr(r); renderStep3(); }
  }catch(e){ extractMsg='Couldn’t read that message — try again, or add items manually.'; renderStep3(); }
}
// Read up to 6 files into payloads (multi-page lists / several photos in one go).
async function filesToPayloads(fileList){
  const arr=Array.from(fileList||[]).slice(0,6); const out=[];
  for(const f of arr){ try{ out.push(await fileToPayload(f)); }catch(e){} }
  return out;
}
function pickAndExtract(camera){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept = camera ? 'image/*' : 'image/*,application/pdf';
  if(camera) inp.setAttribute('capture','environment'); else inp.multiple=true;
  inp.onchange=async()=>{
    const fl=inp.files; if(!fl||!fl.length) return;
    const st=$('attachStatus'); if(st) st.textContent='Reading your list… ⏳';
    try{
      const files=await filesToPayloads(fl);
      if(!files.length){ extractMsg='Couldn’t read that file — try a clear photo or a PDF.'; renderStep3(); return; }
      const r=await extractItemsChunked({files});
      if(r&&r.ok){ if((r.items||[]).length){ pendingItems=r.items; extractMsg=''; } else { extractMsg='No items found in that file — add them manually below.'; } renderStep3(); }
      else { extractMsg=attachErr(r); renderStep3(); }
    }catch(e){ extractMsg='Couldn’t read that file — try a clear photo or a PDF, or add items manually.'; renderStep3(); }
  };
  inp.click();
}

// ---------- vendor: price list (photo/PDF/paste) → match to fixed items, fill costs ----------
function applyExtractedCosts(costs){
  let filled=0;
  (Array.isArray(costs)?costs:[]).forEach(c=>{
    const it=vitems.find(x=>String(x.rfq_item_id)===String(c.rfq_item_id));
    if(!it) return;
    if(c.can_supply===false){ it.can_supply=false; it.unit_cost=''; it.imported=true; it.lowConf=(c.confidence==='low'); it.matchSource=c.source||''; filled++; }
    else if(c.unit_cost!=null){ it.unit_cost=String(c.unit_cost); it.can_supply=true; it.imported=true; it.lowConf=(c.confidence==='low'); it.matchSource=c.source||''; filled++; }
  });
  return filled;
}
async function pickAndExtractCosts(camera){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept = camera ? 'image/*' : 'image/*,application/pdf';
  if(camera) inp.setAttribute('capture','environment'); else inp.multiple=true;
  inp.onchange=async()=>{
    const fl=inp.files; if(!fl||!fl.length) return;
    const st=$('vattachStatus'); if(st) st.textContent='Reading your price list… ⏳';
    try{
      const files=await filesToPayloads(fl);
      if(!files.length){ extractMsg='Couldn’t read that file — try a clear photo or PDF.'; renderVendorForm(); return; }

      else { extractMsg=attachErr(r); renderVendorForm(); }
    }catch(e){ extractMsg='Couldn’t read that file — try a clear photo or PDF, or enter prices manually.'; renderVendorForm(); }

  html += vScheduleHtml();
  if(Array.isArray(pendingCosts)){
    const rows=pendingCosts.map((c,i)=>{ const it=vitems.find(x=>String(x.rfq_item_id)===String(c.rfq_item_id)); const nm=it?it.description:'item'; const val=(c.can_supply===false)?'<span style="color:#a32d2d">can’t supply</span>':(c.unit_cost!=null?('₹'+Number(c.unit_cost).toLocaleString('en-IN')):'<span style="color:#bbb">—</span>'); const conf=(c.confidence==='low')?' <span style="font-size:9px;color:#a32d2d">· low confidence</span>':''; const src=c.source?('<div style="font-size:10px;color:#aaa">from: '+esc(c.source)+'</div>'):''; return '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;border-top:1px solid #f0eee9;padding:6px 0;font-size:12.5px"><span>'+esc(nm)+conf+src+'</span><span style="display:flex;align-items:center;gap:8px;white-space:nowrap"><b>'+val+'</b><span data-vrem="'+i+'" style="cursor:pointer;color:#bbb;font-size:13px">✕</span></span></div>'; }).join('');
    html += '<div style="background:#fff;border:1px solid #e6d9bf;border-radius:12px;padding:12px 14px;margin:8px 0 14px">'
      + '<div style="font-weight:600;font-size:13.5px;color:#222">We matched '+pendingCosts.length+' price'+(pendingCosts.length===1?'':'s')+' — review, then apply</div>'
      + '<div style="margin:6px 0">'+rows+'</div>'
      + '<div style="display:flex;gap:8px"><button class="btn primary" id="vpvApply" type="button">✓ Apply prices</button><button class="btn ghost" id="vpvCancel" type="button">Cancel</button></div>'
      + '</div>';
  } else {
    html += '<div style="background:#FBF7F0;border:1px solid #ecdfca;border-radius:12px;padding:12px 14px;margin:8px 0 14px">'
      + '<div style="font-weight:600;font-size:14px;color:#7a1533">⚡ Have a price list ready?</div>'
      + '<div class="sub" style="margin:2px 0 8px">Attach a photo/PDF or paste your quote — we’ll match the prices to the items below for you to review.</div>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" id="vattachFile" type="button">📎 Attach</button><button class="btn ghost" id="vattachCam" type="button">📷 Photo</button><button class="btn ghost" id="vattachPaste" type="button">📋 Paste</button></div>'
      + (showPaste?('<div style="margin-top:10px"><textarea id="vpasteBox" rows="4" style="width:100%;box-sizing:border-box;font-size:14px;padding:8px;border:1px solid #ddd;border-radius:8px" placeholder="Paste your price list / quote here…">'+esc(pasteText)+'</textarea><div style="display:flex;gap:8px;margin-top:6px"><button class="btn primary" id="vpasteGo" type="button">✨ Match prices</button><button class="btn ghost" id="vpasteCancel" type="button">Cancel</button></div></div>'):'')
      + (vitems.some(it=>it.imported)?('<div style="margin-top:8px"><span id="vundoImport" style="cursor:pointer;color:#9a6a12;font-size:12px">↩ Clear imported prices</span></div>'):'')
      + '<div id="vattachStatus" class="sub" style="margin-top:8px;color:#7a1533">'+esc(extractMsg)+'</div>'
      + '</div>';
  }
  vitems.forEach((it,i)=>{
    html += '<div class="itemrow'+(it.can_supply?'':' off')+'" style="flex-direction:column;align-items:stretch;gap:6px">'
      + '<div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><span class="idesc">'+esc(it.description)+(it.imported?(it.lowConf?' <span style="font-size:9.5px;background:#FCE3E3;color:#a32d2d;border-radius:10px;padding:1px 7px;white-space:nowrap">⚡ imported · check carefully</span>':' <span style="font-size:9.5px;background:#FCEFD2;color:#9a6a12;border-radius:10px;padding:1px 7px;white-space:nowrap">⚡ imported · review</span>'):'')+'</span><span style="color:var(--muted);white-space:nowrap;font-size:12px">×'+it.quantity+'</span></div>'
      + '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
        + '<div style="display:flex;align-items:center;gap:4px"><span style="font-size:13px">₹</span><input data-vi="'+i+'" data-k="unit_cost" inputmode="numeric" style="width:120px'+(it.imported?(it.lowConf?';border:1px solid #e0a0a0;background:#FDF0F0':';border:1px solid #cdbd9f;background:#FCF7EC'):'')+'" value="'+esc(it.unit_cost)+'"'+(it.can_supply?'':' disabled')+'></div>'
        + '<label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin:0"><input type="checkbox" data-vi="'+i+'" data-k="can_supply" style="width:auto" '+(it.can_supply?'':'checked')+'> Can’t supply</label>'
      + '</div>'
      + ((it.imported&&it.matchSource)?'<div style="font-size:10px;color:#aaa;margin-top:-2px">matched from: '+esc(it.matchSource)+'</div>':'')
      + '<input data-vi="'+i+'" data-k="item_note" placeholder="Note (optional)" value="'+esc(it.item_note)+'" style="font-size:12px">'
      + '</div>';
  });
  html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin:12px 2px"><span style="font-size:12px;color:var(--muted)">Your total</span><span style="font-size:16px;font-weight:700" id="vtot">₹'+vendorTotal().toLocaleString('en-IN')+'</span></div>';
  html += '<label>Anything else we should know? (optional)</label><textarea id="v_notes">'+esc(data.notes||'')+'</textarea>';
  html += '<div class="nav"><button class="btn ghost" id="vsave">Save draft</button><button class="btn green" id="vsubmit">Submit bid ✓</button></div>';
  html += '<div class="err" id="verr"></div><div class="save-hint">✓ Saved automatically</div>';
  html += '</div>';
  app.innerHTML = html;
  app.querySelectorAll('[data-vi]').forEach(inp=>{
    const i=+inp.getAttribute('data-vi'), k=inp.getAttribute('data-k');
    if(k==='can_supply'){
      inp.onchange=()=>{ vitems[i].can_supply = !inp.checked; renderVendorForm(); vsaveDraft(true); };
    } else {
      inp.oninput=()=>{ vitems[i][k]= inp.value; if(k==='unit_cost' && $('vtot')) $('vtot').textContent='₹'+vendorTotal().toLocaleString('en-IN'); };
      inp.onblur=()=>{ if(k==='unit_cost' && vitems[i].imported){ vitems[i].imported=false; renderVendorForm(); } vsaveDraft(true); };
    }
  });
  $('v_notes').onblur=()=>vsaveDraft(true);
  if($('vattachFile')) $('vattachFile').onclick=()=>pickAndExtractCosts(false);
  if($('vattachCam')) $('vattachCam').onclick=()=>pickAndExtractCosts(true);
  if($('vattachPaste')) $('vattachPaste').onclick=()=>{ showPaste=true; extractMsg=''; renderVendorForm(); if($('vpasteBox')) $('vpasteBox').focus(); };
  if($('vpasteCancel')) $('vpasteCancel').onclick=()=>{ showPaste=false; pasteText=''; renderVendorForm(); };
  if($('vpasteBox')) $('vpasteBox').oninput=(e)=>{ pasteText=e.target.value; };
  if($('vpasteGo')) $('vpasteGo').onclick=()=>extractCostsFromText();
  if($('vpvApply')) $('vpvApply').onclick=()=>{ const n=applyExtractedCosts(pendingCosts||[]); pendingCosts=null; extractMsg = n+' price'+(n===1?'':'s')+' filled in — review each before submitting.'; renderVendorForm(); vsaveDraft(true); };
  if($('vpvCancel')) $('vpvCancel').onclick=()=>{ pendingCosts=null; extractMsg=''; renderVendorForm(); };
  app.querySelectorAll('[data-vrem]').forEach(x=>x.onclick=()=>{ const i=+x.getAttribute('data-vrem'); if(pendingCosts){ pendingCosts.splice(i,1); if(!pendingCosts.length) pendingCosts=null; renderVendorForm(); } });
  if($('vundoImport')) $('vundoImport').onclick=()=>{ vitems.forEach(it=>{ if(it.imported){ it.unit_cost=''; it.can_supply=true; it.imported=false; it.lowConf=false; it.matchSource=''; } }); extractMsg='Imported prices cleared.'; renderVendorForm(); vsaveDraft(true); };
  $('vsave').onclick=async()=>{ await vsaveDraft(false); };
  $('vsubmit').onclick=async()=>{
    $('vsubmit').textContent='Submitting…';
    await vsaveDraft(true);
    const r=await api('submit_rfq',{session});
    if(r.ok) renderVendorSubmitted(true);
    else { $('vsubmit').textContent='Submit bid ✓'; $('verr').textContent = r._http===401?'Session expired — re-enter your PIN.':'Could not submit. Please try again.'; }
  };
}

async function vsaveDraft(silent){
  if($('v_notes')) data.notes = $('v_notes').value.trim();
  const payloadItems = vitems.map(it=>({ rfq_item_id: it.rfq_item_id, unit_cost: it.unit_cost, can_supply: it.can_supply, item_note: it.item_note }));
  const r = await api('save_rfq', { session, fields:{ notes: data.notes }, items: payloadItems });
  if(!silent){ if(r.ok) toast('Saved'); else if(r._http===401){ toast('Session expired — please re-enter your PIN'); session=null; renderUnlock(); } else toast('Could not save'); }
  return r.ok;
}

function renderVendorSubmitted(editable){
  app.innerHTML='<div class="pad center"><h1>Thank you!</h1>'
    +'<div class="sub">Your pricing has been submitted to Isheeka Events.</div>'
    +'<p style="font-size:34px">🤝</p>'
    +(editable?'<button class="btn ghost" id="vedit" style="max-width:260px;margin:0 auto">✏️ Revise my pricing</button><div class="note">Need to change something? You can revise until pricing is finalised.</div>':'')
    +'</div>';
  if(editable){ const b=document.getElementById('vedit'); if(b) b.onclick=()=>{ renderVendorForm(); }; }
}

function esc(v){ return (v==null?'':String(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
