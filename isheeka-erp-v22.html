      {refundFor&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'60px 20px'}} onClick={e=>{if(e.target===e.currentTarget)setRefundFor(null);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:420}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--grey-100)',fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>Record vendor refund <span style={{fontSize:12,fontWeight:400,color:'var(--grey-400)'}}>· {refundFor.vendor_name||'vendor'} · paid ₹{Math.round(parseFloat(refundFor.total_paid)||0).toLocaleString('en-IN')}</span></div>
            <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label className="field-label">Refund amount (₹) <span style={{color:'var(--pink)'}}>*</span></label><input type="number" className="field-input" value={refundForm.amount} onChange={e=>setRefundForm(f=>({...f,amount:e.target.value}))} placeholder="0"/></div>
              <div><label className="field-label">Date</label><input type="date" className="field-input" value={refundForm.date} onChange={e=>setRefundForm(f=>({...f,date:e.target.value}))}/></div>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Reason <span style={{color:'var(--pink)'}}>*</span></label><input className="field-input" value={refundForm.reason} onChange={e=>setRefundForm(f=>({...f,reason:e.target.value}))} placeholder="e.g. Vendor returned advance after cancellation"/></div>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn" onClick={()=>setRefundFor(null)}>Cancel</button><button className="btn primary" disabled={vSaving} onClick={submitVendorRefund}>{vSaving?'Saving…':'Record refund'}</button></div>
          </div>
        </div>
      )}
      {instFor&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'60px 20px'}} onClick={e=>{if(e.target===e.currentTarget)setInstFor(null);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:420}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--grey-100)',fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>{instForm.id?'Edit installment':'Add installment'} <span style={{fontSize:12,fontWeight:400,color:'var(--grey-400)'}}>· {instFor.vendor_name||'vendor'}</span></div>
            <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Label</label><input className="field-input" value={instForm.label} onChange={e=>setInstForm(f=>({...f,label:e.target.value}))} placeholder="e.g. Advance, Pre-event, Final"/></div>
              <div><label className="field-label">Amount (₹) <span style={{color:'var(--pink)'}}>*</span></label><input type="number" className="field-input" value={instForm.amount} onChange={e=>setInstForm(f=>({...f,amount:e.target.value}))} placeholder="0"/></div>
              <div><label className="field-label">Due date</label><input type="date" className="field-input" value={instForm.due_date} onChange={e=>setInstForm(f=>({...f,due_date:e.target.value}))}/></div>
              {(()=>{ const sched=(eventInstallments[instFor.event_vendor_id]||[]); const others=sched.filter(x=>x.installment_id!==instForm.id).reduce((s,x)=>s+(parseFloat(x.amount_due)||0),0); const tot=others+(parseFloat(instForm.amount)||0); const agreed=parseFloat(instFor.agreed_amount)||0; const diff=tot-agreed; return <div style={{gridColumn:'1 / -1',fontSize:12,color:Math.abs(diff)<1?'var(--grey-400)':'var(--orange)'}}>Scheduled total ₹{Math.round(tot).toLocaleString('en-IN')} vs agreed ₹{Math.round(agreed).toLocaleString('en-IN')}{Math.abs(diff)<1?' · matches':(diff>0?(' · ₹'+Math.round(diff).toLocaleString('en-IN')+' over'):(' · ₹'+Math.round(-diff).toLocaleString('en-IN')+' unallocated'))}</div>; })()}
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn" onClick={()=>setInstFor(null)}>Cancel</button><button className="btn primary" disabled={vSaving} onClick={submitInstallment}>{vSaving?'Saving…':(instForm.id?'Save':'Add')}</button></div>
          </div>
        </div>
      )}
      {editEngage&&(()=>{ const paid=parseFloat(editEngage.total_paid)||0; const opts=[{id:String(editEngage.vendor_id||''),name:editEngage.vendor_name||'(current)'}].concat(vendorMaster.filter(m=>String(m.vendor_id)!==String(editEngage.vendor_id)&&!eventVendors.some(ev=>String(ev.vendor_id)===String(m.vendor_id)&&!ev.is_deleted)).map(m=>({id:String(m.vendor_id),name:m.name}))); return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'60px 20px'}} onClick={e=>{if(e.target===e.currentTarget)setEditEngage(null);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:440}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--grey-100)',fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>Edit vendor on this event</div>
            <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Vendor</label><select className="field-input" value={engForm.vendorId} disabled={paid>0} onChange={e=>setEngForm(f=>({...f,vendorId:e.target.value}))}>{opts.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>{paid>0&&<div style={{fontSize:11,color:'var(--grey-400)',marginTop:3}}>Locked — ₹{Math.round(paid).toLocaleString('en-IN')} already paid to this vendor. Remove payments to swap, or remove + re-add.</div>}</div>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Service</label><input className="field-input" value={engForm.service} onChange={e=>setEngForm(f=>({...f,service:e.target.value}))} placeholder="e.g. Mandap & florals"/></div>
              <div><label className="field-label">Agreed amount (₹)</label><input type="number" className="field-input" value={engForm.agreed} onChange={e=>setEngForm(f=>({...f,agreed:e.target.value}))} placeholder="0"/></div>
              <div style={{display:'flex',alignItems:'flex-end',fontSize:11,color:'var(--grey-400)'}}>{paid>0?('Paid ₹'+Math.round(paid).toLocaleString('en-IN')+' · balance updates to agreed − paid.'):'No payments yet.'}</div>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <button className="btn sm" style={{color:'var(--red)',borderColor:'rgba(163,45,45,0.3)'}} disabled={vSaving} title={paid>0?'Remove + void recorded payments (reason required)':'Remove from event'} onClick={()=>removeEngage(editEngage)}>🗑 {paid>0?'Remove & void payments':'Remove'}</button>
              <div style={{display:'flex',gap:8}}><button className="btn" onClick={()=>setEditEngage(null)}>Cancel</button><button className="btn primary" disabled={vSaving} onClick={submitEditEngage}>{vSaving?'Saving…':'Save'}</button></div>
            </div>
          </div>
        </div>
      ); })()}
      {removeReasonFor&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1200,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'80px 20px'}} onClick={e=>{if(e.target===e.currentTarget)setRemoveReasonFor(null);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:420}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--grey-100)',fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>Remove {removeReasonFor.vendor_name||'vendor'} &amp; void payments</div>
            <div style={{padding:20}}>
              <div style={{fontSize:13,color:'var(--grey-600)',marginBottom:10}}>₹{Math.round(parseFloat(removeReasonFor.total_paid)||0).toLocaleString('en-IN')} has been recorded against this vendor. Removing will <b>void those payments</b> (kept as an audit record, excluded from totals &amp; reports). This can't be undone in the app.</div>
              <label className="field-label">Reason for voiding <span style={{color:'var(--pink)'}}>*</span></label>
              <textarea className="field-textarea" rows={3} value={removeReason} onChange={e=>setRemoveReason(e.target.value)} placeholder="e.g. Wrong vendor selected, paid in error; refund received."/>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn" onClick={()=>setRemoveReasonFor(null)}>Cancel</button><button className="btn primary" disabled={vSaving} style={{background:'var(--red)',borderColor:'var(--red)'}} onClick={confirmVoidRemove}>{vSaving?'Removing…':'Void & remove'}</button></div>
          </div>
        </div>
      )}
      {showCancel&&(()=>{
        const activeInv=(invoices||[]).filter(i=>i.status!=='cancelled');
        const billed=activeInv.reduce((s,i)=>s+(parseFloat(i.grand_total)||0),0);
        const collected=activeInv.reduce((s,i)=>s+(parseFloat(i.total_received)||0),0);
        const unpaidCount=activeInv.filter(i=>(parseFloat(i.total_received)||0)<=0).length;
        const paidCount=activeInv.length-unpaidCount;
        const vAgreed=(eventVendors||[]).reduce((s,v)=>s+(parseFloat(v.agreed_amount)||0),0);
        const vPaid=(eventVendors||[]).reduce((s,v)=>s+(parseFloat(v.total_paid)||0),0);
        const dueInst=Object.values(eventInstallments||{}).reduce((s,arr)=>s+arr.filter(it=>vendorInstBalance(it)>0.5).length,0);
        const inr=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
        return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1300,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 20px',overflowY:'auto'}} onClick={e=>{if(e.target===e.currentTarget)setShowCancel(false);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:580}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>⛔ Cancel event — {event.ref_number} · {event.name}</div><button className="btn sm" onClick={()=>setShowCancel(false)}>✕</button></div>
            <div style={{padding:'16px 20px'}}>
              {collected>0&&<div style={{background:'var(--red-light)',border:'1px solid rgba(163,45,45,0.25)',borderRadius:'var(--radius-md)',padding:'10px 12px',fontSize:12,color:'var(--red)',marginBottom:14}}>⚠ {inr(collected)} has been collected on this event. Cancelling keeps the paid invoice as a record and flags a refund to arrange offline — the app does not move money.</div>}
              <div style={{fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>What will be affected</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'10px 12px',fontSize:12.5}}><div style={{color:'var(--grey-400)',fontSize:12}}>🧾 Invoices</div>{activeInv.length} · {inr(billed)} billed · <span style={{color:'var(--green)'}}>{inr(collected)} collected</span></div>
                <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'10px 12px',fontSize:12.5}}><div style={{color:'var(--grey-400)',fontSize:12}}>🔧 Vendors</div>{(eventVendors||[]).length} · {inr(vPaid)} paid · {dueInst} due installment{dueInst===1?'':'s'}</div>
                <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'10px 12px',fontSize:12.5}}><div style={{color:'var(--grey-400)',fontSize:12}}>💰 Expenses</div>{inr(expTotal)} (kept as sunk cost)</div>
                <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'10px 12px',fontSize:12.5}}><div style={{color:'var(--grey-400)',fontSize:12}}>🎪 Sub-events · Lead</div>{(subEvents||[]).length} sub-event{(subEvents||[]).length===1?'':'s'}{linkedLead?(' · '+(linkedLead.ref_number||'lead')):''}</div>
              </div>
              {cancelInvList.length>0&&<div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Client money collected — refund or retain? <span style={{color:'var(--red)'}}>*</span></div>
                {cancelInvList.map(i=>{ const h=invHandling[i.invoice_id]||{}; const recv=Math.round(parseFloat(i.total_received)||0); return (
                  <div key={i.invoice_id} style={{padding:'7px 0',borderTop:'1px solid var(--grey-100)',fontSize:12.5}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span>{i.ref_number} <span style={{color:'var(--grey-400)'}}>· {inr(recv)} collected</span></span></div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <button className={'btn sm'+(h.mode==='refund'?' primary':'')} style={{fontSize:11,padding:'2px 10px'}} onClick={()=>setInvHandling(p=>({...p,[i.invoice_id]:{...p[i.invoice_id],mode:'refund'}}))}>Refund to client</button>
                      <button className={'btn sm'+(h.mode==='retain'?' primary':'')} style={{fontSize:11,padding:'2px 10px'}} onClick={()=>setInvHandling(p=>({...p,[i.invoice_id]:{...p[i.invoice_id],mode:'retain'}}))}>Retain (keep)</button>
                      {h.mode==='refund'&&<span style={{fontSize:11,color:'var(--grey-400)'}}>₹<input type="number" value={h.amount} onChange={e=>setInvHandling(p=>({...p,[i.invoice_id]:{...p[i.invoice_id],amount:e.target.value}}))} style={{width:90,padding:'2px 6px',border:'1px solid var(--grey-200)',borderRadius:4,fontSize:12}}/> refunded {parseFloat(h.amount)<recv?('· '+inr(recv-(parseFloat(h.amount)||0))+' retained'):''}</span>}
                    </div>
                  </div>
                ); })}
              </div>}
              {cancelVenList.length>0&&<div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Vendor money paid — recovered or lost? <span style={{color:'var(--red)'}}>*</span></div>
                {cancelVenList.map(v=>{ const h=venHandling[v.event_vendor_id]||{}; const paid=Math.round(parseFloat(v.total_paid)||0); return (
                  <div key={v.event_vendor_id} style={{padding:'7px 0',borderTop:'1px solid var(--grey-100)',fontSize:12.5}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span>{v.vendor_name||'Vendor'} <span style={{color:'var(--grey-400)'}}>· {inr(paid)} paid</span></span></div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <button className={'btn sm'+(h.mode==='recover'?' primary':'')} style={{fontSize:11,padding:'2px 10px'}} onClick={()=>setVenHandling(p=>({...p,[v.event_vendor_id]:{...p[v.event_vendor_id],mode:'recover'}}))}>Recovered (reverse)</button>
                      <button className={'btn sm'+(h.mode==='lost'?' primary':'')} style={{fontSize:11,padding:'2px 10px'}} onClick={()=>setVenHandling(p=>({...p,[v.event_vendor_id]:{...p[v.event_vendor_id],mode:'lost'}}))}>Lost — write off</button>
                      {h.mode==='recover'&&<span style={{fontSize:11,color:'var(--grey-400)'}}>₹<input type="number" value={h.amount} onChange={e=>setVenHandling(p=>({...p,[v.event_vendor_id]:{...p[v.event_vendor_id],amount:e.target.value}}))} style={{width:90,padding:'2px 6px',border:'1px solid var(--grey-200)',borderRadius:4,fontSize:12}}/> recovered {parseFloat(h.amount)<paid?('· '+inr(paid-(parseFloat(h.amount)||0))+' lost'):''}</span>}
                    </div>
                  </div>
                ); })}
              </div>}
              <div style={{fontSize:12,lineHeight:1.7,marginBottom:14,color:'var(--grey-400)'}}>
                {unpaidCount>0&&<div>• Void {unpaidCount} unpaid invoice{unpaidCount===1?'':'s'} → cancelled</div>}
                {dueInst>0&&<div>• Cancel {dueInst} unpaid vendor installment{dueInst===1?'':'s'} (stops overdue alerts)</div>}
                <div>• Keep {inr(expTotal)} expenses as records (sunk cost in Reports)</div>
                {linkedLead&&<div>• Add a dated note to lead {linkedLead.ref_number||''}</div>}
              </div>
              {linkedLead&&<div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Source lead {linkedLead.ref_number||''}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {[['leave','Leave as-is'],['reopen','Reopen → Contacted'],['lost','Mark Lost']].map(([v,l])=>(
                    <button key={v} className={'btn sm'+(leadAction===v?' primary':'')} style={{fontSize:11,padding:'3px 10px'}} onClick={()=>setLeadAction(v)}>{l}</button>
                  ))}
                </div>
              </div>}
              <label className="field-label">Reason for cancellation <span style={{color:'var(--pink)'}}>*</span></label>
              <textarea className="field-textarea" rows={2} value={cancelReason} onChange={e=>setCancelReason(e.target.value)} placeholder="e.g. Client postponed indefinitely; date clash; budget withdrawn."/>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--grey-400)'}}>Reversible — you can reopen later (status only)</span>
              <div style={{display:'flex',gap:8}}><button className="btn" onClick={()=>setShowCancel(false)}>Keep event</button><button className="btn primary" disabled={cancelling||!cancelReason.trim()||!cancelChoicesComplete} title={!cancelChoicesComplete?'Mark every client and vendor payment first':''} style={{background:'var(--red)',borderColor:'var(--red)'}} onClick={doCancelEvent}>{cancelling?'Cancelling…':'Cancel this event'}</button></div>
            </div>
          </div>
        </div>
        ); })()}
    </div>
  );

  // ── EDIT MODE ────────────────────────────────────────────────────────────────
  return (
    <div>
      {header}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'20px 24px',border:'1px solid var(--grey-100)',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Event details</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:14}}>
          <EvtInput label="Event name" required value={form.name} onChange={v=>setF('name',v)} error={errors.name}/>
          <EvtSelect label="Event type" value={form.type} onChange={v=>setF('type',v)} options={typeOpts}/>
          <EvtSelect label="Status" value={form.status} onChange={v=>setF('status',v)} options={statusOpts}/>
          <EvtInput label="Main event date" required type="date" value={form.main_date} onChange={v=>setF('main_date',v)} error={errors.main_date}/>
          <EvtAutoInput label="Location" required value={form.location} onChange={v=>setF('location',v)} placeholder="e.g. Hyderabad" table="events" column="location"/>
          <EvtInput label="Guest count" type="number" value={form.guest_count} onChange={v=>setF('guest_count',v)}/>
          <EvtInput label="Budget (₹)" type="number" value={form.budget} onChange={v=>setF('budget',v)}/>
          <EvtSelect label="Assigned staff" value={form.assigned_staff_id||''} onChange={v=>{
            const s=staffList.find(x=>x.user_id===v);
            setF('assigned_staff_id',v);
            setForm(f=>({...f,assigned_staff_name:s?s.first_name+' '+s.last_name:''}));
          }} options={staffOpts} placeholder="Select staff..."/>
          <EvtSelect label="Primary contact" value={form.primary_contact_id||''} onChange={v=>{
            const ac=altContacts.find(x=>x.contact_id===v);
            setF('primary_contact_id',v);
            setForm(f=>({...f,primary_contact_name:ac?ac.first_name+' '+ac.last_name:event.client_name}));
          }} options={contactOpts} placeholder="Client themselves"/>
          <EvtSelect label="Secondary contact" value={form.secondary_contact_id||''} onChange={v=>{
            const ac=altContacts.find(x=>x.contact_id===v);
            setF('secondary_contact_id',v);
            setForm(f=>({...f,secondary_contact_name:ac?ac.first_name+' '+ac.last_name:''}));
          }} options={[{value:'',label:'None'},...altContacts.map(ac=>({value:ac.contact_id,label:ac.first_name+' '+ac.last_name+' ('+ac.relationship+')'}))]} placeholder="None"/>
        </div>
        <EvtTextarea label="Internal notes" value={form.internal_notes} onChange={v=>setF('internal_notes',v)} placeholder="Any internal notes..."/>
      </div>

      {/* Sub-events edit */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)'}}>Sub-events & items</div>
          <button className="btn sm" style={{border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}}
            onClick={()=>setEditSubEvents(s=>[...s,{id:'new-'+Date.now(),name:'',date:'',location:'',items:[]}])}>+ Add sub-event</button>
        </div>
        {editSubEvents.map((se,si)=>(
          <div key={se.id||se.sub_event_id} style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'12px',marginBottom:10,border:'1px solid var(--grey-100)'}}>
            <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#e8185a',flexShrink:0}}/>
              <SubEventNameInput value={se.name} onChange={v=>setEditSubEvents(s=>s.map((x,i)=>i===si?{...x,name:v}:x))}/>
              <SubEventDateInput value={se.date} onChange={v=>setEditSubEvents(s=>s.map((x,i)=>i===si?{...x,date:v}:x))}/>
              <SubEventLocInput value={se.location} onChange={v=>setEditSubEvents(s=>s.map((x,i)=>i===si?{...x,location:v}:x))}/>
              <SubEventTplBtn templates={evTemplates} onPick={tpl=>loadTemplateIntoEditSub(si,tpl)} onImport={items=>setEditSubEvents(s=>s.map((x,i)=>i===si?{...x,items}:x))}/>
              <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:14}}
                onClick={()=>setEditSubEvents(s=>s.filter((_,i)=>i!==si))}>🗑</button>
            </div>
            <FastEntryTable key={se.id||se.sub_event_id} items={se.items||[]} onChange={items=>setEditSubEvents(s=>s.map((x,i)=>i===si?{...x,items}:x))}/>
          </div>
        ))}
        <div style={{marginTop:8,paddingTop:8,borderTop:'1px dashed var(--grey-200)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <div style={{fontSize:12,color:'var(--grey-400)',flex:1}}>Main event items</div>
            <SubEventTplBtn templates={evTemplates} onPick={tpl=>loadTemplateIntoEditMain(tpl)} onImport={items=>setEditMainItems(items)}/>
          </div>
          <FastEntryTable key="main-items" items={editMainItems} onChange={setEditMainItems}/>
        </div>
      </div>
    </div>
  );
}

function NewTaskInput({value, onChange, onEnter}) {
  return <input className="field-input" style={{flex:1}} value={value} onChange={e=>onChange(e.target.value)}
    placeholder="Add a task..." onKeyDown={e=>{if(e.key==='Enter') onEnter();}}/>;

function mapLostReason(outcome, reason){ if(outcome==='us'){ return reason==='out_of_service_area'?'out_of_service_area':'other'; } const ok=['price_too_high','went_with_competitor','event_postponed','no_response','other']; return ok.includes(reason)?reason:'other'; }
// Close a quote as not-proceeding: quote→rejected, log the reason, and (lead-origin) mark the lead lost.
async function closeQuoteNotProceeding(quot, opts){
  const outcome=(opts&&opts.outcome)||'client', reason=(opts&&opts.reason)||'other', notes=((opts&&opts.notes)||'').trim();
  const list=REJECT_REASONS[outcome]||REJECT_REASONS.client; const rLabel=(list.find(r=>r.value===reason)||{}).label||reason;
  const who=outcome==='us'?'We withdrew':'Client declined'; const summary=who+' — '+rLabel+(notes?(': '+notes):'');
  const {error}=await supabase.from('quotations').update({status:'rejected',updated_at:new Date().toISOString()}).eq('quotation_id',quot.quotation_id); if(error) throw error;
  try{ await supabase.from('quotation_activity_log').insert({quotation_id:quot.quotation_id, action:'rejected', notes:summary, logged_by:await _currentUid()}); }catch(e){}
  if(quot.lead_id){ try{ await supabase.from('leads').update({stage:'lost', lost_reason:mapLostReason(outcome,reason), lost_notes:summary, updated_at:new Date().toISOString()}).eq('lead_id',quot.lead_id); }catch(e){} }

}

let _eventTypesCache = null;
// value -> label map, used by eventTypeLabel() for display. Seeded with the
// defaults so built-ins render correctly even before the table loads.
let _eventTypeLabelMap = Object.fromEntries(EVENT_TYPES_DEFAULT.map(t=>[t.value,t.label]));
async function fetchEventTypes() {

  try {

// Hook: configurable event types as [{value,label}] (falls back to defaults).
function useEventTypes() {

}
// Display label for a stored event-type value: prefer the configured label,
// else prettify the value (under_scores -> "Title Case") so it always reads cleanly.
function prettyTypeValue(v){ return String(v||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function eventTypeLabel(v){ if(!v) return ''; return _eventTypeLabelMap[v] || prettyTypeValue(v); }
// Default document/event name from an event-type value: "Half Saree" -> "Half Saree Event".
function defaultEventName(typeValue){ const l=eventTypeLabel(typeValue); return l?(l+' Event'):'Event'; }

// Today as a local YYYY-MM-DD string (for date-only comparisons, no UTC drift).
function todayLocalStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// Effective (display) event status: an event past its main date that isn't completed/cancelled reads as "in_progress".
function effectiveEventStatus(e){ if(!e) return ''; const s=(e.status||'').toLowerCase(); if(['completed','cancelled'].includes(s)) return s; if(e.main_date && e.main_date<=todayLocalStr() && ['planning','confirmed'].includes(s)) return 'in_progress'; return s; }
// Quote past its validity — DISPLAY flag only (does not change the stored status or block actions).
function isQuoteExpired(q){ return !!(q && q.status==='sent' && q.valid_until && q.valid_until<todayLocalStr()); }
// Invoice past its due date and not fully paid — drives the 'overdue' status.
function isInvoiceOverdue(i){ return !!(i && ['sent','partially_paid'].includes((i.status||'').toLowerCase()) && i.due_date && i.due_date<todayLocalStr()); }
function vendorInstBalance(inst){ return Math.max(0,(parseFloat(inst&&inst.amount_due)||0)-(parseFloat(inst&&inst.amount_paid)||0)); }
function isVendorInstOverdue(inst){ return !!(inst && inst.due_date && inst.due_date<todayLocalStr() && vendorInstBalance(inst)>0.5); }
function isVendorInstDueSoon(inst, days){ if(!inst||!inst.due_date||vendorInstBalance(inst)<=0.5) return false; const t=todayLocalStr(); if(inst.due_date<t) return false; const d=new Date(); d.setDate(d.getDate()+(days||5)); const soon=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); return inst.due_date<=soon; }
// Collapsed lead-stage label for the chip (the quote owns its own sub-states now).
function leadStageDisplay(stage){ if(['quote_generation_in_progress','quote_sent','quote_revision_pending','revised_quote_sent','quote_confirmed'].includes(stage)) return 'Quoting'; return (LEAD_STAGE_LABELS[stage]||stage); }

// Cormorant Garamond (bold-italic) for the PDF cover — fetched once from CDN, base64 cached for jsPDF.
// Falls back to Times-italic in buildQuotationPDF if this hasn't loaded (e.g. offline).
let _CG_B64=null;
(function(){ try{ fetch('https://cdn.jsdelivr.net/gh/google/fonts/ofl/cormorantgaramond/CormorantGaramond-BoldItalic.ttf').then(r=>r.ok?r.arrayBuffer():null).then(buf=>{ if(!buf) return; const bytes=new Uint8Array(buf); let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]); _CG_B64=btoa(bin); }).catch(()=>{}); }catch(e){} })();

// Timezone-safe date formatter. A bare 'YYYY-MM-DD' is built from its parts as a
// LOCAL date (avoids new Date('YYYY-MM-DD') being parsed as UTC and shifting a day
// in non-UTC timezones). Full timestamps fall through to normal parsing.
function fmtDate(d, opts){
  if(!d) return '—';
  const s=String(d);
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const dt = m ? new Date(+m[1], +m[2]-1, +m[3]) : new Date(s);
  if(isNaN(dt.getTime())) return '—';
  return dt.toLocaleDateString('en-IN', opts||{day:'numeric',month:'short',year:'numeric'});
}

// ── Lead follow-up urgency ────────────────────────────────────────────────────
function getFollowUpUrgency(date) {
  if(!date) return 'none';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.floor((d-today)/(1000*60*60*24));
  if(diff < 0) return 'overdue';
  if(diff === 0) return 'today';
  if(diff <= 7) return 'week';
  return 'future';
}

// ── Lead Detail ───────────────────────────────────────────────────────────────
function LeadDetail({leadId, onBack, onConverted, onCreateFromReference, onNavigate}) {
  const [lead, setLead] = React.useState(null);
  const [subEvents, setSubEvents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [mode, setMode] = React.useState('view');
  const [saving, setSaving] = React.useState(false);
  const [showLoss, setShowLoss] = React.useState(false);
  const [showWelcome, setShowWelcome] = React.useState(false);
  const [convertedEventId, setConvertedEventId] = React.useState(null);
  const [showOldQuotes, setShowOldQuotes] = React.useState(false);
  const [convertClientOutcome, setConvertClientOutcome] = React.useState(null); // {type:'created'|'reused', name:string}
  const [showLostConfirm, setShowLostConfirm] = React.useState(false);
  const [showQuoteWizard, setShowQuoteWizard] = React.useState(false);
  const [leadQuotations, setLeadQuotations] = React.useState([]);
  const [linkedEvent, setLinkedEvent] = React.useState(null);
  const [successMsg, setSuccessMsg] = React.useState('');
  const [staffList, setStaffList] = React.useState([]);

  React.useEffect(()=>{ loadLead(); },[leadId]);

  const loadLead = async () => {
    setLoading(true); setMode('view');
    const [{data:l},{data:ses},{data:staff},{data:quots}] = await Promise.all([
      supabase.from('leads').select('*').eq('lead_id',leadId).single(),
      supabase.from('lead_sub_events').select('*').eq('lead_id',leadId).eq('is_deleted',false).order('sort_order'),
      supabase.from('users').select('user_id,first_name,last_name').eq('status','active'),
      supabase.from('quotations').select('quotation_id,ref_number,status,grand_total,valid_until,revision_number,created_at').eq('lead_id',leadId).eq('is_deleted',false).order('created_at',{ascending:false}),
    ]);
    if(l) setLead(l);
    if(ses) setSubEvents(ses);
    if(staff) setStaffList(staff);
    if(quots) setLeadQuotations(quots);
    if(l && l.event_id){
      const {data:ev} = await supabase.from('events').select('event_id,ref_number,name,status,main_date,location,type').eq('event_id',l.event_id).single();
      setLinkedEvent(ev||null);
    } else { setLinkedEvent(null); }
    setLoading(false);
  };

  const handleSave = async (form, ses) => {
    setSaving(true);
    try {
      const {error} = await supabase.from('leads').update({
        first_name: form.first_name,
        last_name: form.last_name,
        phone: form.phone,
        phone_2: form.phone_2||null,
        email: form.email||null,
        source: form.source||null,
        referred_by: form.referred_by||null,
        event_type: form.event_type||null,
        tentative_date: form.tentative_date||null,
        location: form.location||null,
        budget: form.budget?parseFloat(form.budget):null,
        guest_count: form.guest_count?parseInt(form.guest_count):null,
        venue_preference: form.venue_preference||null,
        stage: form.stage||'new',
        assigned_to: form.assigned_to||null,
        notes: form.notes||null,
        follow_up_date: form.follow_up_date||null,
        updated_at: new Date().toISOString()
      }).eq('lead_id',leadId);
      if(error) throw error;

      // Item 8: cascade name / phone / email changes to the linked client + active quotations
      const nameChanged = (form.first_name!==lead.first_name)||(form.last_name!==lead.last_name);
      const phoneChanged = (form.phone||'')!==(lead.phone||'');
      const emailChanged = (form.email||'')!==(lead.email||'');
      if((nameChanged||phoneChanged||emailChanged) && lead.client_id){
        const {error:cce}=await supabase.from('clients').update({
          first_name:form.first_name,last_name:form.last_name,
          phone_1:form.phone,email_1:form.email||null,
          updated_at:new Date().toISOString()
        }).eq('client_id',lead.client_id);
        if(cce) throw cce;
      }
      if(nameChanged){
        const newClientName=form.first_name+' '+form.last_name;
        const {data:quots}=await supabase.from('quotations').select('quotation_id,status').eq('lead_id',leadId).eq('is_deleted',false);
        const targets=(quots||[]).filter(q=>!['superseded','rejected','expired','converted'].includes(q.status));
        for(const q of targets){
          const {error:qcce}=await supabase.from('quotations').update({client_name:newClientName,updated_at:new Date().toISOString()}).eq('quotation_id',q.quotation_id); if(qcce) throw qcce;
        }
      }

      await loadLead();
      setSuccessMsg('Lead updated successfully!');
      setTimeout(()=>setSuccessMsg(''),4000);
    } catch(err) {
      setSuccessMsg('');
      console.error('[Isheeka ERP] lead save failed:', err);
      notify('Could not save lead: '+(err?.message||'Please try again.'),'error');
    } finally { setSaving(false); }
  };



  const handleStageChange = async (newStage) => {
    try {
      const {error} = await supabase.from('leads')
        .update({stage:newStage, updated_at:new Date().toISOString()})
        .eq('lead_id',leadId);
      if(error) throw error;
      setLead(l=>({...l,stage:newStage}));
      // Item 16: confirming the quote approves the active quotation
      if(newStage==='quote_confirmed' && lead.active_quotation_id){
        const {error:ae}=await supabase.from('quotations').update({status:'approved',updated_at:new Date().toISOString()}).eq('quotation_id',lead.active_quotation_id); if(ae) throw ae;
        const {data:quots}=await supabase.from('quotations').select('quotation_id,ref_number,status,grand_total,valid_until,revision_number,created_at').eq('lead_id',leadId).eq('is_deleted',false).order('created_at',{ascending:false});
        if(quots) setLeadQuotations(quots);
      }
      const labels = {
        contacted:'Lead marked as Contacted.',
        quote_sent:'Quote sent to client.',
        quote_revision_pending:'Revision requested — lead updated.',
        revised_quote_sent:'Revised quote sent to client.',
        quote_confirmed:'Quote confirmed by client! Ready to convert.',
      };
      setSuccessMsg(labels[newStage]||'Stage updated.');
      setTimeout(()=>setSuccessMsg(''),4000);
    } catch(err) {
      console.error('[Isheeka ERP] stage update failed:', err);
      notify('Could not update stage: '+(err?.message||'Please try again.'),'error');
    }
  };

  const handleCreateFromLostLead = async () => {
    setShowLostConfirm(false);
    // Load sub-events for this lead
    const {data:ses} = await supabase.from('lead_sub_events')
      .select('*').eq('lead_id',leadId).eq('is_deleted',false).order('sort_order');
    // Build reference data — copy all, reset stage to new
    const refData = {
      first_name: lead.first_name||'',
      last_name: lead.last_name||'',
      phone: lead.phone||'',
      phone_2: lead.phone_2||'',
      email: lead.email||'',
      source: lead.source||'',
      referred_by: lead.referred_by||'',
      event_type: lead.event_type||'',
      tentative_date: lead.tentative_date||'',
      location: lead.location||'',
      budget: lead.budget||'',
      guest_count: lead.guest_count||'',
      venue_preference: lead.venue_preference||'',
      stage: 'new',
      assigned_to: lead.assigned_to||'',
      follow_up_date: '',
      notes: lead.notes ? '[Based on lost lead: '+lead.first_name+' '+lead.last_name+'] '+lead.notes : 'Based on lost lead: '+lead.first_name+' '+lead.last_name,
      subEvents: (ses||[]).map(se=>({name:se.name,date:se.date||'',location:se.location||''})),
    };
    onCreateFromReference && onCreateFromReference(refData);
  };

  const handleLoss = async (reason, notes) => {
    const {error:lle}=await runDb(supabase.from('leads').update({
      stage:'lost',lost_reason:reason,lost_notes:notes||null,
      lost_at:new Date().toISOString(),updated_at:new Date().toISOString()
    }).eq('lead_id',leadId),'mark lead as lost');
    if(lle) return;
    // Sync: reject the lead's active quote so quote + lead don't diverge.
    const activeQ=(leadQuotations||[]).find(q=>!['superseded','rejected','expired','converted','invoiced'].includes(q.status));
    if(activeQ){
      const rl=(LEAD_LOSS_REASONS.find(r=>r.value===reason)||{}).label||reason;
      await supabase.from('quotations').update({status:'rejected',updated_at:new Date().toISOString()}).eq('quotation_id',activeQ.quotation_id);
      try{ await supabase.from('quotation_activity_log').insert({quotation_id:activeQ.quotation_id, action:'rejected', notes:'Lead marked lost — '+rl+(notes?(': '+notes):''), logged_by:await _currentUid()}); }catch(e){}
    }
    setShowLoss(false);
    await loadLead();
    setSuccessMsg('Lead marked as lost.'+(activeQ?' Active quote '+activeQ.ref_number+' rejected.':''));
    setTimeout(()=>setSuccessMsg(''),4000);
  };

  // Phone normalization for client dedup
  const normPhone = (s) => (s||'').replace(/\D/g,'').replace(/^91(\d{10})$/,'$1');

  // (lead-origin conversion now lives on the quote page via createEventFromQuote; the
  //  in-lead convert flow + its ConvertLeadModal/ClientMatchModal mounts were removed.)

  if(loading) return <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>;
  if(!lead) return <div style={{padding:40,textAlign:'center',color:'var(--grey-400)'}}>Lead not found.</div>;

  if(mode==='edit') return (
    <LeadForm
      initial={{...lead,subEvents}}
      originalLead={lead}
      originalSubEvents={subEvents}
      title="Edit lead"
      lockEventFields={leadQuotations.some(q=>!['superseded','rejected','expired'].includes(q.status))}
      onSave={async (form,ses)=>{ await handleSave(form,ses); setMode('view'); }}
      onCancel={()=>setMode('view')}
    />
  );

  const sc = lead.stage==='lost'
    ? {bg:'#FCEBEB',color:'#A32D2D'}
    : LEAD_STAGE_COLORS[lead.stage]||LEAD_STAGE_COLORS.new;
  const urgency = getFollowUpUrgency(lead.follow_up_date);
  const uc = URGENCY_COLORS[urgency];
  const isLost = lead.stage==='lost';
  const isConverted = lead.stage==='event_triggered';
  const lossLabel = LEAD_LOSS_REASONS.find(r=>r.value===lead.lost_reason)?.label||lead.lost_reason;

  return (
    <div>
      {showLoss&&<LossReasonModal onSave={handleLoss} onCancel={()=>setShowLoss(false)}/>}
      {showLostConfirm&&<LostLeadEditModal
        onEditAnyway={()=>{setShowLostConfirm(false);setMode('edit');}}
        onCreateFromReference={handleCreateFromLostLead}
        onCancel={()=>setShowLostConfirm(false)}
      />}
      {showQuoteWizard&&<QuoteGenerationWizard
        lead={lead}
        leadSubEvents={subEvents}
        isRevision={lead.stage==='quote_revision_pending'}
        isContinuation={lead.stage==='quote_generation_in_progress'||(!!(lead.active_quotation_id)&&lead.stage==='contacted')}
        existingQuotationId={(lead.stage==='quote_revision_pending'||lead.stage==='quote_generation_in_progress'||lead.active_quotation_id)?lead.active_quotation_id:null}
        onComplete={async()=>{ setShowQuoteWizard(false); await loadLead(); }}
        onCancel={()=>setShowQuoteWizard(false)}
      />}
      {showWelcome&&<WelcomeMessageModal
        lead={lead}
        quotRef={(leadQuotations.find(q=>q.quotation_id===lead.active_quotation_id)||{}).ref_number}
        clientOutcome={convertClientOutcome}
        onGoToEvent={()=>{ setShowWelcome(false); if(onNavigate&&convertedEventId){ onNavigate('events',{eventId:convertedEventId}); } else { onConverted&&onConverted(); } }}
        onClose={()=>{ setShowWelcome(false); onConverted&&onConverted(); }}
      />}


      {successMsg&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:12,border:'1px solid rgba(15,110,86,0.2)'}}>✅ {successMsg}</div>}

      {/* Header */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'18px 24px',border:'1px solid var(--grey-100)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)',marginBottom:4}}>{lead.first_name} {lead.last_name}{lead.ref_number&&<span style={{fontSize:13,fontWeight:400,color:'var(--grey-400)',marginLeft:8}}>{lead.ref_number}</span>}</div>
          <div style={{fontSize:12,color:'var(--grey-400)',marginBottom:6}}>{lead.phone}{lead.email?' · '+lead.email:''}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>
              {isLost?'LOST':leadStageDisplay(lead.stage)}
            </span>
            {lead.event_type&&<span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--blue-light)',color:'var(--blue)',textTransform:'capitalize'}}>{eventTypeLabel(lead.event_type)}</span>}
            {lead.source&&<span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--grey-100)',color:'var(--grey-400)',textTransform:'capitalize'}}>{lead.source.replace('_',' ')}</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {/* Stage badge — always visible */}
          <span style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:500,background:sc.bg,color:sc.color}}>
            {isLost?'LOST':isConverted?'CONVERTED':leadStageDisplay(lead.stage)}
          </span>
          {!isLost&&!isConverted&&(
            <>
              {/* Next action buttons — context aware per stage */}
              {lead.stage==='new'&&(
                <button className="btn sm" style={{background:'var(--blue-light)',color:'var(--blue)',border:'1px solid #93C5FD'}}
                  onClick={()=>handleStageChange('contacted')}>✓ Mark as contacted</button>
              )}
              {lead.stage==='contacted'&&(
                <button className="btn sm" style={{background:'#F3E5F5',color:'#6A1B9A',border:'1px solid #CE93D8'}}
                  onClick={()=>setShowQuoteWizard(true)}>📋 Generate quote</button>
              )}
              {/* Once a quote exists, all quote work lives on the quote page — the lead just links to it. */}
              {['quote_generation_in_progress','quote_sent','quote_revision_pending','revised_quote_sent','quote_confirmed'].includes(lead.stage)&&lead.active_quotation_id&&(
                <button className="btn sm primary" onClick={()=>onNavigate&&onNavigate('quotations',{quotId:lead.active_quotation_id,label:(leadQuotations.find(q=>q.quotation_id===lead.active_quotation_id)||{}).ref_number||'Quote'})}>📄 Open active quote →</button>
              )}
              <button className="btn sm" style={{color:'#A32D2D',border:'1px solid #FCEBEB'}}
                onClick={()=>setShowLoss(true)}>✕ Lost</button>
              <button className="btn sm" onClick={()=>setMode('edit')}>✏️ Edit</button>
            </>
          )}
          {isConverted&&<button className="btn sm" onClick={()=>setMode('edit')}>✏️ Edit</button>}
          {isLost&&<button className="btn sm" onClick={()=>setShowLostConfirm(true)}>✏️ Edit</button>}
        </div>
      </div>

      {/* Info grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* Event details */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Event details</div>
          {[
            ['Event type',lead.event_type?eventTypeLabel(lead.event_type):'—'],
            ['Tentative date',lead.tentative_date?fmtDate(lead.tentative_date,{day:'numeric',month:'long',year:'numeric'}):'—'],
            ['Location',lead.location||'—'],
            ['Approx. budget',lead.budget?'₹'+parseFloat(lead.budget).toLocaleString('en-IN'):'—'],
            ['Guest count',lead.guest_count||'—'],
            ['Venue preference',lead.venue_preference||'—'],
          ].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
              <span style={{color:'var(--grey-400)'}}>{l}</span>
              <span style={{fontWeight:500,color:'var(--grey-800)'}}>{v}</span>
            </div>
          ))}
        </div>

        {/* Follow-up + pipeline */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Pipeline & follow-up</div>

          {/* Follow-up date */}
          <div style={{background:uc.bg,borderRadius:'var(--radius-md)',padding:'12px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:uc.color,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2}}>Follow-up</div>
              <div style={{fontSize:14,fontWeight:500,color:uc.color}}>
                {lead.follow_up_date?fmtDate(lead.follow_up_date,{day:'numeric',month:'short',year:'numeric'}):'Not set'}
              </div>
              {urgency!=='none'&&<div style={{fontSize:11,color:uc.color,marginTop:2}}>{uc.label}</div>}
            </div>
            <div style={{width:10,height:10,borderRadius:'50%',background:uc.dot}}/>
          </div>

          {[
            ['Assigned staff',staffList.find(s=>s.user_id===lead.assigned_to)?staffList.find(s=>s.user_id===lead.assigned_to).first_name+' '+staffList.find(s=>s.user_id===lead.assigned_to).last_name:'—'],
            ['Source',lead.source?lead.source.replace('_',' '):'—'],
            ['Referred by',lead.referred_by||'—'],
            ['Created',lead.created_at?new Date(lead.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—'],
          ].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
              <span style={{color:'var(--grey-400)'}}>{l}</span>
              <span style={{fontWeight:500,color:'var(--grey-800)',textTransform:'capitalize'}}>{v}</span>
            </div>
          ))}

          {isLost&&(
            <div style={{marginTop:12,background:'#FCEBEB',borderRadius:'var(--radius-md)',padding:'10px 14px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'#A32D2D',marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Lost reason</div>
              <div style={{fontSize:13,color:'#A32D2D',fontWeight:500}}>{lossLabel||'—'}</div>
              {lead.lost_notes&&<div style={{fontSize:12,color:'#A32D2D',marginTop:4,opacity:.8}}>{lead.lost_notes}</div>}
            </div>
          )}

          {isConverted&&(
            <div style={{marginTop:12,background:'var(--green-light)',borderRadius:'var(--radius-md)',padding:'10px 14px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--green)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Converted</div>
              <div style={{fontSize:13,color:'var(--green)'}}>{lead.converted_at?new Date(lead.converted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):''}</div>
            </div>
          )}
        </div>
      </div>

      {/* Notes */}
      {lead.notes&&(
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:10}}>Notes</div>
          <div style={{fontSize:13,color:'var(--grey-600)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{lead.notes}</div>
        </div>
      )}

      {/* Quotations panel */}
      {leadQuotations.length>0&&(
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:12}}>Quotations</div>
          {(()=>{
            const renderRow=(q,showBorder)=>{
              const isActive=lead.active_quotation_id===q.quotation_id;
              const sc=QUOT_STATUS_COLORS?QUOT_STATUS_COLORS[q.status]||{bg:'var(--grey-100)',color:'var(--grey-400)'}:{bg:'var(--grey-100)',color:'var(--grey-400)'};
              const statusLabel=QUOT_STATUS_LABELS?QUOT_STATUS_LABELS[q.status]||q.status:q.status;
              return (
                <div key={q.quotation_id} onClick={()=>onNavigate&&onNavigate('quotations',{quotId:q.quotation_id,label:q.ref_number})} title="Open quotation"
                  style={{display:'flex',alignItems:'center',gap:12,padding:'10px 8px',margin:'0 -8px',borderRadius:'var(--radius-sm)',cursor:'pointer',borderBottom:showBorder?'1px solid var(--grey-100)':'none',opacity:q.status==='superseded'?0.5:1}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:isActive?'var(--green)':'var(--grey-300)'}}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{q.ref_number}</span>
                      {isActive&&<span style={{fontSize:10,fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:'.04em'}}>ACTIVE</span>}
                      {q.revision_number>0&&<span style={{fontSize:11,color:'var(--grey-400)'}}>Rev {q.revision_number}</span>}
                    </div>
                    <div style={{fontSize:12,color:'var(--grey-400)',marginTop:2}}>
                      {'Rs.'+parseFloat(q.grand_total||0).toLocaleString('en-IN')}
                      {q.valid_until&&(' · Valid until '+fmtDate(q.valid_until,{day:'numeric',month:'short'}))}
                    </div>
                  </div>
                  <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>{statusLabel}</span>
                </div>
              );
            };
            const current=leadQuotations.filter(q=>q.status!=='superseded');
            const older=leadQuotations.filter(q=>q.status==='superseded');
            return <>
              {current.map((q,i)=>renderRow(q,i<current.length-1||(older.length>0)))}
              {older.length>0&&<div onClick={()=>setShowOldQuotes(v=>!v)} style={{fontSize:12,fontWeight:500,color:'var(--blue)',cursor:'pointer',padding:'8px 0 2px',userSelect:'none'}}>{showOldQuotes?'▾ Hide':'▸ Show'} {older.length} earlier revision{older.length>1?'s':''}</div>}
              {showOldQuotes&&older.map((q,i)=>renderRow(q,i<older.length-1))}
            </>;
          })()}
        </div>
      )}

      {linkedEvent&&(
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:12}}>Converted to event</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:'var(--blue)'}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                {linkedEvent.ref_number&&<span style={{fontSize:13,fontWeight:500,color:'var(--pink)'}}>{linkedEvent.ref_number}</span>}
                <span style={{fontSize:13,color:'var(--grey-800)'}}>{linkedEvent.name}</span>
              </div>
              <div style={{fontSize:12,color:'var(--grey-400)',marginTop:2}}>
                {linkedEvent.type?linkedEvent.type.charAt(0).toUpperCase()+linkedEvent.type.slice(1):''}
                {linkedEvent.main_date&&(' · '+fmtDate(linkedEvent.main_date,{day:'numeric',month:'short',year:'numeric'}))}
                {linkedEvent.location&&(' · '+linkedEvent.location)}
              </div>
            </div>
            <button className="btn primary" onClick={()=>onNavigate&&onNavigate('events',{eventId:linkedEvent.event_id,label:linkedEvent.name||linkedEvent.ref_number||'Event'})}>View event →</button>
          </div>
        </div>
      )}

      {/* Sub-events panel removed in v21 — sub-events are now managed in the quotation wizard */}
    </div>
  );
}

// ── Lead Reference Modal ──────────────────────────────────────────────────────
function LeadReferenceModal({onSelect, onCancel}) {
  const [search, setSearch] = React.useState('');
  const [leads, setLeads] = React.useState([]);
  const [filtered, setFiltered] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    supabase.from('leads').select('*').eq('is_deleted',false)
      .order('created_at',{ascending:false})
      .then(({data})=>{
        if(data){ setLeads(data); setFiltered(data); }
        setLoading(false);
      });
  },[]);

  React.useEffect(()=>{
    if(!search.trim()){ setFiltered(leads); return; }
    const q = search.toLowerCase();
    setFiltered(leads.filter(l=>
      (l.first_name+' '+l.last_name).toLowerCase().includes(q) ||
      (l.phone||'').includes(q) ||
      (l.email||'').toLowerCase().includes(q) ||
      (l.event_type||'').toLowerCase().includes(q) ||
      (l.location||'').toLowerCase().includes(q) ||
      (l.source||'').toLowerCase().includes(q) ||
      (l.venue_preference||'').toLowerCase().includes(q)
    ));
  },[search, leads]);

  const typeIcons = {wedding:'💍',corporate:'🏢',birthday:'🎂',anniversary:'💑',other:'🎪'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:560,maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'var(--shadow-lg)'}}>

        {/* Header */}
        <div style={{padding:'18px 24px',borderBottom:'1px solid var(--grey-100)',flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)',marginBottom:2}}>📋 Create from reference lead</div>
          <div style={{fontSize:12,color:'var(--grey-400)'}}>Search a past lead to use as a starting point. Contact details will be cleared.</div>
        </div>

        {/* Search */}

const EVENT_STATUS_LABELS = {in_progress:'In Progress',confirmed:'Confirmed',planning:'Planning',completed:'Completed',cancelled:'Cancelled'};
const EVENT_STATUS_COLORS = {
  planning:{bg:'#F1ECE4',color:'#6B6660',dot:'#9A938A'},

const INVOICE_STATUS_COLORS = {
  draft:{bg:'#F1ECE4',color:'#6B6660',dot:'#9A938A'},
  sent:{bg:'#E6F1FB',color:'#185FA5',dot:'#185FA5'},
  partially_paid:{bg:'#FAEEDA',color:'#854F0B',dot:'#c87d2a'},
  paid:{bg:'#E1F5EE',color:'#0F6E56',dot:'#0F6E56'},
  overdue:{bg:'#FCEBEB',color:'#A32D2D',dot:'#A32D2D'},

};
const INVOICE_STATUS_LABELS = {draft:'Draft',sent:'Sent',partially_paid:'Partly paid',paid:'Paid',overdue:'Overdue',cancelled:'Cancelled'};
// ── Derived event funnel (client ladder + vendor balance) ─────────────────────
// Computed LIVE from invoices + installments + vendor dues. Nothing is stored, so
// it can never drift out of sync. Drives the progress sub-badge AND the
// Mark-completed gate. Client side is the gate; vendor balance is a visible flag
// that never blocks (vendors are often paid on post-event terms).
function eventFunnel({invoices, installments, vendorOutstanding, hasApprovedQuote}={}){
  const active=(invoices||[]).filter(i=>(i.status||'').toLowerCase()!=='cancelled');
  const issued=active.filter(i=>['sent','partially_paid','paid','overdue'].includes((i.status||'').toLowerCase()));
  const grand=active.reduce((s,i)=>s+(parseFloat(i.grand_total)||0),0);
  const received=active.reduce((s,i)=>s+(parseFloat(i.total_received)||0),0);
  const outstanding=active.reduce((s,i)=>s+((parseFloat(i.total_outstanding!=null?i.total_outstanding:((parseFloat(i.grand_total)||0)-(parseFloat(i.total_received)||0)))||0)),0);
  const vBal=Math.max(0,parseFloat(vendorOutstanding)||0);
  const insts=(installments||[]).filter(x=>!x.is_deleted);
  let stage='pre', label=null, clientPaid=false;
  if(issued.length===0){
    if(hasApprovedQuote){ stage='quote_approved'; label='Quote approved'; }
  } else if(received<=0.5){
    stage='invoice_issued'; label='Invoice issued';
  } else if(outstanding>0.5){
    stage='partly_paid';
    const paidN=insts.filter(x=>(parseFloat(x.balance)||0)<=0.5).length;
    label=(insts.length>0)
      ? paidN+' of '+insts.length+' installment'+(insts.length>1?'s':'')+' received'
      : 'Part-paid · ₹'+Math.round(received).toLocaleString('en-IN')+' of ₹'+Math.round(grand).toLocaleString('en-IN');
  } else {
    stage='paid'; label='Invoice fully paid'; clientPaid=true;
  }
  let blocker=null;
  if(!clientPaid){
    if(issued.length===0) blocker = hasApprovedQuote ? 'Issue an invoice and collect payment before completing.' : 'Approve a quote and issue an invoice before completing.';
    else if(received<=0.5) blocker='Invoice issued, but no client payment received yet.';
    else blocker='₹'+Math.round(outstanding).toLocaleString('en-IN')+' still outstanding from the client.';
  }
  return {stage,label,vendorBalance:vBal,clientPaid,canComplete:clientPaid,blocker,received,grand,outstanding};
}
const EVENT_STAGE_COLORS={
  quote_approved:{bg:'#E6F1FB',color:'#185FA5'},
  invoice_issued:{bg:'#FAEEDA',color:'#854F0B'},
  partly_paid:{bg:'#FAEEDA',color:'#854F0B'},
  paid:{bg:'#E1F5EE',color:'#0F6E56'},
};
// Renders the funnel sub-badge: the client-ladder stage chip + (if any) a red
// vendor-balance chip. `compact` trims padding for list rows.
function EventFunnelBadge({funnel, compact}){
  if(!funnel) return null;
  const pad=compact?'2px 8px':'3px 10px'; const fs=compact?11:12;
  const sc=EVENT_STAGE_COLORS[funnel.stage];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
      {funnel.label&&sc&&<span style={{padding:pad,borderRadius:20,fontSize:fs,fontWeight:500,background:sc.bg,color:sc.color}}>{funnel.label}</span>}
      {funnel.vendorBalance>0&&<span title="Outstanding vendor dues for this event" style={{padding:pad,borderRadius:20,fontSize:fs,fontWeight:500,background:'#FCEBEB',color:'#A32D2D'}}>Vendor balance ₹{Math.round(funnel.vendorBalance).toLocaleString('en-IN')}</span>}
    </span>
  );
}
const EVENT_TYPES = ['Wedding','Corporate','Birthday','Anniversary','Other'];
const BUDGET_RANGES = [
  {label:'All budgets',value:''},
  {label:'Under ₹1L',value:'0-100000'},
  {label:'₹1L – ₹5L',value:'100000-500000'},
  {label:'₹5L – ₹10L',value:'500000-1000000'},
  {label:'₹10L – ₹25L',value:'1000000-2500000'},

];

function matchesBudget(budget, range) {
  if (!range) return true;
  const [min, max] = range.split('-').map(Number);
  const b = parseFloat(budget) || 0;
  return b >= min && b <= max;
}
