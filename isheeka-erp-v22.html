function NavBar({stack, onBack, onJump}){
  if(!stack || stack.length<=1) return null;
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',marginBottom:16,background:'white',border:'1px solid var(--grey-100)',borderRadius:'var(--radius-md)',flexWrap:'wrap'}}>
      <button className="btn sm" onClick={onBack} title="Back one step" style={{display:'inline-flex',alignItems:'center',gap:4}}>← Back</button>
      <div style={{width:1,height:18,background:'var(--grey-200)'}}/>
      <div style={{display:'flex',alignItems:'center',gap:2,flexWrap:'wrap',fontSize:13}}>
        {stack.map((n,i)=>{
          const last=i===stack.length-1;
          return (
            <React.Fragment key={i}>
              {i>0&&<span style={{color:'var(--grey-300)',margin:'0 2px'}}>›</span>}
              {last
                ? <span style={{fontWeight:500,color:'var(--pink)',background:'var(--pink-light)',padding:'3px 8px',borderRadius:'var(--radius-sm)'}}>{n.label}</span>
                : <button onClick={()=>onJump(i)} style={{border:'none',background:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:13,padding:'3px 6px',fontFamily:'Inter,sans-serif'}} onMouseEnter={e=>e.currentTarget.style.color='var(--pink)'} onMouseLeave={e=>e.currentTarget.style.color='var(--grey-400)'}>{n.label}</button>}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  // Global navigation history stack. Each entry: {page, opts?, label}. Top entry = current screen.
  // Back pops; a breadcrumb click truncates; a sidebar click resets to a fresh single-entry trail.
  const [navStack, setNavStack] = useState([{page:'dashboard', label:'Dashboard'}]);
  const current = navStack[navStack.length-1];
  const activePage = current.page;
  const navigate = useCallback((page, opts={})=>{
    const o=opts||{};
    const rest={}; ['eventId','leadId','invoiceId','quotId','clientId','vendorId','expenseId','mode','referenceEvent','referenceData'].forEach(k=>{ if(o[k]!==undefined&&o[k]!==null) rest[k]=o[k]; });
    const hasPayload=Object.keys(rest).length>0;
    const label=o.label||pageTitles[page]||page;
    setNavStack(st=>{
      const top=st[st.length-1];
      if(top&&top.page===page&&(top.label||'')===label&&JSON.stringify(top.opts||{})===JSON.stringify(rest)) return st;
      return [...st,{page,opts:hasPayload?rest:undefined,label}];
    });
  },[]);
  const goBack = useCallback(()=>{ setNavStack(st=>st.length>1?st.slice(0,-1):st); },[]);
  const jumpTo = useCallback((i)=>{ setNavStack(st=>(i>=0&&i<st.length-1)?st.slice(0,i+1):st); },[]);
  const resetTo = useCallback((page)=>{ setNavStack([{page,label:pageTitles[page]||page}]); },[]);
  const [showWarning, setShowWarning] = useState(false);
  const lastActivity = useRef(Date.now());
  const warningTimer = useRef(null);
  const logoutTimer = useRef(null);

  const resetTimers = useCallback(() => {
    lastActivity.current = Date.now();
    setShowWarning(false);
    clearTimeout(warningTimer.current);
    clearTimeout(logoutTimer.current);
    warningTimer.current = setTimeout(()=>setShowWarning(true), SESSION_WARNING);
    logoutTimer.current = setTimeout(()=>handleLogout(), SESSION_TIMEOUT);
  }, []);

  const handleLogout = async () => {
    clearTimeout(warningTimer.current);
    clearTimeout(logoutTimer.current);
    await supabase.auth.signOut();
    setUser(null);
    setShowWarning(false);
  };

  useEffect(() => {
    supabase.auth.getSession().then(({data:{session}})=>{ setUser(session?.user??null); setLoading(false); });
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_,session)=>setUser(session?.user??null));
    return ()=>subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!user) return;
    const events = ['mousedown','keydown','scroll','touchstart','click'];
    events.forEach(e=>document.addEventListener(e,resetTimers));
    resetTimers();
    return ()=>{ events.forEach(e=>document.removeEventListener(e,resetTimers)); clearTimeout(warningTimer.current); clearTimeout(logoutTimer.current); };
  }, [user, resetTimers]);

  const pageTitles = {dashboard:'Dashboard',leads:'Leads',clients:'Clients',events:'Events',quotations:'Quotations',invoices:'Invoices',vendors:'Vendors','vendor-payments':'Vendor Payments',expenses:'Expenses',reports:'Reports',users:'Users',settings:'Settings','owner-account':'Owner Account'};
  const role = 'admin';

  if (loading) return <div className="loading"><div className="spinner"></div><div style={{color:'var(--grey-400)',fontSize:14}}>Loading Isheeka Events...</div></div>;
  if (!user) return <LoginScreen onLogin={u=>{setUser(u);resetTimers();}}/>;

  return (
    <div className="app-layout">
      {showWarning && <SessionWarning onStay={resetTimers} onLogout={handleLogout}/>}
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-logo">
            <div style={{fontSize:28}}>🌸</div>
            <div className="brand-text">
              <div className="name">ISHEEKA EVENTS</div>
              <div className="tagline">Making Every Event Memorable</div>
            </div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {NAV.map((group,gi)=>(
            <div key={gi} className="nav-section">
              {group.section && <div className="nav-section-title">{group.section}</div>}
              {group.items.filter(item=>item.roles.includes(role)).map(item=>(
                <button key={item.id} className={`nav-item ${activePage===item.id?'active':''}`} onClick={()=>resetTo(item.id)}>
                  <span className="nav-icon">{item.icon}</span>{item.label}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="user-avatar">{(user.email||'U').charAt(0).toUpperCase()}</div>
            <div><div className="user-name">{user.email?.split('@')[0]}</div><div className="user-role">Admin</div></div>
          </div>
          <button className="logout-btn" onClick={handleLogout}>🚪 Sign out</button>
        </div>
      </aside>
      <main className="main-content">
        <div className="page-header">
          <div>
            <div className="page-title">{pageTitles[activePage]}</div>
            <div className="page-subtitle">Isheeka Events ERP</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:13,color:'var(--grey-400)'}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--green)'}} title="Connected"></div>
          </div>
        </div>
        <div className="page-body">
          <NavBar stack={navStack} onBack={goBack} onJump={jumpTo}/>
          {activePage==='dashboard' && <Dashboard user={user} onNavigate={navigate}/>}
          {activePage==='settings' && <SettingsModule/>}
          {activePage==='clients' && <ClientsModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='events' && <EventsModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='leads' && <LeadsModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='invoices' && <InvoicesModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='quotations' && <QuotationsModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='expenses' && <ExpensesModule onNavigate={navigate}/>}
          {activePage==='vendors' && <VendorsModule nav={current.opts||null} onNavigate={navigate} onBack={goBack}/>}
          {activePage==='vendor-payments' && <VendorPaymentsModule onNavigate={navigate}/>}
          {activePage==='reports' && <ReportsModule onNavigate={navigate}/>}
          {activePage!=='dashboard' && activePage!=='settings' && activePage!=='clients' && activePage!=='events' && activePage!=='leads' && activePage!=='invoices' && activePage!=='quotations' && activePage!=='expenses' && activePage!=='vendors' && activePage!=='vendor-payments' && activePage!=='reports' && <ComingSoon page={activePage}/>}
        </div>
      </main>
    </div>
  );
}

function FastEntryTable({items, onChange}) {
  const refs = React.useRef({});
  const [pasteMsg, setPasteMsg] = React.useState('');

  const ensureMinRows = (arr, min=10) => {
    const rows = [...arr];
    while(rows.length < min) rows.push({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0});
    return rows;
  };

  const [rows, setRows] = React.useState(()=>ensureMinRows(items||[]));

  // Sync when items prop changes (e.g. when edit mode opens with existing data)
  React.useEffect(()=>{
    if(items && items.length > 0){
      setRows(ensureMinRows(items));
    }
  },[JSON.stringify(items)]);

  React.useEffect(()=>{
    const filled = rows.filter(r=>r.description?.trim());
    onChange(filled);
  },[rows]);

  const updateRow = (id, field, val) => setRows(r=>r.map(row=>row.id===id?{...row,[field]:val}:row));
  const addRows = (count=10) => setRows(r=>[...r,...Array(count).fill(0).map(()=>({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0}))]);
  const removeRow = (id) => setRows(r=>{ const next=r.filter(row=>row.id!==id); return next.length<1?ensureMinRows([]):next; });

  const focusCell = (rowIdx, col) => {
    const key = rowIdx+'-'+col;
    setTimeout(()=>refs.current[key]?.focus(), 0);
  };

  const handleDescTab = (rowIdx) => focusCell(rowIdx, 'qty');
  const handleQtyTab = (rowIdx) => focusCell(rowIdx, 'price');
  const handlePriceTab = (rowIdx) => {
    if(rowIdx === rows.length-1) addRows(5);
    focusCell(rowIdx+1, 'desc');
  };
  const handleEnter = (rowIdx) => {
    if(rowIdx === rows.length-1) addRows(5);
    focusCell(rowIdx+1, 'desc');
  };

  // ── Paste handler ────────────────────────────────────────────────────────
  const handlePaste = (e, startRowIdx, startColIdx) => {
    const text = e.clipboardData.getData('text');
    if (!text) return;

    // Only intercept if multi-row or multi-column
    const hasNewline = text.includes('\n') || text.includes('\r');
    const hasTab = text.includes('\t');
    if (!hasNewline && !hasTab) return; // single value — let browser handle normally

    e.preventDefault();

    // Parse clipboard — detect delimiter
    const rawRows = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    const parsed = rawRows
      .map(r => {
        // Try tab first, then comma
        const cols = r.includes('\t') ? r.split('\t') : r.split(',');
        return cols.map(c => c.trim().replace(/^["']|["']$/g,'').replace(/[₹$,]/g,''));
      })
      .filter(r => r.some(c => c.length > 0)); // remove fully empty rows

    if (parsed.length === 0) return;

    // Column mapping: 0=description, 1=qty, 2=price
    const COL_FIELDS = ['description','quantity','unit_price'];

    setRows(prev => {
      const updated = [...prev];

      // Ensure enough rows exist
      const needed = startRowIdx + parsed.length;
      while(updated.length < Math.max(needed + 5, 10)) {
        updated.push({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0});
      }

      parsed.forEach((pastedRow, pi) => {
        const targetRowIdx = startRowIdx + pi;
        const updatedRow = {...updated[targetRowIdx]};

        pastedRow.forEach((cellVal, ci) => {
          const colIdx = startColIdx + ci;
          if (colIdx >= COL_FIELDS.length) return; // ignore extra columns
          const field = COL_FIELDS[colIdx];
          if (!field) return;

          if (field === 'quantity' || field === 'unit_price') {
            const num = parseFloat(cellVal.replace(/[^0-9.]/g,''));
            updatedRow[field] = isNaN(num) ? (field==='quantity'?1:0) : num;
          } else {
            updatedRow[field] = cellVal;
          }
        });

        updated[targetRowIdx] = updatedRow;
      });

      return updated;
    });

    // Show paste confirmation
    setPasteMsg(parsed.length + ' row' + (parsed.length>1?'s':'') + ' pasted from clipboard');
    setTimeout(()=>setPasteMsg(''),3000);

    // Focus first cell after paste
    setTimeout(()=>focusCell(startRowIdx, COL_FIELDS[startColIdx]==='description'?'desc':COL_FIELDS[startColIdx]==='quantity'?'qty':'price'), 50);
  };

  return (
    <div>
      {pasteMsg && (
        <div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'6px 12px',fontSize:12,marginBottom:6,display:'flex',alignItems:'center',gap:6,fontWeight:500}}>
          ✅ {pasteMsg}
        </div>
      )}
      <div style={{fontSize:11,color:'var(--grey-400)',marginBottom:4}}>
        💡 Tip: Copy rows from Excel and paste (Ctrl+V / Cmd+V) into any cell to fill multiple rows at once
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead>
          <tr style={{background:'#FCEAF1'}}>
            <th style={{padding:'6px 8px',textAlign:'left',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a'}}>#</th>
            <th style={{padding:'6px 8px',textAlign:'left',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a'}}>Description</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'10%'}}>Qty</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Unit price (₹)</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Amount (₹)</th>
            <th style={{borderBottom:'1.5px solid #e8185a',width:28}}></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row,ri)=>{
            const amt=(parseFloat(row.quantity)||0)*(parseFloat(row.unit_price)||0);
            const hasData=row.description?.trim();
            return (
              <tr key={row.id} style={{borderBottom:'1px solid var(--grey-100)',background:hasData?'white':'transparent'}}>
                <td style={{padding:'4px 8px',color:'var(--grey-400)',fontSize:11,width:24}}>{hasData?ri+1:''}</td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemDesc value={row.description} onChange={v=>updateRow(row.id,'description',v)}
                    onTab={()=>handleDescTab(ri)} onEnter={()=>handleEnter(ri)}
                    onPaste={e=>handlePaste(e,ri,0)}
                    ref={el=>refs.current[ri+'-desc']=el}/>
                </td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemQty value={row.quantity} onChange={v=>updateRow(row.id,'quantity',v)}
                    onTab={()=>handleQtyTab(ri)}
                    onPaste={e=>handlePaste(e,ri,1)}
                    ref={el=>refs.current[ri+'-qty']=el}/>
                </td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemPrice value={row.unit_price} onChange={v=>updateRow(row.id,'unit_price',v)}
                    onTab={()=>handlePriceTab(ri)}
                    onPaste={e=>handlePaste(e,ri,2)}
                    ref={el=>refs.current[ri+'-price']=el}/>
                </td>
                <td style={{padding:'3px 8px',textAlign:'right',fontWeight:hasData?500:400,color:hasData?'var(--green)':'var(--grey-200)',fontSize:12}}>
                  {hasData?amt.toLocaleString('en-IN',{minimumFractionDigits:0}):'—'}
                </td>
                <td style={{padding:'3px 4px',textAlign:'center',width:28}}>
                  {hasData&&<button title="Remove this item" onClick={()=>removeRow(row.id)}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:15,lineHeight:1,padding:'2px 4px'}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--red)'}
                    onMouseLeave={e=>e.currentTarget.style.color='var(--grey-400)'}>{'\u00d7'}</button>}
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr>
            <td colSpan={4} style={{padding:'8px',textAlign:'right',fontSize:12,color:'var(--grey-400)'}}>Sub-total</td>
            <td colSpan={2} style={{padding:'8px',textAlign:'right',fontSize:13,fontWeight:600,color:'var(--green)'}}>
              ₹{rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0).toLocaleString('en-IN')}
            </td>
          </tr>
        </tfoot>
      </table>
      <button className="btn sm" style={{marginTop:6,border:'1px dashed var(--grey-200)',color:'var(--grey-400)',fontSize:11}} onClick={()=>addRows(10)}>+ Add 10 more rows</button>
    </div>
  );
}

            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'10%'}}>Qty</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Unit price</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#A01044',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Amount</th>
            <th style={{borderBottom:'1.5px solid #e8185a',width:'6%'}}></th>

        </thead>
        <tbody>

            <tr key={row.id} style={{borderBottom:'1px solid var(--grey-100)'}}>

              </td>
              <td style={{padding:'5px 8px'}}>

              </td>
              <td style={{padding:'5px 8px'}}>
                <ItemNumInput value={row.unit_price} onChange={v=>updateRow(row.id,'unit_price',v)} align="right"/>
              </td>
              <td style={{padding:'5px 8px',textAlign:'right',fontWeight:500,color:'var(--grey-800)',fontSize:12}}>
                ₹{((parseFloat(row.quantity)||0)*(parseFloat(row.unit_price)||0)).toLocaleString('en-IN')}
              </td>
              <td style={{padding:'5px 8px',textAlign:'center'}}>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:14,padding:'2px 4px'}} onClick={()=>removeRow(row.id)}>✕</button>
              </td>
            </tr>

        <tfoot>
          <tr>
            <td colSpan={3} style={{padding:'8px',textAlign:'right',fontSize:12,color:'var(--grey-400)'}}>Sub-event total</td>
            <td style={{padding:'8px',textAlign:'right',fontSize:13,fontWeight:600,color:'var(--green)'}}>
              ₹{items.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0).toLocaleString('en-IN')}
            </td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button className="btn sm" style={{marginTop:8,border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={addRow}>+ Add item</button>
    </div>
  );
}

// Stable input components to prevent focus loss
function ItemDescInput({value, onChange}) {
  return <input style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',color:'var(--grey-800)'}} value={value} onChange={e=>onChange(e.target.value)} placeholder="Description"/>;
}
function ItemNumInput({value, onChange, align}) {
  return <input type="number" style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',textAlign:align||'left',color:'var(--grey-800)',MozAppearance:'textfield'}} value={value} onChange={e=>onChange(e.target.value)}/>;
}

// Per-block toolbar (one per sub-event + the main block): load a template's items into THIS block,
// and import an Excel file into THIS block. Both replace the block's items.
function SubEventTplBtn({templates, onPick, onImport}) {
  const [open,setOpen]=React.useState(false);
  const fileRef=React.useRef(null);
  const parseExcel=(e)=>{
    const file=e.target.files&&e.target.files[0]; if(e.target) e.target.value='';
    if(!file||!onImport) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        let rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(rows.length&&String((rows[0]||[])[0]||'').trim().toLowerCase().startsWith('desc')) rows=rows.slice(1);
        const items=rows.filter(r=>String(r[0]).trim()).map(r=>({id:'i-'+Date.now()+Math.random(),description:String(r[0]).trim(),quantity:parseFloat(String(r[1]).replace(/[^0-9.]/g,''))||1,unit_price:parseFloat(String(r[2]).replace(/[^0-9.]/g,''))||0}));
        if(items.length){ onImport(items); notify(items.length+' row'+(items.length>1?'s':'')+' imported into this section.','success'); } else notify('No rows found in the file.','error');
      }catch(err){ console.error('[Isheeka ERP] excel import failed:',err); notify('Could not read the Excel file.','error'); }
    };
    reader.readAsArrayBuffer(file);
  };
  return (
    <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
      <div style={{position:'relative'}}>
        <button className="btn sm" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setOpen(v=>!v)} onBlur={()=>setTimeout(()=>setOpen(false),180)}>📋 Template ▾</button>
        {open&&(
          <div style={{position:'absolute',top:'100%',right:0,zIndex:120,background:'white',border:'1px solid var(--grey-200)',borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-md)',minWidth:190,marginTop:4}}>
            {(templates||[]).length===0&&<div style={{padding:'10px 14px',fontSize:13,color:'var(--grey-400)'}}>No templates</div>}
            {(templates||[]).map(t=>(
              <div key={t.template_id} style={{padding:'9px 14px',fontSize:13,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'} onMouseLeave={e=>e.currentTarget.style.background='white'}
                onMouseDown={()=>{ setOpen(false); onPick(t); }}>
                {t.event_type==='wedding'?'💍':t.event_type==='corporate'?'🏢':t.event_type==='birthday'?'🎂':t.event_type==='anniversary'?'💑':'🎪'} {t.name}
              </div>
            ))}
          </div>
        )}
      </div>
      {onImport&&<><button className="btn sm" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>fileRef.current&&fileRef.current.click()} title="Import line items from an Excel file into this section">⬆️ Excel</button>
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={parseExcel}/></>}
    </div>
  );
}
// ── New Event Wizard ─────────────────────────────────────────────────────────
function NewEventWizard({onSave, onCancel, referenceEvent=null}) {
  const eventTypes = useEventTypes();
  const [step, setStep] = useState(1);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState('');
  const [errors, setErrors] = useState({});
  const [clients, setClients] = useState([]);
  const [altContacts, setAltContacts] = useState([]);
  const [clientSearch, setClientSearch] = useState('');
  const [staffList, setStaffList] = useState([]);

  // Step 1 form
  const [form, setForm] = useState({
    name:'', type:'', status:'planning', main_date:'', location:'Hyderabad',
    guest_count:'', budget:'', assigned_staff_id:'', assigned_staff_name:'', internal_notes:''
  });

  // Step 2
  const [selectedClient, setSelectedClient] = useState(null);
  const [primaryContactId, setPrimaryContactId] = useState('client');
  const [primaryContactName, setPrimaryContactName] = useState('');
  const [secondaryContactId, setSecondaryContactId] = useState('');
  const [secondaryContactName, setSecondaryContactName] = useState('');
  const [showClientForm, setShowClientForm] = useState(false);

  // Step 3 - sub events with items
  const [subEvents, setSubEvents] = useState([
    {id:Date.now(), name:'', date:'', location:'', items:[]}
  ]);
  const [mainItems, setMainItems] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [showTplMenu, setShowTplMenu] = useState(false);
  const excelFileRef = React.useRef();

  useEffect(()=>{
    supabase.from('clients').select('client_id,first_name,last_name,phone_1,status').eq('is_deleted',false).neq('status','inactive').order('first_name').then(({data})=>{ if(data) setClients(data); });
    supabase.from('users').select('user_id,first_name,last_name,role').eq('status','active').then(({data})=>{ if(data) setStaffList(data); });
    supabase.from('event_templates').select('*').eq('is_deleted',false).eq('is_active',true).order('sort_order').then(({data})=>{ if(data) setTemplates(data); });
    // Pre-fill from reference event if provided
    if(referenceEvent){
      setForm(f=>({...f,
        type:referenceEvent.type||'',
        location:referenceEvent.location||'',
        guest_count:referenceEvent.guest_count||'',
        assigned_staff_id:referenceEvent.assigned_staff_id||'',
        assigned_staff_name:referenceEvent.assigned_staff_name||'',
        internal_notes:referenceEvent.internal_notes?`[Based on: ${referenceEvent.name}] ${referenceEvent.internal_notes}`:`Based on: ${referenceEvent.name}`,
        name:'', main_date:'', budget:'', status:'planning'
      }));
      // Load sub-events and items from reference event
      Promise.all([
        supabase.from('sub_events').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
        supabase.from('sub_event_items').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
      ]).then(([{data:subs},{data:items}])=>{
        if(subs&&items){
          const grouped = subs.map(se=>({
            id:'se-ref-'+se.sub_event_id+Date.now(),
            name:se.name, date:'', location:se.location||'',
            items:items.filter(i=>i.sub_event_id===se.sub_event_id).map(i=>({
              id:'i-ref-'+i.item_id+Math.random(),
              description:i.description, quantity:i.quantity, unit_price:0
            }))
          }));
          setSubEvents(grouped.length>0?grouped:[{id:Date.now(),name:'',date:'',location:'',items:[]}]);
          const mainItems = items.filter(i=>!i.sub_event_id).map(i=>({
            id:'i-ref-'+i.item_id+Math.random(),
            description:i.description, quantity:i.quantity, unit_price:0
          }));
          setMainItems(mainItems);
        }
      });
    }
  },[]);

  useEffect(()=>{
    if(selectedClient){
      supabase.from('alternative_contacts').select('*').eq('client_id',selectedClient.client_id).eq('is_deleted',false).then(({data})=>{ if(data) setAltContacts(data); });
      setPrimaryContactId('client');
      setPrimaryContactName(`${selectedClient.first_name} ${selectedClient.last_name}`);
      setSecondaryContactId('');
      setSecondaryContactName('');
    }
  },[selectedClient]);

  const setF = (field, val) => {
    setForm(f=>({...f,[field]:val}));
    if(errors[field]) setErrors(e=>({...e,[field]:''}));
    setSaveError('');
  };

  const validateStep1 = () => {
    const e={};
    if(!form.name?.trim()) e.name='Event name is required';
    if(!form.type) e.type='Event type is required';
    if(!form.main_date) e.main_date='Main event date is required';
    if(!form.location?.trim()) e.location='Location is required';
    return e;
  };

  const validateStep2 = () => {
    const e={};
    if(!selectedClient) e.client='Please select a client';
    return e;
  };

  const nextStep = () => {
    if(step===1){ const e=validateStep1(); if(Object.keys(e).length>0){setErrors(e);return;} }
    if(step===2){ const e=validateStep2(); if(Object.keys(e).length>0){setErrors(e);return;} }
    setErrors({});
    setStep(s=>s+1);
  };

  const addSubEvent = () => setSubEvents(s=>[...s,{id:Date.now(),name:'',date:'',location:'',items:[]}]);
  const removeSubEvent = (id) => setSubEvents(s=>s.filter(se=>se.id!==id));
  const updateSubEvent = (id, field, val) => setSubEvents(s=>s.map(se=>se.id===id?{...se,[field]:val}:se));
  const updateSubItems = (id, items) => setSubEvents(s=>s.map(se=>se.id===id?{...se,items}:se));

  const grandTotal = subEvents.reduce((s,se)=>s+se.items.reduce((ss,r)=>ss+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0),0)
    + mainItems.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0);

  const loadTemplate = async (tpl) => {
    if(subEvents.some(se=>se.items.length>0)||mainItems.length>0){
      if(!window.confirm('Loading a template will replace current sub-events and items. Continue?')) return;
    }
    setShowTplMenu(false);
    const {data} = await supabase.from('event_template_items').select('*').eq('template_id',tpl.template_id).order('sub_event_name').order('sort_order');
    if(!data) return;
    const groups = {};
    data.forEach(item=>{
      if(!groups[item.sub_event_name]) groups[item.sub_event_name]={id:'se-'+item.sub_event_name+Date.now(),name:item.sub_event_name,date:'',location:'',items:[]};
      if(item.sub_event_name!=='Main Event'){
        groups[item.sub_event_name].items.push({id:'i-'+item.item_id,description:item.description,quantity:item.default_quantity,unit_price:0});
      }
    });
    const mainEventItems = data.filter(i=>i.sub_event_name==='Main Event').map(i=>({id:'i-'+i.item_id,description:i.description,quantity:i.default_quantity,unit_price:0}));
    const ses = Object.values(groups).filter(g=>g.name!=='Main Event');
    setSubEvents(ses.length>0?ses:[{id:'se-'+Date.now(),name:'',date:'',location:'',items:[]}]);
    setMainItems(mainEventItems);
  };
  // Load a template's items into ONE sub-event block (matched by sub-event name, else all template items).
  const loadTemplateIntoSubEvent = async (seId, tpl) => {
    const se = subEvents.find(s=>s.id===seId);
    if(se && (se.items||[]).some(i=>i.description&&i.description.trim()) && !window.confirm('Replace this sub-event’s items with the template?')) return;
    const {data} = await supabase.from('event_template_items').select('*').eq('template_id',tpl.template_id).order('sort_order');
    if(!data) return;
    const seName=((se&&se.name)||'').trim().toLowerCase();
    let src = data.filter(i=>i.sub_event_name!=='Main Event');
    const matched = src.filter(i=>(i.sub_event_name||'').trim().toLowerCase()===seName);
    if(seName && matched.length) src = matched;
    if(src.length===0) src = data; // template had only Main Event items — still let the user pull them in
    const newItems = src.map(i=>({id:'i-'+i.item_id+'-'+Math.random(),description:i.description,quantity:i.default_quantity,unit_price:0}));
    setSubEvents(s=>s.map(x=>x.id===seId?{...x,items:newItems}:x));
  };
  // Load a template's items into the Main event items block (Main Event group, else all template items).
  const loadTemplateIntoMain = async (tpl) => {
    if((mainItems||[]).some(i=>i.description&&i.description.trim()) && !window.confirm('Replace the main event items with the template?')) return;
    const {data} = await supabase.from('event_template_items').select('*').eq('template_id',tpl.template_id).order('sort_order');
    if(!data) return;
    let src = data.filter(i=>(i.sub_event_name||'')==='Main Event');
    if(src.length===0) src = data;
    setMainItems(src.map(i=>({id:'i-'+i.item_id+'-'+Math.random(),description:i.description,quantity:i.default_quantity,unit_price:0})));
  };

  const handleExcelImport = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, {type:'array'});
        const newSubEvents = [];
        wb.SheetNames.forEach(sheetName=>{
          const ws = wb.Sheets[sheetName];
          const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          if(data.length<2) return;
          const items = data.slice(1).filter(r=>String(r[0]).trim()).map(r=>({
            id:'i-'+Date.now()+Math.random(),
            description:String(r[0]).trim(),
            quantity:parseFloat(r[1])||1,
            unit_price:parseFloat(r[2])||0
          }));
          if(sheetName==='Main Event') { setMainItems(items); }
          else { newSubEvents.push({id:'se-'+Date.now()+Math.random(),name:sheetName,date:'',location:'',items}); }
        });
        if(newSubEvents.length>0) setSubEvents(s=>[...s,...newSubEvents]);
        notify(`Imported ${wb.SheetNames.length} sheet(s) successfully!`,'success');
      } catch(err){ notify('Could not read file. Please use the provided template.','error'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

    const handleSave = async () => {
    setSaving(true); setSaveError('');
    try {
      // Determine primary/secondary contact details
      let primId=null, primName=primaryContactName;
      let secId=null, secName=secondaryContactName;
      if(primaryContactId!=='client'){
        const ac=altContacts.find(a=>a.contact_id===primaryContactId);
        if(ac){primId=ac.contact_id; primName=`${ac.first_name} ${ac.last_name}`;}
      }
      if(secondaryContactId&&secondaryContactId!=='none'){
        const ac=altContacts.find(a=>a.contact_id===secondaryContactId);
        if(ac){secId=ac.contact_id; secName=`${ac.first_name} ${ac.last_name}`;}
      }

      // Insert event
      const evRef = await getNextEventRef();
      const {data:eventData, error:eventError} = await supabase.from('events').insert({
        ref_number:evRef,
        name:form.name, type:form.type.toLowerCase(), status:form.status,
        main_date:form.main_date, location:form.location,
        guest_count:form.guest_count?parseInt(form.guest_count):null,
        budget:form.budget?parseFloat(form.budget):null,
        client_id:selectedClient.client_id,
        client_name:`${selectedClient.first_name} ${selectedClient.last_name}`,
        primary_contact_id:primId, primary_contact_name:primName,
        secondary_contact_id:secId, secondary_contact_name:secName,
        assigned_staff_id:form.assigned_staff_id||null,
        assigned_staff_name:form.assigned_staff_name||null,
        internal_notes:form.internal_notes||null,
        created_at:new Date().toISOString(), updated_at:new Date().toISOString(), is_deleted:false
      }).select().single();
      if(eventError) throw eventError;

      // Insert sub events and their items
      for(const se of subEvents){
        if(!se.name.trim()) continue;
        const {data:seData,error:wsie} = await supabase.from('sub_events').insert({
          event_id:eventData.event_id, name:se.name, date:se.date||null,
          location:se.location||null, sort_order:subEvents.indexOf(se),
          created_at:new Date().toISOString(), is_deleted:false
        }).select().single();
        if(wsie) throw wsie;
        if(seData && se.items.length>0){
          const itemRows = se.items.filter(r=>r.description.trim()).map((r,i)=>({
            sub_event_id:seData.sub_event_id, event_id:eventData.event_id,
            description:r.description, quantity:parseFloat(r.quantity)||1,
            unit_price:parseFloat(r.unit_price)||0,
            sort_order:i, created_at:new Date().toISOString(), is_deleted:false
          }));
          if(itemRows.length>0){ const {error:irie}=await supabase.from('sub_event_items').insert(itemRows); if(irie) throw irie; }
        }
      }

      // Insert main event items
      const mainRows = mainItems.filter(r=>r.description?.trim()).map((r,i)=>({
        sub_event_id:null, event_id:eventData.event_id,
        description:r.description, quantity:parseFloat(r.quantity)||1,
        unit_price:parseFloat(r.unit_price)||0,
        sort_order:i, created_at:new Date().toISOString(), is_deleted:false
      }));
      if(mainRows.length>0){ const {error:wmrie}=await supabase.from('sub_event_items').insert(mainRows); if(wmrie) throw wmrie; }

      await onSave(eventData);
    } catch(err){
      console.error('[Isheeka ERP] event creation failed:', err);
      setSaveError('Could not save event. Please try again.');
    } finally { setSaving(false); }
  };

  const handleCreateClient = async (form) => {
    const ref_number = await getNextClientRef();
    const payload = {
      ...form, ref_number,
      preferred_contact: form.preferred_contact||null, source: form.source||null,
      phone_2: form.phone_2||null, phone_3: form.phone_3||null,
      email_2: form.email_2||null, email_3: form.email_3||null,
      gst_number: form.gst_number||null, notes: form.notes||null,
      created_by: form.created_by||null, updated_by: form.updated_by||null, lead_id: form.lead_id||null,
      client_since: new Date().toISOString().split('T')[0],
      created_at: new Date().toISOString(), updated_at: new Date().toISOString()
    };
    const {data,error} = await runDb(supabase.from('clients').insert(payload).select().single(),'create client');
    if(error||!data) return;
    setClients(cs=>[data,...cs]);
    setSelectedClient(data);
    setShowClientForm(false);
    notify('Client created — selected for this event.','success');
  };
  const steps = ['Event details','Client & contact','Sub-events & items','Review & save'];
  const filteredClients = clients.filter(c=>{
    const q=clientSearch.toLowerCase();
    return !q || `${c.first_name} ${c.last_name} ${c.phone_1}`.toLowerCase().includes(q);
  });
  const statusColors = {active:{bg:'var(--green-light)',color:'var(--green)'},inactive:{bg:'var(--grey-100)',color:'var(--grey-400)'},vip:{bg:'var(--pink-light)',color:'var(--pink)'}};

  return (
    <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}} onClick={()=>showTplMenu&&setShowTplMenu(false)}>
      {showClientForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1200,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 20px',overflowY:'auto'}} onClick={e=>{if(e.target===e.currentTarget) setShowClientForm(false);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:680,boxShadow:'var(--shadow-lg)',padding:'8px 4px'}}>
            <ClientForm title="New client" onSave={handleCreateClient} onCancel={()=>setShowClientForm(false)}/>
          </div>
        </div>
      )}
      {/* Step bar */}
      <div style={{background:'var(--grey-50)',padding:'14px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',alignItems:'center',gap:0}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:i+1===step?'#A01044':i+1<step?'var(--green)':'var(--grey-400)',fontWeight:i+1===step?500:400}}>
              <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,flexShrink:0,
                background:i+1===step?'#A01044':i+1<step?'var(--green-light)':'transparent',
                color:i+1===step?'#F4C0D1':i+1<step?'var(--green)':'var(--grey-400)',
                border:i+1<step?'1.5px solid var(--green)':i+1===step?'none':'1.5px solid var(--grey-200)'}}>
                {i+1<step?'✓':i+1}
              </div>
              {s}
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:'var(--grey-200)',margin:'0 8px'}}/>}
          </React.Fragment>
        ))}

// P0-4: ref numbers come from an atomic Postgres function (next_counter) so
// concurrent calls can never produce duplicates. The DB does find-or-create +
// increment in one locked operation; we just format the returned integer.
async function getNextQuotRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data,error} = await supabase.rpc('next_counter',{p_type:'quotation',p_year:year,p_seed:1111});
  if(error||data==null){ notify("Couldn't generate a quotation number. Please try again.",'error'); throw error||new Error('counter failed'); }
  return 'Q-'+year+'-'+data;
}

async function getNextLeadRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data,error} = await supabase.rpc('next_counter',{p_type:'lead',p_year:year,p_seed:1111});
  if(error||data==null){ notify("Couldn't generate a lead number. Please try again.",'error'); throw error||new Error('counter failed'); }
  return 'L-'+year+'-'+data;
}

async function getNextClientRef() {
  const {data,error} = await supabase.rpc('next_counter',{p_type:'client',p_year:'0',p_seed:111111});
  if(error||data==null){ notify("Couldn't generate a client number. Please try again.",'error'); throw error||new Error('counter failed'); }
  return 'CL-'+String(data).padStart(6,'0');
}

async function getNextEventRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data,error} = await supabase.rpc('next_counter',{p_type:'event',p_year:year,p_seed:1});
  if(error||data==null){ notify("Couldn't generate an event number. Please try again.",'error'); throw error||new Error('counter failed'); }

// ── Invoice creation (Phase 2) ────────────────────────────────────────────────
// Create a DRAFT invoice from a confirmed/approved quotation. The single trigger
// is "quote confirmed": lead-origin quotes reach this at conversion (first moment
// an event exists); event-origin quotes reach it via the Confirm-quote action.
// Guarded multi-table write — if a child insert fails, the partial invoice is
// rolled back so we never leave an orphan header. (To be converted to a single
// transactional Postgres RPC in the post-baseline hardening pass.)
// Returns: the new invoice row · an existing invoice (dedupe, one live per event)
// · or null on failure (a branded toast explains why).
// Shared lead→event conversion: resolve/create client → create event → seed sub-events →
// mark the quote converted → draft invoice (best-effort) → link the lead. Used by the lead's
// "Convert" and (Phase 2) the quote page's "Confirm & create event".
// Returns {eventId, clientOutcome, clientName}; throws on hard failures.
async function createEventFromQuote(lead, opts={}) {
  let clientId = (opts.forcedClientId!==undefined ? opts.forcedClientId : null) || lead.client_id || null;
  let clientOutcome = clientId ? 'reused' : 'created';
  if(!clientId){
    const ref_number = await getNextClientRef();
    const {data:client,error:ce} = await supabase.from('clients').insert({
      ref_number,
      first_name:lead.first_name,last_name:lead.last_name,
      phone_1:lead.phone,phone_2:lead.phone_2||null,
      email_1:lead.email||null,source:lead.source||'referral',status:'active',
      client_since:new Date().toISOString().split('T')[0],
      created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
    }).select().single();
    if(ce) throw ce;
    clientId = client.client_id; clientOutcome='created';
  }
  let approvedQuot = opts.quot || null;
  if(!approvedQuot && lead.active_quotation_id){
    const {data:q} = await supabase.from('quotations').select('*').eq('quotation_id',lead.active_quotation_id).single();
    approvedQuot = q;
  }
  const evRef = await getNextEventRef();
  const {data:event,error:ee} = await supabase.from('events').insert({
    ref_number:evRef,
    lead_id:lead.lead_id,
    name:(approvedQuot&&approvedQuot.event_name)||defaultEventName(lead.event_type),
    type:lead.event_type||null,status:'planning',
    main_date:lead.tentative_date||null,
    location:lead.location||null,
    guest_count:lead.guest_count||null,
    budget:lead.budget||null,
    client_id:clientId,
    client_name:lead.first_name+' '+lead.last_name,
    created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
  }).select().single();
  if(ee) throw ee;
  if(approvedQuot){
    const {data:li} = await supabase.from('quotation_line_items').select('sub_event_name').eq('quotation_id',approvedQuot.quotation_id).eq('is_deleted',false);
    const names=[...new Set((li||[]).map(x=>x.sub_event_name).filter(n=>n&&n.trim()&&n!=='General Items'))];
    let so=0;
    for(const name of names){
      const {error:sie}=await supabase.from('sub_events').insert({event_id:event.event_id,name,sort_order:so++,created_at:new Date().toISOString(),is_deleted:false}); if(sie) throw sie;
    }
    const {error:cve}=await supabase.from('quotations').update({status:'converted',event_id:event.event_id,updated_at:new Date().toISOString()}).eq('quotation_id',approvedQuot.quotation_id); if(cve) throw cve;
    try { await createInvoiceFromQuote(approvedQuot.quotation_id,{eventId:event.event_id}); }
    catch(invErr){ console.error('[Isheeka ERP] invoice auto-create failed:', invErr); notify('Event created, but the draft invoice couldn\'t be generated automatically — use "Generate invoice" on the event.','error'); }
  }
  const {error:lue}=await supabase.from('leads').update({
    stage:'event_triggered',client_id:clientId,
    event_id:event.event_id,converted_at:new Date().toISOString(),
    updated_at:new Date().toISOString()
  }).eq('lead_id',lead.lead_id);
  if(lue) throw lue;
  return {eventId:event.event_id, clientOutcome, clientName:lead.first_name+' '+lead.last_name};
}

async function createInvoiceFromQuote(quotationId, opts={}) {
  const {data:quot,error:qe} = await supabase.from('quotations').select('*').eq('quotation_id',quotationId).single();
  if(qe||!quot){ notify('Could not load the quotation to invoice.','error'); return null; }
  const eventId = opts.eventId || quot.event_id;
  if(!eventId){ notify('No event linked yet — the invoice will be created when the event is.','info'); return null; }
  const {data:exArr} = await supabase.from('invoices').select('invoice_id,ref_number,status,total_received,gst_applicable,gst_pct,discount_amount,revision_number,grand_total').eq('event_id',eventId).eq('is_deleted',false).neq('status','cancelled').limit(1);
  const existing = exArr && exArr[0];
  if(existing){
    // Issued (sent+) or any payment recorded → keep it as a snapshot, do not touch.
    if(existing.status!=='draft' || (parseFloat(existing.total_received)||0)>0) return existing;
    // Draft + unpaid → refresh it in place from the newly-confirmed quote (decision #12).
    // Preserve invoice-level settings (GST toggle/%, discount); refresh quote-derived items + installments; keep same ref; don't bump revision_number.
    const {data:qitems} = await supabase.from('quotation_line_items').select('*').eq('quotation_id',quotationId).eq('is_deleted',false).order('sort_order');
    // Pull subtotal AND the signed adjustment from the (revised) QUOTE so the invoice tracks total changes;
    // keep the invoice's own GST toggle/% and add GST on top. (Bug fix: previously used the invoice's stale discount.)
    const rSub=parseFloat(quot.subtotal||0), rDisc=parseFloat(quot.discount_amount||0);
    const rTaxable=Math.max(0,rSub-rDisc);
    const rTax=existing.gst_applicable?Math.round(rTaxable*(parseFloat(existing.gst_pct)||0)/100):0;
    const rGrand=rTaxable+rTax;
    await supabase.from('invoice_line_items').update({is_deleted:true}).eq('invoice_id',existing.invoice_id);
    if(qitems&&qitems.length){ await supabase.from('invoice_line_items').insert(qitems.map((it,idx)=>({invoice_id:existing.invoice_id,description:it.description||'—',sub_event_name:it.sub_event_name||null,quantity:it.quantity,unit_price:it.unit_price,amount:it.amount,sort_order:(it.sort_order!=null?it.sort_order:idx)}))); }
    await supabase.from('invoice_installments').update({is_deleted:true}).eq('invoice_id',existing.invoice_id);
    let rps=quot.payment_schedule; if(typeof rps==='string'){ try{rps=JSON.parse(rps||'[]');}catch(e){rps=[];} } rps=Array.isArray(rps)?rps:[];
    if(rps.length){ await supabase.from('invoice_installments').insert(rps.map((p,idx)=>{ const pct=parseFloat(p.pct)||0; const amt=(parseFloat(p.amount)>0)?Math.round(parseFloat(p.amount)):Math.round(rGrand*pct/100); return {invoice_id:existing.invoice_id,installment_number:idx+1,percentage:pct,label:p.label||('Installment '+(idx+1)),when_text:p.when||'',amount_due:amt,amount_paid:0,balance:amt,status:'pending'}; })); }
    const {error:rue}=await supabase.from('invoices').update({quotation_id:quotationId,event_name:quot.event_name||null,client_name:quot.client_name||null,subtotal:rSub,discount_amount:rDisc,tax_amount:rTax,grand_total:rGrand,total_outstanding:rGrand,source_quote_total:parseFloat(quot.grand_total||0),updated_at:new Date().toISOString()}).eq('invoice_id',existing.invoice_id);
    if(rue){ notify('Could not refresh the draft invoice: '+(rue.message||''),'error'); return existing; }
    try{ await logInvoiceActivity(existing.invoice_id,{action:'auto_refresh',field:'grand_total',old_value:'₹'+(parseFloat(existing.grand_total)||0).toLocaleString('en-IN'),new_value:'₹'+rGrand.toLocaleString('en-IN'),reason:'Synced to confirmed quote '+(quot.ref_number||''),revision_number:existing.revision_number||0}); }catch(e){}
    notify('Draft invoice '+existing.ref_number+' refreshed from the updated quote.','success');
    return existing;
  }
  const {data:items} = await supabase.from('quotation_line_items').select('*').eq('quotation_id',quotationId).eq('is_deleted',false).order('sort_order');
  let ref; try{ ref = await getNextInvoiceRef(); }catch(e){ return null; }
  const subtotal = parseFloat(quot.subtotal||0);
  const discount = parseFloat(quot.discount_amount||0);
  const grand = Math.max(0, subtotal - discount); // GST stays off until toggled on the invoice
  const {data:inv,error:ie} = await supabase.from('invoices').insert({
    event_id:eventId, event_name:quot.event_name||null, quotation_id:quotationId,
    client_id:quot.client_id||null, client_name:quot.client_name||null,
    ref_number:ref, status:'draft', revision_number:0,
    subtotal, discount_amount:discount, tax_amount:0,
    gst_applicable:false, gst_pct:0, grand_total:grand,
    total_received:0, total_outstanding:grand,
    source_quote_total:parseFloat(quot.grand_total||0),
    payment_terms:quot.payment_terms||null
  }).select().single();
  if(ie||!inv){ notify('Failed to create the invoice. '+((ie&&ie.message)||''),'error'); return null; }
  if(items&&items.length){
    const liRows = items.map((it,idx)=>({invoice_id:inv.invoice_id,description:it.description||'—',sub_event_name:it.sub_event_name||null,quantity:it.quantity,unit_price:it.unit_price,amount:it.amount,sort_order:(it.sort_order!=null?it.sort_order:idx)}));
    const {error:lie} = await supabase.from('invoice_line_items').insert(liRows);
    if(lie){ await supabase.from('invoices').delete().eq('invoice_id',inv.invoice_id); notify('Failed to copy line items — invoice rolled back. '+(lie.message||''),'error'); return null; }
  }
  let ps = quot.payment_schedule; if(typeof ps==='string'){ try{ps=JSON.parse(ps||'[]');}catch(e){ps=[];} }
  ps = Array.isArray(ps)?ps:[];
  if(ps.length){
    const instRows = ps.map((p,idx)=>{ const pct=parseFloat(p.pct)||0; const amt=(parseFloat(p.amount)>0)?Math.round(parseFloat(p.amount)):Math.round(grand*pct/100); return {invoice_id:inv.invoice_id,installment_number:idx+1,percentage:pct,label:p.label||('Installment '+(idx+1)),when_text:p.when||'',amount_due:amt,amount_paid:0,balance:amt,status:'pending'}; });
    const {error:ine} = await supabase.from('invoice_installments').insert(instRows);
    if(ine){ await supabase.from('invoice_line_items').delete().eq('invoice_id',inv.invoice_id); await supabase.from('invoices').delete().eq('invoice_id',inv.invoice_id); notify('Failed to create installments — invoice rolled back. '+(ine.message||''),'error'); return null; }
  }
  notify('Draft invoice '+ref+' created.','success');
  return inv;
}

// ── Share helpers ─────────────────────────────────────────────────────────────
function waNormalize(phone){
  const num=(phone||'').replace(/\D/g,'');
  if(!num) return '';
  return num.length===10 ? ('91'+num) : num;
}
// Item 10: try the whatsapp:// app protocol first, fall back to wa.me web
function openWhatsApp(phone, msg){
  const full=waNormalize(phone);
  const text=encodeURIComponent(msg||'');
  const webUrl='https://wa.me/'+full+'?text='+text;
  const appUrl='whatsapp://send?'+(full?('phone='+full+'&'):'')+'text='+text;
  let opened=false;
  const cancel=()=>{ opened=true; };
  window.addEventListener('blur', cancel, {once:true});
  const t=setTimeout(()=>{
    window.removeEventListener('blur',cancel);
    if(!opened) window.open(webUrl,'_blank');
  }, 1200);
  try { window.location.href=appUrl; }
  catch(e){ clearTimeout(t); window.removeEventListener('blur',cancel); window.open(webUrl,'_blank'); }
}
// Item 11: open Gmail web compose or the default mail app
function openEmail(provider, to, subject, body){
  const sub=encodeURIComponent(subject||'');
  const bd=encodeURIComponent(body||'');
  if(provider==='gmail'){
    window.open('https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(to||'')+'&su='+sub+'&body='+bd,'_blank');
  } else {
    window.open('mailto:'+(to||'')+'?subject='+sub+'&body='+bd);
  }
}

async function uploadQuotePdf(quot, items, displayOpts, settings, extra){
  try{
    const blob = buildQuotationPDF(quot, items, {action:'blob', displayOpts, settings, ...(extra||{})});
    if(!blob || !blob.size) return null;
    const _ref = String(quot.ref_number||'draft').replace(/[^A-Za-z0-9_-]/g,'');
    const _rev = (quot.revision_number && quot.revision_number>0) ? ('-r'+quot.revision_number) : '';
    const _d = new Date(), _p = n=>String(n).padStart(2,'0');
    const _stamp = ''+_d.getFullYear()+_p(_d.getMonth()+1)+_p(_d.getDate())+'-'+_p(_d.getHours())+_p(_d.getMinutes());
    const _code = Math.random().toString(36).slice(2,6);
    const path = 'quotes/Quotation_'+_ref+_rev+'_'+_stamp+'_'+_code+'.pdf';
    const {error:upErr} = await supabase.storage.from('quotations').upload(path, blob, {contentType:'application/pdf', upsert:true});

    const {data} = supabase.storage.from('quotations').getPublicUrl(path);

// Phase 3b — per-document activity/audit logging helpers
async function _currentUid(){
  // Resolve the logged-in auth user to their app `users.user_id` (FK target for *_by columns).
  // The auth user's id is NOT a users row, so we match on email; null if no staff row (FK allows null).
  try{
    const {data}=await supabase.auth.getUser();
    const email=data&&data.user&&data.user.email;
    if(!email) return null;
    const {data:u}=await supabase.from('users').select('user_id').eq('email',email).maybeSingle();
    return (u&&u.user_id)||null;
  }catch(e){ return null; }
}
async function logQuoteSend(quotationId, channel){
  try{ await supabase.from('quotation_activity_log').insert({quotation_id:quotationId, action:'sent', channel, logged_by:await _currentUid()}); }
  catch(e){ console.error('[Isheeka ERP] quote send-log failed:', e); }
}
async function logInvoiceActivity(invoiceId, row){
  try{ await supabase.from('invoice_activity_log').insert({invoice_id:invoiceId, changed_by:await _currentUid(), ...row}); }
  catch(e){ console.error('[Isheeka ERP] invoice activity-log failed:', e); }
}

function buildQuotationPDF(quot, lineItems, opts={}){
  const jsPDFctor = window.jspdf && window.jspdf.jsPDF;
  if(!jsPDFctor){ notify('PDF library not loaded. Please refresh.','error'); return false; }
  const doc = new jsPDFctor({unit:'pt', format:'a4'});
  const dOpts = Object.assign({prices:false,qty:true,grouping:true,schedule:true,discount:false,coverPage:false,bankDetails:false}, opts.displayOpts||{});

  const isInv = opts.docType==='invoice';
  const PINK=[232,24,90], PSOFT=[251,234,240], INK=[40,40,40], MUTED=[140,140,140], LINE=[236,236,236];
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=42;
  const LAR=0.781; // logo width/height
  let SCRIPT_OK=false;
  try{ doc.addFileToVFS('GreatVibes.ttf', GV_FONT); doc.addFont('GreatVibes.ttf','GreatVibes','normal'); SCRIPT_OK=true; }catch(e){ SCRIPT_OK=false; }
  let CG_OK=false;
  try{ if(_CG_B64){ doc.addFileToVFS('Cormorant.ttf', _CG_B64); doc.addFont('Cormorant.ttf','Cormorant','italic'); CG_OK=true; } }catch(e){ CG_OK=false; }
  const fmt=d=>d?fmtDate(d):'--';
  const money=n=>'Rs.'+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const sans=(style,sz)=>{ doc.setFont('helvetica',style); doc.setFontSize(sz); };
  const script=(sz)=>{ doc.setFont(SCRIPT_OK?'GreatVibes':'times', SCRIPT_OK?'normal':'italic'); doc.setFontSize(sz); };
  const cormorant=(sz)=>{ doc.setFont(CG_OK?'Cormorant':'times','italic'); doc.setFontSize(sz); };
  const setFill=c=>doc.setFillColor(c[0],c[1],c[2]);
  const setText=c=>doc.setTextColor(c[0],c[1],c[2]);
  const setDraw=c=>doc.setDrawColor(c[0],c[1],c[2]);
  const label = isInv?'INVOICE':'QUOTATION';

  const drawFrame=()=>{ doc.saveGraphicsState(); setDraw(PINK); doc.setLineWidth(2); doc.rect(12,12,W-24,H-24,'S'); doc.restoreGraphicsState(); };

  const HDR_BOTTOM = 108;
  const _evDate = quot.event_date||quot.main_date||quot.tentative_date||null;
  const drawHeaderBand=()=>{
    const top=28; const lh=46, lw=lh*LAR;
    try{ doc.addImage(LOGO,'PNG',M,top,lw,lh); }catch(e){}
    const tx=M+lw+12;
    script(26); setText(PINK); doc.text('Isheeka Events', tx, top+20);
    sans('italic',8.5); setText(MUTED); doc.text('Making Every Event Memorable', tx, top+33);
    script(11); setText(PINK); doc.text('Since 2017', tx, top+45);
    // right doc box
    sans('bold',11); setText(PINK); doc.text(label, W-M, top+12, {align:'right'});
    sans('bold',15); setText(INK); doc.text(String(quot.ref_number||''), W-M, top+28, {align:'right'});
    sans('normal',8); setText(MUTED);
    doc.text('Date: '+fmt(quot.doc_date), W-M, top+40, {align:'right'});
    { if(isInv && quot.due_date) doc.text('Due date: '+fmt(quot.due_date), W-M, top+51, {align:'right'}); }
    { if(_evDate){ const evY=(isInv && quot.due_date)?(top+62):(top+51); setText(PINK); doc.text('Event date: '+fmt(_evDate), W-M, evY, {align:'right'}); setText(MUTED); } }
    setDraw(PINK); doc.setLineWidth(1.4); doc.line(M, HDR_BOTTOM-12, W-M, HDR_BOTTOM-12);
  };

  const drawFooter=(pageNo,pageCount)=>{
    const fy=H-34;
    setDraw(LINE); doc.setLineWidth(0.6); doc.line(M, fy, W-M, fy);
    sans('normal',8); setText(MUTED);
    const phone=(settings.phone_1)||'+91 78423 95867', email=(settings.email)||'isheekaevents@gmail.com', web=(settings.website)||'www.isheekaevents.in';
    doc.text(phone+'   '+email, M, fy+12);
    doc.text(web+'   ·   Page '+pageNo+' of '+pageCount, W-M, fy+12, {align:'right'});
  };

  // ---- COVER PAGE (optional) ----
  if(dOpts.coverPage){
    drawFrame();
    const clh=104, clw=clh*LAR; try{ doc.addImage(LOGO,'PNG',(W-clw)/2,66,clw,clh); }catch(e){}
    let y=206;
    script(46); setText(PINK); doc.text('Isheeka Events', W/2, y, {align:'center'}); y+=22;
    cormorant(14); setText(PINK); doc.text('Making Every Event Memorable', W/2, y, {align:'center'}); y+=27;
    script(15); setText(PINK); doc.text('Since 2017', W/2, y, {align:'center'}); y+=28;
    setDraw(PINK); doc.setLineWidth(1.4); doc.line(W/2-45,y,W/2+45,y); y+=36;
    sans('bold',11); setText(PINK);
    const pillTxt=label+'  ·  '+(quot.ref_number||''); const pw=doc.getTextWidth(pillTxt)+36;
    setDraw(PINK); doc.setLineWidth(1.2); doc.roundedRect((W-pw)/2,y,pw,24,12,12,'S');
    doc.text(pillTxt, W/2, y+16, {align:'center'}); y+=58;
    sans('bold',9); setText(PINK); doc.text('PREPARED FOR', W/2, y, {align:'center'}); y+=25;
    sans('bold',16); setText(PINK); doc.text(String(quot.event_name||''), W/2, y, {align:'center'}); y+=16;
    cormorant(13); setText(PINK);
    doc.text(_evDate?fmt(_evDate):fmt(quot.doc_date), W/2, y, {align:'center'}); y+=36;
    const introTpl = settings.cover_intro || 'Thank you for choosing Isheeka Events to be part of your celebration. Every occasion tells a story, and it is our privilege to help bring yours to life with care, creativity, and attention to the smallest detail.\n\nThe pages that follow set out the details, prepared thoughtfully for {event}. Should you wish to adjust anything, we would be delighted to tailor it to your vision.';
    const introBody = introTpl.replace(/\{client\}/g, quot.client_name||'').replace(/\{event\}/g, quot.event_name||'your event');
    const bx=M+60, bw=W-2*(M+60);
    cormorant(20); setText(PINK); doc.text('Dear '+(quot.client_name||'')+',', bx, y); y+=26;
    cormorant(15); setText(PINK);
    introBody.split('\n').forEach(par=>{ if(!par.trim()){ y+=8; return; } const lines=doc.splitTextToSize(par.trim(), bw); doc.text(lines, bx, y); y+=lines.length*16+10; });
    y+=8; cormorant(14); setText(PINK); doc.text('With warm regards,', bx, y); y+=22;
    cormorant(20); setText(PINK); doc.text('Swathi', bx, y); y+=16;
    cormorant(12); setText(PINK); doc.text('Founder & CEO, Isheeka Events', bx, y);
    doc.addPage();
  }

  // ---- MAIN DOCUMENT ----
  drawFrame();
  drawHeaderBand();

  // Client + Event cards
  let y=HDR_BOTTOM+8;
  const gap=14, cardW=(W-2*M-gap)/2, cardH=76;
  const card=(x,lbl,name,lines)=>{
    setDraw(PINK); doc.setLineWidth(0.8); doc.roundedRect(x,y,cardW,cardH,6,6,'S');
    sans('bold',8); setText(PINK); doc.text(lbl, x+12, y+16);
    sans('bold',12); setText(INK); doc.text(doc.splitTextToSize(String(name||'--'),cardW-24)[0], x+12, y+32);
    sans('normal',9); setText(MUTED);
    let ly=y+45; lines.filter(Boolean).slice(0,3).forEach(l=>{ doc.text(doc.splitTextToSize(String(l),cardW-24)[0], x+12, ly); ly+=11; });
  };
  const addr=[quot.client_city, quot.client_state].filter(Boolean).join(', ');
  card(M,'CLIENT',quot.client_name,[[quot.client_phone, quot.client_email].filter(Boolean).join('   |   '), addr]);
  card(M+cardW+gap,'EVENT',quot.event_name,[ quot.event_ref?('Ref: '+quot.event_ref):null, quot.event_city||null, (isInv&&quot.quotation_ref)?('From quote: '+quot.quotation_ref):null ].filter(Boolean));
  y+=cardH+22;

  // Line items table
  const showPrices=!!dOpts.prices, showQty=!!dOpts.qty;
  const head=['Description']; if(showQty) head.push('Qty'); if(showPrices){ head.push('Unit price','Amount'); }
  const groups={}; const order=[]; (lineItems||[]).forEach(li=>{ const k=li.sub_event_name||'General'; if(!groups[k]){groups[k]=[];order.push(k);} groups[k].push(li); });
  const body=[]; const grpRows=[];
  order.forEach(k=>{
    if(dOpts.grouping && order.length>1){ grpRows.push(body.length); body.push([{content:k, colSpan:head.length}]); }
    groups[k].forEach(li=>{
      const row=[String(li.description||'')];
      if(showQty) row.push(String(parseFloat(li.quantity||0)));
      if(showPrices){ row.push(money(li.unit_price)); row.push(money(li.amount)); }
      body.push(row);
    });
  });
  const colStyles={0:{cellWidth:'auto'}};
  let ci=1; if(showQty){ colStyles[ci]={halign:'right',cellWidth:55}; ci++; }
  if(showPrices){ colStyles[ci]={halign:'right',cellWidth:95}; ci++; colStyles[ci]={halign:'right',cellWidth:95}; }
  const sub=parseFloat(quot.subtotal)||0, disc=parseFloat(quot.discount_amount)||0;
  const grand=parseFloat(quot.grand_total)||(sub-disc);
  let ps=quot.payment_schedule; if(typeof ps==='string'){ try{ps=JSON.parse(ps||'[]');}catch(e){ps=[];} } ps=Array.isArray(ps)?ps:[];
  // Reserve room at the page bottom so the pricing summary + schedule never land alone atop a fresh page —
  // autotable then breaks earlier and pulls the last item rows onto the page that carries the summary.
  const schedH=(dOpts.schedule&&ps.length)?(16+26*ps.length):0;
  let sumH=16+40; if(showPrices){ sumH+=15+((dOpts.discount&&Math.abs(disc)>0.5)?15:0)+((isInv&&quot.gst_applicable)?15:0)+2; } if(isInv){ sumH+=32; }
  const blockH=Math.max(schedH,sumH)+26;
  doc.autoTable({
    head:[head], body:body, startY:y, margin:{left:M,right:M,top:HDR_BOTTOM-2,bottom:58+blockH+24},
    theme:'grid', tableLineColor:PINK, tableLineWidth:0.8,
    styles:{fontSize:9,cellPadding:7,lineColor:LINE,lineWidth:0.4,textColor:INK},
    headStyles:{fillColor:PINK,textColor:[255,255,255],fontSize:9,halign:'left'},
    alternateRowStyles:{fillColor:[252,252,252]},
    columnStyles:colStyles,
    didParseCell:(d)=>{ if(d.section==='body' && grpRows.includes(d.row.index)){ d.cell.styles.fillColor=PSOFT; d.cell.styles.textColor=PINK; d.cell.styles.fontStyle='bold'; d.cell.styles.fontSize=8; } },
    didDrawPage:(d)=>{ drawFrame(); if(d.pageNumber>1){ drawHeaderBand(); } }
  });
  y=doc.lastAutoTable.finalY+24;

  // Totals + schedule — sub/disc/grand/ps/blockH computed above (drives the bottom reserve). Safety net only.
  if(H-58-y < blockH){ doc.addPage(); drawFrame(); drawHeaderBand(); y=HDR_BOTTOM+8; }
  const colY=y, leftX=M, rightX=W/2+14, rr=W-M;
  // schedule (left)
  let sy=colY;
  if(dOpts.schedule && ps.length){
    sans('bold',8.5); setText(PINK); doc.text('PAYMENT SCHEDULE', leftX, sy); sy+=16;
    ps.forEach((p,i)=>{ const pamt=(parseFloat(p.amount)>0)?parseFloat(p.amount):(grand*(parseFloat(p.pct)||0)/100); sans('normal',9.5); setText(INK); doc.text(String.fromCharCode(97+i)+') '+money(pamt)+' '+(p.label?('('+p.label+')'):''), leftX, sy); sans('normal',8); setText(MUTED); doc.text(String(p.when||''), leftX+14, sy+11); sy+=26; });
  }
  // summary (right) — Total always shown
  let ty=colY;
  sans('bold',8.5); setText(PINK); doc.text('SUMMARY', rightX, ty); ty+=16;
  if(showPrices){
    sans('normal',10); setText([85,85,85]);
    doc.text('Subtotal', rightX, ty); doc.text(money(sub), rr, ty, {align:'right'}); ty+=15;
    if(dOpts.discount && Math.abs(disc)>0.5){ doc.text('Adjustment', rightX, ty); doc.text((disc>0?'- ':'+ ')+money(Math.abs(disc)), rr, ty, {align:'right'}); ty+=15; }
    if(isInv && quot.gst_applicable){ doc.text('GST'+(quot.gst_pct?(' ('+parseFloat(quot.gst_pct)+'%)'):''), rightX, ty); doc.text(money(quot.tax_amount), rr, ty, {align:'right'}); ty+=15; }
    ty+=2;
  }
  setFill(PINK); doc.roundedRect(rightX, ty, rr-rightX, 28, 5,5,'F');
  sans('bold',13); setText([255,255,255]); doc.text(isInv?'Grand total':'Total', rightX+12, ty+18); doc.text(money(grand), rr-12, ty+18, {align:'right'}); ty+=40;
  if(isInv){
    const rec=parseFloat(quot.total_received)||0, bal=parseFloat(quot.total_outstanding!=null?quot.total_outstanding:(grand-rec))||0;
    sans('normal',10); setText([85,85,85]); doc.text('Received', rightX, ty); doc.text(money(rec), rr, ty, {align:'right'}); ty+=16;
    sans('bold',11); setText(PINK); doc.text('Balance due', rightX, ty); doc.text(money(bal), rr, ty, {align:'right'}); ty+=16;
  }
  y=Math.max(sy, ty)+26;

  // Payment details
  const hasBank=dOpts.bankDetails && (settings.bank_name||settings.account_number||settings.upi_id);
  if(hasBank){
    if(H-58-y<46){ doc.addPage(); drawFrame(); drawHeaderBand(); y=HDR_BOTTOM+8; }
    setFill([250,247,248]); doc.roundedRect(M,y,W-2*M,34,5,5,'F');
    sans('bold',8); setText(INK); doc.text('Payment details', M+12, y+14);
    sans('normal',9); setText([85,85,85]);
    const bl=[settings.bank_name&&('Bank: '+settings.bank_name), settings.account_number&&('A/c: '+settings.account_number), settings.ifsc_code&&('IFSC: '+settings.ifsc_code), settings.upi_id&&('UPI: '+settings.upi_id)].filter(Boolean).join('    |    ');
    doc.text(doc.splitTextToSize(bl, W-2*M-24), M+12, y+26); y+=48;
  }

  // Terms
  if(quot.additional_terms){
    if(H-58-y<40){ doc.addPage(); drawFrame(); drawHeaderBand(); y=HDR_BOTTOM+8; }
    sans('bold',8.5); setText(PINK); doc.text('TERMS & CONDITIONS', M, y); y+=14;
    sans('normal',9); setText(MUTED);
    quot.additional_terms.split('\n').filter(l=>l.trim()).forEach(l=>{ const wl=doc.splitTextToSize('- '+l.trim(), W-2*M); doc.text(wl, M, y); y+=wl.length*12+2; });
  }

  // Revision history (only on revised docs, when the sender opts to include it)
  if(opts.showRevisionHistory && Array.isArray(opts.revisionHistory) && opts.revisionHistory.length){
    if(H-58-y<60){ doc.addPage(); drawFrame(); drawHeaderBand(); y=HDR_BOTTOM+8; } else { y+=12; }
    sans('bold',8.5); setText(PINK); doc.text('REVISION HISTORY', M, y); y+=6;
    setDraw(PINK); doc.setLineWidth(1); doc.line(M,y,W-M,y); y+=14;
    sans('normal',9);
    opts.revisionHistory.forEach(r=>{
      const line=[r.label,r.date,r.change].filter(Boolean).join('   ·   ')+(r.reason?('   —   '+r.reason):'');
      const wl=doc.splitTextToSize(line, W-2*M);
      if(H-58-y < wl.length*12+4){ doc.addPage(); drawFrame(); drawHeaderBand(); y=HDR_BOTTOM+8; }
      setText(INK); doc.text(wl, M, y); y+=wl.length*12+5;
    });
  }

  // Footer + page numbers
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){ doc.setPage(i); if(!(dOpts.coverPage && i===1)) drawFooter(i,pc); }

  const fname=(isInv?'Invoice_':'Quotation_')+String(quot.ref_number||'draft').replace(/[^A-Za-z0-9_-]/g,'_')+'.pdf';
  if(opts.action==='blob'){ return doc.output('blob'); }
  if(opts.action==='preview'){ window.open(doc.output('bloburl'),'_blank'); return true; }
  if(opts.action==='print'){ try{doc.autoPrint();}catch(e){} window.open(doc.output('bloburl'),'_blank'); }
  else { doc.save(fname); }
  return true;
}

              <div key={i} onMouseDown={()=>{onSelect(o.templateId,o.subEventName);setOpen(false);}}
