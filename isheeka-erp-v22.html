            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'10%'}}>Qty</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Unit price</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Amount</th>
            <th style={{borderBottom:'1.5px solid #e8185a',width:'6%'}}></th>
          </tr>
        </thead>
        <tbody>
          {items.map(row=>(
            <tr key={row.id} style={{borderBottom:'1px solid var(--grey-100)'}}>
              <td style={{padding:'5px 8px'}}>
                <ItemDescInput value={row.description} onChange={v=>updateRow(row.id,'description',v)}/>
              </td>
              <td style={{padding:'5px 8px'}}>
                <ItemNumInput value={row.quantity} onChange={v=>updateRow(row.id,'quantity',v)} align="right"/>
              </td>
              <td style={{padding:'5px 8px'}}>
                <ItemNumInput value={row.unit_price} onChange={v=>updateRow(row.id,'unit_price',v)} align="right"/>
              </td>
              <td style={{padding:'5px 8px',textAlign:'right',fontWeight:500,color:'var(--grey-800)',fontSize:12}}>
                ₹{((parseFloat(row.quantity)||0)*(parseFloat(row.unit_price)||0)).toLocaleString('en-IN')}
              </td>
              <td style={{padding:'5px 8px',textAlign:'center'}}>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:14,padding:'2px 4px'}} onClick={()=>removeRow(row.id)}>✕</button>
              </td>
            </tr>
          ))}
        </tbody>
        <tfoot>
          <tr>
            <td colSpan={3} style={{padding:'8px',textAlign:'right',fontSize:12,color:'var(--grey-400)'}}>Sub-event total</td>
            <td style={{padding:'8px',textAlign:'right',fontSize:13,fontWeight:600,color:'var(--green)'}}>
              ₹{items.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0).toLocaleString('en-IN')}
            </td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button className="btn sm" style={{marginTop:8,border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={addRow}>+ Add item</button>
    </div>
  );
}

// Stable input components to prevent focus loss
function ItemDescInput({value, onChange}) {
  return <input style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',color:'var(--grey-800)'}} value={value} onChange={e=>onChange(e.target.value)} placeholder="Description"/>;
}
function ItemNumInput({value, onChange, align}) {
  return <input type="number" style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',textAlign:align||'left',color:'var(--grey-800)',MozAppearance:'textfield'}} value={value} onChange={e=>onChange(e.target.value)}/>;
}

// ── New Event Wizard ─────────────────────────────────────────────────────────
function NewEventWizard({onSave, onCancel, referenceEvent=null}) {
  const [step, setStep] = useState(1);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState('');
  const [errors, setErrors] = useState({});
  const [clients, setClients] = useState([]);
  const [altContacts, setAltContacts] = useState([]);
  const [clientSearch, setClientSearch] = useState('');
  const [staffList, setStaffList] = useState([]);

  // Step 1 form
  const [form, setForm] = useState({
    name:'', type:'', status:'planning', main_date:'', location:'',
    guest_count:'', budget:'', assigned_staff_id:'', assigned_staff_name:'', internal_notes:''
  });

  // Step 2
  const [selectedClient, setSelectedClient] = useState(null);
  const [primaryContactId, setPrimaryContactId] = useState('client');
  const [primaryContactName, setPrimaryContactName] = useState('');
  const [secondaryContactId, setSecondaryContactId] = useState('');
  const [secondaryContactName, setSecondaryContactName] = useState('');

  // Step 3 - sub events with items
  const [subEvents, setSubEvents] = useState([
    {id:Date.now(), name:'', date:'', location:'', items:[]}
  ]);
  const [mainItems, setMainItems] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [showTplMenu, setShowTplMenu] = useState(false);
  const excelFileRef = React.useRef();

  useEffect(()=>{
    supabase.from('clients').select('client_id,first_name,last_name,phone_1,status').eq('is_deleted',false).order('first_name').then(({data})=>{ if(data) setClients(data); });
    supabase.from('users').select('user_id,first_name,last_name,role').eq('status','active').then(({data})=>{ if(data) setStaffList(data); });
    supabase.from('event_templates').select('*').eq('is_deleted',false).eq('is_active',true).order('sort_order').then(({data})=>{ if(data) setTemplates(data); });
    // Pre-fill from reference event if provided
    if(referenceEvent){
      setForm(f=>({...f,
        type:referenceEvent.type||'',
        location:referenceEvent.location||'',
        guest_count:referenceEvent.guest_count||'',
        assigned_staff_id:referenceEvent.assigned_staff_id||'',
        assigned_staff_name:referenceEvent.assigned_staff_name||'',
        internal_notes:referenceEvent.internal_notes?`[Based on: ${referenceEvent.name}] ${referenceEvent.internal_notes}`:`Based on: ${referenceEvent.name}`,
        name:'', main_date:'', budget:'', status:'planning'
      }));
      // Load sub-events and items from reference event
      Promise.all([
        supabase.from('sub_events').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
        supabase.from('sub_event_items').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
      ]).then(([{data:subs},{data:items}])=>{
        if(subs&&items){
          const grouped = subs.map(se=>({
            id:'se-ref-'+se.sub_event_id+Date.now(),
            name:se.name, date:'', location:se.location||'',
            items:items.filter(i=>i.sub_event_id===se.sub_event_id).map(i=>({
              id:'i-ref-'+i.item_id+Math.random(),
              description:i.description, quantity:i.quantity, unit_price:0
            }))
          }));
          setSubEvents(grouped.length>0?grouped:[{id:Date.now(),name:'',date:'',location:'',items:[]}]);
          const mainItems = items.filter(i=>!i.sub_event_id).map(i=>({
            id:'i-ref-'+i.item_id+Math.random(),
            description:i.description, quantity:i.quantity, unit_price:0
          }));
          setMainItems(mainItems);
        }
      });
    }
  },[]);

  useEffect(()=>{
    if(selectedClient){
      supabase.from('alternative_contacts').select('*').eq('client_id',selectedClient.client_id).eq('is_deleted',false).then(({data})=>{ if(data) setAltContacts(data); });
      setPrimaryContactId('client');
      setPrimaryContactName(`${selectedClient.first_name} ${selectedClient.last_name}`);
      setSecondaryContactId('');
      setSecondaryContactName('');
    }
  },[selectedClient]);

  const setF = (field, val) => {
    setForm(f=>({...f,[field]:val}));
    if(errors[field]) setErrors(e=>({...e,[field]:''}));
    setSaveError('');
  };

  const validateStep1 = () => {
    const e={};
    if(!form.name?.trim()) e.name='Event name is required';
    if(!form.type) e.type='Event type is required';
    if(!form.main_date) e.main_date='Main event date is required';
    if(!form.location?.trim()) e.location='Location is required';
    return e;
  };

  const validateStep2 = () => {
    const e={};
    if(!selectedClient) e.client='Please select a client';
    return e;
  };

  const nextStep = () => {
    if(step===1){ const e=validateStep1(); if(Object.keys(e).length>0){setErrors(e);return;} }
    if(step===2){ const e=validateStep2(); if(Object.keys(e).length>0){setErrors(e);return;} }
    setErrors({});
    setStep(s=>s+1);
  };

  const addSubEvent = () => setSubEvents(s=>[...s,{id:Date.now(),name:'',date:'',location:'',items:[]}]);
  const removeSubEvent = (id) => setSubEvents(s=>s.filter(se=>se.id!==id));
  const updateSubEvent = (id, field, val) => setSubEvents(s=>s.map(se=>se.id===id?{...se,[field]:val}:se));
  const updateSubItems = (id, items) => setSubEvents(s=>s.map(se=>se.id===id?{...se,items}:se));

  const grandTotal = subEvents.reduce((s,se)=>s+se.items.reduce((ss,r)=>ss+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0),0)
    + mainItems.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0);

  const loadTemplate = async (tpl) => {
    if(subEvents.some(se=>se.items.length>0)||mainItems.length>0){
      if(!window.confirm('Loading a template will replace current sub-events and items. Continue?')) return;
    }
    setShowTplMenu(false);
    const {data} = await supabase.from('event_template_items').select('*').eq('template_id',tpl.template_id).order('sub_event_name').order('sort_order');
    if(!data) return;
    const groups = {};
    data.forEach(item=>{
      if(!groups[item.sub_event_name]) groups[item.sub_event_name]={id:'se-'+item.sub_event_name+Date.now(),name:item.sub_event_name,date:'',location:'',items:[]};
      if(item.sub_event_name!=='Main Event'){
        groups[item.sub_event_name].items.push({id:'i-'+item.item_id,description:item.description,quantity:item.default_quantity,unit_price:0});
      }
    });
    const mainEventItems = data.filter(i=>i.sub_event_name==='Main Event').map(i=>({id:'i-'+i.item_id,description:i.description,quantity:i.default_quantity,unit_price:0}));
    const ses = Object.values(groups).filter(g=>g.name!=='Main Event');
    setSubEvents(ses.length>0?ses:[{id:'se-'+Date.now(),name:'',date:'',location:'',items:[]}]);
    setMainItems(mainEventItems);
  };

  const handleExcelImport = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, {type:'array'});
        const newSubEvents = [];
        wb.SheetNames.forEach(sheetName=>{
          const ws = wb.Sheets[sheetName];
          const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          if(data.length<2) return;
          const items = data.slice(1).filter(r=>String(r[0]).trim()).map(r=>({
            id:'i-'+Date.now()+Math.random(),
            description:String(r[0]).trim(),
            quantity:parseFloat(r[1])||1,
            unit_price:parseFloat(r[2])||0
          }));
          if(sheetName==='Main Event') { setMainItems(items); }
          else { newSubEvents.push({id:'se-'+Date.now()+Math.random(),name:sheetName,date:'',location:'',items}); }
        });
        if(newSubEvents.length>0) setSubEvents(s=>[...s,...newSubEvents]);
        alert(`Imported ${wb.SheetNames.length} sheet(s) successfully!`);
      } catch(err){ alert('Could not read file. Please use the provided template.'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

    const handleSave = async () => {
    setSaving(true); setSaveError('');
    try {
      // Determine primary/secondary contact details
      let primId=null, primName=primaryContactName;
      let secId=null, secName=secondaryContactName;
      if(primaryContactId!=='client'){
        const ac=altContacts.find(a=>a.contact_id===primaryContactId);
        if(ac){primId=ac.contact_id; primName=`${ac.first_name} ${ac.last_name}`;}
      }
      if(secondaryContactId&&secondaryContactId!=='none'){
        const ac=altContacts.find(a=>a.contact_id===secondaryContactId);
        if(ac){secId=ac.contact_id; secName=`${ac.first_name} ${ac.last_name}`;}
      }

      // Insert event
      const {data:eventData, error:eventError} = await supabase.from('events').insert({
        name:form.name, type:form.type.toLowerCase(), status:form.status,
        main_date:form.main_date, location:form.location,
        guest_count:form.guest_count?parseInt(form.guest_count):null,
        budget:form.budget?parseFloat(form.budget):null,
        client_id:selectedClient.client_id,
        client_name:`${selectedClient.first_name} ${selectedClient.last_name}`,
        primary_contact_id:primId, primary_contact_name:primName,
        secondary_contact_id:secId, secondary_contact_name:secName,
        assigned_staff_id:form.assigned_staff_id||null,
        assigned_staff_name:form.assigned_staff_name||null,
        internal_notes:form.internal_notes||null,
        created_at:new Date().toISOString(), updated_at:new Date().toISOString(), is_deleted:false
      }).select().single();
      if(eventError) throw eventError;

      // Insert sub events and their items
      for(const se of subEvents){
        if(!se.name.trim()) continue;
        const {data:seData} = await supabase.from('sub_events').insert({
          event_id:eventData.event_id, name:se.name, date:se.date||null,
          location:se.location||null, sort_order:subEvents.indexOf(se),
          created_at:new Date().toISOString(), is_deleted:false
        }).select().single();
        if(seData && se.items.length>0){
          const itemRows = se.items.filter(r=>r.description.trim()).map((r,i)=>({
            sub_event_id:seData.sub_event_id, event_id:eventData.event_id,
            description:r.description, quantity:parseFloat(r.quantity)||1,
            unit_price:parseFloat(r.unit_price)||0,
            sort_order:i, created_at:new Date().toISOString(), is_deleted:false
          }));
          if(itemRows.length>0) await supabase.from('sub_event_items').insert(itemRows);
        }
      }

      // Insert main event items
      const mainRows = mainItems.filter(r=>r.description?.trim()).map((r,i)=>({
        sub_event_id:null, event_id:eventData.event_id,
        description:r.description, quantity:parseFloat(r.quantity)||1,
        unit_price:parseFloat(r.unit_price)||0,
        sort_order:i, created_at:new Date().toISOString(), is_deleted:false
      }));
      if(mainRows.length>0) await supabase.from('sub_event_items').insert(mainRows);

      await onSave(eventData);
    } catch(err){
      setSaveError('Could not save event. Please try again.');
    } finally { setSaving(false); }
  };

  const steps = ['Event details','Client & contact','Sub-events & items','Review & save'];
  const filteredClients = clients.filter(c=>{
    const q=clientSearch.toLowerCase();
    return !q || `${c.first_name} ${c.last_name} ${c.phone_1}`.toLowerCase().includes(q);
  });
  const statusColors = {active:{bg:'var(--green-light)',color:'var(--green)'},inactive:{bg:'var(--grey-100)',color:'var(--grey-400)'},vip:{bg:'var(--pink-light)',color:'var(--pink)'}};

  return (
    <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}} onClick={()=>showTplMenu&&setShowTplMenu(false)}>
      {/* Step bar */}
      <div style={{background:'var(--grey-50)',padding:'14px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',alignItems:'center',gap:0}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:i+1===step?'#993556':i+1<step?'var(--green)':'var(--grey-400)',fontWeight:i+1===step?500:400}}>
              <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,flexShrink:0,
                background:i+1===step?'#993556':i+1<step?'var(--green-light)':'transparent',
                color:i+1===step?'#F4C0D1':i+1<step?'var(--green)':'var(--grey-400)',
                border:i+1<step?'1.5px solid var(--green)':i+1===step?'none':'1.5px solid var(--grey-200)'}}>
                {i+1<step?'✓':i+1}
              </div>
              {s}
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:'var(--grey-200)',margin:'0 8px'}}/>}
          </React.Fragment>
        ))}
      </div>

      <div style={{padding:24}}>
        {saveError&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)'}}>⚠️ {saveError}</div>}

        {/* Step 1 - Event details */}
        {step===1&&(
          <div>
            {referenceEvent&&<div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'8px 14px',fontSize:12,color:'var(--blue)',marginBottom:12}}>📋 Creating new event based on <strong>{referenceEvent.name}</strong> — original event is not affected. Prices have been reset to ₹0.</div>}
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Event details <span style={{fontSize:12,fontWeight:400,color:'var(--grey-400)'}}>— fields marked <span style={{color:'var(--pink)'}}>*</span> are required</span></div>
            <div className="form-grid three" style={{marginBottom:14}}>
              <InputField label="Event name" required value={form.name} onChange={v=>setF('name',v)} placeholder="e.g. Sharma Wedding" error={errors.name}/>
              <SelectField label="Event type" required value={form.type} onChange={v=>setF('type',v)} options={EVENT_TYPES.map(t=>({value:t,label:t}))} error={errors.type}/>
              <SelectField label="Status" value={form.status} onChange={v=>setF('status',v)} options={EVENT_STATUS_ORDER.map(s=>({value:s,label:EVENT_STATUS_LABELS[s]}))}/>
            </div>
            <div className="form-grid three" style={{marginBottom:14}}>
              <InputField label="Main event date" required type="date" value={form.main_date} onChange={v=>setF('main_date',v)} error={errors.main_date}/>
              <AutocompleteInput label="Location" required value={form.location} onChange={v=>setF('location',v)} placeholder="e.g. Hyderabad" error={errors.location} table="events" column="location"/>
              <InputField label="Guest count" type="number" value={form.guest_count} onChange={v=>setF('guest_count',v)} placeholder="e.g. 300"/>
            </div>
            <div className="form-grid" style={{marginBottom:14}}>
              <InputField label="Budget (₹)" type="number" value={form.budget} onChange={v=>setF('budget',v)} placeholder="e.g. 1200000" hint="Approximate budget for planning"/>
              <SelectField label="Assigned staff" value={form.assigned_staff_id} onChange={v=>{
                const staff=staffList.find(s=>s.user_id===v);
                setF('assigned_staff_id',v);
                setForm(f=>({...f,assigned_staff_name:staff?`${staff.first_name} ${staff.last_name}`:''}));
              }} options={staffList.map(s=>({value:s.user_id,label:`${s.first_name} ${s.last_name}`}))} placeholder="Select staff..."/>
            </div>
            <div className="form-grid one">
              <InputField label="Internal notes" type="textarea" value={form.internal_notes} onChange={v=>setF('internal_notes',v)} placeholder="Any internal notes..."/>
            </div>
          </div>
        )}

        {/* Step 2 - Client & contact */}
        {step===2&&(
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Select client & event contacts</div>
            {errors.client&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'8px 12px',fontSize:13,marginBottom:12}}>⚠ {errors.client}</div>}
            <div style={{background:'white',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',padding:16,marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>Select client <span style={{color:'var(--pink)'}}>*</span></div>
                <input className="field-input" style={{width:200,fontSize:12}} placeholder="Search clients..." value={clientSearch} onChange={e=>setClientSearch(e.target.value)}/>
              </div>
              <div style={{maxHeight:220,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                {filteredClients.map(c=>{
                  const sc=statusColors[c.status?.toLowerCase()]||statusColors.active;
                  const sel=selectedClient?.client_id===c.client_id;
                  return (
                    <div key={c.client_id} onClick={()=>setSelectedClient(c)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',border:`1px solid ${sel?'#993556':'var(--grey-100)'}`,borderRadius:'var(--radius-md)',cursor:'pointer',background:sel?'#FBEAF0':'white',transition:'all .15s'}}>
                      <div style={{width:32,height:32,borderRadius:'50%',background:'var(--pink-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'var(--pink)',flexShrink:0}}>
                        {c.first_name?.charAt(0)}{c.last_name?.charAt(0)}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{c.first_name} {c.last_name}</div>
                        <div style={{fontSize:12,color:'var(--grey-400)'}}>{c.phone_1}</div>

            </div>

              ℹ️ Saving will create the event record and link it to {selectedClient?.first_name} {selectedClient?.last_name}'s profile.
            </div>
            {grandTotal>0&&<div style={{background:'var(--green-light)',borderRadius:'var(--radius-md)',padding:'10px 14px',fontSize:13,color:'var(--green)',marginBottom:16}}>

            </div>}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',background:'var(--grey-50)'}}>
        <button className="btn" onClick={step===1?onCancel:()=>setStep(s=>s-1)}>
          {step===1?'✕ Cancel':'← Back'}

          ? <button className="btn primary" onClick={nextStep}>Next →</button>
          : <button className="btn primary" onClick={handleSave} disabled={saving}>{saving?'⏳ Saving...':'💾 Save event'}</button>

    </div>
  );
}

async function getNextQuotRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data} = await supabase.from('counters').select('*').eq('type','quotation').eq('year',year).single();
  if(data){
    const next = (parseInt(data.current_value)||1110) + 1;
    await supabase.from('counters').update({current_value:next.toString(),updated_at:new Date().toISOString()}).eq('counter_id',data.counter_id);
    return 'Q-'+year+'-'+next;
  }
  // Create counter if not exists
  await supabase.from('counters').insert({type:'quotation',year:year,current_value:'1111'});
  return 'Q-'+year+'-1111';
}

async function getNextLeadRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data} = await supabase.from('counters').select('*').eq('type','lead').eq('year',year).single();

    return 'L-'+year+'-'+next;

async function getNextClientRef() {
  // CL-XXXXXX: year-independent, 6-digit counter starting at 111111
  const {data} = await supabase.from('counters').select('*').eq('type','client').eq('year',0).single();
  if(data){
    const next = (parseInt(data.current_value)||111110) + 1;
    await supabase.from('counters').update({current_value:next.toString(),updated_at:new Date().toISOString()}).eq('counter_id',data.counter_id);
    return 'CL-'+next.toString().padStart(6,'0');
  }
  await supabase.from('counters').insert({type:'client',year:0,current_value:'111111'});
  return 'CL-111111';
}

// ── Share helpers ─────────────────────────────────────────────────────────────
function waNormalize(phone){
  const num=(phone||'').replace(/\D/g,'');
  if(!num) return '';
  return num.length===10 ? ('91'+num) : num;
}
// Item 10: try the whatsapp:// app protocol first, fall back to wa.me web
function openWhatsApp(phone, msg){
  const full=waNormalize(phone);
  const text=encodeURIComponent(msg||'');
  const webUrl='https://wa.me/'+full+'?text='+text;
  const appUrl='whatsapp://send?'+(full?('phone='+full+'&'):'')+'text='+text;
  let opened=false;
  const cancel=()=>{ opened=true; };
  window.addEventListener('blur', cancel, {once:true});
  const t=setTimeout(()=>{
    window.removeEventListener('blur',cancel);
    if(!opened) window.open(webUrl,'_blank');
  }, 1200);
  try { window.location.href=appUrl; }
  catch(e){ clearTimeout(t); window.removeEventListener('blur',cancel); window.open(webUrl,'_blank'); }
}
// Item 11: open Gmail web compose or the default mail app
function openEmail(provider, to, subject, body){
  const sub=encodeURIComponent(subject||'');
  const bd=encodeURIComponent(body||'');
  if(provider==='gmail'){
    window.open('https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(to||'')+'&su='+sub+'&body='+bd,'_blank');
  } else {
    window.open('mailto:'+(to||'')+'?subject='+sub+'&body='+bd);
  }
}
// Item 12: branded quotation PDF (action: 'download' | 'print')
function buildQuotationPDF(quot, lineItems, opts={}){
  const jsPDFctor = window.jspdf && window.jspdf.jsPDF;
  if(!jsPDFctor){ alert('PDF library not loaded yet. Please check your connection and refresh.'); return false; }
  const doc = new jsPDFctor({unit:'pt', format:'a4'});
  const dOpts = opts.displayOpts || {prices:true,qty:true,grouping:true,schedule:true,discount:true};
  const PINK=[232,24,90], DARK=[42,26,34], GREY=[120,120,120];
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const M=40;
  const fmt=(d)=> d? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '\u2014';

  // Header band
  doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.rect(0,0,pageW,72,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.text('ISHEEKA EVENTS', M, 32);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('Making Every Event Memorable', M, 47);
  doc.text('+91 78423 95867   |   isheekaevents@gmail.com   |   www.isheekaevents.in', M, 61);
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('QUOTATION', pageW-M, 34, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.text(quot.ref_number||'', pageW-M, 52, {align:'right'});

  let y=98;
  doc.setTextColor(DARK[0],DARK[1],DARK[2]);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.text('Bill To', M, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.text(quot.client_name||'\u2014', M, y+16);
  if(quot.event_name){ doc.setFontSize(9); doc.setTextColor(GREY[0],GREY[1],GREY[2]); doc.text(quot.event_name, M, y+30); doc.setTextColor(DARK[0],DARK[1],DARK[2]); }
  doc.setFontSize(9);
  doc.text('Date: '+fmt(quot.doc_date), pageW-M, y, {align:'right'});
  doc.text('Valid until: '+fmt(quot.valid_until), pageW-M, y+14, {align:'right'});
  doc.text('Status: '+((typeof QUOT_STATUS_LABELS!=='undefined'&&QUOT_STATUS_LABELS[quot.status])||quot.status||'Draft'), pageW-M, y+28, {align:'right'});

  y+=50;
  const groups={};
  (lineItems||[]).forEach(li=>{ const k=li.sub_event_name?(li.sub_event_name.charAt(0).toUpperCase()+li.sub_event_name.slice(1)):'General Items'; (groups[k]=groups[k]||[]).push(li); });
  const body=[];
  const showGroups=dOpts.grouping&&Object.keys(groups).length>1;
  Object.keys(groups).forEach(k=>{
    if(showGroups) body.push([{content:k, colSpan:dOpts.prices?(dOpts.qty?4:3):(dOpts.qty?2:1), styles:{fontStyle:'bold', fillColor:[251,234,240], textColor:PINK}}]);
    groups[k].forEach(li=>{
      const qty=parseFloat(li.quantity)||0, up=parseFloat(li.unit_price)||0;
      const amt=(li.amount!=null&&li.amount!=='')?parseFloat(li.amount):qty*up;
      const row=[];
      row.push(li.description||'');
      if(dOpts.qty) row.push(qty.toString());
      if(dOpts.prices){ row.push('Rs.'+up.toLocaleString('en-IN')); row.push('Rs.'+amt.toLocaleString('en-IN')); }
      body.push(row);
    });
  });
  if(body.length===0) body.push([{content:'No line items', colSpan:dOpts.prices?(dOpts.qty?4:3):(dOpts.qty?2:1), styles:{textColor:GREY, halign:'center'}}]);
  const head=[['Description']];
  if(dOpts.qty) head[0].push('Qty');
  if(dOpts.prices){ head[0].push('Unit Price'); head[0].push('Amount'); }
  const colStyles={0:{cellWidth:'auto'}};
  if(dOpts.qty) colStyles[1]={cellWidth:40,halign:'center'};
  if(dOpts.prices){ colStyles[dOpts.qty?2:1]={cellWidth:80,halign:'right'}; colStyles[dOpts.qty?3:2]={cellWidth:80,halign:'right'}; }
  doc.autoTable({
    startY:y, head:head, body,
    theme:'grid', headStyles:{fillColor:DARK, textColor:255, fontSize:9},
    bodyStyles:{fontSize:9, textColor:DARK, overflow:'linebreak'},
    columnStyles:colStyles,
    rowPageBreak:'avoid',
    margin:{left:M,right:M}
  });
  let ty=doc.lastAutoTable.finalY+18;
  const subtotal=parseFloat(quot.subtotal)||0, disc=parseFloat(quot.discount_amount)||0;
  const gt=(quot.grand_total!=null&&quot.grand_total!=='')?parseFloat(quot.grand_total):(subtotal-disc);
  const tx=pageW-M-200;
  const totalLine=(label,val,bold)=>{ doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(bold?11:9);
    doc.text(label,tx,ty); doc.text(val,pageW-M,ty,{align:'right'}); ty+=bold?18:14; };
  if(dOpts.prices){ totalLine('Subtotal','Rs.'+subtotal.toLocaleString('en-IN'),false); }
  if(dOpts.prices&&dOpts.discount&&disc>0) totalLine('Discount'+(quot.discount_pct>0?' ('+quot.discount_pct+'%)':''),'-Rs.'+disc.toLocaleString('en-IN'),false);
  doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.line(tx,ty-6,pageW-M,ty-6);
  doc.setTextColor(PINK[0],PINK[1],PINK[2]); totalLine('Grand Total','Rs.'+gt.toLocaleString('en-IN'),true);
  doc.setTextColor(DARK[0],DARK[1],DARK[2]);

  let ps=quot.payment_schedule; if(typeof ps==='string'){ try{ps=JSON.parse(ps||'[]');}catch(e){ps=[];} }
  let py=ty+12;
  if(ps&&ps.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.text('Payment Schedule', M, py); py+=4;
    doc.autoTable({ startY:py, head:[['%','Installment','When due']],
      body: ps.map(p=>[(p.pct||0)+'%', p.label||'', p.when||'']),
      theme:'striped', headStyles:{fillColor:DARK,textColor:255,fontSize:9}, bodyStyles:{fontSize:9},
      margin:{left:M,right:pageW/2-10} });
    py=doc.lastAutoTable.finalY+14;
  }
  const addText=(title,txt)=>{ if(!txt) return; if(py>pageH-90){ doc.addPage(); py=60; }
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(DARK[0],DARK[1],DARK[2]); doc.text(title,M,py); py+=12;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    const wrapped=doc.splitTextToSize(txt, pageW-2*M); doc.text(wrapped,M,py); py+=wrapped.length*11+8; doc.setTextColor(DARK[0],DARK[1],DARK[2]); };
  addText('Notes', quot.additional_notes);
  addText('Payment terms', quot.payment_terms);
  addText('Additional terms & conditions', quot.additional_terms);

  doc.setFontSize(8); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
  doc.text('Thank you for choosing Isheeka Events.', M, pageH-24);

  const fname='Quotation_'+String(quot.ref_number||'draft').replace(/[^A-Za-z0-9_-]/g,'_')+'.pdf';
  if(opts.action==='print'){ try{doc.autoPrint();}catch(e){} window.open(doc.output('bloburl'),'_blank'); }
  else { doc.save(fname); }
  return true;
}

      </button>
      {open&&(
        <div style={{position:'absolute',top:'100%',right:0,zIndex:200,background:'white',border:'1px solid var(--grey-200)',borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-md)',minWidth:260,maxHeight:240,overflowY:'auto',marginTop:4}}
          onMouseLeave={()=>setOpen(false)}>
          {empty&&(
            <div style={{padding:'12px 14px',fontSize:12,color:'var(--grey-400)',lineHeight:1.5}}>
              No templates {eventType?('for '+eventType):''} yet.
              <div style={{marginTop:4,color:'var(--pink)',fontWeight:500}}>Create one in Settings &#8594; Templates</div>
            </div>
          )}
          {priority.length>0&&<>
            <div style={{padding:'4px 10px',fontSize:10,fontWeight:700,color:'var(--pink)',textTransform:'uppercase',letterSpacing:'.04em',background:'#FBEAF0'}}>Matching</div>
            {priority.map((o,i)=>(
              <div key={i} onMouseDown={()=>{onSelect(o.templateId,o.subEventName);setOpen(false);}}
                style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
                onMouseEnter={e=>e.currentTarget.style.background='#FBEAF0'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>{o.label}</div>
            ))}
          </>}
          {others.length>0&&<>
            <div style={{padding:'4px 10px',fontSize:10,fontWeight:700,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',background:'var(--grey-50)'}}>{eventType?(eventType+' templates'):'All templates'}</div>
            {others.map((o,i)=>(
              <div key={i} onMouseDown={()=>{onSelect(o.templateId,o.subEventName);setOpen(false);}}
                style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>{o.label}</div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

// ── Quote Generation Wizard ───────────────────────────────────────────────────
function QuoteGenerationWizard({lead, leadSubEvents, isRevision, isContinuation, existingQuotationId, onComplete, onCancel}) {
  const [step, setStep] = React.useState(1);
  const [clientMode, setClientMode] = React.useState('new');
  const [existingClient, setExistingClient] = React.useState(null);
  const [clients, setClients] = React.useState([]);
  const [clientSearch, setClientSearch] = React.useState('');
  const [dupClient, setDupClient] = React.useState(null);
  const [templates, setTemplates] = React.useState([]);
  const [templateItems, setTemplateItems] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [createdQuot, setCreatedQuot] = React.useState(null);
  const [emailMenuOpen, setEmailMenuOpen] = React.useState(false);
  // Quote display options — what the CLIENT sees (not internal data)
  const [displayOpts, setDisplayOpts] = React.useState({prices:false,qty:true,grouping:true,schedule:true,discount:false});
  const setDO=(field,val)=>setDisplayOpts(o=>({...o,[field]:val}));
  const applyPreset=(preset)=>{
    if(preset==='full') setDisplayOpts({prices:true,qty:true,grouping:true,schedule:true,discount:true});
    else if(preset==='items') setDisplayOpts({prices:false,qty:true,grouping:true,schedule:true,discount:false});
    else if(preset==='summary') setDisplayOpts({prices:false,qty:false,grouping:true,schedule:false,discount:false});
  };

  const [subEventBlocks, setSubEventBlocks] = React.useState(()=>{
    const blocks = (leadSubEvents||[]).filter(se=>se.name&&se.name.trim()).map(se=>({
      id:'se-'+Date.now()+Math.random(), name:se.name, items:[]
    }));
    blocks.push({id:'se-main', name:'General Items', items:[]});
    return blocks;
  });

  const today = new Date().toISOString().split('T')[0];
  const [quotDetails, setQuotDetails] = React.useState({
    doc_date:today, valid_until:'',
    discount_pct:0, discount_amount:0,
    additional_notes:'', payment_terms:'', additional_terms:'',
    payment_terms_touched: false,
    payment_schedule:[
      {pct:50,label:'Advance',when:'On confirmation'},
      {pct:40,label:'Pre-event',when:'7 days before event'},
      {pct:10,label:'Balance',when:'On event day'}
    ]
  });

  // Helper: auto-generate payment terms text from schedule
  const buildPaymentTermsText = (schedule) => {
    if(!schedule||schedule.length===0) return '';
    return 'Payment schedule: '+schedule.map((p,i)=>`${p.pct||0}% (${p.label||'Installment '+(i+1)}) due ${p.when||'—'}`).join('; ')+'.';
  };

  React.useEffect(()=>{
    supabase.from('clients').select('client_id,first_name,last_name,phone_1,status').eq('is_deleted',false).order('first_name').then(({data})=>{ if(data) setClients(data); });
    if(lead.phone) supabase.from('clients').select('*').eq('phone_1',lead.phone).eq('is_deleted',false).single().then(({data})=>{ if(data) setDupClient(data); });
    supabase.from('settings').select('default_terms,default_validity_days').single().then(({data})=>{
      if(data){
        const d=new Date(); d.setDate(d.getDate()+(parseInt(data.default_validity_days)||7));
        setQuotDetails(f=>({...f,valid_until:d.toISOString().split('T')[0],additional_terms:data.default_terms||'',payment_terms:buildPaymentTermsText(f.payment_schedule)}));
      }
    });
    supabase.from('event_templates').select('*').eq('is_active',true).eq('is_deleted',false).order('sort_order').then(({data:tmps})=>{
      if(tmps){
        setTemplates(tmps);
        supabase.from('event_template_items').select('*').order('sort_order').then(({data:items})=>{
          if(items){
            const grouped={};
            items.forEach(i=>{
              if(!grouped[i.template_id]) grouped[i.template_id]={};
              const key=i.sub_event_name||'General';
              if(!grouped[i.template_id][key]) grouped[i.template_id][key]=[];
              grouped[i.template_id][key].push(i);
            });
            setTemplateItems(grouped);
          }
        });
      }
    });
    if((isRevision||isContinuation)&&existingQuotationId){
      supabase.from('quotation_line_items').select('*').eq('quotation_id',existingQuotationId).eq('is_deleted',false).order('sort_order').then(({data:li})=>{
        if(li&&li.length>0){
          const seNames=[...new Set(li.map(i=>i.sub_event_name||'General Items'))];
          setSubEventBlocks(seNames.map(name=>({
            id:'se-'+Date.now()+Math.random(), name,
            items:li.filter(i=>(i.sub_event_name||'General Items')===name).map(i=>({id:'li-'+i.line_item_id,description:i.description,quantity:i.quantity,unit_price:i.unit_price}))
          })));
        }
      });
      supabase.from('quotations').select('*').eq('quotation_id',existingQuotationId).single().then(({data:q})=>{
        if(q){
          const ps=typeof q.payment_schedule==='string'?JSON.parse(q.payment_schedule||'[]'):q.payment_schedule||[];
          setQuotDetails(f=>({...f,doc_date:q.doc_date||f.doc_date,valid_until:q.valid_until||f.valid_until,discount_pct:q.discount_pct||0,discount_amount:q.discount_amount||0,additional_notes:q.additional_notes||'',payment_terms:q.payment_terms||'',additional_terms:q.additional_terms||'',payment_terms_touched:!!(q.payment_terms),payment_schedule:ps.length>0?ps:f.payment_schedule}));
          if(q.display_options){ try{ setDisplayOpts(JSON.parse(q.display_options)); }catch(e){} }
        }
      });
    }
  },[]);

  const loadTemplateForBlock = (blockId, templateId, subEventName) => {
    const items=templateItems[templateId]; if(!items) return;
    const matchKey=Object.keys(items).find(k=>k.toLowerCase()===(subEventName||'').toLowerCase());
    const srcItems=matchKey?items[matchKey]:Object.values(items).flat();
    const newItems=srcItems.map(i=>({id:'li-'+Date.now()+Math.random(),description:i.description,quantity:i.default_quantity||1,unit_price:0}));
    setSubEventBlocks(bs=>bs.map(b=>b.id===blockId?{...b,items:newItems}:b));
  };

  const getTemplateOptions = (blockName) => {
    const lt=(lead.event_type||'').toLowerCase();
    const bn=(blockName||'').trim().toLowerCase();
    // Pool: templates matching the lead's event type (fall back to all if lead has no type)
    const pool = templates.filter(t=> !lt || (t.event_type||'').toLowerCase()===lt);
    const opts=[];
    // Priority: sub-event name matches (exact first, then partial), templates with items only
    pool.forEach(t=>{
      const items=templateItems[t.template_id]||{};
      const keys=Object.keys(items);
      let matchKey=null, matchType=null;
      if(bn){
        matchKey=keys.find(k=>k.toLowerCase()===bn);
        if(matchKey) matchType='exact';
        if(!matchKey){
          matchKey=keys.find(k=>{const kl=k.toLowerCase();return kl.includes(bn)||bn.includes(kl);});
          if(matchKey) matchType='partial';
        }
      }
      if(matchKey && items[matchKey] && items[matchKey].length>0){
        opts.push({label:t.name+' \u2192 '+matchKey+' ('+items[matchKey].length+' items)'+(matchType==='partial'?' \u00b7 similar':''),templateId:t.template_id,subEventName:matchKey,priority:true});
      }
    });
    // All-items options for the pool, excluding empty templates
    pool.forEach(t=>{
      const items=templateItems[t.template_id]||{};
      const total=Object.values(items).reduce((s,arr)=>s+arr.length,0);
      if(total>0) opts.push({label:t.name+' \u2192 All items ('+total+')',templateId:t.template_id,subEventName:null,priority:false});
    });
    return opts;
  };

  const setQD=(field,val)=>setQuotDetails(f=>{
    const next={...f,[field]:val};
    // Auto-regen payment_terms from schedule when schedule changes and user hasn't manually edited it
    if(field==='payment_schedule'&&!f.payment_terms_touched){
      next.payment_terms=buildPaymentTermsText(val);
    }
    return next;
  });
  const allItems=subEventBlocks.flatMap(b=>b.items);
  const subtotal=allItems.reduce((s,i)=>s+(parseFloat(i.quantity)||0)*(parseFloat(i.unit_price)||0),0);
  const discountAmt=quotDetails.discount_pct>0?subtotal*(parseFloat(quotDetails.discount_pct)||0)/100:(parseFloat(quotDetails.discount_amount)||0);
  const grandTotal=subtotal-discountAmt;
  const totalPct=(quotDetails.payment_schedule||[]).reduce((s,p)=>s+(parseFloat(p.pct)||0),0);

  const filteredClients=clients.filter(c=>{
    const q=clientSearch.toLowerCase();
    return !q||(c.first_name+' '+c.last_name+' '+(c.phone_1||'')).toLowerCase().includes(q);
  });

  const handleCreate=async()=>{
    if(!quotDetails.valid_until){alert('Please set a valid until date.');return;}
    setSaving(true);
    try {
      // Item 5: continuing an in-progress draft — update it in place, no new client/ref
      if(isContinuation&&existingQuotationId){
        const contItems=subEventBlocks.flatMap(b=>{
          const seName=(b.name&&b.name.trim()&&b.name.trim().toLowerCase()!=='general items')?b.name.trim():null;
          return (b.items||[]).filter(i=>i.description&&i.description.trim()).map((i,idx)=>({
            quotation_id:existingQuotationId,sub_event_name:seName,description:i.description,
            quantity:parseFloat(i.quantity)||1,unit_price:parseFloat(i.unit_price)||0,
            amount:(parseFloat(i.quantity)||1)*(parseFloat(i.unit_price)||0),
            sort_order:idx,created_at:new Date().toISOString(),is_deleted:false
          }));
        });
        const {error:ue}=await supabase.from('quotations').update({
          subtotal,discount_pct:parseFloat(quotDetails.discount_pct)||0,
          discount_amount:discountAmt,grand_total:grandTotal,
          doc_date:quotDetails.doc_date,valid_until:quotDetails.valid_until,
          additional_notes:quotDetails.additional_notes||null,
          payment_terms:quotDetails.payment_terms||null,
          additional_terms:quotDetails.additional_terms||null,
          payment_schedule:JSON.stringify(quotDetails.payment_schedule),
          display_options:JSON.stringify(displayOpts),
          updated_at:new Date().toISOString()
        }).eq('quotation_id',existingQuotationId);
        if(ue) throw ue;
        // Hard-delete old items first, then insert fresh set — prevents pile-up on repeated edits
        await supabase.from('quotation_line_items').delete().eq('quotation_id',existingQuotationId);
        if(contItems.length>0) await supabase.from('quotation_line_items').insert(contItems);
        const {data:updated}=await supabase.from('quotations').select('*').eq('quotation_id',existingQuotationId).single();
        setCreatedQuot(updated); setStep(4); setSaving(false); return;
      }

      let clientId=null, clientName=lead.first_name+' '+lead.last_name;
      if(clientMode==='existing'&&existingClient){
        clientId=existingClient.client_id;
        clientName=existingClient.first_name+' '+existingClient.last_name;
      } else if(!isRevision){
        const ref_number = await getNextClientRef();
        const {data:nc,error:ce}=await supabase.from('clients').insert({
          ref_number,
          first_name:lead.first_name,last_name:lead.last_name,phone_1:lead.phone,phone_2:lead.phone_2||null,
          email_1:lead.email||null,source:lead.source||'referral',status:'active',
          client_since:new Date().toISOString().split('T')[0],
          created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
        }).select().single();
        if(ce) throw ce;
        clientId=nc.client_id; clientName=nc.first_name+' '+nc.last_name;
      } else if(lead.client_id){
        clientId=lead.client_id;
      }

      if(isRevision&&existingQuotationId){
        await supabase.from('quotations').update({status:'superseded',updated_at:new Date().toISOString()}).eq('quotation_id',existingQuotationId);
      }

      const {data:oldQ}=isRevision&&existingQuotationId?await supabase.from('quotations').select('revision_number').eq('quotation_id',existingQuotationId).single():{data:null};
      const revNum=isRevision?(oldQ?.revision_number||0)+1:0;
      const refNum=await getNextQuotRef();

      const lineItems=subEventBlocks.flatMap(b=>{
        // Canonical sub_event_name = the block's display name (trimmed), or null for default/empty blocks
        const seName=(b.name&&b.name.trim()&&b.name.trim().toLowerCase()!=='general items')?b.name.trim():null;
        return (b.items||[]).filter(i=>i.description&&i.description.trim()).map((i,idx)=>({
          sub_event_name:seName,description:i.description,
          quantity:parseFloat(i.quantity)||1,unit_price:parseFloat(i.unit_price)||0,
          amount:(parseFloat(i.quantity)||1)*(parseFloat(i.unit_price)||0),
          sort_order:idx,created_at:new Date().toISOString(),is_deleted:false
        }));
      });

      const {data:newQ,error:qe}=await supabase.from('quotations').insert({
        ref_number:refNum,status:'draft',
        client_id:clientId,client_name:clientName,
        lead_id:lead.lead_id,
        event_name:lead.first_name+' '+lead.last_name+' '+(lead.event_type?lead.event_type.charAt(0).toUpperCase()+lead.event_type.slice(1):'Event'),
        doc_date:quotDetails.doc_date,valid_until:quotDetails.valid_until,
        subtotal,discount_pct:parseFloat(quotDetails.discount_pct)||0,
        discount_amount:discountAmt,grand_total:grandTotal,
        additional_notes:quotDetails.additional_notes||null,
        payment_terms:quotDetails.payment_terms||null,
        additional_terms:quotDetails.additional_terms||null,
        payment_schedule:JSON.stringify(quotDetails.payment_schedule),
        display_options:JSON.stringify(displayOpts),
        parent_quotation_id:isRevision?existingQuotationId:null,
        revision_number:revNum,
        created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
      }).select().single();
      if(qe) throw qe;

      if(lineItems.length>0) await supabase.from('quotation_line_items').insert(lineItems.map(i=>({...i,quotation_id:newQ.quotation_id})));

      await supabase.from('leads').update({
        active_quotation_id:newQ.quotation_id,
        client_id:clientId||lead.client_id||null,
        stage:'quote_generation_in_progress',
        updated_at:new Date().toISOString()
      }).eq('lead_id',lead.lead_id);

      setCreatedQuot(newQ);
      setStep(4);
    } catch(err){
      alert('Could not create quotation: '+(err&&err.message?err.message:'Please try again.'));
    } finally { setSaving(false); }
  };

  const handleMarkSent=async()=>{
    if(!createdQuot) return;
    // Always set to sent (never confirmed) — Swathi manually confirms on client's verbal yes
    const newStage = isRevision ? 'revised_quote_sent' : 'quote_sent';
    await supabase.from('quotations').update({status:'sent',updated_at:new Date().toISOString()}).eq('quotation_id',createdQuot.quotation_id);
    await supabase.from('leads').update({stage:newStage,updated_at:new Date().toISOString()}).eq('lead_id',lead.lead_id);
    onComplete(createdQuot);
  };

  const handleWhatsApp=()=>{
    if(!createdQuot) return;
    const msg='Dear '+lead.first_name+',\n\nPlease find quotation '+createdQuot.ref_number+' for your upcoming '+
      (lead.event_type||'event')+'.\n\nGrand Total: Rs.'+parseFloat(createdQuot.grand_total||0).toLocaleString('en-IN')+
      '\nValid until: '+new Date(createdQuot.valid_until).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+
      '\n\nKindly confirm at your earliest convenience.\n\nWarm regards,\nTeam Isheeka Events\n+91 78423 95867';
    openWhatsApp(lead.phone, msg);
  };

  const handleEmailSend=(provider)=>{
    if(!createdQuot) return;
    const subject='Quotation '+createdQuot.ref_number+' \u2014 Isheeka Events';
    const bodyTxt='Dear '+lead.first_name+',\n\nPlease find the quotation for your upcoming event.\n\nQuotation: '+createdQuot.ref_number+'\nGrand Total: Rs.'+parseFloat(createdQuot.grand_total||0).toLocaleString('en-IN')+'\n\nKindly confirm at your earliest convenience.\n\nWarm regards,\nTeam Isheeka Events';
    openEmail(provider, lead.email||'', subject, bodyTxt);
    setEmailMenuOpen(false);
  };

  const handleQuotePDF=(action)=>{
    if(!createdQuot) return;
    const pdfItems=subEventBlocks.flatMap(b=>(b.items||[]).filter(i=>i.description&&i.description.trim()).map(i=>({
      sub_event_name:(b.name&&b.name.trim()&&b.name.trim().toLowerCase()!=='general items')?b.name.trim():null,
      description:i.description,
      quantity:i.quantity, unit_price:i.unit_price,
      amount:(parseFloat(i.quantity)||0)*(parseFloat(i.unit_price)||0)
    })));
    buildQuotationPDF(createdQuot, pdfItems, {action, displayOpts});
  };

  const steps=['Client','Line items','Quote details','Share'];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:720,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'var(--shadow-lg)'}}>
        <div style={{padding:'18px 24px',borderBottom:'1px solid var(--grey-100)',flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)',marginBottom:8}}>
            {isRevision?'Generate revised quotation':'Generate quotation'} — {lead.first_name} {lead.last_name}
          </div>
          {step<4&&(
            <div style={{display:'flex',alignItems:'center'}}>
              {steps.map((s,i)=>(
                <React.Fragment key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:i+1===step?'var(--pink)':i+1<step?'var(--green)':'var(--grey-400)',fontWeight:i+1===step?500:400}}>
                    <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:600,
                      background:i+1===step?'var(--pink)':i+1<step?'var(--green-light)':'var(--grey-100)',
                      color:i+1===step?'white':i+1<step?'var(--green)':'var(--grey-400)'}}>
                      {i+1<step?'\u2713':i+1}
                    </div>{s}
                  </div>
                  {i<steps.length-1&&<div style={{flex:1,height:1,background:'var(--grey-200)',margin:'0 8px',alignSelf:'center'}}/>}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>

        <div style={{flex:1,overflowY:'auto',padding:20}}>

          {step===1&&(
            <div>
              {!isRevision&&!isContinuation&&<>
                {dupClient&&clientMode==='new'&&(
                  <div style={{background:'#FFF3E0',borderRadius:'var(--radius-md)',padding:'10px 14px',fontSize:13,color:'#E65100',marginBottom:14,border:'1px solid #FFE0B2'}}>
                    Existing client found with this phone: <strong>{dupClient.first_name} {dupClient.last_name}</strong>. Consider linking below.
                  </div>
                )}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                  {[{value:'new',label:'Create new client',sub:'Pre-filled from lead details'},{value:'existing',label:'Link existing client',sub:'Search your client list'}].map(opt=>(
                    <div key={opt.value} onClick={()=>setClientMode(opt.value)}
                      style={{padding:'14px 16px',border:'1.5px solid '+(clientMode===opt.value?'var(--pink)':'var(--grey-100)'),borderRadius:'var(--radius-md)',cursor:'pointer',background:clientMode===opt.value?'#FBEAF0':'white'}}>
                      <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)',marginBottom:3}}>{opt.label}</div>
                      <div style={{fontSize:12,color:'var(--grey-400)'}}>{opt.sub}</div>
                    </div>
                  ))}
                </div>
                {clientMode==='new'&&(
                  <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:14,border:'1px solid var(--grey-100)'}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:10}}>New client details</div>
                    {[['Name',lead.first_name+' '+lead.last_name],['Phone',lead.phone||'—'],['Email',lead.email||'—'],['Source',(lead.source||'').split('_').join(' ')]].map(([l,v])=>(
                      <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
                        <span style={{color:'var(--grey-400)'}}>{l}</span>
                        <span style={{fontWeight:500,color:'var(--grey-800)',textTransform:'capitalize'}}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                {clientMode==='existing'&&(
                  <div>
                    <input className="field-input" placeholder="Search by name or phone..." value={clientSearch} onChange={e=>setClientSearch(e.target.value)} style={{marginBottom:10}}/>
                    <div style={{maxHeight:220,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                      {filteredClients.map(c=>{
                        const sel=existingClient&&existingClient.client_id===c.client_id;
                        return (
                          <div key={c.client_id} onClick={()=>setExistingClient(c)}
                            style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',border:'1px solid '+(sel?'var(--pink)':'var(--grey-100)'),borderRadius:'var(--radius-md)',cursor:'pointer',background:sel?'#FBEAF0':'white'}}>
                            <div style={{width:32,height:32,borderRadius:'50%',background:'var(--pink-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'var(--pink)'}}>
                              {c.first_name&&c.first_name.charAt(0)}{c.last_name&&c.last_name.charAt(0)}
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:500}}>{c.first_name} {c.last_name}</div>
                              <div style={{fontSize:12,color:'var(--grey-400)'}}>{c.phone_1}</div>
                            </div>
                            {sel&&<span style={{color:'var(--green)',fontSize:16}}>{'\u2713'}</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </>}
              {isContinuation&&(
                <div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'12px 16px',fontSize:13,color:'var(--blue)'}}>
                  Continuing your in-progress draft. Line items and details are pre-filled — make your changes and save to update the existing draft (no duplicate is created).
                </div>
              )}
              {isRevision&&(
                <div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'12px 16px',fontSize:13,color:'var(--blue)'}}>
                  This is a revision. Line items will be pre-filled from the previous quotation. The previous quotation will be marked as Superseded.
                </div>
              )}
            </div>
          )}

          {step===2&&(
            <div>
              <div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'8px 14px',fontSize:12,color:'var(--blue)',marginBottom:14}}>
                Use templates to pre-fill items per sub-event, then fill in prices. Tab between cells.
              </div>
              {subEventBlocks.map((block,bi)=>(
                <div key={block.id} style={{background:'var(--grey-50)',borderRadius:'var(--radius-lg)',padding:'14px 16px',marginBottom:12,border:'1px solid var(--grey-100)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:8,borderBottom:'1px solid var(--grey-200)'}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:'#e8185a',flexShrink:0}}/>
                    <QWSubEventNameInput value={block.name} onChange={v=>setSubEventBlocks(bs=>bs.map(b=>b.id===block.id?{...b,name:v}:b))}/>
                    <QWTemplateSelect options={getTemplateOptions(block.name)} eventType={lead.event_type} onSelect={(tId,seName)=>{
                      if(block.items&&block.items.length>0&&!window.confirm('Replace existing items with template?')) return;
                      loadTemplateForBlock(block.id,tId,seName||block.name);
                    }}/>
                    {subEventBlocks.length>1&&<button style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:14,flexShrink:0}} onClick={()=>setSubEventBlocks(bs=>bs.filter(b=>b.id!==block.id))}>X</button>}
                  </div>
                  <FastEntryTable key={block.id} items={block.items||[]} onChange={items=>setSubEventBlocks(bs=>bs.map(b=>b.id===block.id?{...b,items}:b))}/>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <button className="btn sm" style={{border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}}
                  onClick={()=>setSubEventBlocks(bs=>[...bs,{id:'se-'+Date.now(),name:'',items:[]}])}>+ Add sub-event</button>
                <div style={{background:'white',borderRadius:'var(--radius-md)',padding:'8px 16px',border:'1px solid var(--grey-100)',fontSize:13}}>
                  Grand total: <strong style={{color:'var(--green)'}}>Rs.{grandTotal.toLocaleString('en-IN')}</strong>
                </div>
              </div>
            </div>
          )}

          {step===3&&(
            <div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                <div><label className="field-label">Quotation date</label>
                  <input type="date" className="field-input" value={quotDetails.doc_date} onChange={e=>setQD('doc_date',e.target.value)}/></div>
                <div><label className="field-label">Valid until <span style={{color:'var(--pink)'}}>*</span></label>
                  <input type="date" className="field-input" value={quotDetails.valid_until} onChange={e=>setQD('valid_until',e.target.value)}/></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                <div><label className="field-label">Discount %</label>
                  <input type="number" className="field-input" value={quotDetails.discount_pct||''} onChange={e=>{setQD('discount_pct',parseFloat(e.target.value)||0);setQD('discount_amount',0);}} placeholder="0"/></div>
                <div><label className="field-label">Discount (fixed Rs.)</label>
                  <input type="number" className="field-input" value={quotDetails.discount_amount||''} onChange={e=>{setQD('discount_amount',parseFloat(e.target.value)||0);setQD('discount_pct',0);}} placeholder="0"/></div>
              </div>
              <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'12px 16px',marginBottom:14}}>
                {[['Subtotal','Rs.'+subtotal.toLocaleString('en-IN'),false],['Discount','-Rs.'+discountAmt.toLocaleString('en-IN'),false],['Grand total','Rs.'+grandTotal.toLocaleString('en-IN'),true]].map(([l,v,bold],i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:i<2?'1px solid var(--grey-200)':'none'}}>
                    <span style={{fontSize:13,color:'var(--grey-400)'}}>{l}</span>
                    <span style={{fontSize:bold?15:13,fontWeight:bold?700:400,color:bold?'var(--green)':'var(--grey-800)'}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)'}}>Payment schedule</div>
                  <span style={{fontSize:12,color:totalPct===100?'var(--green)':'var(--red)',fontWeight:500}}>Total: {totalPct}%</span>
                </div>
                {(quotDetails.payment_schedule||[]).map((inst,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'70px 1fr 1fr auto',gap:8,marginBottom:6,alignItems:'flex-end'}}>
                    <div><label className="field-label" style={{display:i===0?'block':'none'}}>%</label>
                      <input type="number" className="field-input" value={inst.pct} onChange={e=>{const ps=[...(quotDetails.payment_schedule||[])];ps[i]={...ps[i],pct:parseFloat(e.target.value)||0};setQD('payment_schedule',ps);}}/></div>
                    <div><label className="field-label" style={{display:i===0?'block':'none'}}>Label</label>
                      <input className="field-input" value={inst.label||''} onChange={e=>{const ps=[...(quotDetails.payment_schedule||[])];ps[i]={...ps[i],label:e.target.value};setQD('payment_schedule',ps);}} placeholder="e.g. Advance"/></div>
                    <div><label className="field-label" style={{display:i===0?'block':'none'}}>When due</label>
                      <input className="field-input" value={inst.when||''} onChange={e=>{const ps=[...(quotDetails.payment_schedule||[])];ps[i]={...ps[i],when:e.target.value};setQD('payment_schedule',ps);}} placeholder="e.g. On confirmation"/></div>
                    <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',paddingBottom:6}} onClick={()=>setQD('payment_schedule',(quotDetails.payment_schedule||[]).filter((_,j)=>j!==i))}>X</button>
                  </div>
                ))}
                <button className="btn sm" style={{border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}}
                  onClick={()=>setQD('payment_schedule',[...(quotDetails.payment_schedule||[]),{pct:0,label:'',when:''}])}>+ Add installment</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label className="field-label">Notes (optional)</label>
                  <textarea className="field-textarea" rows={3} value={quotDetails.additional_notes||''} onChange={e=>setQD('additional_notes',e.target.value)} placeholder="Notes for client..."/></div>
                <div><label className="field-label">Payment terms <span style={{fontSize:11,color:'var(--grey-400)',fontWeight:400}}>(auto-generated from schedule above — edit if needed)</span></label>
                  <textarea className="field-textarea" rows={3} value={quotDetails.payment_terms||''} onChange={e=>setQuotDetails(f=>({...f,payment_terms:e.target.value,payment_terms_touched:true}))} placeholder="Payment terms will be auto-generated from the schedule above..."/></div>
                <div><label className="field-label">Additional terms &amp; conditions <span style={{fontSize:11,color:'var(--grey-400)',fontWeight:400}}>(cancellation, inclusions, taxes, etc.)</span></label>
                  <textarea className="field-textarea" rows={3} value={quotDetails.additional_terms||''} onChange={e=>setQD('additional_terms',e.target.value)} placeholder="e.g. Cancellation policy, what's included/excluded, GST, etc."/></div>
              </div>
            </div>
          )}

          {step===4&&createdQuot&&(
            <div style={{textAlign:'center',padding:'10px 0'}}>
              <div style={{width:64,height:64,borderRadius:'50%',background:'var(--green-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 14px'}}>{'\u2705'}</div>
              <div style={{fontSize:16,fontWeight:600,color:'var(--grey-800)',marginBottom:4}}>{isRevision?'Revised quotation created!':'Quotation created!'}</div>
              <div style={{fontSize:14,color:'var(--grey-400)',marginBottom:6}}>{createdQuot.ref_number} — Rs.{parseFloat(createdQuot.grand_total||0).toLocaleString('en-IN')}</div>
              <div style={{fontSize:13,color:'var(--grey-400)',marginBottom:24}}>Share with {lead.first_name}, then mark as sent to update the lead stage.</div>
              <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:'14px 16px',marginBottom:16,textAlign:'left'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--grey-800)',marginBottom:10}}>What the client sees</div>
                <div style={{display:'flex',gap:6,marginBottom:12}}>
                  {[['full','Full detail'],['items','Items only (recommended)'],['summary','Summary only']].map(([k,l])=>(
                    <button key={k} onClick={()=>applyPreset(k)} className="btn sm"
                      style={{fontSize:11,flex:1,background:
                        (k==='full'&&displayOpts.prices&&displayOpts.qty&&displayOpts.schedule)?'var(--pink)':
                        (k==='items'&&!displayOpts.prices&&displayOpts.qty)?'var(--pink)':
                        (k==='summary'&&!displayOpts.prices&&!displayOpts.qty&&!displayOpts.schedule)?'var(--pink)':'white',
                        color:(k==='full'&&displayOpts.prices&&displayOpts.qty&&displayOpts.schedule)||
                              (k==='items'&&!displayOpts.prices&&displayOpts.qty)||
                              (k==='summary'&&!displayOpts.prices&&!displayOpts.qty&&!displayOpts.schedule)?'white':'var(--grey-600)',
                        border:'1px solid var(--grey-200)'}}>{l}</button>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                  {[['prices','Show item prices'],['qty','Show quantities'],['grouping','Show sub-event grouping'],['schedule','Show payment schedule'],['discount','Show discount']].map(([k,l])=>(
                    <label key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--grey-700)',cursor:'pointer'}}>
                      <input type="checkbox" checked={!!displayOpts[k]} onChange={e=>setDO(k,e.target.checked)} style={{accentColor:'var(--pink)'}}/>{l}
                    </label>
                  ))}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:420,margin:'0 auto 10px'}}>
                <button className="btn" style={{padding:'12px 16px'}} onClick={handleWhatsApp}>
                  <div style={{fontSize:13,fontWeight:500}}>Share via WhatsApp</div>
                  <div style={{fontSize:11,color:'var(--grey-400)'}}>Opens app, falls back to web</div>
                </button>
                <div style={{position:'relative'}}>
                  <button className="btn" style={{padding:'12px 16px',width:'100%'}} onClick={()=>setEmailMenuOpen(v=>!v)}>
                    <div style={{fontSize:13,fontWeight:500}}>Send via Email {'\u25BE'}</div>
                    <div style={{fontSize:11,color:'var(--grey-400)'}}>Gmail or default app</div>
                  </button>
                  {emailMenuOpen&&(
                    <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:200,background:'white',border:'1px solid var(--grey-200)',borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-md)',marginTop:4,overflow:'hidden'}}
                      onMouseLeave={()=>setEmailMenuOpen(false)}>
                      <div onClick={()=>handleEmailSend('gmail')} style={{padding:'10px 14px',fontSize:13,cursor:'pointer',borderBottom:'1px solid var(--grey-100)',textAlign:'left'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'} onMouseLeave={e=>e.currentTarget.style.background='white'}>Gmail (web)</div>
                      <div onClick={()=>handleEmailSend('default')} style={{padding:'10px 14px',fontSize:13,cursor:'pointer',textAlign:'left'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'} onMouseLeave={e=>e.currentTarget.style.background='white'}>Default email app</div>
                    </div>
                  )}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:420,margin:'0 auto 16px'}}>
                <button className="btn" style={{padding:'10px 16px'}} onClick={()=>handleQuotePDF('download')}>
                  <div style={{fontSize:13,fontWeight:500}}>{'\u2B07'} Download PDF</div>
                  <div style={{fontSize:11,color:'var(--grey-400)'}}>Branded quotation</div>
                </button>
                <button className="btn" style={{padding:'10px 16px'}} onClick={()=>handleQuotePDF('print')}>
                  <div style={{fontSize:13,fontWeight:500}}>Print</div>
                  <div style={{fontSize:11,color:'var(--grey-400)'}}>Open print dialog</div>
                </button>
              </div>
              <button className="btn primary" style={{width:'100%',maxWidth:420,padding:'12px'}} onClick={handleMarkSent}>
                Mark as sent — update lead stage
              </button>
            </div>
          )}
        </div>

        {step<4&&(
          <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',flexShrink:0}}>
            <button className="btn" onClick={step===1?onCancel:()=>setStep(s=>s-1)}>{step===1?'Cancel':'Back'}</button>
            {step<3&&<button className="btn primary" onClick={()=>{
              if(step===1&&clientMode==='existing'&&!existingClient&&!isRevision) return;
              setStep(s=>s+1);
            }}>Next</button>}
            {step===3&&<button className="btn primary" onClick={handleCreate} disabled={saving}>{saving?'Creating...':isRevision?'Create revised quote':'Create quotation'}</button>}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
