          <div><label className="field-label">City</label><input className="field-input" value={form.city} onChange={e=>setF('city',e.target.value)}/></div>
          <div><label className="field-label">State</label><input className="field-input" value={form.state} onChange={e=>setF('state',e.target.value)}/></div>
          <div><label className="field-label">GSTIN</label><input className="field-input" value={form.gst_number} onChange={e=>setF('gst_number',e.target.value)}/></div>
          <div><label className="field-label">PAN</label><input className="field-input" value={form.pan_number} onChange={e=>setF('pan_number',e.target.value)}/></div>
          <div><label className="field-label">Bank name</label><input className="field-input" value={form.bank_name} onChange={e=>setF('bank_name',e.target.value)}/></div>
          <div><label className="field-label">Account number</label><input className="field-input" value={form.account_number} onChange={e=>setF('account_number',e.target.value)}/></div>
          <div><label className="field-label">IFSC</label><input className="field-input" value={form.ifsc_code} onChange={e=>setF('ifsc_code',e.target.value)}/></div>
          <div><label className="field-label">UPI ID</label><input className="field-input" value={form.upi_id} onChange={e=>setF('upi_id',e.target.value)}/></div>
          <div><label className="field-label">Payment terms</label><input className="field-input" value={form.payment_terms} onChange={e=>setF('payment_terms',e.target.value)} placeholder="e.g. 50% advance"/></div>
          <div><label className="field-label">Rating (0–5)</label><input type="number" min="0" max="5" step="0.1" className="field-input" value={form.rating} onChange={e=>setF('rating',e.target.value)}/></div>
          <div><label className="field-label">Status</label><select className="field-input" value={form.status} onChange={e=>setF('status',e.target.value)}><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:22}}><input type="checkbox" checked={form.is_preferred} onChange={e=>setF('is_preferred',e.target.checked)} style={{width:16,height:16,accentColor:'var(--pink)'}}/><span style={{fontSize:13}}>Preferred vendor</span></div>
          <div style={{gridColumn:'1 / -1'}}><label className="field-label">Notes</label><textarea className="field-textarea" rows={2} value={form.notes} onChange={e=>setF('notes',e.target.value)}/></div>
        </div>
        <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn" onClick={()=>setShowForm(false)}>Cancel</button><button className="btn primary" disabled={saving} onClick={()=>save()}>{saving?'Saving…':(editV?'Save changes':'Add vendor')}</button></div>
      </div>
    </div>
  );

  if(detailId){
    const v=vendors.find(x=>x.vendor_id===detailId);
    if(!v) return <div style={{padding:40,textAlign:'center',color:'var(--grey-400)'}}>Vendor not found. <button className="btn sm" onClick={onBack}>← Back</button></div>;
    const eng=evs.filter(x=>x.vendor_id===v.vendor_id);
    const sc=stColor(v.status);
    return (
      <div>
        {showForm&&formModal}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>{v.name} {v.is_preferred&&<span title="Preferred" style={{color:'var(--orange)'}}>★</span>}</div>
            <div style={{fontSize:13,color:'var(--grey-400)',marginTop:2}}>{catLabel(v.category)}{v.rating?(' · ★ '+v.rating):''}</div>
            <div style={{marginTop:6}}><span style={{fontSize:11,padding:'2px 10px',borderRadius:12,background:sc.bg,color:sc.color}}>{(v.status||'').toUpperCase()}</span></div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <select className="field-input" style={{width:120,fontSize:13,padding:'6px 10px'}} value={v.status} onChange={e=>setStatus(v,e.target.value)}><option value="active">Active</option><option value="inactive">Inactive</option></select>
            <button className="btn sm primary" onClick={()=>openEdit(v)}>✏️ Edit</button>
            <button className="btn sm" style={{color:'var(--red)',borderColor:'rgba(163,45,45,0.3)'}} onClick={()=>del(v)}>🗑 Delete</button>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div style={{background:'white',border:'1px solid var(--grey-100)',borderRadius:'var(--radius-lg)',padding:'14px 18px'}}>
            <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>Contact</div>
            {[['Contact person',v.contact_person],['Phones',[v.phone_1,v.phone_2,v.phone_3].filter(Boolean).join(' · ')],['Emails',[v.email_1,v.email_2,v.email_3].filter(Boolean).join(' · ')],['Address',[v.street_address,v.city,v.state].filter(Boolean).join(', ')]].map(([l,val])=><div key={l} style={{display:'flex',justifyContent:'space-between',gap:10,padding:'4px 0',fontSize:13}}><span style={{color:'var(--grey-400)'}}>{l}</span><span style={{textAlign:'right'}}>{val||'—'}</span></div>)}
          </div>
          <div style={{background:'white',border:'1px solid var(--grey-100)',borderRadius:'var(--radius-lg)',padding:'14px 18px'}}>
            <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>Tax &amp; payment</div>
            {[['GSTIN',v.gst_number],['PAN',v.pan_number],['Bank',[v.bank_name,v.account_number,v.ifsc_code].filter(Boolean).join(' · ')],['UPI',v.upi_id],['Payment terms',v.payment_terms]].map(([l,val])=><div key={l} style={{display:'flex',justifyContent:'space-between',gap:10,padding:'4px 0',fontSize:13}}><span style={{color:'var(--grey-400)'}}>{l}</span><span style={{textAlign:'right'}}>{val||'—'}</span></div>)}
          </div>
        </div>
        <div style={{background:'white',border:'1px solid var(--grey-100)',borderRadius:'var(--radius-lg)',overflow:'hidden'}}>
          <div style={{fontWeight:600,padding:'12px 16px',fontSize:13}}>Engagements <span style={{fontWeight:400,color:'var(--grey-400)',fontSize:12}}>({eng.length})</span></div>
          {eng.length===0&&<div style={{padding:'0 16px 14px',fontSize:13,color:'var(--grey-400)'}}>Not engaged on any event yet.</div>}
          {eng.length>0&&<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 100px 100px 100px',gap:8,padding:'8px 16px',background:'var(--grey-50)',fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}><div>Event</div><div style={{textAlign:'right'}}>Agreed</div><div style={{textAlign:'right'}}>Paid</div><div style={{textAlign:'right'}}>Balance</div></div>
            {eng.map(x=>{ const e=eMap[x.event_id]; return <div key={x.event_vendor_id} style={{display:'grid',gridTemplateColumns:'1fr 100px 100px 100px',gap:8,padding:'10px 16px',borderTop:'1px solid var(--grey-100)',fontSize:13}}><div>{e?<a onClick={()=>onNavigate&&onNavigate('events',{eventId:e.event_id})} style={{color:'var(--pink)',cursor:'pointer',fontWeight:500}}>{e.ref_number}</a>:'—'}{e?(' · '+e.name):''}{x.service_description?(' · '+x.service_description):''}</div><div style={{textAlign:'right'}}>{inr(x.agreed_amount)}</div><div style={{textAlign:'right'}}>{inr(x.total_paid)}</div><div style={{textAlign:'right',color:(parseFloat(x.outstanding)||0)>0?'var(--red)':'var(--grey-800)'}}>{inr(x.outstanding)}</div></div>; })}
          </>}
        </div>
      </div>
    );
  }

  return (
    <div>
      {showForm&&formModal}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>Vendors</div>
        <button className="btn primary" onClick={openNew}>+ New vendor</button>
      </div>
      <div className="metrics-grid" style={{marginBottom:18}}>
        <div className="metric-card pink"><div className="metric-icon">🔧</div><div className="metric-value">{vendors.length}</div><div className="metric-label">Total</div></div>
        <div className="metric-card green"><div className="metric-icon">✅</div><div className="metric-value">{cnt(v=>v.status==='active')}</div><div className="metric-label">Active</div></div>
        <div className="metric-card orange"><div className="metric-icon">⭐</div><div className="metric-value">{cnt(v=>v.is_preferred)}</div><div className="metric-label">Preferred</div></div>
        <div className="metric-card blue"><div className="metric-icon">🚫</div><div className="metric-value">{cnt(v=>v.status==='inactive')}</div><div className="metric-label">Inactive</div></div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{flex:1,minWidth:180,position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span><input className="field-input" style={{paddingLeft:36}} placeholder="Search name, contact, phone, GST…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select className="field-input" style={{width:160}} value={catF} onChange={e=>setCatF(e.target.value)}><option value="">All categories</option>{VENDOR_CATS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
        <select className="field-input" style={{width:130}} value={statusF} onChange={e=>setStatusF(e.target.value)}><option value="">All statuses</option><option value="active">Active</option><option value="inactive">Inactive</option></select>
      </div>
      {loading? <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>
       : filtered.length===0? <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:50,textAlign:'center',border:'1px solid var(--grey-100)',color:'var(--grey-400)'}}>No vendors. <button className="btn sm" onClick={openNew}>+ Add one</button></div>
       : <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
          {filtered.map((v,i)=>{ const sc=stColor(v.status); const used=evs.filter(x=>x.vendor_id===v.vendor_id).length; return (
            <div key={v.vendor_id} onClick={()=>onNavigate('vendors',{vendorId:v.vendor_id,label:v.name})} style={{display:'grid',gridTemplateColumns:'40px 1fr 130px 1fr auto 20px',gap:12,alignItems:'center',padding:'12px 16px',borderTop:i>0?'1px solid var(--grey-100)':'none',cursor:'pointer',opacity:v.status==='inactive'?0.6:1}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:'var(--pink-light)',color:'var(--pink)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13}}>{(v.name||'?').slice(0,2).toUpperCase()}</div>
              <div><div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{v.name} {v.is_preferred&&<span style={{color:'var(--orange)'}}>★</span>}</div><div style={{fontSize:12,color:'var(--grey-400)'}}>{v.rating?('★ '+v.rating):''}{used>0?((v.rating?' · ':'')+used+' event'+(used>1?'s':'')):''}</div></div>
              <div><span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:'var(--blue-light)',color:'var(--blue)'}}>{catLabel(v.category)}</span></div>
              <div style={{fontSize:12,color:'var(--grey-400)'}}>{[v.contact_person,v.phone_1,v.city].filter(Boolean).join(' · ')||'—'}</div>
              <div><span style={{fontSize:11,padding:'2px 10px',borderRadius:12,background:sc.bg,color:sc.color}}>{(v.status||'').toUpperCase()}</span></div>
              <div style={{color:'var(--grey-400)'}}>›</div>
            </div>
          ); })}
        </div>}
    </div>
  );
}

// ── Vendor Payments Module ────────────────────────────────────────────────────
function VendorPaymentsModule({onNavigate}){
  const [pays,setPays]=React.useState([]);
  const [evs,setEvs]=React.useState([]); // event_vendors
  const [vendors,setVendors]=React.useState([]);
  const [events,setEvents]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [search,setSearch]=React.useState('');
  const [evtFilter,setEvtFilter]=React.useState('');
  const [range,setRange]=React.useState('month');
  const [showVoided,setShowVoided]=React.useState(false);
  const [duesView,setDuesView]=React.useState(false);
  const [expVendor,setExpVendor]=React.useState(null);
  const [popupEvent,setPopupEvent]=React.useState(null);
  const [showRec,setShowRec]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const recEmpty={eventId:'',eventVendorId:'',newVendor:false,vendorName:'',vendorId:'',category:'other',service:'',agreed:'',amount:'',date:todayLocalStr(),mode:'upi',reference:''};
  const [rec,setRec]=React.useState(recEmpty);
  const setR=(k,v)=>setRec(f=>({...f,[k]:v}));

  const load=React.useCallback(async()=>{
    setLoading(true);
    const [{data:p},{data:ev},{data:vn},{data:e}]=await Promise.all([
      supabase.from('vendor_payments').select('*').order('payment_date',{ascending:false}),
      supabase.from('event_vendors').select('*').eq('is_deleted',false),
      supabase.from('vendors').select('vendor_id,name,category,status').eq('is_deleted',false),
      supabase.from('events').select('event_id,ref_number,name,main_date,client_name').eq('is_deleted',false).order('main_date',{ascending:false})
    ]);
    setPays(p||[]); setEvs(ev||[]); setVendors(vn||[]); setEvents(e||[]); setLoading(false);
  },[]);
  React.useEffect(()=>{ load(); },[load]);

  const vMap={}; vendors.forEach(v=>{vMap[v.vendor_id]=v.name;});
  const eMap={}; events.forEach(e=>{eMap[e.event_id]=e;});
  const evMap={}; evs.forEach(x=>{evMap[x.event_vendor_id]=x;});
  const yr=String(new Date().getFullYear()), mo=todayLocalStr().slice(0,7);
  const inRange=d=> range==='all'?true: range==='year'?(String(d||'').slice(0,4)===yr):(String(d||'').slice(0,7)===mo);
  const inr=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
  const live=pays.filter(p=>!p.is_voided);
  const mMonth=live.filter(p=>String(p.payment_date||'').slice(0,7)===mo).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const mYear=live.filter(p=>String(p.payment_date||'').slice(0,4)===yr).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const outstanding=evs.reduce((s,x)=>s+(parseFloat(x.outstanding)||0),0);
  const voidedCount=pays.filter(p=>p.is_voided).length;
  // Cross-event dues rollup: what's still owed to each vendor, summed across all their engagements.
  const duesByVendor=(()=>{ const m={}; evs.forEach(x=>{ const out=parseFloat(x.outstanding)||0; const vid=x.vendor_id?('id:'+x.vendor_id):('nm:'+(x.vendor_name||'?')); const name=vMap[x.vendor_id]||x.vendor_name||'Unknown vendor'; if(!m[vid]) m[vid]={key:vid, vid:x.vendor_id||null, name, agreed:0, paid:0, outstanding:0, events:[]}; m[vid].agreed+=parseFloat(x.agreed_amount)||0; m[vid].paid+=parseFloat(x.total_paid)||0; m[vid].outstanding+=out; if(out>0.5){ m[vid].events.push({eid:x.event_id, ev:eMap[x.event_id], outstanding:out, service:x.service_description}); } }); return Object.values(m).filter(r=>r.outstanding>0.5).sort((a,b)=>b.outstanding-a.outstanding); })();
  const exportDues=()=>{
    if(!duesByVendor.length){ notify('No outstanding vendor dues to export.','info'); return; }
    const rows=[];
    duesByVendor.forEach(r=>{
      rows.push({Vendor:r.name, Event:'— Total —', Agreed:Math.round(r.agreed), Paid:Math.round(r.paid), Outstanding:Math.round(r.outstanding)});
      r.events.forEach(e=>{ rows.push({Vendor:'', Event:(e.ev?(e.ev.ref_number+' · '+e.ev.name):'(event)')+(e.service?(' · '+e.service):''), Agreed:'', Paid:'', Outstanding:Math.round(e.outstanding)}); });
    });
    try{ const ws=XLSX.utils.json_to_sheet(rows,{header:['Vendor','Event','Agreed','Paid','Outstanding']}); ws['!cols']=[{wch:26},{wch:42},{wch:12},{wch:12},{wch:13}]; const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Vendor dues'); XLSX.writeFile(wb,'isheeka-vendor-dues-'+todayLocalStr()+'.xlsx'); notify('Vendor dues exported.','success'); }
    catch(err){ console.error('[Isheeka ERP] dues export failed:',err); notify('Could not export the dues.','error'); }
  };
  const filtered=pays.filter(p=>{
    if(showVoided ? !p.is_voided : p.is_voided) return false;
    const q=search.toLowerCase();
    const ev=evMap[p.event_vendor_id]; const evt=eMap[p.event_id];
    const ms=!q||`${vMap[p.vendor_id]||p.vendor_id||''} ${(ev&&ev.service_description)||''} ${(evt&&evt.ref_number)||''} ${(evt&&evt.name)||''} ${p.reference_number||''} ${p.void_reason||''}`.toLowerCase().includes(q);
    const me=!evtFilter||p.event_id===evtFilter;
    return ms&&me&&inRange(p.payment_date);
  });

  const evForSelectedEvent=evs.filter(x=>x.event_id===rec.eventId);
  const openRec=()=>{ setRec(recEmpty); setShowRec(true); };
  const saveRec=async()=>{
    if(!rec.eventId){ notify('Select the event this payment is for.','error'); return; }
    const amt=parseFloat(rec.amount)||0; if(amt<=0){ notify('Enter a valid amount.','error'); return; }
    setSaving(true);
    try{
      let ev;
      if(rec.newVendor){
        if(!rec.vendorName.trim()){ notify('Enter the vendor name.','error'); setSaving(false); return; }
        ev=await addEventVendor({eventId:rec.eventId, vendorId:rec.vendorId||null, vendorName:rec.vendorName.trim(), category:rec.category, service:rec.service, agreed:rec.agreed});
      } else {
        if(!rec.eventVendorId){ notify('Pick the vendor on this event (or add a new one).','error'); setSaving(false); return; }
        ev=evMap[rec.eventVendorId];
      }
      await recordVendorPayment(ev, {amount:amt, date:rec.date, mode:rec.mode, reference:rec.reference});
      setSaving(false); setShowRec(false); notify('Vendor payment recorded.','success'); load();
    }catch(err){ console.error('[Isheeka ERP] vendor payment failed:',err); notify('Could not record the payment: '+(err&&err.message?err.message:'try again'),'error'); setSaving(false); }
  };

  return (
    <div>
      {popupEvent&&<EventQuickView eventId={popupEvent} onClose={()=>setPopupEvent(null)} onNavigate={onNavigate}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>Vendor payments</div>
        <button className="btn primary" onClick={openRec}>+ Record payment</button>
      </div>
      <div className="metrics-grid" style={{marginBottom:18}}>
        <div className="metric-card pink"><div className="metric-icon">🧾</div><div className="metric-value">{inr(mMonth)}</div><div className="metric-label">Paid this month</div></div>
        <div className="metric-card red"><div className="metric-icon">⏳</div><div className="metric-value">{inr(outstanding)}</div><div className="metric-label">Outstanding to vendors</div></div>
        <div className="metric-card blue"><div className="metric-icon">📅</div><div className="metric-value">{inr(mYear)}</div><div className="metric-label">Paid this year</div></div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{flex:1,minWidth:180,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
          <input className="field-input" style={{paddingLeft:36}} placeholder="Search vendor, event ref/name, reference…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="field-input" style={{width:200}} value={evtFilter} onChange={e=>setEvtFilter(e.target.value)}><option value="">All events</option>{events.map(e=><option key={e.event_id} value={e.event_id}>{e.ref_number} · {e.name}{e.client_name?(' · '+e.client_name):''}{e.main_date?(' · '+fmtDate(e.main_date,{day:'numeric',month:'short',year:'numeric'})):''}</option>)}</select>
        <select className="field-input" style={{width:130}} value={range} onChange={e=>setRange(e.target.value)}><option value="month">This month</option><option value="year">This year</option><option value="all">All time</option></select>
        <button className="btn sm" onClick={()=>setDuesView(v=>!v)} title="Outstanding owed to each vendor across all their events" style={{background:duesView?'var(--grey-100)':undefined,color:duesView?'var(--grey-800)':'var(--grey-400)'}}>{duesView?'← Payments':('Dues by vendor'+(duesByVendor.length?(' ('+duesByVendor.length+')'):''))}</button>
        {duesView&&<button className="btn sm" onClick={exportDues} title="Download the vendor dues as an Excel file">⬇ Export</button>}
        <button className="btn sm" onClick={()=>setShowVoided(v=>!v)} title="Audit trail of voided payments" style={{background:showVoided?'var(--grey-100)':undefined,color:showVoided?'var(--grey-800)':'var(--grey-400)'}}>{showVoided?'← Active':('Voided'+(voidedCount?(' ('+voidedCount+')'):''))}</button>
      </div>
      {!duesView && (loading? <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>
       : filtered.length===0? <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:50,textAlign:'center',border:'1px solid var(--grey-100)',color:'var(--grey-400)'}}>No vendor payments for this view. <button className="btn sm" onClick={openRec}>+ Record one</button></div>
       : <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'80px 1fr 200px 90px 96px',gap:10,padding:'9px 16px',background:'var(--grey-50)',fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}>
            <div>Date</div><div>Vendor / service</div><div>Event</div><div>Mode</div><div style={{textAlign:'right'}}>Amount</div>
          </div>
          {filtered.map(p=>{ const ev=evMap[p.event_vendor_id]; const evt=eMap[p.event_id]; return (
            <div key={p.payment_id||p.vendor_payment_id} style={{display:'grid',gridTemplateColumns:'80px 1fr 200px 90px 96px',gap:10,padding:'11px 16px',borderTop:'1px solid var(--grey-100)',alignItems:'center',fontSize:13,opacity:p.is_voided?0.75:1}}>
              <div style={{color:'var(--grey-500)'}}>{fmtDate(p.payment_date,{day:'numeric',month:'short'})}</div>
              <div><b>{vMap[p.vendor_id]||'Vendor'}</b>{ev&&ev.service_description?(' · '+ev.service_description):''}{p.is_voided&&<div style={{fontSize:11,color:'var(--red)'}}>voided{p.voided_at?(' '+fmtDate(p.voided_at,{day:'numeric',month:'short',year:'numeric'})):''}{p.void_reason?(' — '+p.void_reason):''}</div>}</div>
              <div>{evt?<><a onClick={()=>setPopupEvent(p.event_id)} style={{color:'var(--pink)',cursor:'pointer',fontWeight:500}}>{evt.ref_number}</a> <span style={{color:'var(--grey-400)'}}>· {evt.name}</span></>:'—'}</div>
              <div style={{textTransform:'uppercase',fontSize:11,color:'var(--grey-500)'}}>{p.payment_mode}</div>
              <div style={{textAlign:'right',fontWeight:500,textDecoration:p.is_voided?'line-through':'none',color:p.is_voided?'var(--grey-400)':'var(--grey-800)'}}>{inr(p.amount)}</div>
            </div>
          ); })}
        </div>)}

      {duesView && (
        duesByVendor.length===0
          ? <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:50,textAlign:'center',border:'1px solid var(--grey-100)',color:'var(--grey-400)'}}>No outstanding vendor dues — everyone's settled. 🎉</div>
          : <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 120px',gap:10,padding:'9px 16px',background:'var(--grey-50)',fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}>
                <div>Vendor</div><div style={{textAlign:'center'}}>Events</div><div style={{textAlign:'right'}}>Agreed</div><div style={{textAlign:'right'}}>Paid</div><div style={{textAlign:'right'}}>Outstanding</div>
              </div>
              {duesByVendor.map(r=>{ const open=expVendor===r.key; return (
                <div key={r.key} style={{borderTop:'1px solid var(--grey-100)'}}>
                  <div onClick={()=>setExpVendor(open?null:r.key)} style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 120px',gap:10,padding:'11px 16px',alignItems:'center',fontSize:13,cursor:'pointer'}}>
                    <div style={{fontWeight:600,color:'var(--grey-800)'}}>{open?'▾':'▸'} {r.name}</div>
                    <div style={{textAlign:'center',color:'var(--grey-500)'}}>{r.events.length}</div>
                    <div style={{textAlign:'right',color:'var(--grey-500)'}}>{inr(r.agreed)}</div>
                    <div style={{textAlign:'right',color:'var(--grey-500)'}}>{inr(r.paid)}</div>
                    <div style={{textAlign:'right',fontWeight:600,color:'var(--red)'}}>{inr(r.outstanding)}</div>
                  </div>
                  {open&&r.events.map((e,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 120px',gap:10,padding:'8px 16px 8px 32px',alignItems:'center',fontSize:12,background:'var(--grey-50)',borderTop:'1px solid var(--grey-100)'}}>
                      <div>{e.ev?<a onClick={()=>onNavigate&&onNavigate('events',{eventId:e.eid,label:e.ev.name||e.ev.ref_number||'Event'})} style={{color:'var(--pink)',cursor:'pointer',fontWeight:500}}>{e.ev.ref_number}</a>:'—'}{e.ev?(' · '+e.ev.name):''}{e.service?(' · '+e.service):''}</div>
                      <div style={{textAlign:'right',color:'var(--red)'}}>{inr(e.outstanding)}</div>
                    </div>
                  ))}
                </div>
              ); })}
            </div>
      )}

      {showRec&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 20px',overflowY:'auto'}} onClick={e=>{if(e.target===e.currentTarget)setShowRec(false);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:520}}>
            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>Record vendor payment</div>
              <button className="btn sm" onClick={()=>setShowRec(false)}>✕</button>
            </div>
            <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Event <span style={{color:'var(--pink)'}}>*</span></label><select className="field-input" value={rec.eventId} onChange={e=>{setR('eventId',e.target.value);setR('eventVendorId','');setR('newVendor',false);}}><option value="">Select event…</option>{events.map(e=><option key={e.event_id} value={e.event_id}>{e.ref_number} · {e.name}{e.client_name?(' · '+e.client_name):''}{e.main_date?(' · '+fmtDate(e.main_date,{day:'numeric',month:'short',year:'numeric'})):''}</option>)}</select></div>
              {rec.eventId&&<div style={{gridColumn:'1 / -1'}}>
                <label className="field-label">Vendor</label>
                <select className="field-input" value={rec.newVendor?'__new':rec.eventVendorId} onChange={e=>{ if(e.target.value==='__new'){setR('newVendor',true);setR('eventVendorId','');} else {setR('newVendor',false);setR('eventVendorId',e.target.value);} }}>
                  <option value="">Select a vendor on this event…</option>
                  {evForSelectedEvent.map(x=><option key={x.event_vendor_id} value={x.event_vendor_id}>{x.vendor_name||vMap[x.vendor_id]||'Vendor'}{x.service_description?(' — '+x.service_description):''} (bal ₹{Math.round(parseFloat(x.outstanding)||0).toLocaleString('en-IN')})</option>)}
                  <option value="__new">+ Add a new vendor to this event</option>
                </select>
              </div>}
              {rec.eventId&&rec.newVendor&&<>
                <div style={{gridColumn:'1 / -1'}}><label className="field-label">From vendor master</label>
                  <select className="field-input" value={rec.vendorId} onChange={e=>{ const v=vendors.find(x=>String(x.vendor_id)===e.target.value); setRec(f=>({...f,vendorId:e.target.value,vendorName:v?v.name:'',category:(v&&v.category)?v.category:f.category})); }}>
                    <option value="">— Create brand-new vendor —</option>
                    {vendors.filter(v=>v.status==='active'&&!evForSelectedEvent.some(x=>String(x.vendor_id)===String(v.vendor_id))).map(v=><option key={v.vendor_id} value={v.vendor_id}>{v.name}{v.category?(' · '+((VENDOR_CATS.find(c=>c[0]===v.category)||[])[1]||v.category)):''}</option>)}
                  </select>
                </div>
                {!rec.vendorId&&<div><label className="field-label">Vendor name <span style={{color:'var(--pink)'}}>*</span></label><input className="field-input" value={rec.vendorName} onChange={e=>setR('vendorName',e.target.value)} placeholder="e.g. Blooms Decor"/></div>}
                <div><label className="field-label">Category</label><select className="field-input" value={rec.category} onChange={e=>setR('category',e.target.value)} disabled={!!rec.vendorId}>{VENDOR_CATS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
                <div><label className="field-label">Service</label><input className="field-input" value={rec.service} onChange={e=>setR('service',e.target.value)} placeholder="e.g. Mandap & florals"/></div>
                <div><label className="field-label">Agreed amount (₹)</label><input type="number" className="field-input" value={rec.agreed} onChange={e=>setR('agreed',e.target.value)} placeholder="0"/></div>
              </>}
              <div><label className="field-label">Amount paid (₹) <span style={{color:'var(--pink)'}}>*</span></label><input type="number" className="field-input" value={rec.amount} onChange={e=>setR('amount',e.target.value)} placeholder="0"/></div>
              <div><label className="field-label">Date <span style={{color:'var(--pink)'}}>*</span></label><input type="date" className="field-input" value={rec.date} onChange={e=>setR('date',e.target.value)}/></div>
              <div><label className="field-label">Mode</label><select className="field-input" value={rec.mode} onChange={e=>setR('mode',e.target.value)}>{VENDOR_MODES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
              <div><label className="field-label">Reference</label><input className="field-input" value={rec.reference} onChange={e=>setR('reference',e.target.value)} placeholder="optional"/></div>
            </div>
            <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn" onClick={()=>setShowRec(false)}>Cancel</button>
              <button className="btn primary" disabled={saving} onClick={saveRec}>{saving?'Saving…':'Record payment'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Expenses Module ───────────────────────────────────────────────────────────
const EXPENSE_CATS=[['marketing','Marketing'],['operations','Operations'],['travel','Travel'],['staff','Staff'],['event_incidentals','Event incidentals'],['professional','Professional'],['banking','Banking'],['miscellaneous','Miscellaneous']];
const EXPENSE_CAT_LABEL=c=>{ const f=EXPENSE_CATS.find(x=>x[0]===c); return f?f[1]:c; };
function ExpensesModule({onNavigate}){
  const [rows,setRows]=React.useState([]);
  const [events,setEvents]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [search,setSearch]=React.useState('');
  const [catFilter,setCatFilter]=React.useState('');
  const [evtFilter,setEvtFilter]=React.useState('');
  const [range,setRange]=React.useState('month');
  const [showForm,setShowForm]=React.useState(false);
  const [editRow,setEditRow]=React.useState(null);
  const [saving,setSaving]=React.useState(false);
  const [file,setFile]=React.useState(null);
  const emptyForm={description:'',amount:'',date:todayLocalStr(),category:'miscellaneous',sub_category:'',event_id:'',payment_mode:'upi',reference_number:'',is_recurring:false,recurring_frequency:'monthly',notes:''};
  const [form,setForm]=React.useState(emptyForm);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const load=React.useCallback(async()=>{
    setLoading(true);
    const [{data:ex},{data:ev}]=await Promise.all([
      supabase.from('expenses').select('*').eq('is_deleted',false).order('date',{ascending:false}),
      supabase.from('events').select('event_id,ref_number,name,main_date,client_name').eq('is_deleted',false).order('main_date',{ascending:false})
    ]);
    setRows(ex||[]); setEvents(ev||[]); setLoading(false);
  },[]);
  React.useEffect(()=>{ load(); },[load]);

  const evMap={}; events.forEach(e=>{ evMap[e.event_id]=e; });
  const yr=String(new Date().getFullYear()); const mo=todayLocalStr().slice(0,7);
  const inRange=d=> range==='all'?true: range==='year'?(String(d||'').slice(0,4)===yr):(String(d||'').slice(0,7)===mo);
  const sumIf=f=>rows.filter(f).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const mMonth=sumIf(r=>String(r.date||'').slice(0,7)===mo);
  const mYear=sumIf(r=>String(r.date||'').slice(0,4)===yr);
  const mEvent=sumIf(r=>String(r.date||'').slice(0,4)===yr&&r.event_id);
  const mGeneral=sumIf(r=>String(r.date||'').slice(0,4)===yr&&!r.event_id);
  const filtered=rows.filter(r=>{
    const q=search.toLowerCase();
    const ms=!q||`${r.description||''} ${r.reference_number||''} ${r.sub_category||''}`.toLowerCase().includes(q);
    const mc=!catFilter||r.category===catFilter;
    const me=!evtFilter||(evtFilter==='general'?!r.event_id:r.event_id===evtFilter);
    return ms&&mc&&me&&inRange(r.date);
  });

  const openNew=()=>{ setEditRow(null); setForm({...emptyForm}); setFile(null); setShowForm(true); };
  const openEdit=r=>{ setEditRow(r); setForm({description:r.description||'',amount:r.amount||'',date:r.date||emptyForm.date,category:r.category||'miscellaneous',sub_category:r.sub_category||'',event_id:r.event_id||'',payment_mode:r.payment_mode||'upi',reference_number:r.reference_number||'',is_recurring:!!r.is_recurring,recurring_frequency:r.recurring_frequency||'monthly',notes:r.notes||''}); setFile(null); setShowForm(true); };
  const save=async()=>{
    if(!form.description.trim()){ notify('Description is required.','error'); return; }
    const amt=parseFloat(form.amount)||0; if(amt<=0){ notify('Enter a valid amount.','error'); return; }
    if(!form.date){ notify('Date is required.','error'); return; }
    setSaving(true);
    let receiptUrl=editRow?editRow.receipt_url:null;
    if(file){ try{ const ext=((file.name||'').split('.').pop()||'png').replace(/[^a-z0-9]/gi,'').slice(0,8)||'png'; const path='receipts/expenses/exp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)+'.'+ext; const {error:ue}=await supabase.storage.from('quotations').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:true}); if(!ue){ const {data:pu}=supabase.storage.from('quotations').getPublicUrl(path); receiptUrl=(pu&&pu.publicUrl)||receiptUrl; } else notify('Couldn\'t upload the receipt — saving without it.','error'); }catch(e){ notify('Receipt upload failed — saving without it.','error'); } }
    const payload={ description:form.description.trim(), amount:amt, date:form.date, category:form.category, sub_category:form.sub_category||null, event_id:form.event_id||null, payment_mode:form.payment_mode||null, reference_number:form.reference_number||null, is_recurring:!!form.is_recurring, recurring_frequency:form.is_recurring?form.recurring_frequency:null, notes:form.notes||null, receipt_url:receiptUrl, updated_at:new Date().toISOString() };
    let err;
    if(editRow){ const {error}=await runDb(supabase.from('expenses').update(payload).eq('expense_id',editRow.expense_id),'update expense'); err=error; }
    else { payload.created_at=new Date().toISOString(); payload.is_deleted=false; payload.created_by=await _currentUid(); const {error}=await runDb(supabase.from('expenses').insert(payload),'record expense'); err=error; }
    setSaving(false); if(err) return;
    notify(editRow?'Expense updated.':'Expense recorded.','success'); setShowForm(false); load();
  };
  const del=async r=>{ if(!window.confirm('Delete this expense?')) return; const {error}=await runDb(supabase.from('expenses').update({is_deleted:true,updated_at:new Date().toISOString()}).eq('expense_id',r.expense_id),'delete expense'); if(!error){ notify('Expense deleted.','success'); load(); } };

  const inr=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>Expenses</div>
        <button className="btn primary" onClick={openNew}>+ Record expense</button>
      </div>
      <div className="metrics-grid" style={{marginBottom:18}}>
        <div className="metric-card pink"><div className="metric-icon">💸</div><div className="metric-value">{inr(mMonth)}</div><div className="metric-label">This month</div></div>
        <div className="metric-card blue"><div className="metric-icon">📅</div><div className="metric-value">{inr(mYear)}</div><div className="metric-label">This year</div></div>
        <div className="metric-card green"><div className="metric-icon">🎪</div><div className="metric-value">{inr(mEvent)}</div><div className="metric-label">Event-linked (yr)</div></div>
        <div className="metric-card orange"><div className="metric-icon">🏢</div><div className="metric-value">{inr(mGeneral)}</div><div className="metric-label">General (yr)</div></div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{flex:1,minWidth:180,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
          <input className="field-input" style={{paddingLeft:36}} placeholder="Search description / reference…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="field-input" style={{width:160}} value={catFilter} onChange={e=>setCatFilter(e.target.value)}><option value="">All categories</option>{EXPENSE_CATS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
        <select className="field-input" style={{width:180}} value={evtFilter} onChange={e=>setEvtFilter(e.target.value)}><option value="">All events</option><option value="general">General (no event)</option>{events.map(e=><option key={e.event_id} value={e.event_id}>{e.ref_number} · {e.name}{e.client_name?(' · '+e.client_name):''}{e.main_date?(' · '+fmtDate(e.main_date,{day:'numeric',month:'short',year:'numeric'})):''}</option>)}</select>
        <select className="field-input" style={{width:130}} value={range} onChange={e=>setRange(e.target.value)}><option value="month">This month</option><option value="year">This year</option><option value="all">All time</option></select>
      </div>
      {loading? <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>
       : filtered.length===0? <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:50,textAlign:'center',border:'1px solid var(--grey-100)',color:'var(--grey-400)'}}>No expenses for this view. <button className="btn sm" onClick={openNew}>+ Record one</button></div>
       : <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'80px 1fr 150px 130px 96px 64px',gap:10,padding:'9px 16px',background:'var(--grey-50)',fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}>
            <div>Date</div><div>Description</div><div>Event</div><div>Category</div><div style={{textAlign:'right'}}>Amount</div><div></div>
          </div>
          {filtered.map(r=>{ const ev=r.event_id?evMap[r.event_id]:null; return (
            <div key={r.expense_id} style={{display:'grid',gridTemplateColumns:'80px 1fr 150px 130px 96px 64px',gap:10,padding:'11px 16px',borderTop:'1px solid var(--grey-100)',alignItems:'center',fontSize:13}}>
              <div style={{color:'var(--grey-500)'}}>{fmtDate(r.date,{day:'numeric',month:'short'})}</div>
              <div style={{color:'var(--grey-800)'}}>{r.description}{r.receipt_url&&<a href={r.receipt_url} target="_blank" rel="noreferrer" style={{color:'var(--pink)',marginLeft:6}}>📎</a>}</div>
              <div>{ev?<a onClick={()=>onNavigate&&onNavigate('events',{eventId:ev.event_id,label:ev.name||ev.ref_number||'Event'})} style={{color:'var(--pink)',cursor:'pointer',fontWeight:500}}>{ev.ref_number}</a>:<span style={{color:'var(--grey-400)'}}>General</span>}</div>
              <div><span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:'var(--blue-light)',color:'var(--blue)'}}>{EXPENSE_CAT_LABEL(r.category)}</span></div>
              <div style={{textAlign:'right',fontWeight:500}}>{inr(r.amount)}</div>
              <div style={{textAlign:'right'}}><button className="btn sm" style={{fontSize:11,padding:'2px 6px'}} onClick={()=>openEdit(r)}>✏️</button> <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-300)'}} onClick={()=>del(r)}>🗑</button></div>
            </div>
          ); })}
        </div>}

      {showForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 20px',overflowY:'auto'}} onClick={e=>{if(e.target===e.currentTarget)setShowForm(false);}}>
          <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:540}}>
            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>{editRow?'Edit expense':'Record expense'}</div>
              <button className="btn sm" onClick={()=>setShowForm(false)}>✕</button>
            </div>
            <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Description <span style={{color:'var(--pink)'}}>*</span></label><input className="field-input" value={form.description} onChange={e=>setF('description',e.target.value)} placeholder="e.g. Mandap florals"/></div>
              <div><label className="field-label">Amount (₹) <span style={{color:'var(--pink)'}}>*</span></label><input type="number" className="field-input" value={form.amount} onChange={e=>setF('amount',e.target.value)} placeholder="0"/></div>
              <div><label className="field-label">Date <span style={{color:'var(--pink)'}}>*</span></label><input type="date" className="field-input" value={form.date} onChange={e=>setF('date',e.target.value)}/></div>
              <div><label className="field-label">Category</label><select className="field-input" value={form.category} onChange={e=>setF('category',e.target.value)}>{EXPENSE_CATS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
              <div><label className="field-label">Sub-category</label><input className="field-input" value={form.sub_category} onChange={e=>setF('sub_category',e.target.value)} placeholder="optional"/></div>
              <div><label className="field-label">Link to event</label><select className="field-input" value={form.event_id} onChange={e=>setF('event_id',e.target.value)}><option value="">General (no event)</option>{events.map(e=><option key={e.event_id} value={e.event_id}>{e.ref_number} · {e.name}{e.client_name?(' · '+e.client_name):''}{e.main_date?(' · '+fmtDate(e.main_date,{day:'numeric',month:'short',year:'numeric'})):''}</option>)}</select></div>
              <div><label className="field-label">Payment mode</label><select className="field-input" value={form.payment_mode} onChange={e=>setF('payment_mode',e.target.value)}>{[['upi','UPI'],['neft','Bank / NEFT'],['cash','Cash'],['cheque','Cheque']].map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
              <div><label className="field-label">Reference no.</label><input className="field-input" value={form.reference_number} onChange={e=>setF('reference_number',e.target.value)} placeholder="optional"/></div>
              <div><label className="field-label">Receipt</label><input type="file" accept="image/*,application/pdf" onChange={e=>setFile(e.target.files&&e.target.files[0])} style={{fontSize:12}}/></div>
              <div style={{gridColumn:'1 / -1',display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={form.is_recurring} onChange={e=>setF('is_recurring',e.target.checked)} style={{width:16,height:16,accentColor:'var(--pink)'}}/><span style={{fontSize:13}}>Recurring</span>{form.is_recurring&&<select className="field-input" style={{width:140}} value={form.recurring_frequency} onChange={e=>setF('recurring_frequency',e.target.value)}>{[['monthly','Monthly'],['quarterly','Quarterly'],['yearly','Yearly']].map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>}</div>
              <div style={{gridColumn:'1 / -1'}}><label className="field-label">Notes</label><textarea className="field-textarea" rows={2} value={form.notes} onChange={e=>setF('notes',e.target.value)} placeholder="optional"/></div>
            </div>
            <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn" onClick={()=>setShowForm(false)}>Cancel</button>
              <button className="btn primary" disabled={saving} onClick={save}>{saving?'Saving…':(editRow?'Save changes':'Record expense')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Reports Module (Phase 3 — dashboard; locked profitability model) ──────────
function ReportsModule({onNavigate}){
  const [loading,setLoading]=React.useState(true);
  const [range,setRange]=React.useState('year'); // month | quarter | year | all
  const [invoices,setInvoices]=React.useState([]);
  const [pays,setPays]=React.useState([]);
  const [expenses,setExpenses]=React.useState([]);
  const [vpays,setVpays]=React.useState([]);
  const [events,setEvents]=React.useState([]);
  const [leads,setLeads]=React.useState([]);
  const [popupEvent,setPopupEvent]=React.useState(null);

  const load=React.useCallback(async()=>{
    setLoading(true);
    const [{data:inv},{data:ip},{data:ex},{data:vp},{data:ev},{data:ld}]=await Promise.all([
      supabase.from('invoices').select('invoice_id,ref_number,status,grand_total,total_received,total_outstanding,event_id,doc_date').eq('is_deleted',false),
      supabase.from('invoice_payments').select('amount,payment_date,invoice_id'),
      supabase.from('expenses').select('amount,date,event_id,category').eq('is_deleted',false),
      supabase.from('vendor_payments').select('amount,payment_date,event_id,is_voided'),
      supabase.from('events').select('event_id,ref_number,name,main_date,status,client_name').eq('is_deleted',false),
      supabase.from('leads').select('lead_id,stage,budget').eq('is_deleted',false)
    ]);
    setInvoices(inv||[]); setPays(ip||[]); setExpenses(ex||[]); setVpays(vp||[]); setEvents(ev||[]); setLeads(ld||[]); setLoading(false);
  },[]);
  React.useEffect(()=>{ load(); },[load]);

  const inr=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
  const inrK=n=>{ n=n||0; const a=Math.abs(n); if(a>=1e7) return '₹'+(n/1e7).toFixed(2)+'Cr'; if(a>=1e5) return '₹'+(n/1e5).toFixed(2)+'L'; if(a>=1e3) return '₹'+Math.round(n/1e3)+'k'; return '₹'+Math.round(n); };
  const today=todayLocalStr(); const now=new Date(); const yr=now.getFullYear();
  // range bounds (inclusive start, exclusive end) as YYYY-MM-DD strings
  const rangeBounds=()=>{
    if(range==='all') return [null,null];
    if(range==='year') return [yr+'-01-01', (yr+1)+'-01-01'];
    if(range==='month'){ const m=String(now.getMonth()+1).padStart(2,'0'); const nm=now.getMonth()===11?(yr+1)+'-01-01':yr+'-'+String(now.getMonth()+2).padStart(2,'0')+'-01'; return [yr+'-'+m+'-01', nm]; }
    // quarter
    const q=Math.floor(now.getMonth()/3); const sm=q*3; const start=yr+'-'+String(sm+1).padStart(2,'0')+'-01';
    const end= sm+3>=12 ? (yr+1)+'-01-01' : yr+'-'+String(sm+4).padStart(2,'0')+'-01'; return [start,end];
  };
  const [rStart,rEnd]=rangeBounds();
  const inRange=d=>{ if(!d) return false; const s=String(d).slice(0,10); if(rStart&&s<rStart) return false; if(rEnd&&s>=rEnd) return false; return true; };
  const rangeLabel={month:'This month',quarter:'This quarter',year:'This year',all:'All time'}[range];

  // ---- locked profitability helpers ----
  const invEvent={}; invoices.forEach(i=>{ invEvent[i.invoice_id]=i.event_id; });
  const netCollectedByEvent={}; pays.forEach(p=>{ const eid=invEvent[p.invoice_id]; if(eid) netCollectedByEvent[eid]=(netCollectedByEvent[eid]||0)+(parseFloat(p.amount)||0); });
  const eventStatusMap={}; events.forEach(e=>{ eventStatusMap[e.event_id]=(e.status||'').toLowerCase(); });
  const eventFee=id=>invoices.filter(i=>i.event_id===id&&i.status!=='cancelled').reduce((s,i)=>s+(parseFloat(i.grand_total)||0),0);
  // Cancelled events have fee 0 (invoices voided), so revenue = net retained client money (decision); active events use billed fee.
  const eventRevenue=id=> eventStatusMap[id]==='cancelled' ? Math.max(0,netCollectedByEvent[id]||0) : eventFee(id);
  const eventExp=id=>expenses.filter(x=>x.event_id===id).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
  const eventVend=id=>vpays.filter(x=>x.event_id===id&&!x.is_voided).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
  const eventProfit=id=>eventRevenue(id)-eventExp(id)-eventVend(id);

  // events in the selected range (by main_date)
  const rangeEvents=events.filter(e=>range==='all'?true:inRange(e.main_date));
  const perEvent=rangeEvents.map(e=>{ const fee=eventRevenue(e.event_id),ex=eventExp(e.event_id),vn=eventVend(e.event_id); const pr=fee-ex-vn; return {...e,fee,ex,vn,profit:pr,margin:fee>0?pr/fee*100:0}; })
    .sort((a,b)=>(b.main_date||'').localeCompare(a.main_date||''));
  const genExpRange=expenses.filter(x=>!x.event_id&&inRange(x.date)).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
  const sumEventProfit=perEvent.reduce((s,e)=>s+e.profit,0);
  const periodProfit=sumEventProfit-genExpRange;

  // KPIs (cash view, range-filtered)
  const billed=invoices.filter(i=>i.status!=='cancelled'&&(range==='all'||inRange(i.doc_date))).reduce((s,i)=>s+(parseFloat(i.grand_total)||0),0);
  const collected=pays.filter(p=>range==='all'||inRange(p.payment_date)).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const outstanding=invoices.filter(i=>i.status!=='cancelled').reduce((s,i)=>s+(parseFloat(i.total_outstanding!=null?i.total_outstanding:((parseFloat(i.grand_total)||0)-(parseFloat(i.total_received)||0)))||0),0);
  const totExp=expenses.filter(x=>range==='all'||inRange(x.date)).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
  const totVend=vpays.filter(x=>!x.is_voided&&(range==='all'||inRange(x.payment_date))).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
  const voidedVend=vpays.filter(x=>x.is_voided&&(range==='all'||inRange(x.payment_date))).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);

  // last 12 months series
  const months=[]; for(let i=11;i>=0;i--){ const d=new Date(yr,now.getMonth()-i,1); months.push({key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),label:d.toLocaleString('en-US',{month:'short'})}); }
  const mSum=(arr,dateKey)=>months.map(m=>arr.filter(r=>String(r[dateKey]||'').slice(0,7)===m.key).reduce((s,r)=>s+(parseFloat(r.amount)||0),0));
  const collSeries=mSum(pays,'payment_date');
  const billSeries=months.map(m=>invoices.filter(i=>i.status!=='cancelled'&&String(i.doc_date||'').slice(0,7)===m.key).reduce((s,i)=>s+(parseFloat(i.grand_total)||0),0));
  const expSeries=months.map(m=>{ const e=expenses.filter(x=>String(x.date||'').slice(0,7)===m.key).reduce((s,x)=>s+(parseFloat(x.amount)||0),0); const v=vpays.filter(x=>!x.is_voided&&String(x.payment_date||'').slice(0,7)===m.key).reduce((s,x)=>s+(parseFloat(x.amount)||0),0); return e+v; });

  // pipeline by stage (active leads, collapsed display stage)
  const pipeStages=[['new','New'],['contacted','Contacted'],['Quoting','Quoting']];
  const activeLeads=leads.filter(l=>!['lost','event_triggered','completed'].includes(l.stage));
  const pipe=pipeStages.map(([k,lab])=>{ const ls=activeLeads.filter(l=> k==='Quoting'?leadStageDisplay(l.stage)==='Quoting':l.stage===k ); return {label:lab,count:ls.length,value:ls.reduce((s,l)=>s+(parseFloat(l.budget)||0),0)}; });
  const pipeTotal=pipe.reduce((s,p)=>s+p.value,0);

  // upcoming events
  const upcoming=events.filter(e=>e.main_date&&e.main_date>=today&&!['cancelled','completed'].includes((e.status||'').toLowerCase())).sort((a,b)=>(a.main_date||'').localeCompare(b.main_date||'')).slice(0,8);

  // chart primitives
  const BarChart=({series,labels,color,height=120})=>{ const max=Math.max(1,...series); const w=100/series.length; return (
    <div style={{display:'flex',alignItems:'flex-end',gap:0,height,padding:'0 2px'}}>
      {series.map((v,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}} title={labels[i]+': '+inr(v)}>
        <div style={{fontSize:9,color:'var(--grey-400)',marginBottom:2,whiteSpace:'nowrap'}}>{v>0?inrK(v):''}</div>
        <div style={{width:'70%',background:color,borderRadius:'3px 3px 0 0',height:Math.max(v>0?2:0,v/max*(height-22))+'px',transition:'height .3s'}}/>
        <div style={{fontSize:9,color:'var(--grey-400)',marginTop:3}}>{labels[i]}</div>
      </div>)}
    </div>
  ); };
  const GroupBars=({a,b,labels,ca,cb,height=140})=>{ const max=Math.max(1,...a,...b); return (
    <div style={{display:'flex',alignItems:'flex-end',gap:0,height,padding:'0 2px'}}>
      {labels.map((lab,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}} title={lab+' — income '+inr(a[i])+' / cost '+inr(b[i])}>
        <div style={{display:'flex',alignItems:'flex-end',gap:1,height:height-16,width:'100%',justifyContent:'center'}}>
          <div style={{width:'34%',background:ca,borderRadius:'2px 2px 0 0',height:Math.max(a[i]>0?2:0,a[i]/max*(height-18))+'px'}}/>
          <div style={{width:'34%',background:cb,borderRadius:'2px 2px 0 0',height:Math.max(b[i]>0?2:0,b[i]/max*(height-18))+'px'}}/>
        </div>
        <div style={{fontSize:9,color:'var(--grey-400)',marginTop:3}}>{lab}</div>
      </div>)}
    </div>
  ); };
  const card={background:'white',border:'1px solid var(--grey-100)',borderRadius:'var(--radius-lg)',padding:'16px 18px'};
  const cardTitle={fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:12};

  // ---- exports (Phase 4) ----
  const [exporting,setExporting]=React.useState(false);
  const evRefMap={}; events.forEach(e=>{ evRefMap[e.event_id]=(e.ref_number||'')+(e.name?(' · '+e.name):''); });
  const rangeExpenses=expenses.filter(x=>range==='all'||inRange(x.date));
  const rangeVpays=vpays.filter(x=>!x.is_voided&&(range==='all'||inRange(x.payment_date)));
  const stamp=todayLocalStr();
  const safeRange=({month:'Month',quarter:'Quarter',year:'Year',all:'AllTime'}[range]);

  const doExportExcel=async()=>{
    if(typeof XLSX==='undefined'){ notify('Excel library not loaded. Please refresh.','error'); return; }
    setExporting(true);
    try{
      const {data:s}=await supabase.from('settings').select('company_name').single();
      const co=(s&&s.company_name)||'Isheeka Events';
      const wb=XLSX.utils.book_new();
      // Summary
      const sum=[[co+' — Performance Report'],[rangeLabel+'  (generated '+stamp+')'],[],
        ['KPI','Amount (₹)'],
        ['Billed (fee)',Math.round(billed)],
        ['Collected',Math.round(collected)],
        ['Outstanding (current, all open)',Math.round(outstanding)],
        ['Expenses',Math.round(totExp)],
        ['Vendor payments',Math.round(totVend)],
        ['Event profit (sum)',Math.round(sumEventProfit)],
        ['General/overhead expenses',Math.round(genExpRange)],
        ['Net profit (period)',Math.round(periodProfit)],
      ];
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'Summary');
      // Per-event P&L
      const pnl=[['Event ref','Event','Date','Client','Fee','Expenses','Vendors','Profit','Margin %']];
      perEvent.forEach(e=>pnl.push([e.ref_number||'',e.name||'',e.main_date||'',e.client_name||'',Math.round(e.fee),Math.round(e.ex),Math.round(e.vn),Math.round(e.profit),e.fee>0?Math.round(e.margin):'']));
      pnl.push(['','TOTAL ('+perEvent.length+' events)','','',Math.round(perEvent.reduce((s,e)=>s+e.fee,0)),Math.round(perEvent.reduce((s,e)=>s+e.ex,0)),Math.round(perEvent.reduce((s,e)=>s+e.vn,0)),Math.round(sumEventProfit),'']);
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pnl),'Per-Event P&L');
      // Expenses ledger
      const exl=[['Date','Category','Event','Amount']];
      rangeExpenses.slice().sort((a,b)=>String(b.date||'').localeCompare(a.date||'')).forEach(x=>exl.push([x.date||'',x.category||'',x.event_id?(evRefMap[x.event_id]||x.event_id):'General',Math.round(parseFloat(x.amount)||0)]));
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(exl),'Expenses');
      // Vendor payments ledger
      const vpl=[['Date','Event','Amount']];
      rangeVpays.slice().sort((a,b)=>String(b.payment_date||'').localeCompare(a.payment_date||'')).forEach(x=>vpl.push([x.payment_date||'',x.event_id?(evRefMap[x.event_id]||x.event_id):'—',Math.round(parseFloat(x.amount)||0)]));
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(vpl),'Vendor Payments');
      XLSX.writeFile(wb,'Isheeka_Report_'+safeRange+'_'+stamp+'.xlsx');
      notify('Excel report downloaded.','success');
    }catch(err){ console.error('[Isheeka ERP] excel export failed:',err); notify('Could not export Excel: '+(err&&err.message?err.message:'try again'),'error'); }
    setExporting(false);
  };

  const doExportPDF=async()=>{
    const jsPDFctor=window.jspdf&&window.jspdf.jsPDF;
    if(!jsPDFctor){ notify('PDF library not loaded. Please refresh.','error'); return; }
    setExporting(true);
    try{
      const {data:s}=await supabase.from('settings').select('company_name,phone_1,email,website').single();
      const co=(s&&s.company_name)||'Isheeka Events';
      const doc=new jsPDFctor({unit:'pt',format:'a4'});
      const PINK=[232,24,90], INK=[40,40,40], MUTED=[140,140,140];
      const W=doc.internal.pageSize.getWidth(), M=42; let y=0;
      doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.rect(0,0,W,70,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.text(co,M,38);
      doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.text('Performance Report',M,56);
      doc.setFontSize(10); doc.text(rangeLabel+'   ·   generated '+stamp, W-M, 56, {align:'right'});
      y=98;
      // KPI summary
      doc.setTextColor(INK[0],INK[1],INK[2]); doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.text('Summary',M,y); y+=8;
      const kpis=[['Billed (fee)',billed],['Collected',collected],['Outstanding',outstanding],['Expenses',totExp],['Vendor payments',totVend],['Net profit (period)',periodProfit]];
      const colW=(W-2*M)/3; let kx=M, ky=y+18;
      kpis.forEach((k,i)=>{ const cx=M+(i%3)*colW, cy=ky+Math.floor(i/3)*46;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(MUTED[0],MUTED[1],MUTED[2]); doc.text(k[0],cx,cy);
        doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(INK[0],INK[1],INK[2]); doc.text('₹'+Math.round(k[1]||0).toLocaleString('en-IN'),cx,cy+16);
      });
      y=ky+2*46+14;
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(MUTED[0],MUTED[1],MUTED[2]);
      doc.text('Net profit = event fees − event expenses − vendor payments (events by event date) − general overhead (₹'+Math.round(genExpRange).toLocaleString('en-IN')+'). Outstanding is current across all open invoices.',M,y,{maxWidth:W-2*M}); y+=18;
      // per-event table
      const body=perEvent.map(e=>[e.ref_number||'',e.name||'',e.main_date||'','₹'+Math.round(e.fee).toLocaleString('en-IN'),'₹'+Math.round(e.ex).toLocaleString('en-IN'),'₹'+Math.round(e.vn).toLocaleString('en-IN'),'₹'+Math.round(e.profit).toLocaleString('en-IN'),e.fee>0?Math.round(e.margin)+'%':'—']);
      body.push(['','TOTAL ('+perEvent.length+')','','₹'+Math.round(perEvent.reduce((a,e)=>a+e.fee,0)).toLocaleString('en-IN'),'₹'+Math.round(perEvent.reduce((a,e)=>a+e.ex,0)).toLocaleString('en-IN'),'₹'+Math.round(perEvent.reduce((a,e)=>a+e.vn,0)).toLocaleString('en-IN'),'₹'+Math.round(sumEventProfit).toLocaleString('en-IN'),'']);
      doc.autoTable({
        startY:y, head:[['Ref','Event','Date','Fee','Expenses','Vendors','Profit','Margin']], body,
        styles:{fontSize:8,cellPadding:4}, headStyles:{fillColor:PINK,textColor:255,fontStyle:'bold'},
        columnStyles:{3:{halign:'right'},4:{halign:'right'},5:{halign:'right'},6:{halign:'right'},7:{halign:'right'}},
        theme:'grid', tableLineColor:PINK, tableLineWidth:0.4, margin:{left:M,right:M},
        didParseCell:(d)=>{ if(d.row.index===body.length-1){ d.cell.styles.fontStyle='bold'; d.cell.styles.fillColor=[251,234,240]; } }
      });
      doc.save('Isheeka_Report_'+safeRange+'_'+stamp+'.pdf');
      notify('PDF report downloaded.','success');
    }catch(err){ console.error('[Isheeka ERP] pdf export failed:',err); notify('Could not export PDF: '+(err&&err.message?err.message:'try again'),'error'); }
    setExporting(false);
  };

  if(loading) return <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>;

  return (
    <div>
      {popupEvent&&<EventQuickView eventId={popupEvent} onClose={()=>setPopupEvent(null)} onNavigate={onNavigate}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>Reports</div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:4,background:'var(--grey-100)',padding:3,borderRadius:'var(--radius-md)'}}>
            {[['month','Month'],['quarter','Quarter'],['year','Year'],['all','All']].map(([k,l])=><button key={k} onClick={()=>setRange(k)} style={{border:'none',cursor:'pointer',fontSize:12,padding:'5px 12px',borderRadius:'var(--radius-sm)',background:range===k?'white':'transparent',color:range===k?'var(--pink)':'var(--grey-400)',fontWeight:range===k?600:400,boxShadow:range===k?'0 1px 2px rgba(0,0,0,0.08)':'none'}}>{l}</button>)}
          </div>
          <button className="btn sm" disabled={exporting} onClick={doExportExcel} title="Export to Excel">{exporting?'…':'⬇ Excel'}</button>
          <button className="btn sm" disabled={exporting} onClick={doExportPDF} title="Export to PDF">{exporting?'…':'⬇ PDF'}</button>
        </div>
      </div>

      {/* KPI cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:16}}>
        {[['Billed (fee)',billed,'var(--blue)','📄'],['Collected',collected,'var(--green)','💰'],['Outstanding',outstanding,'var(--red)','⏳'],['Expenses + vendors',totExp+totVend,'var(--orange)','🧾'],['Net profit',periodProfit,periodProfit>=0?'var(--green)':'var(--red)','📈']].map(([l,v,c,ic])=>(
          <div key={l} style={{...card,padding:'14px 16px'}}>
            <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
            <div style={{fontSize:20,fontWeight:700,color:c}}>{inr(v)}</div>
            <div style={{fontSize:11,color:'var(--grey-400)',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:'var(--grey-400)',marginBottom:16,marginTop:-6}}>{rangeLabel} · Net profit = event fees − event expenses − vendor payments (events by event date) − general overhead. Outstanding is current across all open invoices. Margin {billed>0?(Math.round(periodProfit/ (perEvent.reduce((s,e)=>s+e.fee,0)||1)*100)+'%'):'—'} on event fees.{voidedVend>0?(' ₹'+Math.round(voidedVend).toLocaleString('en-IN')+' in voided vendor payments excluded.'):''}</div>

      {/* charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <div style={card}>
          <div style={cardTitle}>Revenue collected — last 12 months</div>
          <BarChart series={collSeries} labels={months.map(m=>m.label)} color="var(--green)"/>
        </div>
        <div style={card}>
          <div style={cardTitle}>Income vs cost — last 12 months <span style={{fontWeight:400,fontSize:11,color:'var(--grey-400)'}}>(<span style={{color:'var(--blue)'}}>■</span> billed &nbsp;<span style={{color:'var(--orange)'}}>■</span> expenses+vendors)</span></div>
          <GroupBars a={billSeries} b={expSeries} labels={months.map(m=>m.label)} ca="var(--blue)" cb="var(--orange)"/>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        {/* pipeline */}
        <div style={card}>
          <div style={cardTitle}>Pipeline by stage <span style={{fontWeight:400,fontSize:11,color:'var(--grey-400)'}}>· {inr(pipeTotal)} potential</span></div>
          {pipe.every(p=>p.count===0)? <div style={{fontSize:13,color:'var(--grey-400)'}}>No active leads.</div> :
           pipe.map(p=>{ const max=Math.max(1,...pipe.map(x=>x.value)); return (
            <div key={p.label} style={{marginBottom:10}}>
