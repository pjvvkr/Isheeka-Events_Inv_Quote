                      {lead.follow_up_date&&<span style={{color:uc.color,fontWeight:500}}>🔔 {uc.label}: {new Date(lead.follow_up_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>}
                    </div>
                  </div>
                  <div style={{padding:'14px 16px',display:'flex',alignItems:'center'}}>
                    {lead.source&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:11,background:'var(--grey-100)',color:'var(--grey-400)',textTransform:'capitalize'}}>{lead.source.replace('_',' ')}</span>}
                  </div>
                  <div style={{padding:'0 14px',display:'flex',alignItems:'center',color:'var(--grey-400)',fontSize:18}}>›</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Event constants ───────────────────────────────────────────────────────────
const EVENT_STATUS_ORDER = ['in_progress','confirmed','planning','completed','cancelled'];
const EVENT_STATUS_LABELS = {in_progress:'In Progress',confirmed:'Confirmed',planning:'Planning',completed:'Completed',cancelled:'Cancelled'};
const EVENT_STATUS_COLORS = {
  in_progress:{bg:'#FBEAF0',color:'#993556',dot:'#e8185a'},
  confirmed:{bg:'#FAEEDA',color:'#854F0B',dot:'#c87d2a'},
  planning:{bg:'#E6F1FB',color:'#185FA5',dot:'#185FA5'},
  completed:{bg:'#E1F5EE',color:'#0F6E56',dot:'#0F6E56'},
  cancelled:{bg:'#FCEBEB',color:'#A32D2D',dot:'#A32D2D'},
};
const EVENT_TYPES = ['Wedding','Corporate','Birthday','Anniversary','Other'];
const BUDGET_RANGES = [
  {label:'All budgets',value:''},
  {label:'Under ₹1L',value:'0-100000'},
  {label:'₹1L – ₹5L',value:'100000-500000'},
  {label:'₹5L – ₹10L',value:'500000-1000000'},
  {label:'₹10L – ₹25L',value:'1000000-2500000'},
  {label:'Above ₹25L',value:'2500000-999999999'},
];

function matchesBudget(budget, range) {
  if (!range) return true;
  const [min, max] = range.split('-').map(Number);
  const b = parseFloat(budget) || 0;
  return b >= min && b <= max;
}

function EventsModule({initialEventId, onConsumed}) {
  const [view, setView] = useState('list'); // list | new | detail
  const [events, setEvents] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [referenceEvent, setReferenceEvent] = useState(null);

  const [statusFilter, setStatusFilter] = useState('');
  const [typeFilter, setTypeFilter] = useState('');
  const [staffFilter, setStaffFilter] = useState('');
  const [budgetFilter, setBudgetFilter] = useState('');
  const [saveSuccess, setSaveSuccess] = useState('');
  const [staffList, setStaffList] = useState([]);

  useEffect(()=>{ loadEvents(); loadStaff(); },[]);

  useEffect(()=>{
    if(initialEventId){ setSelectedId(initialEventId); setView('detail'); onConsumed&&onConsumed(); }
  },[initialEventId]);

  const loadEvents = useCallback(async () => {
    setLoading(true);
    const {data} = await supabase.from('events').select('*').eq('is_deleted',false);
    if(data){
      // Sort by urgency then date
      const sorted = [...data].sort((a,b)=>{
        const ao=EVENT_STATUS_ORDER.indexOf(a.status?.toLowerCase());
        const bo=EVENT_STATUS_ORDER.indexOf(b.status?.toLowerCase());
        if(ao!==bo) return ao-bo;
        return new Date(a.main_date||0)-new Date(b.main_date||0);
      });
      setEvents(sorted);
    }
    setLoading(false);
  },[]);

  const loadStaff = async () => {
    const {data} = await supabase.from('users').select('user_id,first_name,last_name').eq('status','active');
    if(data) setStaffList(data);
  };

  const handleSaveNew = async (eventData) => {
    setReferenceEvent(null);
    setView('list');
    setSaveSuccess(`Event "${eventData.name}" created successfully!`);
    setTimeout(()=>setSaveSuccess(''),4000);
    loadEvents();
  };

  const filtered = events.filter(e=>{
    const q=search.toLowerCase();
    const matchSearch = !q || `${e.name} ${e.client_name} ${e.location} ${e.type}`.toLowerCase().includes(q);
    const matchStatus = !statusFilter || e.status?.toLowerCase()===statusFilter;
    const matchType = !typeFilter || e.type?.toLowerCase()===typeFilter.toLowerCase();
    const matchStaff = !staffFilter || e.assigned_staff_id===staffFilter;
    const matchBudget = matchesBudget(e.budget, budgetFilter);
    return matchSearch && matchStatus && matchType && matchStaff && matchBudget;
  });

  if(view==='detail') return (
    <EventDetail
      eventId={selectedId}
      onBack={()=>{setView('list');setSelectedId(null);loadEvents();}}
      onUseAsReference={(evt)=>{setReferenceEvent(evt);setView('new');}}
    />
  );
  if(view==='new') return <NewEventWizard
    referenceEvent={referenceEvent}
    onSave={handleSaveNew}
    onCancel={()=>{setView('list');setReferenceEvent(null);}}
  />;

  return (
    <div>
      {saveSuccess&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(15,110,86,0.2)'}}>✅ {saveSuccess}</div>}

      {/* Metrics */}
      <div className="metrics-grid" style={{marginBottom:20}}>
        <div className="metric-card pink"><div className="metric-icon">🎪</div><div className="metric-value">{events.length}</div><div className="metric-label">Total events</div></div>
        <div className="metric-card orange"><div className="metric-icon">📅</div><div className="metric-value">{events.filter(e=>['planning','confirmed'].includes(e.status?.toLowerCase())).length}</div><div className="metric-label">Upcoming</div></div>
        <div className="metric-card pink"><div className="metric-icon">⚡</div><div className="metric-value">{events.filter(e=>e.status?.toLowerCase()==='in_progress').length}</div><div className="metric-label">In progress</div></div>
        <div className="metric-card green"><div className="metric-icon">✅</div><div className="metric-value">{events.filter(e=>e.status?.toLowerCase()==='completed').length}</div><div className="metric-label">Completed</div></div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
          <input className="field-input" style={{paddingLeft:36}} placeholder="Search by name, client, location..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="field-input" style={{width:140}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
          <option value="">All statuses</option>
          {EVENT_STATUS_ORDER.map(s=><option key={s} value={s}>{EVENT_STATUS_LABELS[s]}</option>)}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [mode, setMode] = useState('login');
  const [forgotEmail, setForgotEmail] = useState('');
  const [forgotSuccess, setForgotSuccess] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      onLogin(data.user);
    } catch { setError('Invalid email or password. Please try again.'); }
    finally { setLoading(false); }
  };

  const handleForgot = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(forgotEmail);
      if (error) throw error;
      setForgotSuccess(true);
    } catch { setError('Could not send reset email. Please try again.'); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div style={{fontSize:48,marginBottom:8}}>🌸</div>
          <div style={{fontSize:22,fontWeight:700,color:'#e8185a',letterSpacing:'.02em'}}>ISHEEKA EVENTS</div>

        </div>

          <>
            <div className="login-title">Welcome back</div>
            <div className="login-sub">Sign in to your account</div>
            {error && <div className="error-msg">{error}</div>}
            <form onSubmit={handleLogin}>

                <label>Email</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@isheeka.com" required/>
              </div>

                <input type={showPass?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter your password" required/>
                <button type="button" className="eye-btn" onClick={()=>setShowPass(!showPass)}>{showPass?'🙈':'👁'}</button>
              </div>
              <button type="submit" className="login-btn" disabled={loading}>{loading?'Signing in...':'Sign in'}</button>
            </form>
            <div className="forgot-link"><a href="#" onClick={e=>{e.preventDefault();setMode('forgot');setError('')}}>Forgot password?</a></div>
          </>

          <>
            <div className="login-title">Reset password</div>
            <div className="login-sub">We'll send a reset link to your email</div>
            {error && <div className="error-msg">{error}</div>}
            {forgotSuccess ? <div className="success-msg">✅ Reset link sent! Check your email inbox.</div> : (
              <form onSubmit={handleForgot}>
                <div className="form-group">
                  <label>Email</label>
                  <input type="email" value={forgotEmail} onChange={e=>setForgotEmail(e.target.value)} placeholder="you@isheeka.com" required/>
                </div>
                <button type="submit" className="login-btn" disabled={loading}>{loading?'Sending...':'Send reset link'}</button>
              </form>
            )}
            <div className="forgot-link"><a href="#" onClick={e=>{e.preventDefault();setMode('login');setError('');setForgotSuccess(false)}}>← Back to sign in</a></div>
          </>
        )}

    </div>
  );
}

// ── Session Warning ──────────────────────────────────────────────────────────
function SessionWarning({ onStay, onLogout }) {
  const [seconds, setSeconds] = useState(300);
  useEffect(() => {
    const t = setInterval(() => setSeconds(s => { if(s<=1){onLogout();return 0;} return s-1; }), 1000);
    return () => clearInterval(t);
  }, []);
  const m=Math.floor(seconds/60), s=seconds%60;
  return (
    <div className="session-warning">
      <h4>⚠️ Session expiring soon</h4>
      <p>You'll be logged out in {m}:{s.toString().padStart(2,'0')} due to inactivity.</p>
      <div className="session-warning-btns">
        <button className="btn primary" onClick={onStay}>Stay logged in</button>
        <button className="btn" onClick={onLogout}>Logout</button>
      </div>
    </div>
  );
}

function FastEntryTable({items, onChange}) {
  const refs = React.useRef({});
  const [pasteMsg, setPasteMsg] = React.useState('');

  const ensureMinRows = (arr, min=10) => {
    const rows = [...arr];
    while(rows.length < min) rows.push({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0});
    return rows;
  };

  const [rows, setRows] = React.useState(()=>ensureMinRows(items||[]));

  // Sync when items prop changes (e.g. when edit mode opens with existing data)
  React.useEffect(()=>{
    if(items && items.length > 0){
      setRows(ensureMinRows(items));
    }
  },[JSON.stringify(items)]);

  React.useEffect(()=>{
    const filled = rows.filter(r=>r.description?.trim());
    onChange(filled);
  },[rows]);

  const updateRow = (id, field, val) => setRows(r=>r.map(row=>row.id===id?{...row,[field]:val}:row));
  const addRows = (count=10) => setRows(r=>[...r,...Array(count).fill(0).map(()=>({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0}))]);
  const removeRow = (id) => setRows(r=>{ const next=r.filter(row=>row.id!==id); return next.length<1?ensureMinRows([]):next; });

  const focusCell = (rowIdx, col) => {
    const key = rowIdx+'-'+col;
    setTimeout(()=>refs.current[key]?.focus(), 0);
  };

  const handleDescTab = (rowIdx) => focusCell(rowIdx, 'qty');
  const handleQtyTab = (rowIdx) => focusCell(rowIdx, 'price');
  const handlePriceTab = (rowIdx) => {
    if(rowIdx === rows.length-1) addRows(5);
    focusCell(rowIdx+1, 'desc');
  };
  const handleEnter = (rowIdx) => {
    if(rowIdx === rows.length-1) addRows(5);
    focusCell(rowIdx+1, 'desc');
  };

  // ── Paste handler ────────────────────────────────────────────────────────
  const handlePaste = (e, startRowIdx, startColIdx) => {
    const text = e.clipboardData.getData('text');
    if (!text) return;

    // Only intercept if multi-row or multi-column
    const hasNewline = text.includes('\n') || text.includes('\r');
    const hasTab = text.includes('\t');
    if (!hasNewline && !hasTab) return; // single value — let browser handle normally

    e.preventDefault();

    // Parse clipboard — detect delimiter
    const rawRows = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    const parsed = rawRows
      .map(r => {
        // Try tab first, then comma
        const cols = r.includes('\t') ? r.split('\t') : r.split(',');
        return cols.map(c => c.trim().replace(/^["']|["']$/g,'').replace(/[₹$,]/g,''));
      })
      .filter(r => r.some(c => c.length > 0)); // remove fully empty rows

    if (parsed.length === 0) return;

    // Column mapping: 0=description, 1=qty, 2=price
    const COL_FIELDS = ['description','quantity','unit_price'];

    setRows(prev => {
      const updated = [...prev];

      // Ensure enough rows exist
      const needed = startRowIdx + parsed.length;
      while(updated.length < Math.max(needed + 5, 10)) {
        updated.push({id:'r-'+Date.now()+Math.random(),description:'',quantity:1,unit_price:0});
      }

      parsed.forEach((pastedRow, pi) => {
        const targetRowIdx = startRowIdx + pi;
        const updatedRow = {...updated[targetRowIdx]};

        pastedRow.forEach((cellVal, ci) => {
          const colIdx = startColIdx + ci;
          if (colIdx >= COL_FIELDS.length) return; // ignore extra columns
          const field = COL_FIELDS[colIdx];
          if (!field) return;

          if (field === 'quantity' || field === 'unit_price') {
            const num = parseFloat(cellVal.replace(/[^0-9.]/g,''));
            updatedRow[field] = isNaN(num) ? (field==='quantity'?1:0) : num;
          } else {
            updatedRow[field] = cellVal;
          }
        });

        updated[targetRowIdx] = updatedRow;
      });

      return updated;
    });

    // Show paste confirmation
    setPasteMsg(parsed.length + ' row' + (parsed.length>1?'s':'') + ' pasted from clipboard');
    setTimeout(()=>setPasteMsg(''),3000);

    // Focus first cell after paste
    setTimeout(()=>focusCell(startRowIdx, COL_FIELDS[startColIdx]==='description'?'desc':COL_FIELDS[startColIdx]==='quantity'?'qty':'price'), 50);
  };

  return (
    <div>
      {pasteMsg && (
        <div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'6px 12px',fontSize:12,marginBottom:6,display:'flex',alignItems:'center',gap:6,fontWeight:500}}>
          ✅ {pasteMsg}
        </div>
      )}
      <div style={{fontSize:11,color:'var(--grey-400)',marginBottom:4}}>
        💡 Tip: Copy rows from Excel and paste (Ctrl+V / Cmd+V) into any cell to fill multiple rows at once
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead>
          <tr style={{background:'#FBEAF0'}}>
            <th style={{padding:'6px 8px',textAlign:'left',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a'}}>#</th>
            <th style={{padding:'6px 8px',textAlign:'left',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a'}}>Description</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'10%'}}>Qty</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Unit price (₹)</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Amount (₹)</th>
            <th style={{borderBottom:'1.5px solid #e8185a',width:28}}></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row,ri)=>{
            const amt=(parseFloat(row.quantity)||0)*(parseFloat(row.unit_price)||0);
            const hasData=row.description?.trim();
            return (
              <tr key={row.id} style={{borderBottom:'1px solid var(--grey-100)',background:hasData?'white':'transparent'}}>
                <td style={{padding:'4px 8px',color:'var(--grey-400)',fontSize:11,width:24}}>{hasData?ri+1:''}</td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemDesc value={row.description} onChange={v=>updateRow(row.id,'description',v)}
                    onTab={()=>handleDescTab(ri)} onEnter={()=>handleEnter(ri)}
                    onPaste={e=>handlePaste(e,ri,0)}
                    ref={el=>refs.current[ri+'-desc']=el}/>
                </td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemQty value={row.quantity} onChange={v=>updateRow(row.id,'quantity',v)}
                    onTab={()=>handleQtyTab(ri)}
                    onPaste={e=>handlePaste(e,ri,1)}
                    ref={el=>refs.current[ri+'-qty']=el}/>
                </td>
                <td style={{padding:'3px 8px'}}>
                  <FastItemPrice value={row.unit_price} onChange={v=>updateRow(row.id,'unit_price',v)}
                    onTab={()=>handlePriceTab(ri)}
                    onPaste={e=>handlePaste(e,ri,2)}
                    ref={el=>refs.current[ri+'-price']=el}/>
                </td>
                <td style={{padding:'3px 8px',textAlign:'right',fontWeight:hasData?500:400,color:hasData?'var(--green)':'var(--grey-200)',fontSize:12}}>
                  {hasData?amt.toLocaleString('en-IN',{minimumFractionDigits:0}):'—'}
                </td>
                <td style={{padding:'3px 4px',textAlign:'center',width:28}}>
                  {hasData&&<button title="Remove this item" onClick={()=>removeRow(row.id)}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:15,lineHeight:1,padding:'2px 4px'}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--red)'}
                    onMouseLeave={e=>e.currentTarget.style.color='var(--grey-400)'}>{'\u00d7'}</button>}
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr>
            <td colSpan={4} style={{padding:'8px',textAlign:'right',fontSize:12,color:'var(--grey-400)'}}>Sub-total</td>
            <td colSpan={2} style={{padding:'8px',textAlign:'right',fontSize:13,fontWeight:600,color:'var(--green)'}}>
              ₹{rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0).toLocaleString('en-IN')}
            </td>
          </tr>
        </tfoot>
      </table>
      <button className="btn sm" style={{marginTop:6,border:'1px dashed var(--grey-200)',color:'var(--grey-400)',fontSize:11}} onClick={()=>addRows(10)}>+ Add 10 more rows</button>
    </div>
  );
}

            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Unit price</th>
            <th style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:'#993556',fontSize:10,textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'18%'}}>Amount</th>
            <th style={{borderBottom:'1.5px solid #e8185a',width:'6%'}}></th>

        </thead>
        <tbody>

              </td>
              <td style={{padding:'5px 8px'}}>
                <ItemNumInput value={row.unit_price} onChange={v=>updateRow(row.id,'unit_price',v)} align="right"/>
              </td>
              <td style={{padding:'5px 8px',textAlign:'right',fontWeight:500,color:'var(--grey-800)',fontSize:12}}>
                ₹{((parseFloat(row.quantity)||0)*(parseFloat(row.unit_price)||0)).toLocaleString('en-IN')}
              </td>
              <td style={{padding:'5px 8px',textAlign:'center'}}>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:14,padding:'2px 4px'}} onClick={()=>removeRow(row.id)}>✕</button>
              </td>
            </tr>
          ))}
        </tbody>
        <tfoot>
          <tr>
            <td colSpan={3} style={{padding:'8px',textAlign:'right',fontSize:12,color:'var(--grey-400)'}}>Sub-event total</td>
            <td style={{padding:'8px',textAlign:'right',fontSize:13,fontWeight:600,color:'var(--green)'}}>
              ₹{items.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0).toLocaleString('en-IN')}
            </td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button className="btn sm" style={{marginTop:8,border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={addRow}>+ Add item</button>

  );
}

// Stable input components to prevent focus loss
function ItemDescInput({value, onChange}) {
  return <input style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',color:'var(--grey-800)'}} value={value} onChange={e=>onChange(e.target.value)} placeholder="Description"/>;
}
function ItemNumInput({value, onChange, align}) {
  return <input type="number" style={{border:'none',background:'transparent',fontSize:12,width:'100%',outline:'none',textAlign:align||'left',color:'var(--grey-800)',MozAppearance:'textfield'}} value={value} onChange={e=>onChange(e.target.value)}/>;
}

// ── New Event Wizard ─────────────────────────────────────────────────────────
function NewEventWizard({onSave, onCancel, referenceEvent=null}) {
  const [step, setStep] = useState(1);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState('');
  const [errors, setErrors] = useState({});
  const [clients, setClients] = useState([]);
  const [altContacts, setAltContacts] = useState([]);
  const [clientSearch, setClientSearch] = useState('');
  const [staffList, setStaffList] = useState([]);

  // Step 1 form
  const [form, setForm] = useState({
    name:'', type:'', status:'planning', main_date:'', location:'',
    guest_count:'', budget:'', assigned_staff_id:'', assigned_staff_name:'', internal_notes:''
  });

  // Step 2
  const [selectedClient, setSelectedClient] = useState(null);
  const [primaryContactId, setPrimaryContactId] = useState('client');
  const [primaryContactName, setPrimaryContactName] = useState('');
  const [secondaryContactId, setSecondaryContactId] = useState('');
  const [secondaryContactName, setSecondaryContactName] = useState('');

  // Step 3 - sub events with items
  const [subEvents, setSubEvents] = useState([
    {id:Date.now(), name:'', date:'', location:'', items:[]}
  ]);
  const [mainItems, setMainItems] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [showTplMenu, setShowTplMenu] = useState(false);
  const excelFileRef = React.useRef();

  useEffect(()=>{
    supabase.from('clients').select('client_id,first_name,last_name,phone_1,status').eq('is_deleted',false).order('first_name').then(({data})=>{ if(data) setClients(data); });
    supabase.from('users').select('user_id,first_name,last_name,role').eq('status','active').then(({data})=>{ if(data) setStaffList(data); });
    supabase.from('event_templates').select('*').eq('is_deleted',false).eq('is_active',true).order('sort_order').then(({data})=>{ if(data) setTemplates(data); });
    // Pre-fill from reference event if provided
    if(referenceEvent){
      setForm(f=>({...f,
        type:referenceEvent.type||'',
        location:referenceEvent.location||'',
        guest_count:referenceEvent.guest_count||'',
        assigned_staff_id:referenceEvent.assigned_staff_id||'',
        assigned_staff_name:referenceEvent.assigned_staff_name||'',
        internal_notes:referenceEvent.internal_notes?`[Based on: ${referenceEvent.name}] ${referenceEvent.internal_notes}`:`Based on: ${referenceEvent.name}`,
        name:'', main_date:'', budget:'', status:'planning'
      }));
      // Load sub-events and items from reference event
      Promise.all([
        supabase.from('sub_events').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
        supabase.from('sub_event_items').select('*').eq('event_id',referenceEvent.event_id).eq('is_deleted',false).order('sort_order'),
      ]).then(([{data:subs},{data:items}])=>{
        if(subs&&items){
          const grouped = subs.map(se=>({
            id:'se-ref-'+se.sub_event_id+Date.now(),
            name:se.name, date:'', location:se.location||'',
            items:items.filter(i=>i.sub_event_id===se.sub_event_id).map(i=>({
              id:'i-ref-'+i.item_id+Math.random(),
              description:i.description, quantity:i.quantity, unit_price:0
            }))
          }));
          setSubEvents(grouped.length>0?grouped:[{id:Date.now(),name:'',date:'',location:'',items:[]}]);
          const mainItems = items.filter(i=>!i.sub_event_id).map(i=>({
            id:'i-ref-'+i.item_id+Math.random(),
            description:i.description, quantity:i.quantity, unit_price:0
          }));
          setMainItems(mainItems);
        }
      });
    }
  },[]);

  useEffect(()=>{
    if(selectedClient){
      supabase.from('alternative_contacts').select('*').eq('client_id',selectedClient.client_id).eq('is_deleted',false).then(({data})=>{ if(data) setAltContacts(data); });
      setPrimaryContactId('client');
      setPrimaryContactName(`${selectedClient.first_name} ${selectedClient.last_name}`);
      setSecondaryContactId('');
      setSecondaryContactName('');
    }
  },[selectedClient]);

  const setF = (field, val) => {
    setForm(f=>({...f,[field]:val}));
    if(errors[field]) setErrors(e=>({...e,[field]:''}));
    setSaveError('');
  };

  const validateStep1 = () => {
    const e={};
    if(!form.name?.trim()) e.name='Event name is required';
    if(!form.type) e.type='Event type is required';
    if(!form.main_date) e.main_date='Main event date is required';
    if(!form.location?.trim()) e.location='Location is required';
    return e;
  };

  const validateStep2 = () => {
    const e={};
    if(!selectedClient) e.client='Please select a client';
    return e;
  };

  const nextStep = () => {
    if(step===1){ const e=validateStep1(); if(Object.keys(e).length>0){setErrors(e);return;} }
    if(step===2){ const e=validateStep2(); if(Object.keys(e).length>0){setErrors(e);return;} }
    setErrors({});
    setStep(s=>s+1);
  };

  const addSubEvent = () => setSubEvents(s=>[...s,{id:Date.now(),name:'',date:'',location:'',items:[]}]);
  const removeSubEvent = (id) => setSubEvents(s=>s.filter(se=>se.id!==id));
  const updateSubEvent = (id, field, val) => setSubEvents(s=>s.map(se=>se.id===id?{...se,[field]:val}:se));
  const updateSubItems = (id, items) => setSubEvents(s=>s.map(se=>se.id===id?{...se,items}:se));

  const grandTotal = subEvents.reduce((s,se)=>s+se.items.reduce((ss,r)=>ss+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0),0)
    + mainItems.reduce((s,r)=>s+(parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),0);

  const loadTemplate = async (tpl) => {
    if(subEvents.some(se=>se.items.length>0)||mainItems.length>0){
      if(!window.confirm('Loading a template will replace current sub-events and items. Continue?')) return;
    }
    setShowTplMenu(false);
    const {data} = await supabase.from('event_template_items').select('*').eq('template_id',tpl.template_id).order('sub_event_name').order('sort_order');
    if(!data) return;
    const groups = {};
    data.forEach(item=>{
      if(!groups[item.sub_event_name]) groups[item.sub_event_name]={id:'se-'+item.sub_event_name+Date.now(),name:item.sub_event_name,date:'',location:'',items:[]};
      if(item.sub_event_name!=='Main Event'){
        groups[item.sub_event_name].items.push({id:'i-'+item.item_id,description:item.description,quantity:item.default_quantity,unit_price:0});
      }
    });
    const mainEventItems = data.filter(i=>i.sub_event_name==='Main Event').map(i=>({id:'i-'+i.item_id,description:i.description,quantity:i.default_quantity,unit_price:0}));
    const ses = Object.values(groups).filter(g=>g.name!=='Main Event');
    setSubEvents(ses.length>0?ses:[{id:'se-'+Date.now(),name:'',date:'',location:'',items:[]}]);
    setMainItems(mainEventItems);
  };

  const handleExcelImport = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, {type:'array'});
        const newSubEvents = [];
        wb.SheetNames.forEach(sheetName=>{
          const ws = wb.Sheets[sheetName];
          const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          if(data.length<2) return;
          const items = data.slice(1).filter(r=>String(r[0]).trim()).map(r=>({
            id:'i-'+Date.now()+Math.random(),
            description:String(r[0]).trim(),
            quantity:parseFloat(r[1])||1,
            unit_price:parseFloat(r[2])||0
          }));
          if(sheetName==='Main Event') { setMainItems(items); }
          else { newSubEvents.push({id:'se-'+Date.now()+Math.random(),name:sheetName,date:'',location:'',items}); }
        });
        if(newSubEvents.length>0) setSubEvents(s=>[...s,...newSubEvents]);
        alert(`Imported ${wb.SheetNames.length} sheet(s) successfully!`);
      } catch(err){ alert('Could not read file. Please use the provided template.'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

    const handleSave = async () => {
    setSaving(true); setSaveError('');
    try {
      // Determine primary/secondary contact details
      let primId=null, primName=primaryContactName;
      let secId=null, secName=secondaryContactName;
      if(primaryContactId!=='client'){
        const ac=altContacts.find(a=>a.contact_id===primaryContactId);
        if(ac){primId=ac.contact_id; primName=`${ac.first_name} ${ac.last_name}`;}
      }
      if(secondaryContactId&&secondaryContactId!=='none'){
        const ac=altContacts.find(a=>a.contact_id===secondaryContactId);
        if(ac){secId=ac.contact_id; secName=`${ac.first_name} ${ac.last_name}`;}
      }

      // Insert event
      const {data:eventData, error:eventError} = await supabase.from('events').insert({
        name:form.name, type:form.type.toLowerCase(), status:form.status,
        main_date:form.main_date, location:form.location,
        guest_count:form.guest_count?parseInt(form.guest_count):null,
        budget:form.budget?parseFloat(form.budget):null,
        client_id:selectedClient.client_id,
        client_name:`${selectedClient.first_name} ${selectedClient.last_name}`,
        primary_contact_id:primId, primary_contact_name:primName,
        secondary_contact_id:secId, secondary_contact_name:secName,
        assigned_staff_id:form.assigned_staff_id||null,
        assigned_staff_name:form.assigned_staff_name||null,
        internal_notes:form.internal_notes||null,
        created_at:new Date().toISOString(), updated_at:new Date().toISOString(), is_deleted:false
      }).select().single();
      if(eventError) throw eventError;

      // Insert sub events and their items
      for(const se of subEvents){
        if(!se.name.trim()) continue;
        const {data:seData} = await supabase.from('sub_events').insert({
          event_id:eventData.event_id, name:se.name, date:se.date||null,
          location:se.location||null, sort_order:subEvents.indexOf(se),
          created_at:new Date().toISOString(), is_deleted:false
        }).select().single();
        if(seData && se.items.length>0){
          const itemRows = se.items.filter(r=>r.description.trim()).map((r,i)=>({
            sub_event_id:seData.sub_event_id, event_id:eventData.event_id,
            description:r.description, quantity:parseFloat(r.quantity)||1,
            unit_price:parseFloat(r.unit_price)||0,
            sort_order:i, created_at:new Date().toISOString(), is_deleted:false
          }));
          if(itemRows.length>0) await supabase.from('sub_event_items').insert(itemRows);
        }
      }

      // Insert main event items
      const mainRows = mainItems.filter(r=>r.description?.trim()).map((r,i)=>({
        sub_event_id:null, event_id:eventData.event_id,
        description:r.description, quantity:parseFloat(r.quantity)||1,
        unit_price:parseFloat(r.unit_price)||0,
        sort_order:i, created_at:new Date().toISOString(), is_deleted:false
      }));
      if(mainRows.length>0) await supabase.from('sub_event_items').insert(mainRows);

      await onSave(eventData);
    } catch(err){
      setSaveError('Could not save event. Please try again.');
    } finally { setSaving(false); }
  };

  const steps = ['Event details','Client & contact','Sub-events & items','Review & save'];
  const filteredClients = clients.filter(c=>{
    const q=clientSearch.toLowerCase();
    return !q || `${c.first_name} ${c.last_name} ${c.phone_1}`.toLowerCase().includes(q);
  });
  const statusColors = {active:{bg:'var(--green-light)',color:'var(--green)'},inactive:{bg:'var(--grey-100)',color:'var(--grey-400)'},vip:{bg:'var(--pink-light)',color:'var(--pink)'}};

  return (
    <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}} onClick={()=>showTplMenu&&setShowTplMenu(false)}>
      {/* Step bar */}
      <div style={{background:'var(--grey-50)',padding:'14px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',alignItems:'center',gap:0}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:i+1===step?'#993556':i+1<step?'var(--green)':'var(--grey-400)',fontWeight:i+1===step?500:400}}>
              <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,flexShrink:0,
                background:i+1===step?'#993556':i+1<step?'var(--green-light)':'transparent',
                color:i+1===step?'#F4C0D1':i+1<step?'var(--green)':'var(--grey-400)',
                border:i+1<step?'1.5px solid var(--green)':i+1===step?'none':'1.5px solid var(--grey-200)'}}>
                {i+1<step?'✓':i+1}
              </div>
              {s}
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:'var(--grey-200)',margin:'0 8px'}}/>}
          </React.Fragment>
        ))}
      </div>

      <div style={{padding:24}}>
        {saveError&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)'}}>⚠️ {saveError}</div>}

        {/* Step 1 - Event details */}
        {step===1&&(
          <div>
            {referenceEvent&&<div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'8px 14px',fontSize:12,color:'var(--blue)',marginBottom:12}}>📋 Creating new event based on <strong>{referenceEvent.name}</strong> — original event is not affected. Prices have been reset to ₹0.</div>}
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Event details <span style={{fontSize:12,fontWeight:400,color:'var(--grey-400)'}}>— fields marked <span style={{color:'var(--pink)'}}>*</span> are required</span></div>
            <div className="form-grid three" style={{marginBottom:14}}>
              <InputField label="Event name" required value={form.name} onChange={v=>setF('name',v)} placeholder="e.g. Sharma Wedding" error={errors.name}/>
              <SelectField label="Event type" required value={form.type} onChange={v=>setF('type',v)} options={EVENT_TYPES.map(t=>({value:t,label:t}))} error={errors.type}/>
              <SelectField label="Status" value={form.status} onChange={v=>setF('status',v)} options={EVENT_STATUS_ORDER.map(s=>({value:s,label:EVENT_STATUS_LABELS[s]}))}/>
            </div>
            <div className="form-grid three" style={{marginBottom:14}}>
              <InputField label="Main event date" required type="date" value={form.main_date} onChange={v=>setF('main_date',v)} error={errors.main_date}/>
              <AutocompleteInput label="Location" required value={form.location} onChange={v=>setF('location',v)} placeholder="e.g. Hyderabad" error={errors.location} table="events" column="location"/>
              <InputField label="Guest count" type="number" value={form.guest_count} onChange={v=>setF('guest_count',v)} placeholder="e.g. 300"/>
            </div>
            <div className="form-grid" style={{marginBottom:14}}>
              <InputField label="Budget (₹)" type="number" value={form.budget} onChange={v=>setF('budget',v)} placeholder="e.g. 1200000" hint="Approximate budget for planning"/>
              <SelectField label="Assigned staff" value={form.assigned_staff_id} onChange={v=>{
                const staff=staffList.find(s=>s.user_id===v);
                setF('assigned_staff_id',v);
                setForm(f=>({...f,assigned_staff_name:staff?`${staff.first_name} ${staff.last_name}`:''}));
              }} options={staffList.map(s=>({value:s.user_id,label:`${s.first_name} ${s.last_name}`}))} placeholder="Select staff..."/>
            </div>
            <div className="form-grid one">
              <InputField label="Internal notes" type="textarea" value={form.internal_notes} onChange={v=>setF('internal_notes',v)} placeholder="Any internal notes..."/>
            </div>
          </div>
        )}

        {/* Step 2 - Client & contact */}
        {step===2&&(
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Select client & event contacts</div>
            {errors.client&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'8px 12px',fontSize:13,marginBottom:12}}>⚠ {errors.client}</div>}
            <div style={{background:'white',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',padding:16,marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>Select client <span style={{color:'var(--pink)'}}>*</span></div>
                <input className="field-input" style={{width:200,fontSize:12}} placeholder="Search clients..." value={clientSearch} onChange={e=>setClientSearch(e.target.value)}/>
              </div>
              <div style={{maxHeight:220,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                {filteredClients.map(c=>{
                  const sc=statusColors[c.status?.toLowerCase()]||statusColors.active;
                  const sel=selectedClient?.client_id===c.client_id;
                  return (
                    <div key={c.client_id} onClick={()=>setSelectedClient(c)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',border:`1px solid ${sel?'#993556':'var(--grey-100)'}`,borderRadius:'var(--radius-md)',cursor:'pointer',background:sel?'#FBEAF0':'white',transition:'all .15s'}}>
                      <div style={{width:32,height:32,borderRadius:'50%',background:'var(--pink-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'var(--pink)',flexShrink:0}}>
                        {c.first_name?.charAt(0)}{c.last_name?.charAt(0)}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{c.first_name} {c.last_name}</div>
                        <div style={{fontSize:12,color:'var(--grey-400)'}}>{c.phone_1}</div>
                      </div>
                      <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>{c.status?.toUpperCase()}</span>
                      {sel&&<span style={{color:'var(--green)',fontSize:16}}>✓</span>}
                    </div>
                  );
                })}
                {filteredClients.length===0&&<div style={{textAlign:'center',padding:20,color:'var(--grey-400)',fontSize:13}}>No clients found</div>}
              </div>
            </div>

            {selectedClient&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {/* Primary contact */}
                <div style={{border:'1.5px solid #993556',borderRadius:'var(--radius-md)',padding:14,background:'#FBEAF0'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#993556',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:10}}>Primary contact <span style={{color:'#993556'}}>*</span></div>
                  {[{id:'client',name:`${selectedClient.first_name} ${selectedClient.last_name}`,sub:'Client themselves'},...altContacts.map(ac=>({id:ac.contact_id,name:`${ac.first_name} ${ac.last_name}`,sub:`${ac.relationship} · ${ac.phone}`}))].map(opt=>(
                    <div key={opt.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(153,53,86,0.15)',cursor:'pointer'}} onClick={()=>{setPrimaryContactId(opt.id);setPrimaryContactName(opt.name);}}>
                      <input type="radio" name="pc" checked={primaryContactId===opt.id} onChange={()=>{}} style={{width:'auto',flexShrink:0}}/>
                      <div><div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{opt.name}</div><div style={{fontSize:11,color:'var(--grey-400)'}}>{opt.sub}</div></div>
                    </div>
                  ))}
                </div>
                {/* Secondary contact */}
                <div style={{border:'1px solid var(--grey-200)',borderRadius:'var(--radius-md)',padding:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:10}}>Secondary contact <span style={{fontSize:10,fontWeight:400}}>(optional)</span></div>
                  {[{id:'none',name:'None',sub:'No secondary contact'},...altContacts.map(ac=>({id:ac.contact_id,name:`${ac.first_name} ${ac.last_name}`,sub:`${ac.relationship} · ${ac.phone}`}))].map(opt=>(
                    <div key={opt.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--grey-100)',cursor:'pointer'}} onClick={()=>{setSecondaryContactId(opt.id);setSecondaryContactName(opt.id==='none'?'':opt.name);}}>
                      <input type="radio" name="sc" checked={secondaryContactId===opt.id||(opt.id==='none'&&!secondaryContactId)} onChange={()=>{}} style={{width:'auto',flexShrink:0}}/>
                      <div><div style={{fontSize:13,fontWeight:500,color:opt.id==='none'?'var(--grey-400)':'var(--grey-800)'}}>{opt.name}</div><div style={{fontSize:11,color:'var(--grey-400)'}}>{opt.sub}</div></div>
                    </div>

        {/* Step 3 - Sub events */}
        {step===3&&(
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:6}}>Sub-events & line items</div>

                        <span>{t.event_type==='wedding'?'💍':t.event_type==='corporate'?'🏢':t.event_type==='birthday'?'🎂':t.event_type==='anniversary'?'💑':'🎪'}</span>

            {/* Main event items */}
            <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-lg)',padding:'14px 16px',marginBottom:10,border:'1px dashed var(--grey-200)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:8,borderBottom:'1px solid var(--grey-200)'}}>
                <div style={{width:9,height:9,borderRadius:'50%',background:'#888780',flexShrink:0}}></div>

              <FastEntryTable items={mainItems} onChange={setMainItems}/>

            <button className="btn" style={{border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={addSubEvent}>+ Add sub-event</button>
          </div>
        )}

        {/* Step 4 - Review */}
        {step===4&&(
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Review before saving</div>
            <div style={{background:'white',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',overflow:'hidden',marginBottom:16}}>
              {[
                ['Event name',form.name],['Type',form.type],['Status',EVENT_STATUS_LABELS[form.status]],
                ['Main date',form.main_date],['Location',form.location],
                ['Guest count',form.guest_count||'—'],['Budget',form.budget?`₹${parseFloat(form.budget).toLocaleString('en-IN')}`:'—'],

                ['Secondary contact',secondaryContactName||'None'],

              ))}

                  ))}

        )}

          {step===1?'✕ Cancel':'← Back'}
        </button>

          ? <button className="btn primary" onClick={nextStep}>Next →</button>

        }
      </div>
    </div>
  );
}

async function getNextQuotRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data} = await supabase.from('counters').select('*').eq('type','quotation').eq('year',year).single();
  if(data){
    const next = (parseInt(data.current_value)||1110) + 1;
    await supabase.from('counters').update({current_value:next.toString(),updated_at:new Date().toISOString()}).eq('counter_id',data.counter_id);
    return 'Q-'+year+'-'+next;
  }
  // Create counter if not exists
  await supabase.from('counters').insert({type:'quotation',year:year,current_value:'1111'});
  return 'Q-'+year+'-1111';
}

async function getNextLeadRef() {
  const year = new Date().getFullYear().toString().slice(-2);
  const {data} = await supabase.from('counters').select('*').eq('type','lead').eq('year',year).single();
  if(data){
    const next = (parseInt(data.current_value)||1110) + 1;
    await supabase.from('counters').update({current_value:next,updated_at:new Date().toISOString()}).eq('counter_id',data.counter_id);
    return 'L-'+year+'-'+next;
  }
  await supabase.from('counters').insert({type:'lead',year:year,current_value:1111});
  return 'L-'+year+'-1111';
}

async function getNextClientRef() {
  const {data:existing} = await supabase.from('counters').select('*').eq('type','client').eq('year','0').single();
  if(!existing){
    const {data:inserted} = await supabase.from('counters').insert({type:'client',year:'0',current_value:111110,updated_at:new Date().toISOString()}).select().single();
    if(inserted){
      await supabase.from('counters').update({current_value:111111,updated_at:new Date().toISOString()}).eq('counter_id',inserted.counter_id);
      return 'CL-111111';
    }
    return 'CL-111111';
  }
  const next = (parseInt(existing.current_value)||111110) + 1;
  await supabase.from('counters').update({current_value:next,updated_at:new Date().toISOString()}).eq('counter_id',existing.counter_id);
  return 'CL-'+next.toString().padStart(6,'0');
}

// ── Share helpers ─────────────────────────────────────────────────────────────
function waNormalize(phone){
  const num=(phone||'').replace(/\D/g,'');
  if(!num) return '';
  return num.length===10 ? ('91'+num) : num;
}
// Item 10: try the whatsapp:// app protocol first, fall back to wa.me web
function openWhatsApp(phone, msg){
  const full=waNormalize(phone);
  const text=encodeURIComponent(msg||'');
  const webUrl='https://wa.me/'+full+'?text='+text;
  const appUrl='whatsapp://send?'+(full?('phone='+full+'&'):'')+'text='+text;
  let opened=false;
  const cancel=()=>{ opened=true; };
  window.addEventListener('blur', cancel, {once:true});
  const t=setTimeout(()=>{
    window.removeEventListener('blur',cancel);
    if(!opened) window.open(webUrl,'_blank');
  }, 1200);
  try { window.location.href=appUrl; }
  catch(e){ clearTimeout(t); window.removeEventListener('blur',cancel); window.open(webUrl,'_blank'); }
}
// Item 11: open Gmail web compose or the default mail app
function openEmail(provider, to, subject, body){
  const sub=encodeURIComponent(subject||'');
  const bd=encodeURIComponent(body||'');
  if(provider==='gmail'){
    window.open('https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(to||'')+'&su='+sub+'&body='+bd,'_blank');
  } else {
    window.open('mailto:'+(to||'')+'?subject='+sub+'&body='+bd);
  }
}

  // ── Simple border ──────────────────────────────────────────────────────────
  const drawSimpleBorder=()=>{
    doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(1.5);
    doc.roundedRect(8,8,W-16,H-16,4,4,'S');
  };

  // ── Ornate border (cover only) ─────────────────────────────────────────────
  const drawOrnateBorder=()=>{
    doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(2);
    doc.roundedRect(6,6,W-12,H-12,4,4,'S');
    doc.setDrawColor(SPINK[0],SPINK[1],SPINK[2]); doc.setLineWidth(0.8);
    doc.roundedRect(11,11,W-22,H-22,3,3,'S');
    [[18,18],[W-18,18],[18,H-18],[W-18,H-18]].forEach(([cx,cy])=>{
      doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(1);
      doc.circle(cx,cy,10,'S'); doc.setLineWidth(0.6);
      doc.line(cx-13,cy,cx+13,cy); doc.line(cx,cy-13,cx,cy+13);
      doc.line(cx-9,cy-9,cx+9,cy+9); doc.line(cx+9,cy-9,cx-9,cy+9);
      doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.circle(cx,cy,3.5,'F');
      doc.setFillColor(255,255,255); doc.circle(cx,cy,2,'F');
      doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.circle(cx,cy,1,'F');
      doc.setDrawColor(SPINK[0],SPINK[1],SPINK[2]); doc.setLineWidth(0.4);
      doc.circle(cx,cy,13,'S');
    });
    doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(1.4);
    const waveH=(x1,x2,baseY,inv)=>{
      for(let x=x1;x<x2-1;x++){
        const y1=baseY+(inv?1:-1)*4*Math.sin((x/24)*Math.PI*2);
        const y2=baseY+(inv?1:-1)*4*Math.sin(((x+1)/24)*Math.PI*2);
        doc.line(x,y1,x+1,y2);
      }
    };
    waveH(30,W/2-28,8,false); waveH(W/2+28,W-30,8,false);
    waveH(30,W/2-28,H-8,true); waveH(W/2+28,W-30,H-8,true);
    const waveV=(baseX,y1,y2,inv)=>{
      for(let y=y1;y<y2-1;y++){
        const x1=baseX+(inv?1:-1)*4*Math.sin((y/24)*Math.PI*2);
        const x2=baseX+(inv?1:-1)*4*Math.sin(((y+1)/24)*Math.PI*2);
        doc.line(x1,y,x2,y+1);
      }
    };
    waveV(8,30,H/2-28,false); waveV(8,H/2+28,H-30,false);
    waveV(W-8,30,H/2-28,true); waveV(W-8,H/2+28,H-30,true);
    const flower=(cx,cy,r)=>{
      for(let a=0;a<8;a++){
        const rad=a*Math.PI/4, ex=cx+Math.cos(rad)*(r+3), ey=cy+Math.sin(rad)*(r+3);
        doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.ellipse(ex,ey,1.6,3.2,'F');
      }
      doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.circle(cx,cy,r,'F');
      doc.setFillColor(255,255,255); doc.circle(cx,cy,r*0.55,'F');
      doc.setFillColor(PINK[0],PINK[1],PINK[2]); doc.circle(cx,cy,r*0.28,'F');
    };
    flower(W/2,8,4); flower(85,8,3); flower(W-85,8,3);
    flower(W/2,H-8,4); flower(85,H-8,3); flower(W-85,H-8,3);
    flower(8,H/2,4); flower(W-8,H/2,4);
    flower(8,H/2-70,2.5); flower(8,H/2+70,2.5);
    flower(W-8,H/2-70,2.5); flower(W-8,H/2+70,2.5);
  };

  // ── Pink divider line ──────────────────────────────────────────────────────
  const drawDivider=(y)=>{
    doc.setDrawColor(SPINK[0],SPINK[1],SPINK[2]); doc.setLineWidth(1.2);
    doc.line(M,y,W-M,y);
    doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(1.5);
    doc.line(W/2-60,y,W/2+60,y);
  };

  // ── Page header (pages 2+) ─────────────────────────────────────────────────
  const drawPageHeader=(ref,date,valid)=>{
    try{ doc.addImage(LOGO,'PNG',M,10,52,36); }catch(e){}
    doc.setFillColor(248,240,244); doc.roundedRect(W-M-130,10,130,18,3,3,'F');
    doc.setDrawColor(SPINK[0],SPINK[1],SPINK[2]); doc.setLineWidth(0.5);
    doc.roundedRect(W-M-130,10,130,18,3,3,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.text('QUOTATION',W-M-65,21,{align:'center'});
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.text('Ref: '+(ref||''),W-M,38,{align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    doc.text('Date: '+fmt(date),W-M,47,{align:'right'});
    doc.text('Valid until: '+fmt(valid),W-M,56,{align:'right'});
    drawDivider(64);
  };

  // ── Footer ─────────────────────────────────────────────────────────────────
  const drawFooter=(contd)=>{
    drawDivider(H-30);
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.text('Isheeka Events',M,H-16);
    doc.setFont('helvetica','italic'); doc.setFontSize(9);
    doc.text('  +91 78423 95867    Making Every Event Memorable',M+65,H-16);
    if(contd){ doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.text('Contd...',W-M,H-16,{align:'right'}); }
  };

  // ══════════════════════════════════════════════════════════════════
  // PAGE 1 — COVER
  // ══════════════════════════════════════════════════════════════════
  if(dOpts.coverPage){
    drawOrnateBorder();
    const lh=160, lw=220;
    try{ doc.addImage(LOGO,'PNG',(W-lw)/2,48,lw,lh); }catch(e){}
    let y=228;
    drawDivider(y); y+=22;

    // Pill badge
    const pill='QUOTATION  .  '+(quot.ref_number||'');
    const pillW=190;
    doc.setDrawColor(PINK[0],PINK[1],PINK[2]); doc.setLineWidth(1.3);
    doc.roundedRect((W-pillW)/2,y,pillW,22,11,11,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.text(pill,W/2,y+14,{align:'center'});
    y+=34;

    // PREPARED FOR — FIX: proper spacing before client name
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    doc.setCharSpace(2.5); doc.text('PREPARED FOR',W/2,y,{align:'center'}); doc.setCharSpace(0);
    y+=20; // <-- gap before client name

    // Client name
    doc.setFont('helvetica','bold'); doc.setFontSize(26); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.text(quot.client_name||'',W/2,y,{align:'center'}); y+=22;

    // Event type
    if(quot.event_name){
      doc.setFont('helvetica','italic'); doc.setFontSize(13); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
      doc.text(quot.event_name,W/2,y,{align:'center'}); y+=18;
    }

    // Date
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    doc.text(fmt(quot.doc_date),W/2,y,{align:'center'}); y+=20;

    // Three dots
    doc.setFillColor(PINK[0],PINK[1],PINK[2]);
    doc.circle(W/2-14,y,3,'F'); doc.circle(W/2,y,2,'F'); doc.circle(W/2+14,y,3,'F');
    y+=18;

    // Intro paragraph
    const intro=settings.cover_intro||'Every great event is a unique story waiting to be told through beautiful design and flawless execution. We bring a fresh, creative mindset to ensure your gathering is not just any other event, but a grand success filled with moments your guests will talk about for years. Let us transform your vision into a vibrant, stress-free reality where you can simply enjoy being the host.';
    doc.setFont('helvetica','italic'); doc.setFontSize(10); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    const iLines=doc.splitTextToSize(intro,W-2*M-20);
    doc.text(iLines,W/2,y,{align:'center'}); y+=iLines.length*14+22;

    // Sign-off — FIX: proper em dash via unicode
    doc.setFont('helvetica','bolditalic'); doc.setFontSize(11); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.text('\u2014 Swathi N, Founder & CEO',W-M,y,{align:'right'});

    drawFooter(true);
    doc.addPage();
  }

  // ══════════════════════════════════════════════════════════════════
  // PAGE 2 — QUOTATION
  // ══════════════════════════════════════════════════════════════════
  drawSimpleBorder();
  drawPageHeader(quot.ref_number,quot.doc_date,quot.valid_until);
  let y=78;

  // Event name
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
  doc.text(quot.event_name||'',M,y); y+=16;

  // Client details
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
  doc.setCharSpace(1.5); doc.text('CLIENT DETAILS',M,y); doc.setCharSpace(0); y+=5;
  doc.setFillColor(255,248,250); doc.setDrawColor(245,208,218); doc.setLineWidth(0.5);
  doc.roundedRect(M,y,W-2*M,26,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
  doc.text('Shri/Smt. '+(quot.client_name||''),M+8,y+11);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
  doc.text('+91 --',M+8,y+21); y+=34;

  // Events & venues
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
  doc.setCharSpace(1.5); doc.text('EVENTS & VENUES',M,y); doc.setCharSpace(0); y+=4;
  let evTableStartPage=doc.internal.getCurrentPageInfo().pageNumber;
  doc.autoTable({startY:y,
    head:[['#','Event date','Event name','Venue','City']],
    body:[[1,fmt(quot.doc_date),quot.event_name||'--','--','--']],
    theme:'plain',
    headStyles:{fillColor:PINK,textColor:255,fontSize:7.5,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:DARK},
    columnStyles:{0:{cellWidth:20},1:{cellWidth:65},2:{cellWidth:'auto'},3:{cellWidth:65},4:{cellWidth:55}},
    margin:{left:M,right:M},
    didDrawPage:(data)=>{
      // Only draw border+footer on overflow pages (not the starting page)
      if(doc.internal.getCurrentPageInfo().pageNumber>evTableStartPage){
        drawSimpleBorder(); drawFooter(true);
      }
    }
  });
  y=doc.lastAutoTable.finalY+10;

  // Line items
  const groups={};
  (lineItems||[]).forEach(li=>{
    const k=li.sub_event_name?(li.sub_event_name.charAt(0).toUpperCase()+li.sub_event_name.slice(1)):'General Items';
    (groups[k]=groups[k]||[]).push(li);
  });
  const body2=[]; const showG=dOpts.grouping&&Object.keys(groups).length>1;
  const nc=1+(dOpts.qty?1:0)+(dOpts.prices?2:0);
  Object.keys(groups).forEach(k=>{
    if(showG) body2.push([{content:k,colSpan:nc,styles:{fontStyle:'bold',fillColor:[255,240,244],textColor:PINK,fontSize:8}}]);
    groups[k].forEach(li=>{
      const qty=parseFloat(li.quantity)||0,up=parseFloat(li.unit_price)||0;
      const amt=(li.amount!=null)?parseFloat(li.amount):qty*up;
      const row=[li.description||''];
      if(dOpts.qty) row.push(qty.toString());
      if(dOpts.prices){ row.push(fmtM(up)); row.push(fmtM(amt)); }
      body2.push(row);
    });
  });
  if(!body2.length) body2.push([{content:'No items',colSpan:nc,styles:{halign:'center'}}]);
  const head2=[['Description']]; if(dOpts.qty) head2[0].push('Qty'); if(dOpts.prices){ head2[0].push('Unit Price'); head2[0].push('Amount'); }
  const cs={0:{cellWidth:'auto',halign:'left'}};
  if(dOpts.qty) cs[1]={cellWidth:35,halign:'center'};
  if(dOpts.prices){ cs[dOpts.qty?2:1]={cellWidth:80,halign:'right'}; cs[dOpts.qty?3:2]={cellWidth:85,halign:'right',fontStyle:'bold'}; }
  let itemTableStartPage=doc.internal.getCurrentPageInfo().pageNumber;
  doc.autoTable({
    startY:y, head:head2, body:body2, theme:'plain',
    headStyles:{fillColor:PINK,textColor:255,fontSize:8,fontStyle:'bold'},
    bodyStyles:{fontSize:9,textColor:DARK},
    alternateRowStyles:{fillColor:[252,252,252]},
    columnStyles:cs, rowPageBreak:'avoid',
    margin:{left:M,right:M},
    didDrawPage:()=>{
      // Only on overflow pages — border + footer with Contd...
      if(doc.internal.getCurrentPageInfo().pageNumber>itemTableStartPage){
        drawSimpleBorder(); drawFooter(true);
      }
    }
  });
  y=doc.lastAutoTable.finalY+14;

  // Totals
  const sub=parseFloat(quot.subtotal)||0, disc=parseFloat(quot.discount_amount)||0;
  const gt=parseFloat(quot.grand_total)||(sub-disc);
  const tx=W-M-190;
  if(dOpts.prices){
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    doc.text('Subtotal',tx,y+12); doc.text(fmtM(sub),W-M,y+12,{align:'right'}); y+=13;
    if(dOpts.discount&&disc>0){ doc.text('Discount'+(quot.discount_pct>0?' ('+quot.discount_pct+'%)':''),tx,y+12); doc.text('-'+fmtM(disc),W-M,y+12,{align:'right'}); y+=13; }
  }
  doc.setDrawColor(DARK[0],DARK[1],DARK[2]); doc.setLineWidth(1);
  doc.line(tx,y+10,W-M,y+10); doc.setLineWidth(0.5);
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
  doc.text('Grand total',tx,y+24);
  doc.setFontSize(14); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
  doc.text(fmtM(gt),W-M,y+24,{align:'right'});
  y+=44;

  // Signature — FIX: 75% down page with proper gap, never too close to terms
  const sigY=Math.max(y+30, H*0.70);
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(28); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
  doc.text('Swathi',W-M-80,sigY,{align:'center'});
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
  doc.text('Swathi N',W-M-80,sigY+16,{align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
  doc.text('Founder & CEO',W-M-80,sigY+28,{align:'center'});
  y=sigY+48;

  // ── TERMS — inline or new page ─────────────────────────────────────────────
  let ps=quot.payment_schedule;
  if(typeof ps==='string'){ try{ps=JSON.parse(ps||'[]');}catch(e){ps=[];} }
  const hasBank=dOpts.bankDetails&&(settings.bank_name||settings.account_number);
  const psLines=(ps&&dOpts.schedule?ps.length:0);
  const addTermLines=quot.additional_terms?quot.additional_terms.split('\n').filter(l=>l.trim()).length:0;
  const estH=(hasBank?50:0)+(psLines*14)+(addTermLines*14)+60;
  const remaining=H-36-y;

  if(remaining<estH){
    // Not enough space — new page
    drawFooter(false);
    doc.addPage();
    drawSimpleBorder();
    drawPageHeader(quot.ref_number,quot.doc_date,quot.valid_until);
    y=78;
  } else {
    // Enough space — divider then terms on same page
    drawDivider(y+6); y+=22;
  }

  // Bank details
  if(hasBank){
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.setCharSpace(1.5); doc.text('PAYMENT DETAILS',M,y); doc.setCharSpace(0); y+=5;
    doc.setFillColor(245,245,245); doc.rect(M,y,W-2*M,30,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    const bl=[settings.bank_name&&'Bank: '+settings.bank_name, settings.account_number&&'Acct: '+settings.account_number, settings.ifsc_code&&'IFSC: '+settings.ifsc_code].filter(Boolean).join('   |   ');
    doc.text(bl,M+8,y+18); y+=38;
  }

  // Payment schedule
  if(ps&&ps.length&&dOpts.schedule){
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
    doc.setCharSpace(1.5); doc.text('PAYMENT, GENERAL TERMS & CONDITIONS',M,y); doc.setCharSpace(0); y+=12;
    ps.forEach((p,i)=>{
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
      doc.text(String.fromCharCode(97+i)+') '+(p.pct||0)+'% ('+p.label+') \u2014 '+p.when,M,y); y+=13;
    }); y+=6;
  }

  // Additional terms
  if(quot.additional_terms){
    if(!(ps&&ps.length&&dOpts.schedule)){
      doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(PINK[0],PINK[1],PINK[2]);
      doc.setCharSpace(1.5); doc.text('TERMS & CONDITIONS',M,y); doc.setCharSpace(0); y+=12;
    }
    quot.additional_terms.split('\n').filter(l=>l.trim()).forEach(l=>{
      const wl=doc.splitTextToSize('\u2022 '+l.trim(),W-2*M);
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(DARK[0],DARK[1],DARK[2]);
      doc.text(wl,M,y); y+=wl.length*12+3;
    });
  }

  // Final footer — NO Contd...
  drawFooter(false);

  const fname='Quotation_'+String(quot.ref_number||'draft').replace(/[^A-Za-z0-9_-]/g,'_')+'.pdf';
  if(opts.action==='print'){ try{doc.autoPrint();}catch(e){} window.open(doc.output('bloburl'),'_blank'); }
  else{ doc.save(fname); }
  return true;
}

    <div style={{position:'relative',flexShrink:0}}>

          onMouseLeave={()=>setOpen(false)}>

            {priority.map((o,i)=>(
              <div key={i} onMouseDown={()=>{onSelect(o.templateId,o.subEventName);setOpen(false);}}
                style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
                onMouseEnter={e=>e.currentTarget.style.background='#FBEAF0'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>{o.label}</div>
            ))}
          </>}
          {others.length>0&&<>
            <div style={{padding:'4px 10px',fontSize:10,fontWeight:700,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',background:'var(--grey-50)'}}>{eventType?(eventType+' templates'):'All templates'}</div>
            {others.map((o,i)=>(
              <div key={i} onMouseDown={()=>{onSelect(o.templateId,o.subEventName);setOpen(false);}}
                style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>{o.label}</div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

  const [clientMode, setClientMode] = React.useState('new');

  const [clients, setClients] = React.useState([]);

  const [templateItems, setTemplateItems] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [createdQuot, setCreatedQuot] = React.useState(null);
  const [emailMenuOpen, setEmailMenuOpen] = React.useState(false);
