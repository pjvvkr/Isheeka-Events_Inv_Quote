  const [staffList, setStaffList] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [mode, setMode] = React.useState('view');
  const [saving, setSaving] = React.useState(false);
  const [saveError, setSaveError] = React.useState('');
  const [showChangeClient, setShowChangeClient] = React.useState(false);
  const [newTask, setNewTask] = React.useState('');
  const [addingTask, setAddingTask] = React.useState(false);
  const [successMsg, setSuccessMsg] = React.useState('');
  const [form, setForm] = React.useState({});
  const [editSubEvents, setEditSubEvents] = React.useState([]);
  const [editMainItems, setEditMainItems] = React.useState([]);
  const [errors, setErrors] = React.useState({});
  const [mainItemsView, setMainItemsView] = React.useState([]);

  React.useEffect(()=>{ loadAll(); },[eventId]);

  const loadAll = async () => {
    setLoading(true);
    setMode('view');
    const [
      {data:evt},
      {data:subs},
      {data:items},
      {data:chk},
      {data:quotes},
      {data:invs},
      {data:staff}
    ] = await Promise.all([
      supabase.from('events').select('*').eq('event_id',eventId).single(),
      supabase.from('sub_events').select('*').eq('event_id',eventId).eq('is_deleted',false).order('sort_order'),
      supabase.from('sub_event_items').select('*').eq('event_id',eventId).eq('is_deleted',false).order('sort_order'),
      supabase.from('event_checklists').select('*').eq('event_id',eventId).order('sort_order'),
      supabase.from('quotations').select('quotation_id,ref_number,status,grand_total').eq('event_id',eventId).eq('is_deleted',false),
      supabase.from('invoices').select('invoice_id,ref_number,status,grand_total').eq('event_id',eventId).eq('is_deleted',false),
      supabase.from('users').select('user_id,first_name,last_name').eq('status','active'),
    ]);
    if(evt){
      setEvent(evt);
      setForm({...evt});
      if(evt.client_id){
        const {data:ac} = await supabase.from('alternative_contacts').select('*').eq('client_id',evt.client_id).eq('is_deleted',false);
        if(ac) setAltContacts(ac);
      }
    }
    if(subs && items){
      const grouped = subs.map(se=>({
        ...se, id:se.sub_event_id,
        items:items.filter(i=>i.sub_event_id===se.sub_event_id).map(i=>({id:i.item_id,description:i.description,quantity:i.quantity,unit_price:i.unit_price}))
      }));
      setSubEvents(grouped);
      setEditSubEvents(grouped.map(se=>({...se})));
      const mi = items.filter(i=>!i.sub_event_id).map(i=>({id:i.item_id,description:i.description,quantity:i.quantity,unit_price:i.unit_price}));
      setMainItemsView(mi);
      setEditMainItems(mi);
    }
    if(chk) setChecklist(chk);
    if(quotes) setQuotations(quotes);
    if(invs) setInvoices(invs);
    if(staff) setStaffList(staff);
    setLoading(false);
  };

  const setF = (field,val) => { setForm(f=>({...f,[field]:val})); if(errors[field]) setErrors(e=>({...e,[field]:''})); };

  const handleSave = async () => {
    const e={};
    if(!form.name?.trim()) e.name='Event name is required';
    if(!form.main_date) e.main_date='Date is required';
    if(!form.location?.trim()) e.location='Location is required';
    if(Object.keys(e).length>0){setErrors(e);setSaveError('Please fill in all required fields.');return;}
    setSaving(true); setSaveError('');
    try {
      await supabase.from('events').update({
        name:form.name,type:form.type,status:form.status,
        main_date:form.main_date,location:form.location,
        guest_count:form.guest_count?parseInt(form.guest_count):null,
        budget:form.budget?parseFloat(form.budget):null,
        primary_contact_id:form.primary_contact_id||null,
        primary_contact_name:form.primary_contact_name||null,
        secondary_contact_id:form.secondary_contact_id||null,
        secondary_contact_name:form.secondary_contact_name||null,
        assigned_staff_id:form.assigned_staff_id||null,
        assigned_staff_name:form.assigned_staff_name||null,
        internal_notes:form.internal_notes||null,
        updated_at:new Date().toISOString()
      }).eq('event_id',eventId);
      await supabase.from('sub_event_items').update({is_deleted:true}).eq('event_id',eventId);
      await supabase.from('sub_events').update({is_deleted:true}).eq('event_id',eventId);
      for(const se of editSubEvents){
        if(!se.name?.trim()) continue;
        const {data:seData} = await supabase.from('sub_events').insert({
          event_id:eventId,name:se.name,date:se.date||null,location:se.location||null,
          sort_order:editSubEvents.indexOf(se),created_at:new Date().toISOString(),is_deleted:false
        }).select().single();
        if(seData && se.items?.length>0){
          const rows=se.items.filter(r=>r.description?.trim()).map((r,i)=>({
            sub_event_id:seData.sub_event_id,event_id:eventId,
            description:r.description,quantity:parseFloat(r.quantity)||1,
            unit_price:parseFloat(r.unit_price)||0,
            sort_order:i,created_at:new Date().toISOString(),is_deleted:false
          }));
          if(rows.length>0) await supabase.from('sub_event_items').insert(rows);
        }
      }
      const mainRows=editMainItems.filter(r=>r.description?.trim()).map((r,i)=>({
        sub_event_id:null,event_id:eventId,
        description:r.description,quantity:parseFloat(r.quantity)||1,
        unit_price:parseFloat(r.unit_price)||0,
        sort_order:i,created_at:new Date().toISOString(),is_deleted:false
      }));
      if(mainRows.length>0) await supabase.from('sub_event_items').insert(mainRows);
      await loadAll();
      setSuccessMsg('Event updated successfully!');
      setTimeout(()=>setSuccessMsg(''),4000);
    } catch(err){ setSaveError('Could not save changes. Please try again.'); }
    finally { setSaving(false); }
  };

  const handleStatusChange = async (newStatus) => {
    await supabase.from('events').update({status:newStatus,updated_at:new Date().toISOString()}).eq('event_id',eventId);
    setEvent(ev=>({...ev,status:newStatus}));
  };

  const handleChangeClient = async (newClient) => {
    await supabase.from('events').update({
      client_id:newClient.client_id,
      client_name:newClient.first_name+' '+newClient.last_name,
      primary_contact_id:null,primary_contact_name:null,
      secondary_contact_id:null,secondary_contact_name:null,
      updated_at:new Date().toISOString()
    }).eq('event_id',eventId);
    setShowChangeClient(false);
    await loadAll();
    setSuccessMsg('Client changed to '+newClient.first_name+' '+newClient.last_name+'. Primary and secondary contacts have been reset — please reassign them.');
    setTimeout(()=>setSuccessMsg(''),6000);
  };

  const toggleChecklist = async (item) => {
    const done = !item.is_done;
    setChecklist(c=>c.map(i=>i.checklist_id===item.checklist_id?{...i,is_done:done}:i));
    await supabase.from('event_checklists').update({is_done:done,done_at:done?new Date().toISOString():null}).eq('checklist_id',item.checklist_id);
  };

  const addChecklistItem = async () => {
    if(!newTask.trim()) return;
    const {data} = await supabase.from('event_checklists').insert({
      event_id:eventId,task:newTask.trim(),is_done:false,
      sort_order:checklist.length,created_at:new Date().toISOString()
    }).select().single();
    if(data) setChecklist(c=>[...c,data]);
    setNewTask(''); setAddingTask(false);
  };

  const deleteChecklistItem = async (id) => {
    setChecklist(c=>c.filter(i=>i.checklist_id!==id));
    await supabase.from('event_checklists').delete().eq('checklist_id',id);
  };

  const enterEditMode = () => { setForm({...event}); setErrors({}); setSaveError(''); setMode('edit'); };
  const cancelEdit = () => { setErrors({}); setSaveError(''); setMode('view'); };

  if(loading) return <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>;
  if(!event) return <div style={{padding:40,textAlign:'center',color:'var(--grey-400)'}}>Event not found.</div>;

  const sc = EVENT_STATUS_COLORS[event.status?.toLowerCase()]||EVENT_STATUS_COLORS.planning;
  const hasFinancialDocs = quotations.length>0||invoices.length>0;
  const staffOpts = staffList.map(s=>({value:s.user_id,label:s.first_name+' '+s.last_name}));
  const typeOpts = EVENT_TYPES.map(t=>({value:t.toLowerCase(),label:t}));
  const statusOpts = EVENT_STATUS_ORDER.map(s=>({value:s,label:EVENT_STATUS_LABELS[s]}));
  const contactOpts = [{value:'',label:'Client themselves'},...altContacts.map(ac=>({value:ac.contact_id,label:ac.first_name+' '+ac.last_name+' ('+ac.relationship+')'}))];
  const grandTotal = subEvents.reduce((s,se)=>s+se.items.reduce((ss,i)=>ss+(parseFloat(i.quantity)||0)*(parseFloat(i.unit_price)||0),0),0)
    + mainItemsView.reduce((s,i)=>s+(parseFloat(i.quantity)||0)*(parseFloat(i.unit_price)||0),0);

  // ── SHARED HEADER (always visible) ──────────────────────────────────────────
  const header = (
    <div>
      {showChangeClient && <ChangeClientModal currentClient={{client_id:event.client_id}} onSave={handleChangeClient} onCancel={()=>setShowChangeClient(false)}/>}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,fontSize:13,color:'var(--grey-400)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--pink)',fontSize:13,padding:0,fontFamily:'Inter,sans-serif'}}>← Events</button>
        <span>/</span>
        <span style={{color:'var(--grey-800)',fontWeight:500}}>{event.name}</span>
        {mode==='edit'&&<span> / Editing</span>}
      </div>
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'18px 24px',border:'1px solid var(--grey-100)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)',marginBottom:4}}>{event.name}</div>
          <div style={{fontSize:12,color:'var(--grey-400)'}}>{event.type?event.type.charAt(0).toUpperCase()+event.type.slice(1):''} · {event.client_name}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {mode==='view' && <>
            <span style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:500,background:sc.bg,color:sc.color}}>
              {EVENT_STATUS_LABELS[event.status?.toLowerCase()]||event.status}
            </span>
            <button className="btn sm" onClick={()=>onUseAsReference(event)}>📋 Use as reference</button>
            <button className="btn sm primary" onClick={enterEditMode}>✏️ Edit</button>
          </>}
          {mode==='edit' && <>
            <button className="btn sm" onClick={cancelEdit}>✕ Cancel</button>
            <button className="btn sm primary" onClick={handleSave} disabled={saving}>{saving?'Saving...':'💾 Save changes'}</button>
          </>}
        </div>
      </div>
      {saveError&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:12,border:'1px solid rgba(163,45,45,0.2)'}}>⚠️ {saveError}</div>}
    </div>
  );

  // ── VIEW MODE ────────────────────────────────────────────────────────────────
  if(mode==='view') return (
    <div>
      {header}
      {successMsg&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:12,border:'1px solid rgba(15,110,86,0.2)',display:'flex',alignItems:'center',gap:8}}>✅ {successMsg}</div>}
      {/* Info cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'Main event date',val:event.main_date?new Date(event.main_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}):'—'},
          {label:'Location',val:event.location||'—'},
          {label:'Guest count',val:event.guest_count||'—'},
          {label:'Budget',val:event.budget?'₹'+parseFloat(event.budget).toLocaleString('en-IN'):'—'},
          {label:'Primary contact',val:event.primary_contact_name||event.client_name||'—'},
          {label:'Assigned staff',val:event.assigned_staff_name||'—'},
        ].map((card,i)=>(
          <div key={i} style={{background:'white',borderRadius:'var(--radius-md)',padding:'12px 16px',border:'1px solid var(--grey-100)'}}>
            <div style={{fontSize:11,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:4}}>{card.label}</div>
            <div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{card.val}</div>
          </div>
        ))}
      </div>

      {/* Client */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'14px 20px',border:'1px solid var(--grey-100)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:11,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2}}>Client</div>
          <div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{event.client_name||'—'}</div>
        </div>
        {hasFinancialDocs
          ? <div style={{fontSize:12,color:'var(--grey-400)',display:'flex',alignItems:'center',gap:4}}>🔒 Client cannot be changed — quotations/invoices exist</div>
          : <button className="btn sm" onClick={()=>setShowChangeClient(true)}>↔ Change client</button>
        }
      </div>

      {/* Sub-events + Checklist */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Sub-events & items</div>
          {subEvents.length===0&&<div style={{fontSize:13,color:'var(--grey-400)',textAlign:'center',padding:'20px 0'}}>No sub-events</div>}
          {subEvents.map(se=>(
            <div key={se.sub_event_id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--grey-100)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:'#e8185a',flexShrink:0}}/>
                <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{se.name}</div>
                {se.date&&<div style={{fontSize:12,color:'var(--grey-400)'}}>· {new Date(se.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>}
                {se.location&&<div style={{fontSize:12,color:'var(--grey-400)'}}>· {se.location}</div>}
              </div>
              {se.items.length>0
                ? <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                    <thead><tr style={{background:'var(--grey-50)'}}>
                      <th style={{padding:'4px 8px',textAlign:'left',color:'var(--grey-400)',fontWeight:500}}>Description</th>
                      <th style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-400)',fontWeight:500,width:'10%'}}>Qty</th>
                      <th style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-400)',fontWeight:500,width:'20%'}}>Price</th>
                      <th style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-400)',fontWeight:500,width:'20%'}}>Amount</th>
                    </tr></thead>
                    <tbody>{se.items.map((item,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--grey-100)'}}>
                        <td style={{padding:'4px 8px',color:'var(--grey-800)'}}>{item.description}</td>
                        <td style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-600)'}}>{item.quantity}</td>
                        <td style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-600)'}}>₹{parseFloat(item.unit_price||0).toLocaleString('en-IN')}</td>
                        <td style={{padding:'4px 8px',textAlign:'right',color:'var(--green)',fontWeight:500}}>₹{((parseFloat(item.quantity)||0)*(parseFloat(item.unit_price)||0)).toLocaleString('en-IN')}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                : <div style={{fontSize:12,color:'var(--grey-400)',paddingLeft:14}}>No items</div>
              }
            </div>
          ))}
          {mainItemsView.length>0&&(
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px dashed var(--grey-200)'}}>
              <div style={{fontSize:12,color:'var(--grey-400)',marginBottom:6}}>Main event items</div>
              <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                <tbody>{mainItemsView.map((item,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid var(--grey-100)'}}>
                    <td style={{padding:'4px 8px',color:'var(--grey-800)'}}>{item.description}</td>
                    <td style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-600)',width:'10%'}}>{item.quantity}</td>
                    <td style={{padding:'4px 8px',textAlign:'right',color:'var(--grey-600)',width:'20%'}}>₹{parseFloat(item.unit_price||0).toLocaleString('en-IN')}</td>
                    <td style={{padding:'4px 8px',textAlign:'right',color:'var(--green)',fontWeight:500,width:'20%'}}>₹{((parseFloat(item.quantity)||0)*(parseFloat(item.unit_price)||0)).toLocaleString('en-IN')}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>

        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)'}}>Checklist</div>
            <div style={{fontSize:12,color:'var(--grey-400)'}}>{checklist.filter(i=>i.is_done).length}/{checklist.length} done</div>
          </div>
          {checklist.length===0&&<div style={{fontSize:13,color:'var(--grey-400)',textAlign:'center',padding:'20px 0'}}>No tasks yet</div>}
          {checklist.map(item=>(
            <div key={item.checklist_id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--grey-100)',cursor:'pointer'}} onClick={()=>toggleChecklist(item)}>
              <div style={{width:18,height:18,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s',
                border:item.is_done?'none':'1.5px solid var(--grey-200)',background:item.is_done?'var(--green)':'white'}}>
                {item.is_done&&<span style={{color:'white',fontSize:11,fontWeight:600}}>✓</span>}
              </div>
              <div style={{flex:1,fontSize:13,color:item.is_done?'var(--grey-400)':'var(--grey-800)',textDecoration:item.is_done?'line-through':'none'}}>{item.task}</div>
              <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-300)',fontSize:13}} onClick={e=>{e.stopPropagation();deleteChecklistItem(item.checklist_id);}}>🗑</button>
            </div>
          ))}
          {addingTask
            ? <div style={{display:'flex',gap:8,marginTop:10}}>
                <NewTaskInput value={newTask} onChange={setNewTask} onEnter={addChecklistItem}/>
                <button className="btn sm primary" onClick={addChecklistItem}>Add</button>
                <button className="btn sm" onClick={()=>{setAddingTask(false);setNewTask('');}}>✕</button>
              </div>
            : <button className="btn sm" style={{marginTop:10,border:'1px dashed var(--grey-200)',color:'var(--grey-400)',width:'100%'}} onClick={()=>setAddingTask(true)}>+ Add task</button>
          }
        </div>
      </div>

      {/* Documents */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Documents</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div>
            <div style={{fontSize:11,color:'var(--grey-400)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>Quotations ({quotations.length})</div>
            {quotations.length===0&&<div style={{fontSize:13,color:'var(--grey-400)'}}>No quotations yet</div>}
            {quotations.map(q=>{
              const qs={draft:{bg:'var(--grey-100)',color:'var(--grey-400)'},sent:{bg:'var(--blue-light)',color:'var(--blue)'},approved:{bg:'var(--green-light)',color:'var(--green)'},converted:{bg:'var(--green-light)',color:'var(--green)'},rejected:{bg:'var(--red-light)',color:'var(--red)'},expired:{bg:'var(--orange-light)',color:'var(--orange)'},revised:{bg:'var(--orange-light)',color:'var(--orange)'}};
              const s=qs[q.status?.toLowerCase()]||qs.draft;
              return <div key={q.quotation_id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--grey-50)',borderRadius:'var(--radius-sm)',marginBottom:6}}>
                <div><div style={{fontSize:13,fontWeight:500}}>{q.ref_number}</div><div style={{fontSize:12,color:'var(--grey-400)'}}>₹{parseFloat(q.grand_total||0).toLocaleString('en-IN')}</div></div>
                <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:s.bg,color:s.color,textTransform:'capitalize'}}>{q.status}</span>
              </div>;
            })}
          </div>
          <div>
            <div style={{fontSize:11,color:'var(--grey-400)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>Invoices ({invoices.length})</div>
            {invoices.length===0&&<div style={{fontSize:13,color:'var(--grey-400)'}}>No invoices yet</div>}
            {invoices.map(inv=>{
              const is={draft:{bg:'var(--grey-100)',color:'var(--grey-400)'},sent:{bg:'var(--blue-light)',color:'var(--blue)'},partially_paid:{bg:'var(--orange-light)',color:'var(--orange)'},paid:{bg:'var(--green-light)',color:'var(--green)'},overdue:{bg:'var(--red-light)',color:'var(--red)'},cancelled:{bg:'var(--grey-100)',color:'var(--grey-400)'}};
              const s=is[inv.status?.toLowerCase()]||is.draft;
              return <div key={inv.invoice_id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--grey-50)',borderRadius:'var(--radius-sm)',marginBottom:6}}>
                <div><div style={{fontSize:13,fontWeight:500}}>{inv.ref_number}</div><div style={{fontSize:12,color:'var(--grey-400)'}}>₹{parseFloat(inv.grand_total||0).toLocaleString('en-IN')}</div></div>
                <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:s.bg,color:s.color,textTransform:'capitalize'}}>{inv.status}</span>
              </div>;
            })}
          </div>
        </div>
      </div>

      {/* Payment summary */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Payment summary</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {[

// ── Lead follow-up urgency ────────────────────────────────────────────────────
function getFollowUpUrgency(date) {
  if(!date) return 'none';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.floor((d-today)/(1000*60*60*24));
  if(diff < 0) return 'overdue';
  if(diff === 0) return 'today';
  if(diff <= 7) return 'week';
  return 'future';
}

  week:{dot:'#0F6E56',label:'This week',bg:'#E1F5EE',color:'#0F6E56'},

function LeadForm({initial={}, onSave, onCancel, title='New lead', referenceData=null, originalLead=null, originalSubEvents=null, lockEventFields=false}) {
  const empty = {
    first_name:'',last_name:'',phone:'',phone_2:'',email:'',
    source:'',event_type:'',tentative_date:'',location:'',
    budget:'',guest_count:'',venue_preference:'',referred_by:'',
    stage:'new',assigned_to:'',notes:'',follow_up_date:'',
  };
  const initData = referenceData || initial;
  const [form, setForm] = React.useState({...empty,...initData});
  const [errors, setErrors] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [saveError, setSaveError] = React.useState('');
  const [staffList, setStaffList] = React.useState([]);

  const [leadSources, setLeadSources] = React.useState(LEAD_SOURCES_DEFAULT);
  React.useEffect(()=>{
    supabase.from('users').select('user_id,first_name,last_name').eq('status','active').then(({data})=>{ if(data) setStaffList(data); });
    fetchLeadSources().then(setLeadSources);
  },[]);

  const set = (field,val) => { setForm(f=>({...f,[field]:val})); if(errors[field]) setErrors(e=>({...e,[field]:''})); setSaveError(''); };

  const validate = () => {
    const e={};
    if(!form.first_name?.trim()) e.first_name='First name is required';
    if(!form.last_name?.trim()) e.last_name='Last name is required';
    if(!form.phone?.trim()) e.phone='Phone is required';
    if(!form.source) e.source='Source is required';
    if(!form.event_type) e.event_type='Event type is required';
    return e;
  };

  const handleSave = async () => {
    // Detect no changes when editing
    if(originalLead) {
      const fields = ['first_name','last_name','phone','phone_2','email','source',
        'referred_by','event_type','tentative_date','location','budget','guest_count',
        'venue_preference','stage','assigned_to','notes','follow_up_date'];
      const hasFormChanges = fields.some(f=>String(form[f]||'')!==String(originalLead[f]||''));
      if(!hasFormChanges) {
        setSaveError('No changes have been made.');
        return;
      }
    }
    const e=validate();
    if(Object.keys(e).length>0){setErrors(e);setSaveError('Please fix the errors below.');return;}
    setSaving(true); setSaveError('');
    try { await onSave(form); }
    catch(err){
      const msg = err?.message || err?.toString() || 'Unknown error';
      setSaveError('Could not save lead: ' + msg);
      console.error('Lead save error:', err);
    }
    finally { setSaving(false); }
  };

  const typeOpts = EVENT_TYPES.map(t=>({value:t.toLowerCase(),label:t}));
  const staffOpts = staffList.map(s=>({value:s.user_id,label:s.first_name+' '+s.last_name}));

  return (
    <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
      <div style={{padding:'18px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

        <button className="btn sm" onClick={onCancel}>✕ Cancel</button>
      </div>
      <div style={{padding:24}}>
        {referenceData&&<div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:'8px 14px',fontSize:12,color:'var(--blue)',marginBottom:14}}>
          📋 All fields pre-filled from reference lead — update whatever you need before saving.
        </div>}
        {saveError&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)'}}>⚠️ {saveError}</div>}

        <div style={{fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:12}}>Contact details</div>
        <div className="form-grid" style={{marginBottom:14}}>
          <InputField label="First name" required value={form.first_name} onChange={v=>set('first_name',v)} error={errors.first_name} placeholder="e.g. Priya"/>
          <InputField label="Last name" required value={form.last_name} onChange={v=>set('last_name',v)} error={errors.last_name} placeholder="e.g. Sharma"/>
        </div>
        <div className="form-grid three" style={{marginBottom:14}}>
          <InputField label="Phone 1" required value={form.phone} onChange={v=>set('phone',v)} error={errors.phone} placeholder="+91 98765 43210"/>
          <InputField label="Phone 2" value={form.phone_2} onChange={v=>set('phone_2',v)} placeholder="+91 XXXXX XXXXX"/>
          <InputField label="Email" value={form.email} onChange={v=>set('email',v)} placeholder="priya@email.com"/>
        </div>
        <div className="form-grid three" style={{marginBottom:14}}>
          <SelectField label="Source" required value={form.source} onChange={v=>set('source',v)} options={leadSources} error={errors.source} placeholder="How did they find us?"/>
          {form.source==='referral'&&<InputField label="Referred by" value={form.referred_by} onChange={v=>set('referred_by',v)} placeholder="Name or phone"/>}
        </div>

        <div style={{height:1,background:'var(--grey-100)',margin:'16px 0'}}/>
        <div style={{fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:12}}>Event details</div>
        {lockEventFields&&<div style={{background:'#FFF8E1',borderRadius:'var(--radius-sm)',padding:'8px 12px',fontSize:12,color:'#8A6D1B',marginBottom:12,border:'1px solid #FFE082'}}>

          <InputField label="Tentative date" type="date" value={form.tentative_date} onChange={v=>set('tentative_date',v)} disabled={lockEventFields}/>

          <InputField label="Approx. budget (₹)" type="number" value={form.budget} onChange={v=>set('budget',v)} placeholder="e.g. 1200000" disabled={lockEventFields}/>
          <InputField label="Guest count (approx)" type="number" value={form.guest_count} onChange={v=>set('guest_count',v)} placeholder="e.g. 300" disabled={lockEventFields}/>

        <div style={{fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Pipeline</div>
        <div style={{fontSize:12,color:'var(--grey-400)',marginBottom:12,background:'var(--blue-light)',borderRadius:'var(--radius-sm)',padding:'6px 10px',color:'var(--blue)'}}>
          ℹ️ Stage is managed automatically via action buttons on the lead screen.
        </div>
        <div className="form-grid" style={{marginBottom:14}}>
          <InputField label="Follow-up date" type="date" value={form.follow_up_date} onChange={v=>set('follow_up_date',v)} hint="When to next contact this lead"/>
          <SelectField label="Assigned staff" value={form.assigned_to} onChange={v=>set('assigned_to',v)} options={staffOpts} placeholder="Select staff..."/>
        </div>
        <div className="form-grid one" style={{marginBottom:14}}>
          <InputField label="Notes" type="textarea" value={form.notes} onChange={v=>set('notes',v)} placeholder="Any notes about this lead..."/>
        </div>
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--grey-50)'}}>
        <div style={{fontSize:12,color:'var(--grey-400)'}}>Fields marked <span style={{color:'var(--pink)'}}>*</span> are required</div>
        <button className="btn primary" onClick={handleSave} disabled={saving}>{saving?'⏳ Saving...':'💾 Save lead'}</button>
      </div>
    </div>
  );
}

    if(p==='full') setModalDisplayOpts({prices:true,qty:true,grouping:true,schedule:true,discount:true});
    else if(p==='items') setModalDisplayOpts({prices:false,qty:true,grouping:true,schedule:true,discount:false});
    else if(p==='summary') setModalDisplayOpts({prices:false,qty:false,grouping:true,schedule:false,discount:false});

    let alive=true;
    (async()=>{

            {quot&&<span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>{statusLabel}</span>}

                  return (

          </>}
        </div>
        {!loading&&quot&&(
          <div style={{borderTop:'1px solid var(--grey-100)',flexShrink:0}}>

// ── Lead Detail ───────────────────────────────────────────────────────────────
function LeadDetail({leadId, onBack, onConverted, onCreateFromReference, onNavigate}) {
  const [lead, setLead] = React.useState(null);
  const [subEvents, setSubEvents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [mode, setMode] = React.useState('view');
  const [saving, setSaving] = React.useState(false);
  const [showLoss, setShowLoss] = React.useState(false);
  const [showConvert, setShowConvert] = React.useState(false);
  const [showWelcome, setShowWelcome] = React.useState(false);
  const [convertedEventId, setConvertedEventId] = React.useState(null);
  const [viewQuotId, setViewQuotId] = React.useState(null);
  const [clientMatches, setClientMatches] = React.useState(null);
  const [convertClientOutcome, setConvertClientOutcome] = React.useState(null); // {type:'created'|'reused', name:string}
  const [showLostConfirm, setShowLostConfirm] = React.useState(false);
  const [showQuoteWizard, setShowQuoteWizard] = React.useState(false);
  const [leadQuotations, setLeadQuotations] = React.useState([]);
  const [successMsg, setSuccessMsg] = React.useState('');
  const [staffList, setStaffList] = React.useState([]);

  React.useEffect(()=>{ loadLead(); },[leadId]);

  const loadLead = async () => {
    setLoading(true); setMode('view');
    const [{data:l},{data:ses},{data:staff},{data:quots}] = await Promise.all([
      supabase.from('leads').select('*').eq('lead_id',leadId).single(),
      supabase.from('lead_sub_events').select('*').eq('lead_id',leadId).eq('is_deleted',false).order('sort_order'),
      supabase.from('users').select('user_id,first_name,last_name').eq('status','active'),
      supabase.from('quotations').select('quotation_id,ref_number,status,grand_total,valid_until,revision_number,created_at').eq('lead_id',leadId).eq('is_deleted',false).order('created_at',{ascending:false}),
    ]);
    if(l) setLead(l);
    if(ses) setSubEvents(ses);
    if(staff) setStaffList(staff);
    if(quots) setLeadQuotations(quots);
    setLoading(false);
  };

  const handleSave = async (form, ses) => {
    setSaving(true);
    try {
      const {error} = await supabase.from('leads').update({
        first_name: form.first_name,
        last_name: form.last_name,
        phone: form.phone,
        phone_2: form.phone_2||null,
        email: form.email||null,
        source: form.source||null,
        referred_by: form.referred_by||null,
        event_type: form.event_type||null,
        tentative_date: form.tentative_date||null,
        location: form.location||null,
        budget: form.budget?parseFloat(form.budget):null,
        guest_count: form.guest_count?parseInt(form.guest_count):null,
        venue_preference: form.venue_preference||null,
        stage: form.stage||'new',
        assigned_to: form.assigned_to||null,
        notes: form.notes||null,
        follow_up_date: form.follow_up_date||null,
        updated_at: new Date().toISOString()
      }).eq('lead_id',leadId);
      if(error) throw error;

      // Item 8: cascade name / phone / email changes to the linked client + active quotations
      const nameChanged = (form.first_name!==lead.first_name)||(form.last_name!==lead.last_name);
      const phoneChanged = (form.phone||'')!==(lead.phone||'');
      const emailChanged = (form.email||'')!==(lead.email||'');
      if((nameChanged||phoneChanged||emailChanged) && lead.client_id){
        await supabase.from('clients').update({
          first_name:form.first_name,last_name:form.last_name,
          phone_1:form.phone,email_1:form.email||null,
          updated_at:new Date().toISOString()
        }).eq('client_id',lead.client_id);
      }
      if(nameChanged){
        const newClientName=form.first_name+' '+form.last_name;
        const {data:quots}=await supabase.from('quotations').select('quotation_id,status').eq('lead_id',leadId).eq('is_deleted',false);
        const targets=(quots||[]).filter(q=>!['superseded','rejected','expired','converted'].includes(q.status));
        for(const q of targets){
          await supabase.from('quotations').update({client_name:newClientName,updated_at:new Date().toISOString()}).eq('quotation_id',q.quotation_id);
        }
      }

      await loadLead();
      setSuccessMsg('Lead updated successfully!');
      setTimeout(()=>setSuccessMsg(''),4000);
    } catch(err) {
      setSuccessMsg('');
      alert('Could not save lead: '+(err?.message||'Please try again.'));
    } finally { setSaving(false); }
  };



  const handleStageChange = async (newStage) => {
    try {
      const {error} = await supabase.from('leads')
        .update({stage:newStage, updated_at:new Date().toISOString()})
        .eq('lead_id',leadId);
      if(error) throw error;
      setLead(l=>({...l,stage:newStage}));
      // Item 16: confirming the quote approves the active quotation
      if(newStage==='quote_confirmed' && lead.active_quotation_id){
        await supabase.from('quotations').update({status:'approved',updated_at:new Date().toISOString()}).eq('quotation_id',lead.active_quotation_id);
        const {data:quots}=await supabase.from('quotations').select('quotation_id,ref_number,status,grand_total,valid_until,revision_number,created_at').eq('lead_id',leadId).eq('is_deleted',false).order('created_at',{ascending:false});
        if(quots) setLeadQuotations(quots);
      }
      const labels = {
        contacted:'Lead marked as Contacted.',
        quote_sent:'Quote sent to client.',
        quote_revision_pending:'Revision requested — lead updated.',
        revised_quote_sent:'Revised quote sent to client.',
        quote_confirmed:'Quote confirmed by client! Ready to convert.',
      };
      setSuccessMsg(labels[newStage]||'Stage updated.');
      setTimeout(()=>setSuccessMsg(''),4000);
    } catch(err) {
      alert('Could not update stage: '+(err?.message||'Please try again.'));
    }
  };

  const handleCreateFromLostLead = async () => {
    setShowLostConfirm(false);
    // Load sub-events for this lead
    const {data:ses} = await supabase.from('lead_sub_events')
      .select('*').eq('lead_id',leadId).eq('is_deleted',false).order('sort_order');
    // Build reference data — copy all, reset stage to new
    const refData = {
      first_name: lead.first_name||'',
      last_name: lead.last_name||'',
      phone: lead.phone||'',
      phone_2: lead.phone_2||'',
      email: lead.email||'',
      source: lead.source||'',
      referred_by: lead.referred_by||'',
      event_type: lead.event_type||'',
      tentative_date: lead.tentative_date||'',
      location: lead.location||'',
      budget: lead.budget||'',
      guest_count: lead.guest_count||'',
      venue_preference: lead.venue_preference||'',
      stage: 'new',
      assigned_to: lead.assigned_to||'',
      follow_up_date: '',
      notes: lead.notes ? '[Based on lost lead: '+lead.first_name+' '+lead.last_name+'] '+lead.notes : 'Based on lost lead: '+lead.first_name+' '+lead.last_name,
      subEvents: (ses||[]).map(se=>({name:se.name,date:se.date||'',location:se.location||''})),
    };
    onCreateFromReference && onCreateFromReference(refData);
  };

  const handleLoss = async (reason, notes) => {
    await supabase.from('leads').update({
      stage:'lost',lost_reason:reason,lost_notes:notes||null,
      lost_at:new Date().toISOString(),updated_at:new Date().toISOString()
    }).eq('lead_id',leadId);
    setShowLoss(false);
    await loadLead();
    setSuccessMsg('Lead marked as lost.');
    setTimeout(()=>setSuccessMsg(''),4000);
  };

  // Phone normalization for client dedup
  const normPhone = (s) => (s||'').replace(/\D/g,'').replace(/^91(\d{10})$/,'$1');

  // Step 1 of convert: check for phone matches, show modal if needed
  const handleConvertInitiate = async () => {
    setShowConvert(false);
    // If lead already has a client_id, skip match check
    if(lead.client_id){ await handleConvert(lead.client_id); return; }
    if(!lead.phone){ await handleConvert(null); return; }
    const normalized = normPhone(lead.phone);
    const {data:allClients} = await supabase.from('clients').select('client_id,first_name,last_name,phone_1,email_1,ref_number').eq('is_deleted',false);
    const matches = (allClients||[]).filter(c=>normPhone(c.phone_1)===normalized);
    if(matches.length===0){ await handleConvert(null); return; }
    setClientMatches(matches); // show match modal
  };

  const handleConvert = async (forcedClientId) => {
    setClientMatches(null);
    const resolvedClientId = forcedClientId!==undefined ? forcedClientId : null;
    try {
      let clientId = resolvedClientId || lead.client_id || null;
      let clientOutcome = clientId ? 'reused' : 'created';
      if(!clientId){
        const ref_number = await getNextClientRef();
        const {data:client,error:ce} = await supabase.from('clients').insert({
          ref_number,
          first_name:lead.first_name,last_name:lead.last_name,
          phone_1:lead.phone,phone_2:lead.phone_2||null,
          email_1:lead.email||null,source:lead.source||'referral',status:'active',
          client_since:new Date().toISOString().split('T')[0],
          created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
        }).select().single();
        if(ce) throw ce;
        clientId = client.client_id;
        clientOutcome = 'created';
      }

      // 2. Load the approved (active) quotation to build the event from it
      let approvedQuot = null;
      if(lead.active_quotation_id){
        const {data:q} = await supabase.from('quotations').select('*').eq('quotation_id',lead.active_quotation_id).single();
        approvedQuot = q;
      }

      // 3. Create the event from lead + approved quotation
      const {data:event,error:ee} = await supabase.from('events').insert({
        name:(approvedQuot&&approvedQuot.event_name)||(lead.first_name+' '+lead.last_name+' '+(lead.event_type?lead.event_type.charAt(0).toUpperCase()+lead.event_type.slice(1):'Event')),
        type:lead.event_type||null,status:'planning',
        main_date:lead.tentative_date||null,
        location:lead.location||null,
        guest_count:lead.guest_count||null,
        budget:lead.budget||null,
        client_id:clientId,
        client_name:lead.first_name+' '+lead.last_name,
        created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false
      }).select().single();
      if(ee) throw ee;

      // 4. Seed event sub-events from the approved quotation's line items (distinct sub-event names)
      if(approvedQuot){
        const {data:li} = await supabase.from('quotation_line_items').select('sub_event_name').eq('quotation_id',approvedQuot.quotation_id).eq('is_deleted',false);
        const names=[...new Set((li||[]).map(x=>x.sub_event_name).filter(n=>n&&n.trim()&&n!=='General Items'))];
        let so=0;
        for(const name of names){
          await supabase.from('sub_events').insert({event_id:event.event_id,name,sort_order:so++,created_at:new Date().toISOString(),is_deleted:false});
        }
      }

      // 5. Mark the approved quotation as converted
      if(approvedQuot){
        await supabase.from('quotations').update({status:'converted',updated_at:new Date().toISOString()}).eq('quotation_id',approvedQuot.quotation_id);
      }

      // 6. Update the lead — reuse client, link event
      await supabase.from('leads').update({
        stage:'event_triggered',client_id:clientId,
        event_id:event.event_id,converted_at:new Date().toISOString(),
        updated_at:new Date().toISOString()
      }).eq('lead_id',leadId);

      setConvertedEventId(event.event_id);
      setConvertClientOutcome({type:clientOutcome, name:lead.first_name+' '+lead.last_name});
      setShowConvert(false);
      setShowWelcome(true);
      await loadLead();
    } catch(err){
      alert('Could not convert lead: '+(err&&err.message?err.message:'Please try again.'));
    }
  };

  if(loading) return <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>;
  if(!lead) return <div style={{padding:40,textAlign:'center',color:'var(--grey-400)'}}>Lead not found.</div>;

  if(mode==='edit') return (
    <LeadForm
      initial={{...lead,subEvents}}
      originalLead={lead}
      originalSubEvents={subEvents}
      title="Edit lead"
      lockEventFields={leadQuotations.some(q=>!['superseded','rejected','expired'].includes(q.status))}
      onSave={async (form,ses)=>{ await handleSave(form,ses); setMode('view'); }}
      onCancel={()=>setMode('view')}
    />
  );

  const sc = lead.stage==='lost'
    ? {bg:'#FCEBEB',color:'#A32D2D'}
    : LEAD_STAGE_COLORS[lead.stage]||LEAD_STAGE_COLORS.new;
  const urgency = getFollowUpUrgency(lead.follow_up_date);
  const uc = URGENCY_COLORS[urgency];
  const isLost = lead.stage==='lost';
  const isConverted = lead.stage==='event_triggered';
  const lossLabel = LEAD_LOSS_REASONS.find(r=>r.value===lead.lost_reason)?.label||lead.lost_reason;

  return (
    <div>
      {showLoss&&<LossReasonModal onSave={handleLoss} onCancel={()=>setShowLoss(false)}/>}
      {showLostConfirm&&<LostLeadEditModal
        onEditAnyway={()=>{setShowLostConfirm(false);setMode('edit');}}
        onCreateFromReference={handleCreateFromLostLead}
        onCancel={()=>setShowLostConfirm(false)}
      />}
      {showQuoteWizard&&<QuoteGenerationWizard
        lead={lead}
        leadSubEvents={subEvents}
        isRevision={lead.stage==='quote_revision_pending'}
        isContinuation={lead.stage==='quote_generation_in_progress'||(!!(lead.active_quotation_id)&&lead.stage==='contacted')}
        existingQuotationId={(lead.stage==='quote_revision_pending'||lead.stage==='quote_generation_in_progress'||lead.active_quotation_id)?lead.active_quotation_id:null}
        onComplete={async()=>{ setShowQuoteWizard(false); await loadLead(); }}
        onCancel={()=>setShowQuoteWizard(false)}
      />}
      {showConvert&&<ConvertLeadModal lead={lead} onConfirm={handleConvertInitiate} onCancel={()=>setShowConvert(false)}/>}
      {clientMatches&&clientMatches.length>0&&<ClientMatchModal matches={clientMatches} lead={lead} onLink={(cid)=>handleConvert(cid)} onCreateNew={()=>handleConvert(null)} onCancel={()=>setClientMatches(null)}/>}
      {viewQuotId&&<QuotationDetailModal quotationId={viewQuotId} onClose={()=>setViewQuotId(null)}/>}
      {showWelcome&&<WelcomeMessageModal
        lead={lead}
        quotRef={(leadQuotations.find(q=>q.quotation_id===lead.active_quotation_id)||{}).ref_number}
        clientOutcome={convertClientOutcome}
        onGoToEvent={()=>{ setShowWelcome(false); if(onNavigate&&convertedEventId){ onNavigate('events',{eventId:convertedEventId}); } else { onConverted&&onConverted(); } }}
        onClose={()=>{ setShowWelcome(false); onConverted&&onConverted(); }}
      />}

      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,fontSize:13,color:'var(--grey-400)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--pink)',fontSize:13,padding:0,fontFamily:'Inter,sans-serif'}}>← Leads</button>
        <span>/</span>
        <span style={{color:'var(--grey-800)',fontWeight:500}}>{lead.first_name} {lead.last_name}{lead.ref_number&&<span style={{color:'var(--grey-400)',fontWeight:400,fontSize:12,marginLeft:6}}>{lead.ref_number}</span>}</span>
      </div>

      {successMsg&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:12,border:'1px solid rgba(15,110,86,0.2)'}}>✅ {successMsg}</div>}

      {/* Header */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'18px 24px',border:'1px solid var(--grey-100)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)',marginBottom:4}}>{lead.first_name} {lead.last_name}{lead.ref_number&&<span style={{fontSize:13,fontWeight:400,color:'var(--grey-400)',marginLeft:8}}>{lead.ref_number}</span>}</div>
          <div style={{fontSize:12,color:'var(--grey-400)',marginBottom:6}}>{lead.phone}{lead.email?' · '+lead.email:''}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>
              {isLost?'LOST':LEAD_STAGE_LABELS[lead.stage]||lead.stage}
            </span>
            {lead.event_type&&<span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--blue-light)',color:'var(--blue)',textTransform:'capitalize'}}>{lead.event_type}</span>}
            {lead.source&&<span style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--grey-100)',color:'var(--grey-400)',textTransform:'capitalize'}}>{lead.source.replace('_',' ')}</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {/* Stage badge — always visible */}
          <span style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:500,background:sc.bg,color:sc.color}}>
            {isLost?'LOST':isConverted?'CONVERTED':LEAD_STAGE_LABELS[lead.stage]||lead.stage}
          </span>
          {!isLost&&!isConverted&&(
            <>
              {/* Next action buttons — context aware per stage */}
              {lead.stage==='new'&&(
                <button className="btn sm" style={{background:'var(--blue-light)',color:'var(--blue)',border:'1px solid #93C5FD'}}
                  onClick={()=>handleStageChange('contacted')}>✓ Mark as contacted</button>
              )}
              {lead.stage==='contacted'&&(
                <button className="btn sm" style={{background:'#F3E5F5',color:'#6A1B9A',border:'1px solid #CE93D8'}}
                  onClick={()=>setShowQuoteWizard(true)}>📋 Generate quote</button>
              )}
              {lead.stage==='quote_generation_in_progress'&&(
                <button className="btn sm" style={{background:'#F3E5F5',color:'#6A1B9A',border:'1px solid #CE93D8'}}
                  onClick={()=>setShowQuoteWizard(true)}>📋 Continue quote</button>
              )}
              {lead.stage==='quote_sent'&&(<>
                <button className="btn sm" style={{background:'#FCEBEB',color:'#A32D2D',border:'1px solid #FFCDD2'}}
                  onClick={()=>handleStageChange('quote_revision_pending')}>🔄 Revision requested</button>
                <button className="btn sm" style={{background:'var(--green-light)',color:'var(--green)',border:'1px solid #86EFAC'}}
                  onClick={()=>handleStageChange('quote_confirmed')}>✅ Quote confirmed</button>
              </>)}
              {lead.stage==='quote_revision_pending'&&(
                <button className="btn sm" style={{background:'#FFF8E1',color:'#F57F17',border:'1px solid #FFE082'}}
                  onClick={()=>setShowQuoteWizard(true)}>📋 Generate revised quote</button>
              )}
              {lead.stage==='revised_quote_sent'&&(
                <button className="btn sm" style={{background:'var(--green-light)',color:'var(--green)',border:'1px solid #86EFAC'}}
                  onClick={()=>handleStageChange('quote_confirmed')}>✅ Quote confirmed</button>
              )}
              {lead.stage==='quote_confirmed'&&(
                <button className="btn sm" style={{background:'var(--green)',color:'white',border:'none'}}
                  onClick={()=>setShowConvert(true)}>🎉 Convert to event</button>
              )}
              <button className="btn sm" style={{color:'#A32D2D',border:'1px solid #FCEBEB'}}
                onClick={()=>setShowLoss(true)}>✕ Lost</button>
              <button className="btn sm primary" onClick={()=>setMode('edit')}>✏️ Edit</button>
            </>
          )}
          {isConverted&&<button className="btn sm" onClick={()=>setMode('edit')}>✏️ Edit</button>}
          {isLost&&<button className="btn sm" onClick={()=>setShowLostConfirm(true)}>✏️ Edit</button>}
        </div>
      </div>

      {/* Info grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* Event details */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Event details</div>
          {[
            ['Event type',lead.event_type?lead.event_type.charAt(0).toUpperCase()+lead.event_type.slice(1):'—'],
            ['Tentative date',lead.tentative_date?new Date(lead.tentative_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}):'—'],
            ['Location',lead.location||'—'],
            ['Approx. budget',lead.budget?'₹'+parseFloat(lead.budget).toLocaleString('en-IN'):'—'],
            ['Guest count',lead.guest_count||'—'],
            ['Venue preference',lead.venue_preference||'—'],
          ].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
              <span style={{color:'var(--grey-400)'}}>{l}</span>
              <span style={{fontWeight:500,color:'var(--grey-800)'}}>{v}</span>
            </div>
          ))}
        </div>

        {/* Follow-up + pipeline */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:14}}>Pipeline & follow-up</div>

          {/* Follow-up date */}
          <div style={{background:uc.bg,borderRadius:'var(--radius-md)',padding:'12px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:uc.color,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2}}>Follow-up</div>
              <div style={{fontSize:14,fontWeight:500,color:uc.color}}>
                {lead.follow_up_date?new Date(lead.follow_up_date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'Not set'}
              </div>
              {urgency!=='none'&&<div style={{fontSize:11,color:uc.color,marginTop:2}}>{uc.label}</div>}
            </div>
            <div style={{width:10,height:10,borderRadius:'50%',background:uc.dot}}/>
          </div>

          {[
            ['Assigned staff',staffList.find(s=>s.user_id===lead.assigned_to)?staffList.find(s=>s.user_id===lead.assigned_to).first_name+' '+staffList.find(s=>s.user_id===lead.assigned_to).last_name:'—'],
            ['Source',lead.source?lead.source.replace('_',' '):'—'],
            ['Referred by',lead.referred_by||'—'],
            ['Created',lead.created_at?new Date(lead.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—'],
          ].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
              <span style={{color:'var(--grey-400)'}}>{l}</span>
              <span style={{fontWeight:500,color:'var(--grey-800)',textTransform:'capitalize'}}>{v}</span>
            </div>
          ))}

          {isLost&&(
            <div style={{marginTop:12,background:'#FCEBEB',borderRadius:'var(--radius-md)',padding:'10px 14px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'#A32D2D',marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Lost reason</div>
              <div style={{fontSize:13,color:'#A32D2D',fontWeight:500}}>{lossLabel||'—'}</div>
              {lead.lost_notes&&<div style={{fontSize:12,color:'#A32D2D',marginTop:4,opacity:.8}}>{lead.lost_notes}</div>}
            </div>
          )}

          {isConverted&&(
            <div style={{marginTop:12,background:'var(--green-light)',borderRadius:'var(--radius-md)',padding:'10px 14px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--green)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Converted</div>
              <div style={{fontSize:13,color:'var(--green)'}}>{lead.converted_at?new Date(lead.converted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):''}</div>
            </div>
          )}
        </div>
      </div>

      {/* Notes */}
      {lead.notes&&(
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:10}}>Notes</div>
          <div style={{fontSize:13,color:'var(--grey-600)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{lead.notes}</div>
        </div>
      )}

      {/* Quotations panel */}
      {leadQuotations.length>0&&(
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'16px 20px',border:'1px solid var(--grey-100)',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:12}}>Quotations</div>
          {leadQuotations.map((q,i)=>{
            const isActive=lead.active_quotation_id===q.quotation_id;
            const sc=QUOT_STATUS_COLORS?QUOT_STATUS_COLORS[q.status]||{bg:'var(--grey-100)',color:'var(--grey-400)'}:{bg:'var(--grey-100)',color:'var(--grey-400)'};
            const statusLabel=QUOT_STATUS_LABELS?QUOT_STATUS_LABELS[q.status]||q.status:q.status;
            return (
              <div key={q.quotation_id} onClick={()=>setViewQuotId(q.quotation_id)} title="View quotation details"
                style={{display:'flex',alignItems:'center',gap:12,padding:'10px 8px',margin:'0 -8px',borderRadius:'var(--radius-sm)',cursor:'pointer',borderBottom:i<leadQuotations.length-1?'1px solid var(--grey-100)':'none',opacity:q.status==='superseded'?0.5:1}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:isActive?'var(--green)':'var(--grey-300)'}}/>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{q.ref_number}</span>
                    {isActive&&<span style={{fontSize:10,fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:'.04em'}}>ACTIVE</span>}
                    {q.revision_number>0&&<span style={{fontSize:11,color:'var(--grey-400)'}}>Rev {q.revision_number}</span>}
                  </div>
                  <div style={{fontSize:12,color:'var(--grey-400)',marginTop:2}}>
                    {'Rs.'+parseFloat(q.grand_total||0).toLocaleString('en-IN')}
                    {q.valid_until&&(' · Valid until '+new Date(q.valid_until).toLocaleDateString('en-IN',{day:'numeric',month:'short'}))}
                  </div>
                </div>
                <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>{statusLabel}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Sub-events panel removed in v21 — sub-events are now managed in the quotation wizard */}
    </div>
  );
}

// ── Lead Reference Modal ──────────────────────────────────────────────────────
function LeadReferenceModal({onSelect, onCancel}) {
  const [search, setSearch] = React.useState('');
  const [leads, setLeads] = React.useState([]);
  const [filtered, setFiltered] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    supabase.from('leads').select('*').eq('is_deleted',false)
      .order('created_at',{ascending:false})
      .then(({data})=>{
        if(data){ setLeads(data); setFiltered(data); }
        setLoading(false);
      });
  },[]);

  React.useEffect(()=>{
    if(!search.trim()){ setFiltered(leads); return; }
    const q = search.toLowerCase();
    setFiltered(leads.filter(l=>
      (l.first_name+' '+l.last_name).toLowerCase().includes(q) ||
      (l.phone||'').includes(q) ||
      (l.email||'').toLowerCase().includes(q) ||
      (l.event_type||'').toLowerCase().includes(q) ||
      (l.location||'').toLowerCase().includes(q) ||
      (l.source||'').toLowerCase().includes(q) ||
      (l.venue_preference||'').toLowerCase().includes(q)
    ));
  },[search, leads]);

  const typeIcons = {wedding:'💍',corporate:'🏢',birthday:'🎂',anniversary:'💑',other:'🎪'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:560,maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'var(--shadow-lg)'}}>

        {/* Header */}
        <div style={{padding:'18px 24px',borderBottom:'1px solid var(--grey-100)',flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)',marginBottom:2}}>📋 Create from reference lead</div>
          <div style={{fontSize:12,color:'var(--grey-400)'}}>Search a past lead to use as a starting point. Contact details will be cleared.</div>
        </div>

        {/* Search */}
        <div style={{padding:'12px 24px',borderBottom:'1px solid var(--grey-100)',flexShrink:0}}>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
            <LeadRefSearchInput value={search} onChange={setSearch}/>
          </div>
        </div>

        {/* Results */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 12px'}}>
          {loading && <div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>}
          {!loading && filtered.length===0 && (
            <div style={{padding:40,textAlign:'center',color:'var(--grey-400)',fontSize:13}}>
              No leads found matching "{search}"
            </div>
          )}
          {!loading && filtered.map(lead=>{
            const sc = lead.stage==='lost'
              ? {bg:'#FCEBEB',color:'#A32D2D'}
              : LEAD_STAGE_COLORS[lead.stage]||LEAD_STAGE_COLORS.new;
            const isLost = lead.stage==='lost';
            const isConverted = lead.stage==='event_triggered';
            return (
              <div key={lead.lead_id}
                style={{padding:'12px 14px',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',marginBottom:6,cursor:'pointer',opacity:isLost?.65:1,transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--pink)';e.currentTarget.style.background='#FBEAF0';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--grey-100)';e.currentTarget.style.background='white';}}
                onClick={()=>onSelect(lead)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>
                    {typeIcons[lead.event_type]||'🎪'} {lead.first_name} {lead.last_name}
                  </div>
                  <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color,flexShrink:0,marginLeft:8}}>
                    {isLost?'Lost':isConverted?'Converted':LEAD_STAGE_LABELS[lead.stage]}
                  </span>
                </div>
                <div style={{display:'flex',gap:12,fontSize:12,color:'var(--grey-400)',flexWrap:'wrap'}}>
                  {lead.event_type&&<span style={{textTransform:'capitalize'}}>{lead.event_type}</span>}
                  {lead.location&&<span>📍 {lead.location}</span>}
                  {lead.budget&&<span>💰 ₹{parseFloat(lead.budget).toLocaleString('en-IN')}</span>}
                  {lead.guest_count&&<span>👥 {lead.guest_count}</span>}
                  {lead.source&&<span style={{textTransform:'capitalize'}}>{lead.source.replace('_',' ')}</span>}
                  {lead.tentative_date&&<span>📅 {new Date(lead.tentative_date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>}
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{padding:'12px 24px',borderTop:'1px solid var(--grey-100)',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:12,color:'var(--grey-400)'}}>{filtered.length} lead{filtered.length!==1?'s':''} shown</div>
          <button className="btn sm" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
function LeadRefSearchInput({value, onChange}) {
  return <input className="field-input" style={{paddingLeft:36}}
    value={value} onChange={e=>onChange(e.target.value)}
    placeholder="Search by name, phone, email, event type, location..."
    autoFocus/>;
}

// ── Leads Module ──────────────────────────────────────────────────────────────
function LeadsModule({onNavigate}) {
  const [view, setView] = React.useState('list'); // list | new | detail
  const [leads, setLeads] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [search, setSearch] = React.useState('');
  const [stageFilter, setStageFilter] = React.useState('');
  const [sourceFilter, setSourceFilter] = React.useState('');
  const [typeFilter, setTypeFilter] = React.useState('');
  const [followUpFilter, setFollowUpFilter] = React.useState('');
  const [selectedId, setSelectedId] = React.useState(null);
  const [saveSuccess, setSaveSuccess] = React.useState('');
  const [leadSources, setLeadSources] = React.useState(LEAD_SOURCES_DEFAULT);
  const [showRefModal, setShowRefModal] = React.useState(false);
  const [referenceData, setReferenceData] = React.useState(null);

  React.useEffect(()=>{ loadLeads(); fetchLeadSources().then(setLeadSources); },[]);

  const loadLeads = useCallback(async () => {
    setLoading(true);
    const {data} = await supabase.from('leads').select('*').eq('is_deleted',false).order('created_at',{ascending:false});
    if(data) setLeads(data);
    setLoading(false);
  },[]);

  const handleSelectReference = async (lead) => {
    const {data:ses} = await supabase.from('lead_sub_events')
      .select('*').eq('lead_id',lead.lead_id).eq('is_deleted',false).order('sort_order');
    // Copy ALL fields — user can update whatever they want
    setReferenceData({
      first_name: lead.first_name||'',
      last_name: lead.last_name||'',
      phone: lead.phone||'',
      phone_2: lead.phone_2||'',
      email: lead.email||'',
      source: lead.source||'',
      referred_by: lead.referred_by||'',
      event_type: lead.event_type||'',
      tentative_date: lead.tentative_date||'',
      location: lead.location||'',
      budget: lead.budget||'',
      guest_count: lead.guest_count||'',
      venue_preference: lead.venue_preference||'',
      stage: 'new',
      assigned_to: lead.assigned_to||'',
      follow_up_date: lead.follow_up_date||'',
      notes: lead.notes||'',
      subEvents: (ses||[]).map(se=>({name:se.name,date:se.date||'',location:se.location||''})),
    });
    setShowRefModal(false);
    setView('new');
  };

  const handleSaveNew = async (form, subEvents) => {
    const ref_number = await getNextLeadRef();
    const insertPayload = {
      ref_number,
      first_name: form.first_name,
      last_name: form.last_name,
      phone: form.phone,
      phone_2: form.phone_2||null,
      email: form.email||null,
      source: form.source||null,
      event_type: form.event_type||null,
      tentative_date: form.tentative_date||null,
      location: form.location||null,
      budget: form.budget?parseFloat(form.budget):null,
      guest_count: form.guest_count?parseInt(form.guest_count):null,
      venue_preference: form.venue_preference||null,
      referred_by: form.referred_by||null,
      stage: form.stage||'new',
      assigned_to: form.assigned_to||null,
      notes: form.notes||null,
      follow_up_date: form.follow_up_date||null,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
      is_deleted: false
    };
    const {data,error} = await supabase.from('leads').insert(insertPayload).select().single();
    if(error) throw error;
    setReferenceData(null);
    setView('list');
    setSaveSuccess('Lead '+form.first_name+' '+form.last_name+' added successfully!');
    setTimeout(()=>setSaveSuccess(''),4000);
    loadLeads();
  };

  // Filter leads
  const filtered = leads.filter(l=>{
    const q=search.toLowerCase();
    const matchSearch = !q || (l.first_name+' '+l.last_name+' '+(l.phone||'')+' '+(l.email||'')).toLowerCase().includes(q);
    const matchStage = !stageFilter || l.stage===stageFilter;
    const matchSource = !sourceFilter || l.source===sourceFilter;
    const matchType = !typeFilter || l.event_type===typeFilter;
    const matchFollowUp = !followUpFilter || getFollowUpUrgency(l.follow_up_date)===followUpFilter;
    return matchSearch && matchStage && matchSource && matchType && matchFollowUp;
  });

  // Sort: overdue first, then today, then week, then future, then none; lost at bottom
  const sorted = [...filtered].sort((a,b)=>{
    if(a.stage==='lost'&&b.stage!=='lost') return 1;
    if(b.stage==='lost'&&a.stage!=='lost') return -1;
    const order={overdue:0,today:1,week:2,future:3,none:4};
    const ao=order[getFollowUpUrgency(a.follow_up_date)]??4;
    const bo=order[getFollowUpUrgency(b.follow_up_date)]??4;
    return ao-bo;
  });

  // Metrics
  const active = leads.filter(l=>l.stage!=='lost'&&l.stage!=='event_triggered');
  const today = leads.filter(l=>getFollowUpUrgency(l.follow_up_date)==='today'||getFollowUpUrgency(l.follow_up_date)==='overdue');
  const converted = leads.filter(l=>l.stage==='event_triggered');
  const convRate = leads.length>0?Math.round((converted.length/leads.length)*100):0;

  if(view==='new') return <LeadForm
    referenceData={referenceData}
    onSave={handleSaveNew}
    onCancel={()=>{setView('list');setReferenceData(null);}}
  />;
  if(view==='detail') return (
    <LeadDetail
      leadId={selectedId}
      onBack={()=>{setView('list');setSelectedId(null);loadLeads();}}
      onConverted={()=>{setView('list');setSelectedId(null);loadLeads();}}
      onNavigate={onNavigate}
      onCreateFromReference={(refData)=>{
        setSelectedId(null);
        setReferenceData(refData);
        setView('new');
      }}
    />
  );

  return (
    <div>
      {saveSuccess&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(15,110,86,0.2)'}}>✅ {saveSuccess}</div>}
      {showRefModal&&<LeadReferenceModal onSelect={handleSelectReference} onCancel={()=>setShowRefModal(false)}/>}

      {/* Metrics */}
      <div className="metrics-grid" style={{marginBottom:20}}>
        <div className="metric-card pink"><div className="metric-icon">📋</div><div className="metric-value">{leads.length}</div><div className="metric-label">Total leads</div></div>
        <div className="metric-card orange"><div className="metric-icon">⚡</div><div className="metric-value">{active.length}</div><div className="metric-label">Active leads</div></div>
        <div className="metric-card blue"><div className="metric-icon">📅</div><div className="metric-value">{today.length}</div><div className="metric-label">Follow-up due</div></div>
        <div className="metric-card green"><div className="metric-icon">🎉</div><div className="metric-value">{convRate}%</div><div className="metric-label">Conversion rate</div></div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
          <input className="field-input" style={{paddingLeft:36}} placeholder="Search by name, phone, email..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="field-input" style={{width:150}} value={stageFilter} onChange={e=>setStageFilter(e.target.value)}>
          <option value="">All stages</option>
          {LEAD_STAGES.map(s=><option key={s} value={s}>{LEAD_STAGE_LABELS[s]}</option>)}
          <option value="lost">Lost</option>
        </select>
        <select className="field-input" style={{width:130}} value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
          <option value="">All types</option>
          {EVENT_TYPES.map(t=><option key={t} value={t.toLowerCase()}>{t}</option>)}
        </select>
        <select className="field-input" style={{width:130}} value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}>
          <option value="">All sources</option>
          {leadSources.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
        </select>
        <button className="btn primary" onClick={()=>setView('new')}>+ New lead</button>
        <button className="btn" onClick={()=>setShowRefModal(true)}>📋 From reference</button>
      </div>

      {/* Follow-up quick filters */}
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {[
          {value:'',label:'All'},
          {value:'overdue',label:'🔴 Overdue'},
          {value:'today',label:'🟡 Today'},
          {value:'week',label:'🟢 This week'},
        ].map(f=>(
          <button key={f.value} onClick={()=>setFollowUpFilter(f.value)}
            className="btn sm"
            style={{fontWeight:followUpFilter===f.value?600:400,background:followUpFilter===f.value?'var(--pink-light)':'white',color:followUpFilter===f.value?'var(--pink)':'var(--grey-600)',border:`1px solid ${followUpFilter===f.value?'var(--pink)':'var(--grey-200)'}`}}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Leads list */}
      {loading ? (
        <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>
      ) : sorted.length===0 ? (
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:60,textAlign:'center',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)',marginBottom:6}}>{search||stageFilter||typeFilter||followUpFilter?'No leads found':'No leads yet'}</div>
          <div style={{fontSize:13,color:'var(--grey-400)',marginBottom:16}}>{search||stageFilter?'Try adjusting your filters':'Add your first lead to get started'}</div>
          {!search&&!stageFilter&&<button className="btn primary" onClick={()=>setView('new')}>+ Add first lead</button>}
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {sorted.map(lead=>{
            const urgency = getFollowUpUrgency(lead.follow_up_date);
            const uc = URGENCY_COLORS[urgency];
            const sc = lead.stage==='lost'?{bg:'#FCEBEB',color:'#A32D2D'}:LEAD_STAGE_COLORS[lead.stage]||LEAD_STAGE_COLORS.new;
            const isLost = lead.stage==='lost';
            const isConverted = lead.stage==='event_triggered';
            return (
              <div key={lead.lead_id}
                style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden',cursor:'pointer',opacity:isLost?.6:1,transition:'border-color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--grey-200)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--grey-100)'}
                onClick={()=>{setSelectedId(lead.lead_id);setView('detail');}}>
                <div style={{display:'grid',gridTemplateColumns:'6px 1fr auto auto',alignItems:'stretch'}}>
                  <div style={{background:uc.dot,borderRadius:'var(--radius-lg) 0 0 var(--radius-lg)'}}/>
                  <div style={{padding:'14px 16px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      <span style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{lead.first_name} {lead.last_name}</span>
                      {lead.ref_number&&<span style={{fontSize:11,color:'var(--grey-400)',fontWeight:400}}>{lead.ref_number}</span>}
                      <span style={{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>
                        {isLost?'LOST':isConverted?'CONVERTED':LEAD_STAGE_LABELS[lead.stage]}

                      {lead.event_type&&<span style={{padding:'2px 8px',borderRadius:20,fontSize:11,background:'var(--blue-light)',color:'var(--blue)',textTransform:'capitalize'}}>{lead.event_type}</span>}
