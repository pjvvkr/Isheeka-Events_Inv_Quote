.login-logo .tagline{font-family:'EB Garamond',serif;font-style:italic;color:var(--pink);font-size:15px;font-weight:600;margin-top:8px}

.form-group label{display:block;font-size:12px;font-weight:500;color:var(--grey-600);margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase}

.field-label{font-size:12px;font-weight:500;color:var(--grey-600);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.02em}

// Stable inputs for template editor
function TplNameInput({value, onChange}) {
  const [suggestions, setSuggestions] = React.useState([]);
  const [filtered, setFiltered] = React.useState([]);
  const [open, setOpen] = React.useState(false);

  const handleFocus = async () => {
    const s1 = await fetchSuggestions('sub_events','name');
    const s2 = await fetchSuggestions('event_template_items','sub_event_name');
    const suggs = [...new Set([...s1,...s2])];
    setSuggestions(suggs);
    const q=(value||'').toLowerCase();
    const f=q?suggs.filter(s=>s.toLowerCase().includes(q)):suggs;
    setFiltered(f); if(f.length>0) setOpen(true);
  };
  const handleChange = (val) => {
    onChange(val);
    const q=val.toLowerCase();
    setFiltered(q?suggestions.filter(s=>s.toLowerCase().includes(q)&&s.toLowerCase()!==q):suggestions);
    setOpen(true);
  };
  const handleSelect = (val) => { onChange(val); setOpen(false); };

  return (
    <div style={{flex:1,position:'relative'}}>
      <input style={{width:'100%',border:'none',background:'transparent',fontSize:13,fontWeight:500,outline:'none',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-200)',padding:'2px 4px'}}
        value={value} onChange={e=>handleChange(e.target.value)}
        onFocus={handleFocus} onBlur={()=>setTimeout(()=>setOpen(false),150)}
        placeholder="Sub-event name"/>
      {open && filtered.length>0 && (
        <div style={{position:'absolute',top:'100%',left:0,zIndex:500,background:'white',border:'1.5px solid var(--pink)',borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-md)',minWidth:180,maxHeight:160,overflowY:'auto'}}>
          {filtered.map((s,i)=>(
            <div key={i} onMouseDown={()=>handleSelect(s)}
              style={{padding:'7px 12px',fontSize:13,cursor:'pointer',color:'var(--grey-800)',borderBottom:'1px solid var(--grey-100)'}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--pink-light)'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TemplateEditor({template, onSave, onCancel}) {
  const [name, setName] = React.useState(template?.name||'');
  const [eventType, setEventType] = React.useState(template?.event_type||'');
  const [subEvents, setSubEvents] = React.useState([]);
  const [loading, setLoading] = React.useState(!!template?.template_id);
  const [saving, setSaving] = React.useState(false);
  const [saveError, setSaveError] = React.useState('');

  React.useEffect(()=>{
    if(template?.template_id){
      supabase.from('event_template_items').select('*').eq('template_id',template.template_id).order('sub_event_name').order('sort_order').then(({data})=>{
        if(data){
          // Group by sub_event_name
          const groups = {};
          data.forEach(item=>{
            if(!groups[item.sub_event_name]) groups[item.sub_event_name]={id:'se-'+item.sub_event_name,name:item.sub_event_name,items:[]};
            groups[item.sub_event_name].items.push({id:item.item_id,description:item.description,default_quantity:item.default_quantity,sort_order:item.sort_order});
          });
          setSubEvents(Object.values(groups));
        }
        setLoading(false);
      });
    } else {
      setSubEvents([{id:'se-'+Date.now(),name:'Main Event',items:[{id:'i-'+Date.now(),description:'',default_quantity:1,sort_order:0}]}]);
      setLoading(false);
    }
  },[]);

  const addSubEvent = () => setSubEvents(s=>[...s,{id:'se-'+Date.now(),name:'',items:[{id:'i-'+Date.now(),description:'',default_quantity:1,sort_order:0}]}]);
  const removeSubEvent = (id) => setSubEvents(s=>s.filter(se=>se.id!==id));
  const updateSEName = (id,val) => setSubEvents(s=>s.map(se=>se.id===id?{...se,name:val}:se));
  const addItem = (seId) => setSubEvents(s=>s.map(se=>se.id===seId?{...se,items:[...se.items,{id:'i-'+Date.now(),description:'',default_quantity:1,sort_order:se.items.length}]}:se));
  const removeItem = (seId,iId) => setSubEvents(s=>s.map(se=>se.id===seId?{...se,items:se.items.filter(i=>i.id!==iId)}:se));
  const updateItem = (seId,iId,field,val) => setSubEvents(s=>s.map(se=>se.id===seId?{...se,items:se.items.map(i=>i.id===iId?{...i,[field]:val}:i)}:se));

  const moveSE = (idx, dir) => {
    const s=[...subEvents];
    const to=idx+dir;
    if(to<0||to>=s.length) return;
    [s[idx],s[to]]=[s[to],s[idx]];
    setSubEvents(s);
  };

  const handleSave = async () => {
    if(!name.trim()){setSaveError('Template name is required');return;}
    if(subEvents.length===0){setSaveError('Add at least one sub-event');return;}
    setSaving(true); setSaveError('');
    try {
      let tplId = template?.template_id;
      if(tplId){
        // Update template
        await supabase.from('event_templates').update({name,event_type:eventType||null,updated_at:new Date().toISOString()}).eq('template_id',tplId);
        // Delete existing items and re-insert
        await supabase.from('event_template_items').delete().eq('template_id',tplId);
      } else {
        // Insert new template
        const {data} = await supabase.from('event_templates').insert({name,event_type:eventType||null,is_active:true,sort_order:0,created_at:new Date().toISOString(),updated_at:new Date().toISOString(),is_deleted:false}).select().single();
        tplId = data.template_id;
      }
      // Insert all items
      const allItems = [];
      subEvents.forEach((se,si)=>{
        se.items.forEach((item,ii)=>{
          if(item.description.trim()){
            allItems.push({template_id:tplId,sub_event_name:se.name||'Main Event',description:item.description,default_quantity:parseFloat(item.default_quantity)||1,sort_order:ii,created_at:new Date().toISOString()});
          }
        });
      });
      if(allItems.length>0) await supabase.from('event_template_items').insert(allItems);
      onSave();
    } catch(err){ setSaveError('Could not save template. Please try again.'); }
    finally { setSaving(false); }
  };

  const typeOpts = [{value:'wedding',label:'Wedding'},{value:'corporate',label:'Corporate'},{value:'birthday',label:'Birthday'},{value:'anniversary',label:'Anniversary'},{value:'other',label:'Other'}];

  if(loading) return <div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div>;

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)'}}>{template?.template_id?'Edit template':'New template'}</div>
        <button className="btn sm" onClick={onCancel}>✕ Cancel</button>
      </div>
      {saveError&&<div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)'}}>⚠️ {saveError}</div>}
      <div className="form-grid" style={{marginBottom:20}}>
        <InputField label="Template name" required value={name} onChange={setName} placeholder="e.g. Wedding, Corporate - Large"/>
        <SelectField label="Event type" value={eventType} onChange={setEventType} options={typeOpts} placeholder="Select event type..."/>
      </div>
      <div style={{fontSize:12,color:'var(--grey-400)',marginBottom:4}}>💡 Note: No prices in templates — prices are entered per event</div>
      <div style={{height:1,background:'var(--grey-100)',marginBottom:16}}/>

      {subEvents.map((se,si)=>(
        <div key={se.id} style={{background:'var(--grey-50)',borderRadius:'var(--radius-lg)',padding:'14px 16px',marginBottom:12,border:'1px solid var(--grey-100)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--grey-200)'}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:'#e8185a',flexShrink:0}}></div>
            <TplNameInput value={se.name} onChange={v=>updateSEName(se.id,v)}/>
            <div style={{display:'flex',gap:4}}>
              <button className="btn sm" onClick={()=>moveSE(si,-1)} disabled={si===0} style={{padding:'2px 8px',opacity:si===0?.3:1}}>↑</button>
              <button className="btn sm" onClick={()=>moveSE(si,1)} disabled={si===subEvents.length-1} style={{padding:'2px 8px',opacity:si===subEvents.length-1?.3:1}}>↓</button>
              <button className="btn sm" style={{color:'var(--red)',padding:'2px 8px'}} onClick={()=>removeSubEvent(se.id)}>🗑</button>
            </div>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#FBEAF0'}}>
                <th style={{padding:'6px 8px',textAlign:'left',fontSize:10,fontWeight:700,color:'#993556',textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a'}}>Description</th>
                <th style={{padding:'6px 8px',textAlign:'right',fontSize:10,fontWeight:700,color:'#993556',textTransform:'uppercase',letterSpacing:'.03em',borderBottom:'1.5px solid #e8185a',width:'15%'}}>Default qty</th>
                <th style={{borderBottom:'1.5px solid #e8185a',width:'6%'}}></th>
              </tr>
            </thead>
            <tbody>
              {se.items.map((item,ii)=>(
                <tr key={item.id} style={{borderBottom:'1px solid var(--grey-100)'}}>
                  <td style={{padding:'6px 8px'}}><TplDescInput value={item.description} onChange={v=>updateItem(se.id,item.id,'description',v)}/></td>
                  <td style={{padding:'6px 8px'}}><TplQtyInput value={item.default_quantity} onChange={v=>updateItem(se.id,item.id,'default_quantity',v)}/></td>
                  <td style={{padding:'6px 8px',textAlign:'center'}}><button style={{background:'none',border:'none',cursor:'pointer',color:'var(--grey-400)',fontSize:13}} onClick={()=>removeItem(se.id,item.id)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          <button className="btn sm" style={{marginTop:8,border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={()=>addItem(se.id)}>+ Add item</button>
        </div>
      ))}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,marginBottom:20}}>
        <button className="btn" style={{border:'1px dashed var(--grey-200)',color:'var(--grey-400)'}} onClick={addSubEvent}>+ Add sub-event</button>
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',gap:8,paddingTop:16,borderTop:'1px solid var(--grey-100)'}}>
        <button className="btn" onClick={onCancel}>Cancel</button>
        <button className="btn primary" onClick={handleSave} disabled={saving}>{saving?'⏳ Saving...':'💾 Save template'}</button>
      </div>
    </div>
  );
}

function TemplatesTab() {
  const [templates, setTemplates] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [view, setView] = React.useState('list'); // list | new | edit
  const [editingTemplate, setEditingTemplate] = React.useState(null);

  React.useEffect(()=>{ loadTemplates(); },[]);

  const loadTemplates = async () => {
    setLoading(true);
    const {data} = await supabase.from('event_templates').select('*').eq('is_deleted',false).order('sort_order').order('name');
    if(data) setTemplates(data);
    setLoading(false);
  };

  const handleArchive = async (tpl) => {
    if(!window.confirm(`Archive "${tpl.name}"? It will no longer appear in the Events wizard but can be restored.`)) return;
    await supabase.from('event_templates').update({is_active:false,updated_at:new Date().toISOString()}).eq('template_id',tpl.template_id);
    loadTemplates();
  };

  const handleRestore = async (tpl) => {
    await supabase.from('event_templates').update({is_active:true,updated_at:new Date().toISOString()}).eq('template_id',tpl.template_id);
    loadTemplates();
  };

  const typeIcons = {wedding:'💍',corporate:'🏢',birthday:'🎂',anniversary:'💑',other:'🎪'};
  const active = templates.filter(t=>t.is_active);
  const archived = templates.filter(t=>!t.is_active);

  if(view==='new'||view==='edit') return (
    <TemplateEditor
      template={view==='edit'?editingTemplate:null}
      onSave={()=>{ loadTemplates(); setView('list'); setEditingTemplate(null); }}
      onCancel={()=>{ setView('list'); setEditingTemplate(null); }}
    />
  );

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div className="settings-section-title">Event templates</div>
          <div style={{fontSize:13,color:'var(--grey-400)',marginTop:2,marginBottom:16}}>Configure reusable templates for common event types. Templates are starting points only — changes don't affect existing events.</div>
        </div>
        <button className="btn primary" onClick={()=>setView('new')}>+ New template</button>
      </div>

      {loading ? <div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div> : (
        <>
          {/* Active templates */}
          <div style={{marginBottom:8,fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}>Active ({active.length})</div>
          {active.length===0&&<div style={{padding:'20px',textAlign:'center',color:'var(--grey-400)',fontSize:13,background:'var(--grey-50)',borderRadius:'var(--radius-md)',marginBottom:16}}>No active templates. Create one!</div>}
          {active.map(tpl=>(
            <div key={tpl.template_id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'white',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',marginBottom:8,transition:'border-color .15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--grey-200)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--grey-100)'}>
              <span style={{fontSize:24}}>{typeIcons[tpl.event_type]||'🎪'}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{tpl.name}</div>
                <div style={{fontSize:12,color:'var(--grey-400)',textTransform:'capitalize'}}>{tpl.event_type||'General'}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn sm" onClick={()=>{setEditingTemplate(tpl);setView('edit');}}>✏️ Edit</button>
                <button className="btn sm" style={{color:'var(--orange)'}} onClick={()=>handleArchive(tpl)}>📦 Archive</button>
              </div>
            </div>
          ))}

          {/* Archived templates */}
          {archived.length>0&&(
            <>
              <div style={{marginTop:20,marginBottom:8,fontSize:12,fontWeight:600,color:'var(--grey-400)',textTransform:'uppercase',letterSpacing:'.04em'}}>Archived ({archived.length})</div>
              {archived.map(tpl=>(
                <div key={tpl.template_id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'var(--grey-50)',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',marginBottom:6,opacity:.7}}>
                  <span style={{fontSize:20}}>{typeIcons[tpl.event_type]||'🎪'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:'var(--grey-400)',textDecoration:'line-through'}}>{tpl.name}</div>
                    <div style={{fontSize:12,color:'var(--grey-400)',textTransform:'capitalize'}}>{tpl.event_type||'General'}</div>
                  </div>
                  <button className="btn sm" onClick={()=>handleRestore(tpl)}>↩ Restore</button>
                </div>
              ))}
            </>
          )}
        </>
      )}
    </div>
  );
}


// ── Lead Sources Configuration Tab ───────────────────────────────────────────
function LeadSourcesTab() {
  const [sources, setSources] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [newLabel, setNewLabel] = React.useState('');
  const [newValue, setNewValue] = React.useState('');
  const [addError, setAddError] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [successMsg, setSuccessMsg] = React.useState('');

  React.useEffect(()=>{ loadSources(); },[]);

  const loadSources = async () => {
    setLoading(true);
    const {data} = await supabase.from('lead_sources').select('*').order('sort_order').order('label');
    if(data) setSources(data);
    _leadSourcesCache = null; // Clear cache so LeadForm reloads
    setLoading(false);
  };

  const handleAdd = async () => {
    if(!newLabel.trim()){setAddError('Label is required');return;}
    const val = newLabel.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
    setSaving(true);
    await supabase.from('lead_sources').insert({
      label:newLabel.trim(), value:val,
      sort_order:sources.length+1, is_active:true,
      created_at:new Date().toISOString()
    });
    setNewLabel(''); setNewValue(''); setAddError('');
    await loadSources();
    setSuccessMsg('Source added!');
    setTimeout(()=>setSuccessMsg(''),3000);
    setSaving(false);
  };

  const toggleActive = async (src) => {
    await supabase.from('lead_sources').update({is_active:!src.is_active}).eq('source_id',src.source_id);
    setSources(s=>s.map(x=>x.source_id===src.source_id?{...x,is_active:!x.is_active}:x));
    _leadSourcesCache = null;
  };

  const moveUp = async (idx) => {
    if(idx===0) return;
    const a=sources[idx], b=sources[idx-1];
    await supabase.from('lead_sources').update({sort_order:b.sort_order}).eq('source_id',a.source_id);
    await supabase.from('lead_sources').update({sort_order:a.sort_order}).eq('source_id',b.source_id);
    await loadSources(); _leadSourcesCache=null;
  };

  return (
    <div>
      <div className="settings-section-title">Lead sources</div>
      <div style={{fontSize:13,color:'var(--grey-400)',marginBottom:16}}>
        Configure the sources that appear when creating a new lead. These values are shared across the app.
      </div>

      {successMsg&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'8px 14px',fontSize:13,marginBottom:12}}>✅ {successMsg}</div>}

      {loading ? <div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div> : (
        <>
          <div style={{background:'white',borderRadius:'var(--radius-md)',border:'1px solid var(--grey-100)',overflow:'hidden',marginBottom:16}}>
            <div style={{padding:'8px 16px',background:'var(--pink-light)',display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:8,fontSize:11,fontWeight:700,color:'var(--pink)',textTransform:'uppercase',letterSpacing:'.04em'}}>
              <div>Label</div><div>Order</div><div>Status</div><div></div>
            </div>
            {sources.map((src,i)=>(
              <div key={src.source_id} style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:8,alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--grey-100)',opacity:src.is_active?1:.5}}>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)'}}>{src.label}</div>
                  <div style={{fontSize:11,color:'var(--grey-400)',fontFamily:'monospace'}}>{src.value}</div>
                </div>
                <button className="btn sm" onClick={()=>moveUp(i)} disabled={i===0} style={{opacity:i===0?.3:1,padding:'2px 8px'}}>↑</button>
                <button className="btn sm" style={{fontSize:11,color:src.is_active?'var(--green)':'var(--grey-400)',borderColor:src.is_active?'var(--green)':'var(--grey-200)'}}
                  onClick={()=>toggleActive(src)}>
                  {src.is_active?'Active':'Inactive'}
                </button>
                <div style={{width:20}}/>
              </div>
            ))}
            {sources.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--grey-400)',fontSize:13}}>No sources yet</div>}
          </div>

          {/* Add new source */}
          <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:16,border:'1px solid var(--grey-100)'}}>
            <div style={{fontSize:13,fontWeight:500,color:'var(--grey-800)',marginBottom:10}}>Add new source</div>
            {addError&&<div style={{fontSize:12,color:'var(--red)',marginBottom:8}}>⚠ {addError}</div>}
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
              <div style={{flex:1}}>
                <label className="field-label">Source label</label>
                <LeadSourceInput value={newLabel} onChange={v=>{setNewLabel(v);setAddError('');}}/>
              </div>
              <button className="btn primary" onClick={handleAdd} disabled={saving} style={{flexShrink:0}}>
                {saving?'Adding...':'+ Add source'}
              </button>
            </div>
            <div style={{fontSize:11,color:'var(--grey-400)',marginTop:6}}>
              The value will be auto-generated from the label (e.g. "Trade Show" → trade_show)
            </div>
          </div>
        </>
      )}
    </div>
  );
}
function LeadSourceInput({value,onChange}) {
  return <input className="field-input" value={value} onChange={e=>onChange(e.target.value)} placeholder="e.g. Trade Show, Instagram..."/>;
}

// ── Settings Field Component (outside to prevent re-render focus loss) ────────
function SettingsField({field, label, required, type='text', placeholder='', readOnly=false, hint='', rows=3, form, errors, handleChange}) {
  return (
    <div>
      <label className="field-label">
        {label} {required && <span style={{color:'var(--pink)'}}>*</span>}
      </label>
      {type === 'textarea' ? (
        <textarea
          className="field-textarea"
          rows={rows}
          value={form[field]||''}
          onChange={e=>handleChange(field, e.target.value)}
          placeholder={placeholder}
          style={errors[field]?{borderColor:'var(--red)'}:{}}
        />
      ) : (
        <input
          className="field-input"
          type={type}
          value={form[field]||''}
          onChange={e=>handleChange(field, type==='number'?parseInt(e.target.value)||0:e.target.value)}
          placeholder={placeholder}
          readOnly={readOnly}
          style={errors[field]?{borderColor:'var(--red)'}:{}}
        />
      )}
      {errors[field] && <div style={{fontSize:11,color:'var(--red)',marginTop:4}}>⚠ {errors[field]}</div>}
      {hint && !errors[field] && <div style={{fontSize:11,color:'var(--grey-400)',marginTop:4}}>{hint}</div>}
    </div>
  );
}

// ── Settings Module ──────────────────────────────────────────────────────────
function SettingsModule() {
  const [activeTab, setActiveTab] = useState('company');
  const [settings, setSettings] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [saveError, setSaveError] = useState('');
  const [form, setForm] = useState({});
  const [errors, setErrors] = useState({});

  useEffect(() => { loadSettings(); }, []);

  const loadSettings = async () => {
    setLoading(true);
    const { data } = await supabase.from('settings').select('*').single();
    if (data) { setSettings(data); setForm(data); }
    setLoading(false);
  };

  const handleChange = (field, value) => {
    setForm(f => ({...f, [field]: value}));
    setSaved(false); setSaveError('');
    if (errors[field]) setErrors(e => ({...e, [field]: ''}));
  };

  // Validation rules per tab
  const validateTab = (tab) => {
    const newErrors = {};
    if (tab === 'company') {
      if (!form.company_name?.trim()) newErrors.company_name = 'Company name is required';
      if (!form.email?.trim()) newErrors.email = 'Email is required';
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) newErrors.email = 'Enter a valid email address';
      if (!form.phone_1?.trim()) newErrors.phone_1 = 'Primary phone is required';
      if (!form.street_address?.trim()) newErrors.street_address = 'Street address is required';
      if (!form.city?.trim()) newErrors.city = 'City is required';
      if (!form.state?.trim()) newErrors.state = 'State is required';
    }
    if (tab === 'bank') {
      if (!form.bank_name?.trim()) newErrors.bank_name = 'Bank name is required';
      if (!form.account_number?.trim()) newErrors.account_number = 'Account number is required';
      if (!form.ifsc_code?.trim()) newErrors.ifsc_code = 'IFSC code is required';
    }
    if (tab === 'documents') {
      if (!form.default_validity_days || form.default_validity_days < 1) newErrors.default_validity_days = 'Must be at least 1 day';
      if (!form.default_invoice_due_days || form.default_invoice_due_days < 1) newErrors.default_invoice_due_days = 'Must be at least 1 day';
    }
    if (tab === 'terms') {
      if (!form.default_terms?.trim()) newErrors.default_terms = 'Terms & conditions are required';
    }
    return newErrors;
  };

  const handleSave = async () => {
    const newErrors = validateTab(activeTab);
    if (Object.keys(newErrors).length > 0) {
      setErrors(newErrors);
      setSaveError('Please fill in all required fields before saving.');
      return;
    }
    setSaving(true); setSaveError(''); setErrors({});
    try {
      const { error } = await supabase.from('settings')
        .update({...form, updated_at: new Date().toISOString()})
        .eq('setting_id', settings.setting_id);
      if (error) throw error;
      setSaved(true); setSettings(form);
      setTimeout(() => setSaved(false), 3000);
    } catch (err) {
      setSaveError('Could not save settings. Please try again.');
    } finally { setSaving(false); }
  };

  // Field component defined outside - see SettingsField below

  const tabs = [
    {id:'company',label:'Company',icon:'🏢'},
    {id:'bank',label:'Bank details',icon:'🏦'},
    {id:'documents',label:'Documents',icon:'📄'},
    {id:'terms',label:'Terms & conditions',icon:'📜'},
    {id:'templates',label:'Templates',icon:'📋'},
    {id:'lead_sources',label:'Lead sources',icon:'🏷️'},
  ];

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:60}}><div className="spinner"></div></div>;

  return (
    <div className="settings-layout">
      <div className="settings-sidebar">
        {tabs.map(tab => (
          <button key={tab.id}
            className={`settings-nav-item ${activeTab===tab.id?'active':''}`}
            onClick={() => { setActiveTab(tab.id); setErrors({}); setSaveError(''); setSaved(false); }}>
            <span style={{fontSize:16}}>{tab.icon}</span>{tab.label}
          </button>
        ))}
      </div>

      <div className="settings-panel">
        {saveError && (
          <div style={{background:'var(--red-light)',color:'var(--red)',borderRadius:'var(--radius-sm)',
            padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)',
            display:'flex',alignItems:'center',gap:8}}>
            ⚠️ {saveError}
          </div>
        )}

        {activeTab === 'company' && (
          <>
            <div className="settings-section-title">Company profile</div>
            <div className="settings-section-sub">
              Your business details that appear on all quotations and invoices.

function InputField({label, required, type='text', value, onChange, placeholder='', hint='', error='', readOnly=false, disabled=false}) {

// ── AutocompleteInput ─────────────────────────────────────────────────────────
// Cache: shared across all instances, keyed by "table:column"
const _acCache = {};
const _acCacheTime = {};
const AC_CACHE_TTL = 5 * 60 * 1000; // 5 minutes

async function fetchSuggestions(table, column) {
  const key = table + ':' + column;
  const now = Date.now();
  if (_acCache[key] && (now - _acCacheTime[key]) < AC_CACHE_TTL) {
    return _acCache[key];
  }
  try {
    const { data } = await supabase
      .rpc('get_distinct_values', { p_table: table, p_column: column })
      .limit(20);
    // Fallback if RPC not available - use direct query
    if (!data) {
      const res = await supabase.from(table).select(column).not(column, 'is', null).limit(200);
      if (res.data) {
        const unique = [...new Set(res.data.map(r => r[column]).filter(v => v && String(v).trim()))].slice(0,20);
        _acCache[key] = unique;
        _acCacheTime[key] = now;
        return unique;
      }
    }
    const vals = (data || []).map(r => r.value).filter(Boolean);
    _acCache[key] = vals;
    _acCacheTime[key] = now;
    return vals;
  } catch(e) {
    return [];
  }
}

function AutocompleteInput({
  label, required, value, onChange, placeholder='', hint='', error='',
  table, column, // Supabase table + column to fetch suggestions from
  staticSuggestions=[], // optional hardcoded suggestions (used when table/column not provided)
  type='text', readOnly=false, disabled=false
}) {
  const [suggestions, setSuggestions] = React.useState([]);
  const [filtered, setFiltered] = React.useState([]);
  const [open, setOpen] = React.useState(false);
  const [focused, setFocused] = React.useState(false);
  const wrapRef = React.useRef();

  // Fetch suggestions on first focus
  const handleFocus = async () => {
    if(disabled) return;
    setFocused(true);
    let suggs = [];
    if (table && column) {
      suggs = await fetchSuggestions(table, column);
    } else if (staticSuggestions.length > 0) {
      suggs = staticSuggestions;
    }
    setSuggestions(suggs);
    // Filter based on current value
    const q = (value||'').toLowerCase();
    const f = q ? suggs.filter(s => s.toLowerCase().includes(q)) : suggs;
    setFiltered(f);
    if (f.length > 0) setOpen(true);
  };

  const handleChange = (val) => {
    onChange(val);
    const q = val.toLowerCase();
    const f = q
      ? suggestions.filter(s => s.toLowerCase().includes(q) && s.toLowerCase() !== q)
      : suggestions;
    setFiltered(f);
    setOpen(f.length > 0);
  };

  const handleSelect = (val) => {
    onChange(val);
    setOpen(false);
  };

  const handleBlur = () => {
    // Delay to allow mousedown on suggestion to fire first
    setTimeout(() => { setOpen(false); setFocused(false); }, 150);
  };

  return (
    <div ref={wrapRef} style={{position:'relative'}}>
      <label className="field-label">
        {label}{required && <span style={{color:'var(--pink)'}}> *</span>}
      </label>
      <input
        className="field-input"
        type={type}
        value={value||''}
        onChange={e => handleChange(e.target.value)}
        onFocus={handleFocus}
        onBlur={handleBlur}
        placeholder={placeholder}
        readOnly={readOnly}
        disabled={disabled}
        style={disabled ? {background:'var(--grey-50)',color:'var(--grey-400)',cursor:'not-allowed'} : error ? {borderColor:'var(--red)'} : focused && open ? {borderColor:'var(--pink)',borderBottomLeftRadius:0,borderBottomRightRadius:0} : {}}
      />
      {open && filtered.length > 0 && (
        <div style={{
          position:'absolute', top:'100%', left:0, right:0, zIndex:500,
          background:'white', border:'1.5px solid var(--pink)',
          borderTop:'none', borderRadius:'0 0 var(--radius-md) var(--radius-md)',
          boxShadow:'var(--shadow-md)', maxHeight:200, overflowY:'auto'
        }}>
          {filtered.map((s,i) => (
            <div key={i}
              onMouseDown={() => handleSelect(s)}
              style={{
                padding:'8px 14px', fontSize:13, cursor:'pointer',
                color:'var(--grey-800)', borderBottom:'1px solid var(--grey-100)',
                display:'flex', alignItems:'center', gap:8,
                transition:'background .1s'
              }}
              onMouseEnter={e => e.currentTarget.style.background='var(--pink-light)'}
              onMouseLeave={e => e.currentTarget.style.background='white'}>
              <span style={{color:'var(--grey-400)', fontSize:11}}>↩</span>
              {s}
            </div>
          ))}
        </div>
      )}
      {error && <div style={{fontSize:11,color:'var(--red)',marginTop:4}}>⚠ {error}</div>}
      {hint && !error && <div style={{fontSize:11,color:'var(--grey-400)',marginTop:4}}>{hint}</div>}
    </div>
  );
}

      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn sm" onClick={onCancel}>Cancel</button>
        <button className="btn sm primary" onClick={handleSave} disabled={saving}>{saving?'Saving...':'Save contact'}</button>
      </div>
    </div>
  );
}

// ── Client Detail ─────────────────────────────────────────────────────────────
function ClientDetail({clientId, onBack}) {
  const [client, setClient] = useState(null);
  const [altContacts, setAltContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(false);
  const [showAltForm, setShowAltForm] = useState(false);
  const [editingAlt, setEditingAlt] = useState(null);

  useEffect(()=>{ loadClient(); }, [clientId]);

  const loadClient = async () => {
    setLoading(true);
    const [{data:c},{data:ac}] = await Promise.all([
      supabase.from('clients').select('*').eq('client_id',clientId).single(),
      supabase.from('alternative_contacts').select('*').eq('client_id',clientId).eq('is_deleted',false).order('created_at')
    ]);
    if(c) setClient(c);
    if(ac) setAltContacts(ac);
    setLoading(false);
  };

  const handleSaveClient = async (form) => {
    const {error} = await supabase.from('clients').update({...form,updated_at:new Date().toISOString()}).eq('client_id',clientId);
    if(error) throw error;
    setClient({...client,...form});
    setEditing(false);
  };

  const handleSaveAlt = async (form) => {
    if(editingAlt) {
      await supabase.from('alternative_contacts').update({...form,updated_at:new Date().toISOString()}).eq('contact_id',editingAlt.contact_id);
      setAltContacts(ac=>ac.map(a=>a.contact_id===editingAlt.contact_id?{...a,...form}:a));
    } else {
      const {data} = await supabase.from('alternative_contacts').insert({...form,client_id:clientId,created_at:new Date().toISOString()}).select().single();
      if(data) setAltContacts(ac=>[...ac,data]);
    }
    setShowAltForm(false); setEditingAlt(null);
  };

  const handleDeleteAlt = async (contactId) => {
    if(!window.confirm('Remove this alternative contact?')) return;
    await supabase.from('alternative_contacts').update({is_deleted:true}).eq('contact_id',contactId);
    setAltContacts(ac=>ac.filter(a=>a.contact_id!==contactId));
  };

  if(loading) return <div style={{padding:40,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div>;
  if(!client) return <div style={{padding:40,textAlign:'center',color:'var(--grey-400)'}}>Client not found.</div>;

  if(editing) return <ClientForm initial={client} title="Edit client" onSave={handleSaveClient} onCancel={()=>setEditing(false)}/>;

  const statusColors = {active:{bg:'var(--green-light)',color:'var(--green)'},inactive:{bg:'var(--grey-100)',color:'var(--grey-400)'},vip:{bg:'var(--pink-light)',color:'var(--pink)'}};
  const sc = statusColors[client.status?.toLowerCase()]||statusColors.active;
  const relLabels = {spouse:'Spouse',parent:'Parent',sibling:'Sibling',friend:'Friend',other:'Other'};

  return (
    <div>
      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,fontSize:13,color:'var(--grey-400)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--pink)',fontSize:13,padding:0,fontFamily:'Inter,sans-serif'}}>← Clients</button>
        <span>/</span>
        <span style={{color:'var(--grey-800)',fontWeight:500}}>{client.first_name} {client.last_name}{client.ref_number&&<span style={{color:'var(--grey-400)',fontWeight:400,fontSize:12,marginLeft:6}}>{client.ref_number}</span>}</span>
      </div>

      {/* Header */}
      <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'20px 24px',border:'1px solid var(--grey-100)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div style={{width:52,height:52,borderRadius:'50%',background:'var(--pink-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:'var(--pink)',flexShrink:0}}>
            {client.first_name?.charAt(0)}{client.last_name?.charAt(0)}
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:600,color:'var(--grey-800)'}}>{client.first_name} {client.last_name}{client.ref_number&&<span style={{fontSize:13,fontWeight:400,color:'var(--grey-400)',marginLeft:8}}>{client.ref_number}</span>}</div>
            <div style={{fontSize:13,color:'var(--grey-400)',marginTop:2}}>{client.email_1} · {client.phone_1}</div>
            <div style={{marginTop:6,display:'flex',gap:6}}>
              <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>
                {client.status?.toUpperCase()}
              </span>
              <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--blue-light)',color:'var(--blue)'}}>
                {client.source}
              </span>
            </div>
          </div>
        </div>
        <button className="btn sm primary" onClick={()=>setEditing(true)}>✏️ Edit client</button>
      </div>

      <div className="form-grid">
        {/* Contact details */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'20px 24px',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--grey-800)',marginBottom:16}}>Contact details</div>
          {[['Phone 1',client.phone_1],['Phone 2',client.phone_2],['Phone 3',client.phone_3],['Email 1',client.email_1],['Email 2',client.email_2],['Email 3',client.email_3]].filter(([,v])=>v).map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--grey-100)',fontSize:13}}>
              <span style={{color:'var(--grey-400)'}}>{l}</span>
              <span style={{color:'var(--grey-800)',fontWeight:500}}>{v}</span>

          ))}
          {client.street_address&&<>

            <div style={{fontSize:13,color:'var(--grey-800)',lineHeight:1.6}}>{client.street_address}<br/>{client.city}{client.state?`, ${client.state}`:''}{client.pincode?` — ${client.pincode}`:''}</div>

          {client.gst_number&&<div style={{marginTop:12,fontSize:13}}><span style={{color:'var(--grey-400)'}}>GST: </span><span style={{color:'var(--grey-800)'}}>{client.gst_number}</span></div>}
          {client.preferred_contact&&<div style={{marginTop:8,fontSize:13}}><span style={{color:'var(--grey-400)'}}>Preferred: </span><span style={{color:'var(--grey-800)',fontWeight:500,textTransform:'capitalize'}}>{client.preferred_contact}</span></div>}
          {client.notes&&<><div style={{height:1,background:'var(--grey-100)',margin:'12px 0'}}/><div style={{fontSize:12,fontWeight:500,color:'var(--grey-400)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>Notes</div><div style={{fontSize:13,color:'var(--grey-600)',lineHeight:1.6}}>{client.notes}</div></>}
        </div>

        {/* Alternative contacts */}
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:'20px 24px',border:'1px solid var(--grey-100)'}}>

          {altContacts.map(ac=>(
            <div key={ac.contact_id} style={{padding:'10px 0',borderBottom:'1px solid var(--grey-100)'}}>

// ── Mass Client Upload ────────────────────────────────────────────────────────
function MassClientUpload({ onClose, onSuccess }) {
  const [step, setStep] = useState('intro'); // intro | preview | uploading | done
  const [rows, setRows] = useState([]);
  const [errors, setErrors] = useState([]);
  const [progress, setProgress] = useState(0);
  const [imported, setImported] = useState(0);
  const [failed, setFailed] = useState(0);
  const fileRef = React.useRef();

  const COLUMNS = [
    'first_name','last_name','phone_1','phone_2','phone_3',
    'email_1','email_2','email_3','source','status',
    'preferred_contact','street_address','city','state','pincode',
    'gst_number','notes'
  ];

  const REQUIRED = ['first_name','last_name','phone_1','source'];

  const VALID_SOURCE = ['referral','website','manual'];
  const VALID_STATUS = ['active','inactive','vip'];
  const VALID_CONTACT = ['whatsapp','phone','email',''];

  // Download template
  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([
      COLUMNS,
      ['Priya','Sharma','+91 98765 43210','','',
       'priya@email.com','','','referral','active',
       'whatsapp','Banjara Hills','Hyderabad','Telangana','500034','','VIP client'],
      ['Ravi','Menon','+91 87654 32109','','',
       'ravi@email.com','','','website','active',
       'email','Jubilee Hills','Hyderabad','Telangana','500033','',''],
    ]);
    // Style header row
    ws['!cols'] = COLUMNS.map(()=>({wch:18}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Clients');
    XLSX.writeFile(wb, 'Isheeka_Clients_Upload_Template.xlsx');
  };

  // Parse uploaded file
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { alert('File appears empty. Please add at least one client row.'); return; }

        const header = data[0].map(h => String(h).trim().toLowerCase().replace(/ /g,'_'));
        const dataRows = data.slice(1).filter(r => r.some(c => String(c).trim() !== ''));

        const parsed = []; const rowErrors = [];
        dataRows.forEach((row, ri) => {
          const obj = {};
          header.forEach((h, ci) => { obj[h] = String(row[ci]||'').trim(); });

          const rowErrs = [];
          // Required fields
          REQUIRED.forEach(f => { if (!obj[f]) rowErrs.push(`${f} is required`); });
          // Valid values
          if (obj.source && !VALID_SOURCE.includes(obj.source.toLowerCase())) rowErrs.push(`source must be: referral, website, or manual`);
          if (obj.status && !VALID_STATUS.includes(obj.status.toLowerCase())) rowErrs.push(`status must be: active, inactive, or vip`);
          if (obj.preferred_contact && !VALID_CONTACT.includes(obj.preferred_contact.toLowerCase())) rowErrs.push(`preferred_contact must be: whatsapp, phone, or email`);
          // Email format
          if (obj.email_1 && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(obj.email_1)) rowErrs.push(`email_1 format is invalid`);

          if (rowErrs.length > 0) rowErrors.push({row: ri+2, errors: rowErrs, data: obj});
          else parsed.push({
            ...obj,
            source: (obj.source||'manual').toLowerCase(),
            status: (obj.status||'active').toLowerCase(),
            preferred_contact: (obj.preferred_contact||'').toLowerCase(),
          });
        });

        setRows(parsed);
        setErrors(rowErrors);
        setStep('preview');
      } catch(err) {
        alert('Could not read file. Please use the provided template.');
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  };

  // Import to Supabase
  const handleImport = async () => {
    setStep('uploading');
    let ok = 0, fail = 0;
    for (let i = 0; i < rows.length; i++) {
      try {
        const ref_number = await getNextClientRef();
        const {error} = await supabase.from('clients').insert({
          ...rows[i],
          ref_number,
          client_since: new Date().toISOString().split('T')[0],
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
          is_deleted: false,
          total_business_value: 0,
        });
        if (error) throw error;
        ok++;
      } catch { fail++; }
      setProgress(Math.round(((i+1)/rows.length)*100));
    }
    setImported(ok); setFailed(fail);
    setStep('done');
    if (ok > 0) setTimeout(() => onSuccess(ok), 1500);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:'var(--radius-xl)',width:'100%',maxWidth:680,maxHeight:'85vh',overflow:'auto',boxShadow:'var(--shadow-lg)'}}>

        {/* Header */}
        <div style={{padding:'20px 24px',borderBottom:'1px solid var(--grey-100)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white',zIndex:1}}>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:'var(--grey-800)'}}>Mass client upload</div>
            <div style={{fontSize:12,color:'var(--grey-400)',marginTop:2}}>Upload multiple clients at once via Excel</div>
          </div>
          <button className="btn sm" onClick={onClose}>✕ Close</button>
        </div>

        <div style={{padding:24}}>
          {step === 'intro' && (
            <>
              {/* Step 1: Download template */}
              <div style={{background:'var(--blue-light)',borderRadius:'var(--radius-md)',padding:16,marginBottom:16,display:'flex',gap:12,alignItems:'flex-start'}}>
                <span style={{fontSize:24}}>📋</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--blue)',marginBottom:4}}>Step 1 — Download the template</div>
                  <div style={{fontSize:13,color:'var(--blue)',opacity:.8,marginBottom:10}}>Use our Excel template to ensure your data is in the correct format. Fill in client details row by row.</div>
                  <button className="btn sm primary" onClick={downloadTemplate}>⬇️ Download Excel template</button>
                </div>
              </div>

              {/* Column guide */}
              <div style={{background:'var(--grey-50)',borderRadius:'var(--radius-md)',padding:14,marginBottom:16,border:'1px solid var(--grey-100)'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--grey-600)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>Template columns</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                  {COLUMNS.map(c=>(
                    <div key={c} style={{fontSize:12,display:'flex',gap:6,alignItems:'center'}}>
                      <span style={{color:REQUIRED.includes(c)?'var(--pink)':'var(--green)',fontSize:10,fontWeight:700}}>{REQUIRED.includes(c)?'REQ':'OPT'}</span>
                      <span style={{color:'var(--grey-600)',fontFamily:'monospace'}}>{c}</span>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:8,fontSize:11,color:'var(--grey-400)'}}>
                  <span style={{color:'var(--pink)',fontWeight:700}}>REQ</span> = Required &nbsp;·&nbsp; 
                  <span style={{color:'var(--green)',fontWeight:700}}>OPT</span> = Optional &nbsp;·&nbsp;
                  source: referral/website/manual &nbsp;·&nbsp; status: active/inactive/vip
                </div>
              </div>

              {/* Step 2: Upload */}
              <div style={{border:'2px dashed var(--grey-200)',borderRadius:'var(--radius-md)',padding:24,textAlign:'center',cursor:'pointer',transition:'border-color .2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--pink)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--grey-200)'}
                onClick={()=>fileRef.current?.click()}>
                <div style={{fontSize:36,marginBottom:8}}>📂</div>
                <div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)',marginBottom:4}}>Step 2 — Upload your filled template</div>
                <div style={{fontSize:13,color:'var(--grey-400)',marginBottom:12}}>Click here or drag and drop your Excel file (.xlsx or .xls)</div>
                <button className="btn sm primary">Choose file</button>
                <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFile}/>
              </div>
            </>
          )}

          {step === 'preview' && (
            <>
              {/* Error rows */}
              {errors.length > 0 && (
                <div style={{background:'var(--red-light)',borderRadius:'var(--radius-md)',padding:14,marginBottom:16,border:'1px solid rgba(163,45,45,0.2)'}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:8}}>⚠️ {errors.length} row{errors.length>1?'s':''} with errors (will be skipped)</div>
                  {errors.map((e,i)=>(
                    <div key={i} style={{fontSize:12,color:'var(--red)',marginBottom:4}}>

              {/* Valid rows */}
              <div style={{background:'var(--green-light)',borderRadius:'var(--radius-md)',padding:12,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--green)'}}>✅ {rows.length} client{rows.length!==1?'s':''} ready to import</div>
                <button className="btn sm" onClick={()=>{setStep('intro');setRows([]);setErrors([]);}}>← Change file</button>
              </div>

              {rows.length > 0 && (
                <div style={{border:'1px solid var(--grey-100)',borderRadius:'var(--radius-md)',overflow:'hidden',marginBottom:16}}>
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                      <thead>
                        <tr style={{background:'var(--pink-light)'}}>

// ── Clients Module ────────────────────────────────────────────────────────────
function ClientsModule() {
  const [view, setView] = useState('list'); // list | new | detail
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [sourceFilter, setSourceFilter] = useState('');
  const [selectedId, setSelectedId] = useState(null);
  const [saveSuccess, setSaveSuccess] = useState('');
  const [showUpload, setShowUpload] = useState(false);

  useEffect(()=>{ loadClients(); },[]);

  const loadClients = async () => {
    setLoading(true);
    const {data} = await supabase.from('clients').select('*').eq('is_deleted',false).order('created_at',{ascending:false});
    if(data) setClients(data);
    setLoading(false);
  };

  const handleSaveNew = async (form) => {
    const ref_number = await getNextClientRef();
    const payload = {
      ...form,
      ref_number,
      // Strip empty strings on constrained optional fields so they go in as null
      preferred_contact: form.preferred_contact||null,
      source: form.source||null,
      phone_2: form.phone_2||null,
      phone_3: form.phone_3||null,
      email_2: form.email_2||null,
      email_3: form.email_3||null,
      gst_number: form.gst_number||null,
      notes: form.notes||null,
      // FK fields — must be null if not set (empty string fails FK constraint)
      created_by: form.created_by||null,
      updated_by: form.updated_by||null,
      lead_id: form.lead_id||null,
      client_since: new Date().toISOString().split('T')[0],
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    const {data,error} = await supabase.from('clients').insert(payload).select().single();
    if(error) throw error;
    setView('list');
    setSaveSuccess(`Client ${form.first_name} ${form.last_name} added successfully!`);
    setTimeout(()=>setSaveSuccess(''),4000);
    loadClients();
  };

  const filtered = clients.filter(c=>{
    const q=search.toLowerCase();
    const matchSearch = !q || `${c.first_name} ${c.last_name} ${c.phone_1} ${c.email_1} ${c.city}`.toLowerCase().includes(q);
    const matchStatus = !statusFilter || c.status?.toLowerCase()===statusFilter.toLowerCase();
    const matchSource = !sourceFilter || c.source?.toLowerCase()===sourceFilter.toLowerCase();
    return matchSearch && matchStatus && matchSource;
  });

  const statusColors = {active:{bg:'var(--green-light)',color:'var(--green)'},inactive:{bg:'var(--grey-100)',color:'var(--grey-400)'},vip:{bg:'var(--pink-light)',color:'var(--pink)'}};

  if(view==='new') return <ClientForm onSave={handleSaveNew} onCancel={()=>setView('list')}/>;
  if(view==='detail') return <ClientDetail clientId={selectedId} onBack={()=>{setView('list');setSelectedId(null);loadClients();}}/>;

  return (
    <div>
      {saveSuccess&&<div style={{background:'var(--green-light)',color:'var(--green)',borderRadius:'var(--radius-sm)',padding:'10px 14px',fontSize:13,marginBottom:16,border:'1px solid rgba(15,110,86,0.2)'}}>✅ {saveSuccess}</div>}

      {/* Metrics */}
      <div className="metrics-grid" style={{marginBottom:20}}>
        <div className="metric-card pink"><div className="metric-icon">👥</div><div className="metric-value">{clients.length}</div><div className="metric-label">Total clients</div></div>
        <div className="metric-card green"><div className="metric-icon">⭐</div><div className="metric-value">{clients.filter(c=>c.status?.toLowerCase()==='vip').length}</div><div className="metric-label">VIP clients</div></div>
        <div className="metric-card blue"><div className="metric-icon">✅</div><div className="metric-value">{clients.filter(c=>c.status?.toLowerCase()==='active').length}</div><div className="metric-label">Active clients</div></div>
        <div className="metric-card orange"><div className="metric-icon">🔗</div><div className="metric-value">{clients.filter(c=>c.source?.toLowerCase()==='referral').length}</div><div className="metric-label">From referrals</div></div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center'}}>
        <div style={{flex:1,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--grey-400)',pointerEvents:'none'}}>🔍</span>
          <input className="field-input" style={{paddingLeft:36}} placeholder="Search by name, phone, email, city..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="field-input" style={{width:140}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="vip">VIP</option>
        </select>
        <select className="field-input" style={{width:140}} value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}>
          <option value="">All sources</option>
          <option value="referral">Referral</option>
          <option value="website">Website</option>
          <option value="manual">Manual</option>
        </select>
        <button className="btn primary" onClick={()=>setView('new')}>+ New client</button>
        <button className="btn" onClick={()=>setShowUpload(true)}>⬆️ Import</button>
      </div>
      {showUpload&&<MassClientUpload onClose={()=>setShowUpload(false)} onSuccess={(count)=>{setShowUpload(false);loadClients();setSaveSuccess(`${count} clients imported successfully!`);setTimeout(()=>setSaveSuccess(''),4000);}}/>}

      {/* List */}
      {loading ? (
        <div style={{padding:60,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}></div></div>
      ) : filtered.length===0 ? (
        <div style={{background:'white',borderRadius:'var(--radius-lg)',padding:60,textAlign:'center',border:'1px solid var(--grey-100)'}}>
          <div style={{fontSize:48,marginBottom:12}}>👥</div>
          <div style={{fontSize:15,fontWeight:600,color:'var(--grey-800)',marginBottom:6}}>{search||statusFilter||sourceFilter?'No clients found':'No clients yet'}</div>
          <div style={{fontSize:13,color:'var(--grey-400)',marginBottom:16}}>{search||statusFilter||sourceFilter?'Try adjusting your search or filters':'Add your first client to get started'}</div>
          {!search&&!statusFilter&&!sourceFilter&&<button className="btn primary" onClick={()=>setView('new')}>+ Add first client</button>}
        </div>
      ) : (
        <div style={{background:'white',borderRadius:'var(--radius-lg)',border:'1px solid var(--grey-100)',overflow:'hidden'}}>
          <div style={{padding:'10px 20px',borderBottom:'1px solid var(--grey-100)',fontSize:12,color:'var(--grey-400)',fontWeight:500}}>
            {filtered.length} client{filtered.length!==1?'s':''} {search||statusFilter||sourceFilter?'(filtered)':''}
          </div>
          {filtered.map((c,i)=>{
            const sc=statusColors[c.status?.toLowerCase()]||statusColors.active;
            return (
              <div key={c.client_id}
                style={{display:'grid',gridTemplateColumns:'auto 1fr auto auto',gap:16,alignItems:'center',padding:'14px 20px',borderBottom:i<filtered.length-1?'1px solid var(--grey-100)':'none',cursor:'pointer',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--grey-50)'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}
                onClick={()=>{setSelectedId(c.client_id);setView('detail');}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:'var(--pink-light)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'var(--pink)',flexShrink:0}}>
                  {c.first_name?.charAt(0)}{c.last_name?.charAt(0)}
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:500,color:'var(--grey-800)'}}>{c.first_name} {c.last_name}{c.ref_number&&<span style={{fontSize:11,color:'var(--grey-400)',fontWeight:400,marginLeft:6}}>{c.ref_number}</span>}</div>
                  <div style={{fontSize:12,color:'var(--grey-400)',marginTop:2}}>{c.phone_1}{c.email_1?` · ${c.email_1}`:''}{c.city?` · ${c.city}`:''}</div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:sc.bg,color:sc.color}}>{c.status?.toUpperCase()}</span>
                  <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:'var(--blue-light)',color:'var(--blue)',textTransform:'capitalize'}}>{c.source}</span>
                </div>
                <div style={{color:'var(--grey-400)',fontSize:16}}>›</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const MAX_QTY = 9999;
const MAX_PRICE = 9999999; // 99,99,999 — ~1 crore per item
const sanitizeNum = (val, max) => {
  const n = parseFloat(String(val).replace(/[^0-9.]/g,''));
  if(isNaN(n)||n<0) return 0;
  if(n>max){ setTimeout(()=>alert('Value '+n.toLocaleString('en-IN')+' seems too high — please check. Maximum allowed is '+max.toLocaleString('en-IN')+'.'),0); return max; }
  return n;
};
