<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Quote Approval · Isheeka Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#E8185A;--rose:#A01044;--pink-light:#FCEAF1;--pink-mid:#EF93B4;
    --gold:#B8893A;--gold-soft:#F0C674;
    --ink:#2A2723;--muted:#6B6660;--faint:#9A938A;--line:#E5DDD2;--line2:#F1ECE4;
    --bg:#F3EFE9;--card:#ffffff;--field:#FAF7F3;--green:#0F6E56;--red:#A32D2D;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:600px;margin:0 auto;padding:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.06);}
  .mast{background:var(--rose);padding:20px 16px;text-align:center;}
  .mast .name{font-family:'Great Vibes',cursive;color:#fff;font-size:34px;line-height:1;}
  .mast .tag{font-family:'Cormorant Garamond',serif;font-style:italic;color:#F3C9D9;font-size:13px;margin-top:3px;}
  .mast .since{font-family:'Great Vibes',cursive;color:var(--gold-soft);font-size:17px;margin-top:2px;}
  .pad{padding:18px 18px 22px;}
  h1{font-size:17px;font-weight:600;margin:0 0 4px;}
  h2{font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--gold);text-transform:uppercase;margin:18px 0 6px;}
  .sub{font-size:12px;color:var(--faint);margin-bottom:14px;}
  label{display:block;font-size:11px;color:var(--faint);margin:10px 0 4px;font-weight:600;letter-spacing:.03em;}
  input[type=text],input[type=number]{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--field);border:1.5px solid var(--line);border-radius:9px;padding:10px 11px;outline:none;}
  input:focus{border-color:var(--pink-mid);}
  .row{display:flex;gap:10px;}.row>div{flex:1;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:600;border-radius:11px;padding:12px 18px;border:none;cursor:pointer;font-family:inherit;text-decoration:none;}
  .btn.primary{background:var(--pink);color:#fff;}
  .btn.danger{background:var(--red);color:#fff;}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted);}
  .btn.green{background:var(--green);color:#fff;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn-row .btn{flex:1;min-width:120px;}
  .note{font-size:11px;color:var(--faint);margin-top:10px;text-align:center;}
  .err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--pink);border-radius:50%;animation:s 1s linear infinite;margin:36px auto;}
  @keyframes s{to{transform:rotate(360deg)}}
  .center{text-align:center;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-bottom:8px;}
  .info-grid .label{font-size:11px;color:var(--faint);margin:0;}
  .info-grid .value{font-size:13px;font-weight:500;color:var(--ink);}
  .divider{border:none;border-top:1px solid var(--line2);margin:14px 0;}
  .item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--line2);font-size:13px;}
  .item-row:last-child{border-bottom:none;}
  .item-desc{flex:1;color:var(--ink);}
  .item-amt{font-weight:500;color:var(--ink);white-space:nowrap;}
  .sub-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:4px 0 4px 16px;font-size:12px;color:var(--muted);}
  .total-box{background:var(--field);border-radius:10px;padding:12px 16px;margin-top:10px;}
  .total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
  .total-row.grand{font-size:16px;font-weight:700;color:var(--green);border-top:1px solid var(--line2);margin-top:4px;padding-top:6px;}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;}
  .badge.pending{background:#FFF7ED;color:#92400E;}
  .badge.signed{background:#ECFDF5;color:var(--green);}
  .badge.declined{background:#FEF2F2;color:var(--red);}
  .pin-input{width:100%;font-family:inherit;font-size:22px;font-weight:700;color:var(--rose);background:var(--field);border:1.5px solid var(--line);border-radius:9px;padding:12px;outline:none;text-align:center;letter-spacing:8px;}
  .pin-input:focus{border-color:var(--pink-mid);}
  .name-input{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--field);border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;}
  .name-input:focus{border-color:var(--pink-mid);}
  .checkbox-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0;font-size:13px;color:var(--muted);cursor:pointer;}
  .checkbox-row input{margin-top:2px;accent-color:var(--rose);width:16px;height:16px;flex:none;}
  .success-icon{font-size:48px;text-align:center;margin:10px 0;}
  .section{padding:0 18px 16px;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin:14px 0 8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="mast">
      <div class="name">Isheeka Events</div>
      <div class="tag">Making Every Event Memorable</div>
      <div class="since">Since 2017</div>
    </div>
    <div id="app"><div class="spin"></div></div>
  </div>
  <div class="note">Isheeka Events · Secure quote approval</div>
</div>
<div class="toast" id="toast"></div>

<script>
const GATEWAY = (/localhost|127\.0\.0\.1/.test(location.hostname))
  ? 'http://127.0.0.1:54321/functions/v1/rfq-gateway'
  : 'https://jlcssesetnxulnkbrmyp.supabase.co/functions/v1/rfq-gateway';

const token = new URLSearchParams(location.search).get('t') || '';
const app = document.getElementById('app');

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

function inr(n){ return '₹'+(parseFloat(n)||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtDate(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return d; } }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function api(payload){
  const r = await fetch(GATEWAY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  let j={}; try{ j=await r.json(); }catch(e){}
  return Object.assign({_http:r.status},j);
}

// Boot
(async function boot(){
  if(!token){ renderMsg('This link is missing its token. Please use the full link Isheeka shared with you.'); return; }
  app.innerHTML='<div class="spin"></div>';
  const r = await api({action:'view_quote_by_token',token});
  if(!r.ok || !r.quote){ renderMsg(r.error==='not_found'?'This approval link is invalid or has expired. Please contact Isheeka Events.':(r.error||'Could not load the quotation. Please try again.')); return; }
  renderQuote(r.quote, r.items||[]);
})();

function renderMsg(text){
  app.innerHTML='<div class="pad center"><p style="font-size:14px;color:var(--muted);padding:20px 0">'+esc(text)+'</p></div>';
}

function renderQuote(q, items){
  const status = q.approval_status;
  const alreadyDone = status==='signed'||status==='declined';

  // Build line items HTML
  let itemsHtml='';
  items.forEach(li=>{
    const qty=parseFloat(li.quantity)||0, up=parseFloat(li.unit_price)||0;
    const amt=(li.amount!=null&&li.amount!=='')?parseFloat(li.amount):qty*up;
    const showPrice = up>0;
    itemsHtml+='<div class="item-row">'
      +'<span class="item-desc">'+esc(li.description||'')+(qty&&showPrice?' <span style="color:var(--faint);font-size:11px">×'+qty+'</span>':'')+'</span>'
      +(showPrice?'<span class="item-amt">'+inr(amt)+'</span>':'')
    +'</div>';
    // sub_items
    if(Array.isArray(li.sub_items)){
      li.sub_items.forEach(si=>{
        const sUp=parseFloat(si.unit_price)||0, sQty=parseFloat(si.quantity)||1;
        const sAmt=(si.amount!=null&&si.amount!=='')?parseFloat(si.amount):sQty*sUp;
        itemsHtml+='<div class="sub-item"><span style="flex:1">↳ '+esc(si.description||'')+'</span>'+(sUp>0?'<span>'+inr(sAmt)+'</span>':'')+'</div>';
      });
    }
  });

  // Status badge
  let badgeHtml='';
  if(status==='pending') badgeHtml='<span class="badge pending">🔏 Awaiting approval</span>';
  else if(status==='signed') badgeHtml='<span class="badge signed">✅ Approved'+(q.approver_name?' by '+esc(q.approver_name):'')+'</span>';
  else if(status==='declined') badgeHtml='<span class="badge declined">❌ Declined</span>';

  // Totals
  const disc=parseFloat(q.discount_amount)||0;
  let totalsHtml='<div class="total-box">';
  totalsHtml+='<div class="total-row"><span>Subtotal</span><span>'+inr(q.subtotal||0)+'</span></div>';
  if(Math.abs(disc)>0.5) totalsHtml+='<div class="total-row"><span>Adjustment</span><span>'+(disc>0?'- ':'+ ')+inr(Math.abs(disc))+'</span></div>';
  totalsHtml+='<div class="total-row grand"><span>Grand Total</span><span>'+inr(q.grand_total||0)+'</span></div>';
  totalsHtml+='</div>';

  // Approval form or already-done message
  let formHtml='';
  if(alreadyDone){
    if(status==='signed'){
      formHtml='<div class="section"><div class="success-icon">✅</div>'
        +'<div class="center" style="font-size:15px;font-weight:600;color:var(--green);margin-bottom:6px">Quotation approved</div>'
        +'<div class="center" style="font-size:13px;color:var(--muted)">'+(q.approver_name?'Signed by <b>'+esc(q.approver_name)+'</b>. ':'')
        +(q.client_approved_at?'Approved on '+fmtDate(q.client_approved_at)+'.':'')+'</div></div>';
    } else {
      formHtml='<div class="section"><div class="success-icon">❌</div>'
        +'<div class="center" style="font-size:15px;font-weight:600;color:var(--red);margin-bottom:6px">Quotation declined</div>'
        +'<div class="center" style="font-size:13px;color:var(--muted)">Please contact Isheeka Events if you have questions.</div></div>';
    }
  } else {
    formHtml=`
    <div class="section">
      <div class="section-title">Sign to approve</div>
      <label>PIN (shared by Isheeka Events)</label>
      <input class="pin-input" type="password" inputmode="numeric" maxlength="6" id="pin" placeholder="••••" autocomplete="off"/>
      <label style="margin-top:12px">Your name (typed signature)</label>
      <input class="name-input" type="text" id="signame" placeholder="Your full name" autocomplete="name"/>
      <label class="checkbox-row" style="margin-top:14px"><input type="checkbox" id="agree"/> I have reviewed the quotation and agree to proceed on these terms.</label>
      <div class="err" id="ferr"></div>
      <div class="btn-row">
        <button class="btn green" id="btnApprove">✅ Approve &amp; Sign</button>
        <button class="btn danger" id="btnDecline">❌ Decline</button>
      </div>
    </div>`;
  }

  app.innerHTML=`
  <div class="pad">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:4px">
      <h1>Quotation ${esc(q.ref_number||'')}</h1>
      ${badgeHtml}
    </div>
    <div class="sub">${esc(q.client_name||'')}${q.event_name?' · '+esc(q.event_name):''}${q.doc_date?' · '+fmtDate(q.doc_date):''}</div>
  </div>
  <hr class="divider" style="margin:0 18px"/>
  <div class="section">
    <div class="section-title">Quote details</div>
    <div class="info-grid">
      <div><div class="label">Reference</div><div class="value">${esc(q.ref_number||'—')}</div></div>
      <div><div class="label">Date</div><div class="value">${fmtDate(q.doc_date)}</div></div>
      <div><div class="label">Client</div><div class="value">${esc(q.client_name||'—')}</div></div>
      <div><div class="label">Event</div><div class="value">${esc(q.event_name||'—')}</div></div>
    </div>
  </div>
  <hr class="divider" style="margin:0 18px"/>
  <div class="section">
    <div class="section-title">Line items</div>
    ${itemsHtml||'<div style="font-size:13px;color:var(--faint)">No items.</div>'}
    ${totalsHtml}
  </div>
  <hr class="divider" style="margin:0 18px"/>
  ${formHtml}
  `;

  if(!alreadyDone){
    document.getElementById('btnApprove').onclick = ()=>submitApproval('signed');
    document.getElementById('btnDecline').onclick = ()=>submitApproval('declined');
  }
}

async function submitApproval(action){
  const pin=(document.getElementById('pin').value||'').trim();
  const name=(document.getElementById('signame').value||'').trim();
  const agree=document.getElementById('agree').checked;
  const ferr=document.getElementById('ferr');
  ferr.textContent='';

  if(action==='signed'){
    if(!pin){ ferr.textContent='Please enter your PIN.'; return; }
    if(!name){ ferr.textContent='Please enter your name.'; return; }
    if(!agree){ ferr.textContent='Please check the agreement box to proceed.'; return; }
  } else {
    if(!pin){ ferr.textContent='Please enter your PIN to confirm decline.'; return; }
    if(!window.confirm('Are you sure you want to decline this quotation?')) return;
  }

  const btnApprove=document.getElementById('btnApprove');
  const btnDecline=document.getElementById('btnDecline');
  if(btnApprove) btnApprove.disabled=true;
  if(btnDecline) btnDecline.disabled=true;
  ferr.textContent='';

  const r = await api({action:'submit_quote_approval',token,pin,signer_name:name,approval_action:action});

  if(r.ok){
    if(action==='signed'){
      app.innerHTML='<div class="pad"><div class="success-icon">✅</div>'
        +'<div class="center" style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:8px">Quotation approved!</div>'
        +'<div class="center" style="font-size:13px;color:var(--muted)">Thank you, <b>'+esc(name)+'</b>. Your approval has been recorded. Isheeka Events will be in touch shortly.</div></div>';
    } else {
      app.innerHTML='<div class="pad"><div class="success-icon">❌</div>'
        +'<div class="center" style="font-size:16px;font-weight:700;color:var(--red);margin-bottom:8px">Quotation declined</div>'
        +'<div class="center" style="font-size:13px;color:var(--muted)">Your response has been recorded. Isheeka Events will follow up with you.</div></div>';
    }
  } else {
    if(btnApprove) btnApprove.disabled=false;
    if(btnDecline) btnDecline.disabled=false;
    ferr.textContent = r.error==='wrong_pin'?'Incorrect PIN — please check and try again.'
      : r.error==='already_actioned'?'This quotation has already been approved or declined.'
      : r.error==='not_found'?'This approval link is invalid or has expired.'
      : (r.error||'Something went wrong. Please try again.');
  }
}
</script>
</body>
</html>
